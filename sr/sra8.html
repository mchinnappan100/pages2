<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCap — Screen Recorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #00f5a0;
      --accent2: #7c3aed;
      --red: #ff3b5c;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 20px; height: 20px; }

    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand span { color: var(--accent); }

    .version {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    /* Preview area */
    .preview-area {
      position: relative;
      background: #06060c;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    .preview-placeholder svg { width: 48px; height: 48px; }

    .preview-placeholder p {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* Recording indicator */
    .rec-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 59, 92, 0.15);
      border: 1px solid rgba(255, 59, 92, 0.4);
      border-radius: 100px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--red);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .rec-badge.visible { opacity: 1; }

    .rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Timer */
    .timer {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      background: rgba(10, 10, 15, 0.7);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .timer.visible { opacity: 1; }

    /* Camera PIP */
    #camera-pip {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 120px;
      height: 90px;
      border-radius: 10px;
      border: 2px solid var(--accent);
      object-fit: cover;
      box-shadow: 0 0 20px rgba(0, 245, 160, 0.25);
      display: none;
      cursor: move;
      z-index: 10;
    }

    #camera-pip.active { display: block; }

    /* Controls area */
    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Options row */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .option-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }

    .option-toggle:hover {
      border-color: var(--accent);
      background: rgba(0, 245, 160, 0.04);
    }

    .option-toggle.active {
      border-color: var(--accent);
      background: rgba(0, 245, 160, 0.07);
    }

    .option-toggle svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .option-toggle.active svg { opacity: 1; color: var(--accent); }

    .toggle-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .toggle-switch {
      margin-left: auto;
      width: 28px;
      height: 16px;
      background: var(--border);
      border-radius: 100px;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .option-toggle.active .toggle-switch {
      background: var(--accent);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .option-toggle.active .toggle-switch::after {
      transform: translateX(12px);
    }

    /* Filename input */
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent2); }

    .input-row svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }

    .filename-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 0;
    }

    .input-suffix {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* Buttons row */
    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .btn-start {
      background: var(--accent);
      color: #0a0a0f;
    }

    .btn-start:not(:disabled):hover {
      box-shadow: 0 0 24px rgba(0, 245, 160, 0.4);
    }

    .btn-stop {
      background: var(--red);
      color: white;
      flex: 0 0 auto;
      width: 48px;
      padding: 0;
    }

    .btn-stop:not(:disabled):hover {
      box-shadow: 0 0 20px rgba(255, 59, 92, 0.4);
    }

    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Tip */
    .tip {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      background: rgba(124, 58, 237, 0.06);
      border: 1px solid rgba(124, 58, 237, 0.15);
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.5;
    }

    .tip svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; color: var(--accent2); }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.ready { background: var(--accent); }
    .status-dot.recording { background: var(--red); animation: pulse-dot 1.2s infinite; }

    #status-text { transition: color 0.3s; }

    /* Download toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast svg { width: 16px; height: 16px; }

    a#download { display: none; }

    /* Resize handle for PIP */
    #camera-pip:hover::after {
      content: '⤢';
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: 10px;
      color: var(--accent);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="5" fill="#0a0a0f"/>
        <circle cx="12" cy="12" r="9"/>
      </svg>
    </div>
    <div class="brand">Screen<span>Cap</span></div>
    <div class="version">v2.0</div>
  </div>

  <div class="card">
    <!-- Preview -->
    <div class="preview-area" id="preview-area">
      <div class="preview-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="4" width="20" height="14" rx="2"/>
          <path d="M8 20h8M12 18v2"/>
        </svg>
        <p>ready to capture</p>
      </div>
      <div class="rec-badge" id="rec-badge"><span class="rec-dot"></span> REC</div>
      <div class="timer" id="timer">00:00</div>
      <video id="camera-pip" autoplay muted playsinline></video>
    </div>

    <!-- Controls -->
    <div class="controls">

      <!-- Options -->
      <div class="options-grid">
        <div class="option-toggle active" id="toggle-audio" title="Record microphone audio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/>
          </svg>
          <span class="toggle-label">Microphone</span>
          <div class="toggle-switch"></div>
        </div>

        <div class="option-toggle" id="toggle-camera" title="Show camera overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
          <span class="toggle-label">Camera PIP</span>
          <div class="toggle-switch"></div>
        </div>

        <div class="option-toggle active" id="toggle-cursor" title="Show cursor in recording">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 4l7.07 17 2.51-7.39L21 11.07 4 4z"/>
          </svg>
          <span class="toggle-label">Show Cursor</span>
          <div class="toggle-switch"></div>
        </div>

        <div class="option-toggle active" id="toggle-echo" title="Noise suppression">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <span class="toggle-label">Noise Filter</span>
          <div class="toggle-switch"></div>
        </div>
      </div>

      <!-- Filename -->
      <div class="input-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
          <polyline points="13,2 13,9 20,9"/>
        </svg>
        <input class="filename-input" id="filename" type="text" placeholder="screenRecording" value="" spellcheck="false"/>
        <span class="input-suffix">.webm</span>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-start" id="start">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
          Start Recording
        </button>
        <button class="btn btn-stop" id="stop" disabled title="Stop Recording">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>

      <!-- Tip -->
      <div class="tip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span>Pick a <strong>different tab or window</strong> — do not share this recorder tab · Camera PIP is draggable · <code>?show-camera=true</code> to auto-enable</span>
      </div>

      <!-- Warning banner (shown on self-tab capture) -->
      <div id="warning-banner" style="display:none;align-items:flex-start;gap:8px;background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.4);border-radius:8px;padding:10px 12px;font-size:12px;color:#ff3b5c;line-height:1.5;font-family:var(--mono);"></div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Idle — ready to record</span>
    </div>
  </div>
</div>

<!-- Download toast -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
  <span id="toast-msg">Recording saved!</span>
</div>

<a id="download"></a>

<script>
  const qp = new URLSearchParams(location.search);
  document.getElementById('filename').value = qp.get('f') || 'screenRecording';
  if (qp.get('show-camera') === 'true') document.getElementById('toggle-camera').classList.add('active');

  let mediaRecorder  = null;
  let recordedChunks = [];
  let timerInterval  = null;
  let rafId          = null;
  let seconds        = 0;
  let cameraStream   = null;
  let pipPos         = { x: null, y: null };

  const startBtn    = document.getElementById('start');
  const stopBtn     = document.getElementById('stop');
  const recBadge    = document.getElementById('rec-badge');
  const timerEl     = document.getElementById('timer');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const cameraPip   = document.getElementById('camera-pip');
  const downloadEl  = document.getElementById('download');
  const toast       = document.getElementById('toast');
  const toastMsg    = document.getElementById('toast-msg');
  const placeholder = document.getElementById('placeholder');

  function getToggle(id) { return document.getElementById(id).classList.contains('active'); }
  function setStatus(state, msg) {
    statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    statusText.textContent = msg;
  }
  function showToast(msg) {
    toastMsg.textContent = msg; toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }
  function showWarning(msg) {
    const el = document.getElementById('warning-banner');
    el.textContent = '⚠️ ' + msg; el.style.display = 'flex';
    setTimeout(() => el.style.display = 'none', 8000);
  }
  function startTimer() {
    seconds = 0; timerEl.textContent = '00:00'; timerEl.classList.add('visible');
    timerInterval = setInterval(() => {
      seconds++;
      timerEl.textContent = String(Math.floor(seconds/60)).padStart(2,'0') + ':' + String(seconds%60).padStart(2,'0');
    }, 1000);
  }
  function stopTimer() { clearInterval(timerInterval); timerEl.classList.remove('visible'); }

  // Option toggles
  document.querySelectorAll('.option-toggle').forEach(el => {
    el.addEventListener('click', () => {
      if (mediaRecorder) return;
      el.classList.toggle('active');
      if (el.id === 'toggle-camera') handleCameraToggle();
    });
  });

  // Camera toggle
  async function handleCameraToggle() {
    if (getToggle('toggle-camera')) {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        cameraPip.srcObject = cameraStream;
        cameraPip.classList.add('active');
        setStatus('ready', 'Camera ready');
      } catch(e) {
        document.getElementById('toggle-camera').classList.remove('active');
        setStatus('', 'Camera permission denied');
      }
    } else {
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      cameraPip.srcObject = null;
      cameraPip.classList.remove('active');
      pipPos = { x: null, y: null };
    }
  }
  if (qp.get('show-camera') === 'true') handleCameraToggle();

  // Draggable PIP preview
  let dragging = false, dragDx = 0, dragDy = 0;
  cameraPip.addEventListener('mousedown', e => {
    dragging = true;
    dragDx = e.clientX - cameraPip.getBoundingClientRect().left;
    dragDy = e.clientY - cameraPip.getBoundingClientRect().top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const area = document.getElementById('preview-area').getBoundingClientRect();
    const x = Math.max(0, Math.min(area.width  - cameraPip.offsetWidth,  e.clientX - area.left - dragDx));
    const y = Math.max(0, Math.min(area.height - cameraPip.offsetHeight, e.clientY - area.top  - dragDy));
    cameraPip.style.right = 'auto'; cameraPip.style.bottom = 'auto';
    cameraPip.style.left = x + 'px'; cameraPip.style.top = y + 'px';
    pipPos.x = x / area.width; pipPos.y = y / area.height;
  });
  document.addEventListener('mouseup', () => dragging = false);

  // ── waitForVideo: resolves once a video element has real decoded frames ──
  function waitForVideo(vid) {
    return new Promise(resolve => {
      if (vid.readyState >= 3 && vid.videoWidth > 0) { resolve(); return; }
      const check = () => {
        if (vid.readyState >= 3 && vid.videoWidth > 0) { resolve(); return; }
        requestAnimationFrame(check);
      };
      vid.onloadedmetadata = () => vid.play().then(check).catch(resolve);
      vid.oncanplaythrough = check;
      setTimeout(resolve, 4000); // hard fallback
    });
  }

  // ── Start recording ────────────────────────────────────────────────────
  startBtn.addEventListener('click', async () => {
    const withAudio   = getToggle('toggle-audio');
    const withCursor  = getToggle('toggle-cursor');
    const noiseFilter = getToggle('toggle-echo');
    const withCamera  = getToggle('toggle-camera') && !!cameraStream;

    try {
      const screenStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: withCursor ? 'always' : 'never' },
        audio: false
      });

      // Self-tab guard
      const label = screenStream.getVideoTracks()[0].label || '';
      if (['localhost', location.pathname, 'ScreenCap', document.title]
          .some(h => h && label.toLowerCase().includes(h.toLowerCase()))) {
        screenStream.getTracks().forEach(t => t.stop());
        showWarning('You captured this recorder tab — click Start and choose a different tab, window or screen.');
        setStatus('', 'Wrong tab selected'); return;
      }

      setStatus('recording', 'Starting…');

      // Mic
      let micStream = null;
      if (withAudio) {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: noiseFilter, noiseSuppression: noiseFilter, sampleRate: 44100 }
          });
        } catch(e) { /* no mic, continue */ }
      }

      let recordedStream, cleanup;

      if (withCamera) {
        // ── Canvas compositor: screen + camera PIP ─────────────────────
        const screenTrack = screenStream.getVideoTracks()[0];
        const settings    = screenTrack.getSettings();

        // Two off-screen videos, both appended to DOM at tiny opacity
        // so Chrome's media pipeline actually decodes their frames
        const sv = Object.assign(document.createElement('video'),
          { autoplay: true, muted: true, playsInline: true });
        sv.style.cssText = 'position:fixed;left:-9999px;top:0;width:2px;height:2px;opacity:0.001;pointer-events:none';
        document.body.appendChild(sv);
        sv.srcObject = screenStream;

        const cv = Object.assign(document.createElement('video'),
          { autoplay: true, muted: true, playsInline: true });
        cv.style.cssText = 'position:fixed;left:-9999px;top:0;width:2px;height:2px;opacity:0.001;pointer-events:none';
        document.body.appendChild(cv);
        cv.srcObject = cameraStream;

        // Wait until both have decoded frames
        setStatus('recording', 'Warming up camera…');
        await Promise.all([ waitForVideo(sv), waitForVideo(cv) ]);
        // One extra RAF to be safe
        await new Promise(r => requestAnimationFrame(r));

        const sw = sv.videoWidth  || settings.width  || 1920;
        const sh = sv.videoHeight || settings.height || 1080;

        const canvas = document.createElement('canvas');
        canvas.width = sw; canvas.height = sh;
        const ctx = canvas.getContext('2d');

        const pipW = Math.round(sw * 0.22);
        const pipH = Math.round(pipW * 0.75);
        const mg   = Math.round(sw * 0.018);
        const cr   = Math.round(sw * 0.008);

        function rrect(x, y, w, h, r) {
          ctx.beginPath();
          ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
          ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
          ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
          ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
          ctx.closePath();
        }

        const draw = () => {
          if (sv.readyState >= 2) ctx.drawImage(sv, 0, 0, sw, sh);
          if (cv.readyState >= 2) {
            const px = pipPos.x !== null ? Math.round(pipPos.x * sw) : sw - pipW - mg;
            const py = pipPos.y !== null ? Math.round(pipPos.y * sh) : sh - pipH - mg;
            ctx.save(); ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=24;
            rrect(px,py,pipW,pipH,cr); ctx.clip(); ctx.drawImage(cv,px,py,pipW,pipH); ctx.restore();
            ctx.save(); ctx.strokeStyle='#00f5a0'; ctx.lineWidth=Math.max(2,sw*0.002);
            rrect(px,py,pipW,pipH,cr); ctx.stroke(); ctx.restore();
          }
          rafId = requestAnimationFrame(draw);
        };
        draw();

        // Let the canvas draw a few real frames before captureStream
        await new Promise(r => setTimeout(r, 200));

        const canvasTracks = canvas.captureStream(30).getVideoTracks();
        const allTracks = [...canvasTracks];
        if (micStream) allTracks.push(...micStream.getAudioTracks());
        recordedStream = new MediaStream(allTracks);
        cleanup = () => {
          cancelAnimationFrame(rafId); rafId = null;
          sv.srcObject = null; cv.srcObject = null;
          sv.remove(); cv.remove();
        };

      } else {
        // ── Direct recording — no canvas ───────────────────────────────
        const allTracks = [...screenStream.getVideoTracks()];
        if (micStream) allTracks.push(...micStream.getAudioTracks());
        recordedStream = new MediaStream(allTracks);
        cleanup = () => {};
      }

      // MediaRecorder
      recordedChunks = [];
      const mimeType = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
        .find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

      mediaRecorder = new MediaRecorder(recordedStream, { mimeType });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        cleanup();
        screenStream.getTracks().forEach(t => t.stop());
        if (micStream) micStream.getTracks().forEach(t => t.stop());
        const filename = (document.getElementById('filename').value.trim() || 'screenRecording') + '.webm';
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        recordedChunks = [];
        const url = URL.createObjectURL(blob);
        downloadEl.href = url; downloadEl.download = filename;
        downloadEl.click(); URL.revokeObjectURL(url);
        showToast('Saved as ' + filename); resetUI();
      };

      // Stop when user clicks "Stop sharing" in browser
      screenStream.getVideoTracks()[0].addEventListener('ended', () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      });

      mediaRecorder.start(1000);

      startBtn.disabled = true; stopBtn.disabled = false;
      recBadge.classList.add('visible'); placeholder.style.opacity = '0';
      startTimer(); setStatus('recording', 'Recording…');
      document.querySelectorAll('.option-toggle').forEach(el => el.style.pointerEvents = 'none');

    } catch(err) {
      console.error(err);
      setStatus('', err.name === 'NotAllowedError' ? 'Permission denied' : 'Error: ' + err.message);
    }
  });

  stopBtn.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  });

  function resetUI() {
    startBtn.disabled = false; stopBtn.disabled = true;
    recBadge.classList.remove('visible'); placeholder.style.opacity = '1';
    stopTimer(); setStatus('ready', 'Recording complete — ready again');
    document.querySelectorAll('.option-toggle').forEach(el => el.style.pointerEvents = '');
    mediaRecorder = null;
  }

  setStatus('ready', 'Idle — ready to record');
</script>
</body>
</html>
