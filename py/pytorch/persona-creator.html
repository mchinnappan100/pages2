<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Creator</title>
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f0f2f8;
  --panel:    #1a1e30;
  --panel2:   #22273b;
  --card:     #ffffff;
  --ink:      #1a1d2e;
  --ink-soft: #64748b;
  --line:     #e2e8f0;
  --accent:   #6366f1;
  --accent2:  #8b5cf6;
  --sp-w:     16px;
}

html { height: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); height: 100%; display: flex; flex-direction: column; overflow: hidden; }

/* ── HEADER ─────────────────────────────── */
.hdr {
  background: linear-gradient(135deg, #0f1b35 0%, #1a3a6b 100%);
  padding: 14px 24px; display: flex; align-items: center;
  justify-content: space-between; gap: 12px; flex-wrap: wrap; flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.hdr-brand { display: flex; align-items: center; gap: 14px; }
.hdr-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.hdr h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; }
.hdr p  { font-size: 11.5px; color: rgba(255,255,255,.5); margin-top: 1px; }
.hdr-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; background: rgba(99,102,241,.25); color: #a5b4fc; padding: 3px 10px; border-radius: 999px; border: 1px solid rgba(99,102,241,.35); }

/* ── APP SHELL ──────────────────────────── */
.app { display: flex; flex: 1 1 0; min-height: 0; height: 0; position: relative; overflow: hidden; }

/* ── CONTROLS ───────────────────────────── */
.controls {
  width: 290px; min-width: 200px; max-width: 480px;
  flex-shrink: 0; background: var(--panel);
  height: 100%; overflow-y: auto; overflow-x: hidden;
  padding: 16px 14px 24px; display: flex; flex-direction: column; gap: 4px;
}

/* Gender selector */
.gender-sel {
  display: flex; background: rgba(0,0,0,.25); border-radius: 9px; padding: 3px; gap: 3px; margin-bottom: 10px;
}
.gender-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 6px; border-radius: 6px; border: none;
  background: transparent; color: rgba(255,255,255,.45);
  cursor: pointer; font-size: 12.5px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.gender-btn .gi { font-size: 17px; }
.gender-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,.4); }

.ctrl-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase;
  color: rgba(255,255,255,.3); padding: 8px 2px 5px;
}
.ctrl-input {
  width: 100%; padding: 8px 11px;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  border-radius: 7px; color: #e2e8f0; font-size: 13px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border .2s, background .2s;
}
.ctrl-input:focus { border-color: var(--accent); background: rgba(99,102,241,.12); }
.ctrl-input::placeholder { color: rgba(255,255,255,.22); }

/* Swatches */
.swatches { display: flex; flex-wrap: wrap; gap: 6px; padding: 2px 0; }
.swatch {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  border: 2.5px solid transparent; transition: transform .15s, border .15s;
}
.swatch:hover { transform: scale(1.18); }
.swatch.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 0 1px rgba(0,0,0,.4); }

/* Hair styles — 4-column */
.hair-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.hair-btn {
  background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 7px; padding: 6px 2px 5px;
  text-align: center; cursor: pointer; transition: all .15s; color: rgba(255,255,255,.55);
  font-size: 10px; font-weight: 600; line-height: 1.4;
}
.hair-btn .hi { font-size: 18px; display: block; margin-bottom: 2px; }
.hair-btn:hover { background: rgba(255,255,255,.11); }
.hair-btn.active { background: rgba(99,102,241,.3); border-color: var(--accent); color: #a5b4fc; }

/* Facial hair — 3-column */
.fhair-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.fhair-btn {
  background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 7px; padding: 5px 2px 4px;
  text-align: center; cursor: pointer; transition: all .15s; color: rgba(255,255,255,.55);
  font-size: 10px; font-weight: 600; line-height: 1.4;
}
.fhair-btn .fi { font-size: 16px; display: block; margin-bottom: 2px; }
.fhair-btn:hover { background: rgba(255,255,255,.11); }
.fhair-btn.active { background: rgba(99,102,241,.3); border-color: var(--accent); color: #a5b4fc; }

/* Toggles */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
.toggle-lbl { font-size: 12.5px; color: rgba(255,255,255,.6); }
.toggle {
  width: 38px; height: 22px; border-radius: 999px;
  background: rgba(255,255,255,.15); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform .2s;
}
.toggle.on::after { transform: translateX(16px); }

.ctrl-div { height: 1px; background: rgba(255,255,255,.07); margin: 6px 0; }

/* ── SPLITTER ───────────────────────────── */
.splitter {
  width: var(--sp-w); flex-shrink: 0; height: 100%;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
  cursor: col-resize; display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 20; user-select: none;
  transition: background .2s;
}
.splitter:hover { background: linear-gradient(180deg, #252b45 0%, #2e3550 100%); }
.splitter.dragging { background: linear-gradient(180deg, #312e81 0%, #3730a3 100%); cursor: col-resize; }

.sp-handle {
  width: 5px; height: 56px;
  background: rgba(255,255,255,.12); border-radius: 3px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px;
  animation: spPulse 2.8s ease-in-out infinite;
  transition: background .2s, transform .15s;
}
.splitter:hover .sp-handle { background: rgba(99,102,241,.5); transform: scaleY(1.08); }
.splitter.dragging .sp-handle { animation: none; background: rgba(255,255,255,.5); }

.sp-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(255,255,255,.7);
  transition: background .2s;
}
.splitter:hover .sp-dot, .splitter.dragging .sp-dot { background: #fff; }

@keyframes spPulse {
  0%,100% { opacity:.55; box-shadow: none; }
  50% { opacity:1; box-shadow: 0 0 10px rgba(99,102,241,.65); }
}

/* ── PREVIEW ────────────────────────────── */
.preview-area {
  flex: 1 1 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px 20px; gap: 20px;
  overflow: auto; min-width: 0; height: 100%;
}

.avatar-wrap { position: relative; }
.avatar-wrap svg { width: 260px; height: 260px; filter: drop-shadow(0 8px 28px rgba(0,0,0,.18)); border-radius: 50%; }

.persona-card {
  background: var(--card); border-radius: 14px; padding: 16px 24px; text-align: center;
  box-shadow: 0 4px 18px rgba(0,0,0,.08); border: 1px solid var(--line); min-width: 220px;
}
.persona-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
.persona-role { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
.persona-tags { display: flex; justify-content: center; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
.persona-tag { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px; background: #ede9fe; color: #6d28d9; border: 1px solid #ddd6fe; }

.btn-row { display: flex; gap: 9px; flex-wrap: wrap; justify-content: center; }
.btn {
  padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; display: flex; align-items: center; gap: 6px;
  transition: all .15s; font-family: 'DM Sans', sans-serif;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.4); }
.btn-outline { background: transparent; color: var(--ink-soft); border: 1.5px solid var(--line); }
.btn-outline:hover { background: var(--line); color: var(--ink); }

/* Male-only sections */
.male-only { display: none; }

@media (max-width: 700px) {
  body { overflow: auto; }
  .app { flex-direction: column; overflow: visible; }
  .controls { width: 100% !important; max-height: 45vh; min-width: unset; }
  .splitter { display: none; }
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon">🎭</div>
    <div><h1>Persona Creator</h1><p>Design your custom illustrated avatar</p></div>
  </div>
  <div class="hdr-badge">SVG · Live Preview · Export PNG</div>
</header>

<div class="app">

  <!-- ── CONTROLS ── -->
  <div class="controls" id="ctrl-panel">

    <!-- Gender -->
    <div class="ctrl-label" style="padding-top:4px">Gender</div>
    <div class="gender-sel">
      <button class="gender-btn active" data-g="female"><span class="gi">♀</span>Female</button>
      <button class="gender-btn"        data-g="male">  <span class="gi">♂</span>Male</button>
    </div>

    <input class="ctrl-input" id="inp-name" type="text" placeholder="Name" value="Sarah Chen" style="margin-bottom:5px">
    <input class="ctrl-input" id="inp-role" type="text" placeholder="Role / Title" value="Product Designer" style="margin-bottom:5px">
    <input class="ctrl-input" id="inp-tags" type="text" placeholder="Tags (comma separated)" value="UX, Research, AI">

    <div class="ctrl-div"></div>

    <div class="ctrl-label">Background</div>
    <div class="swatches" id="sw-bg"></div>

    <div class="ctrl-label">Skin Tone</div>
    <div class="swatches" id="sw-skin"></div>

    <div class="ctrl-div"></div>

    <div class="ctrl-label">Hair Style</div>
    <div class="hair-grid" id="hair-grid"></div>

    <div class="ctrl-label">Hair Color</div>
    <div class="swatches" id="sw-hair"></div>

    <div class="ctrl-div"></div>

    <!-- Facial hair — male only -->
    <div class="male-only" id="fhair-section">
      <div class="ctrl-label">Facial Hair</div>
      <div class="fhair-grid" id="fhair-grid"></div>
      <div class="ctrl-div"></div>
    </div>

    <div class="ctrl-label">Eye Color</div>
    <div class="swatches" id="sw-eye"></div>

    <div class="ctrl-label">Lip Color</div>
    <div class="swatches" id="sw-lip"></div>

    <div class="ctrl-label">Outfit Color</div>
    <div class="swatches" id="sw-outfit"></div>

    <div class="ctrl-div"></div>

    <div class="ctrl-label">Accessories</div>
    <div class="toggle-row"><span class="toggle-lbl">👓 Glasses</span><div class="toggle" id="tog-glasses"></div></div>
    <div class="toggle-row"><span class="toggle-lbl">💛 Earrings</span><div class="toggle" id="tog-earrings"></div></div>

  </div>

  <!-- ── ANIMATED SPLITTER ── -->
  <div class="splitter" id="splitter">
    <div class="sp-handle">
      <div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>
      <div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>
    </div>
  </div>

  <!-- ── PREVIEW ── -->
  <div class="preview-area">
    <div class="avatar-wrap">
      <svg id="avatar-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="persona-card">
      <div class="persona-name" id="card-name">Sarah Chen</div>
      <div class="persona-role" id="card-role">Product Designer</div>
      <div class="persona-tags" id="card-tags"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="exportPNG()">⬇ Export PNG</button>
      <button class="btn btn-outline" onclick="randomize()">🎲 Randomize</button>
    </div>
  </div>

</div>

<script>
/* ─── STATE ──────────────────────────────────────────── */
const state = {
  gender:      'female',
  bg:          '#a8d5e2',
  skin:        '#C68642',
  hairStyle:   'ponytail',
  hairColor:   '#3B1F0A',
  eyeColor:    '#3B1F0A',
  lipColor:    '#C0392B',
  outfitColor: '#5B5EA6',
  facialHair:  'none',
  hasGlasses:  false,
  hasEarrings: false,
};

/* ─── PALETTES ───────────────────────────────────────── */
const PAL = {
  bg:     ['#a8d5e2','#b8d4b0','#f7c5a0','#d5b8f0','#f0d5b8','#b8c8f0','#f0b8c8','#c8e8c8','#e8d5b0','#d0d0d0','#b0c4de','#ffd5d5'],
  skin:   ['#FDDBB4','#F5C89A','#F1C27D','#E8A87C','#C68642','#B5722E','#A0522D','#8B4513','#7B3F1E','#4A2411','#3D1C0F','#FFCBA4'],
  hair:   ['#1a1208','#3B1F0A','#6B3010','#A0522D','#C8853A','#D4A843','#F0C040','#8B0000','#C41E3A','#E75480','#4A4A4A','#888888','#C0C0C0','#ffffff','#1a3a6b','#6B21A8','#0891B2','#065f46'],
  eye:    ['#3B1F0A','#7B4F2E','#4A7C59','#1565C0','#607D8B','#2E4057','#1a1a1a','#5D4037','#00695C','#283593','#6d4c41','#37474f'],
  lip:    ['#C0392B','#E74C3C','#E91E63','#F06292','#A93226','#8B0000','#D35400','#E67E22','#C2185B','#AD1457','#f8bbd0','#880e4f'],
  outfit: ['#5B5EA6','#1565C0','#2E7D32','#6A1B9A','#C62828','#E65100','#37474F','#1B5E20','#880E4F','#F57F17','#263238','#4527A0','#00695C','#bf360c'],
};

const HAIR_STYLES = [
  {id:'ponytail', hi:'🎀', label:'Ponytail'},
  {id:'long',     hi:'💇', label:'Long'},
  {id:'bun',      hi:'🧶', label:'Bun'},
  {id:'curly',    hi:'🌀', label:'Curly'},
  {id:'braids',   hi:'🪢', label:'Braids'},
  {id:'bob',      hi:'✂️',  label:'Bob'},
  {id:'waves',    hi:'🌊', label:'Waves'},
  {id:'pixie',    hi:'⚡', label:'Pixie'},
  {id:'short',    hi:'💈', label:'Short'},
  {id:'quiff',    hi:'🕺', label:'Quiff'},
  {id:'slicked',  hi:'💼', label:'Slicked'},
  {id:'mohawk',   hi:'🎸', label:'Mohawk'},
];

const FACIAL_HAIR = [
  {id:'none',     fi:'🚫', label:'None'},
  {id:'stubble',  fi:'👨', label:'Stubble'},
  {id:'mustache', fi:'🥸', label:'Mustache'},
  {id:'beard',    fi:'🧔', label:'Beard'},
];

/* styles where ears are hidden by hair */
const HIDE_EARS = new Set(['long','braids','waves','curly','bob']);

/* ─── COLOUR HELPERS ─────────────────────────────────── */
function hexToRgb(h){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return{r,g,b}; }
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>Math.min(255,Math.max(0,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function shade(h,a){ const{r,g,b}=hexToRgb(h); return rgbToHex(r+a,g+a,b+a); }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

/* ─── HAIR SVG ───────────────────────────────────────── */
function hairBack(style, hc, hd) {
  const p = [];
  switch(style) {
    case 'ponytail':
      p.push(`<ellipse cx="140" cy="108" rx="68" ry="62" fill="${hc}"/>`);
      p.push(`<path d="M188,120 C238,102 260,155 244,188 C228,214 204,206 196,182 C188,158 188,140 188,120 Z" fill="${hc}"/>`);
      p.push(`<ellipse cx="193" cy="126" rx="9" ry="5.5" fill="${hd}" transform="rotate(-25,193,126)"/>`);
      break;
    case 'long':
      p.push(`<ellipse cx="140" cy="106" rx="70" ry="63" fill="${hc}"/>`);
      p.push(`<path d="M72,140 C58,182 60,240 72,272 C84,254 87,232 85,205 C83,175 83,148 82,140 Z" fill="${hc}"/>`);
      p.push(`<path d="M208,140 C222,182 220,240 208,272 C196,254 193,232 195,205 C197,175 197,148 198,140 Z" fill="${hc}"/>`);
      break;
    case 'bun':
      p.push(`<ellipse cx="140" cy="113" rx="66" ry="60" fill="${hc}"/>`);
      p.push(`<circle cx="140" cy="54" r="31" fill="${hc}"/>`);
      p.push(`<circle cx="140" cy="54" r="20" fill="${hd}"/>`);
      p.push(`<path d="M130,54 Q140,44 150,54 Q140,64 130,54 Z" fill="${shade(hd,20)}" opacity="0.5"/>`);
      break;
    case 'curly':
      [[105,78,22],[126,67,24],[146,64,24],[167,69,22],[183,87,20],
       [88,102,19],[78,124,17],[192,104,19],[202,126,17],
       [104,144,15],[200,145,15]].forEach(([cx,cy,r]) =>
        p.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${hc}"/>`)
      );
      break;
    case 'braids':
      p.push(`<ellipse cx="140" cy="108" rx="68" ry="62" fill="${hc}"/>`);
      for(let i=0;i<8;i++){
        p.push(`<ellipse cx="104" cy="${186+i*12}" rx="9" ry="7.5" fill="${i%2===0?hc:hd}"/>`);
        p.push(`<ellipse cx="176" cy="${186+i*12}" rx="9" ry="7.5" fill="${i%2===0?hc:hd}"/>`);
      }
      break;
    case 'bob':
      p.push(`<path d="M82,132 C80,80 106,68 140,68 C174,68 200,80 198,132 C198,166 192,190 182,200 Q162,214 140,216 Q118,214 98,200 C88,190 82,166 82,132 Z" fill="${hc}"/>`);
      break;
    case 'waves':
      p.push(`<ellipse cx="140" cy="106" rx="70" ry="63" fill="${hc}"/>`);
      p.push(`<path d="M72,140 C64,162 72,182 66,202 C60,222 70,242 66,264 C80,250 85,232 80,212 C75,192 83,172 78,152 C74,142 72,140 72,140 Z" fill="${hc}"/>`);
      p.push(`<path d="M208,140 C216,162 208,182 214,202 C220,222 210,242 214,264 C200,250 195,232 200,212 C205,192 197,172 202,152 C206,142 208,140 208,140 Z" fill="${hc}"/>`);
      break;
    case 'pixie':
      p.push(`<ellipse cx="140" cy="118" rx="65" ry="54" fill="${hc}"/>`);
      p.push(`<path d="M80,140 C82,128 84,122 87,120 C90,116 94,120 91,130 Z" fill="${hc}"/>`);
      p.push(`<path d="M200,140 C198,128 196,122 193,120 C190,116 186,120 189,130 Z" fill="${hc}"/>`);
      break;
    case 'short':
      p.push(`<ellipse cx="140" cy="120" rx="64" ry="52" fill="${hc}"/>`);
      p.push(`<path d="M80,140 C82,130 84,126 87,124 C90,120 93,126 90,135 Z" fill="${hc}"/>`);
      p.push(`<path d="M200,140 C198,130 196,126 193,124 C190,120 187,126 190,135 Z" fill="${hc}"/>`);
      break;
    case 'quiff':
      p.push(`<ellipse cx="140" cy="122" rx="62" ry="50" fill="${hc}"/>`);
      p.push(`<path d="M82,140 C84,128 86,124 89,123 C92,119 95,124 92,134 Z" fill="${hc}"/>`);
      p.push(`<path d="M198,140 C196,128 194,124 191,123 C188,119 185,124 188,134 Z" fill="${hc}"/>`);
      p.push(`<path d="M115,100 C120,76 130,62 140,58 C150,62 160,76 165,100 C156,88 148,84 140,84 C132,84 124,88 115,100 Z" fill="${hc}"/>`);
      break;
    case 'slicked':
      p.push(`<ellipse cx="140" cy="114" rx="67" ry="58" fill="${hc}"/>`);
      p.push(`<path d="M85,136 C105,96 126,80 140,78 C154,80 175,96 195,136 C175,108 140,106 140,106 C140,106 105,108 85,136 Z" fill="${hd}"/>`);
      p.push(`<path d="M105,84 Q140,74 175,84 Q158,78 140,78 Q122,78 105,84 Z" fill="${shade(hc,22)}" opacity="0.45"/>`);
      break;
    case 'mohawk':
      p.push(`<path d="M122,270 C120,230 124,180 128,148 C132,110 136,82 140,64 C144,82 148,110 152,148 C156,180 160,230 158,270 Q150,278 140,280 Q130,278 122,270 Z" fill="${hc}"/>`);
      p.push(`<path d="M128,130 C130,98 135,78 140,64 C145,78 150,98 152,130 C148,112 144,104 140,104 C136,104 132,112 128,130 Z" fill="${hd}"/>`);
      break;
  }
  return p.join('\n');
}

function hairFront(style, hc, hd) {
  const p = [];
  const stdFront = `<path d="M80,140 C82,82 108,67 140,67 C172,67 198,82 200,140 C180,110 140,109 140,109 C140,110 100,110 80,140 Z" fill="${hc}"/>`;
  switch(style) {
    case 'ponytail':
    case 'long':
    case 'waves':
    case 'short':
      p.push(stdFront); break;
    case 'bun':
      p.push(`<path d="M80,138 C82,80 108,65 140,65 C172,65 198,80 200,138 C180,108 140,106 140,106 C140,108 100,108 80,138 Z" fill="${hc}"/>`); break;
    case 'curly':
      p.push(`<circle cx="90" cy="112" r="18" fill="${hc}"/>`);
      p.push(`<circle cx="190" cy="112" r="18" fill="${hc}"/>`);
      p.push(`<path d="M108,92 Q124,74 140,70 Q156,74 172,92" stroke="${hc}" stroke-width="20" fill="none" stroke-linecap="round"/>`);
      break;
    case 'braids':
      p.push(stdFront);
      p.push(`<line x1="140" y1="69" x2="140" y2="108" stroke="${hd}" stroke-width="2.5" opacity="0.5"/>`); break;
    case 'bob':
      /* bob front is part of the back path */ break;
    case 'pixie':
      p.push(`<path d="M84,138 C86,84 110,70 140,70 C170,70 194,84 196,138 C178,112 140,112 140,112 C140,112 102,112 84,138 Z" fill="${hc}"/>`);
      p.push(`<path d="M108,98 C115,82 126,72 140,70 C154,72 165,82 172,98 C164,88 152,84 140,84 C128,84 116,88 108,98 Z" fill="${hd}" opacity="0.65"/>`); break;
    case 'quiff':
      p.push(`<path d="M87,138 C89,98 110,82 130,82 C116,98 108,118 87,138 Z" fill="${hc}"/>`);
      p.push(`<path d="M193,138 C191,98 170,82 150,82 C164,98 172,118 193,138 Z" fill="${hc}"/>`);
      p.push(`<path d="M116,98 C120,80 130,66 140,62 C150,66 160,80 164,98 C157,86 150,82 140,82 C130,82 123,86 116,98 Z" fill="${hc}"/>`); break;
    case 'slicked':
      p.push(`<path d="M83,138 C85,84 109,70 140,70 C171,70 195,84 197,138 C183,108 140,108 140,108 C140,108 97,108 83,138 Z" fill="${hc}"/>`); break;
    case 'mohawk': /* strip already drawn in back */ break;
  }
  return p.join('\n');
}

/* ─── MAIN SVG BUILDER ───────────────────────────────── */
function buildSVG(s) {
  const male = s.gender === 'male';
  const sk  = shade(s.skin, -30);
  const sk2 = shade(s.skin, -14);
  const hc  = s.hairColor;
  const hd  = shade(hc, -30);
  const p   = [];

  /* defs */
  p.push(`<defs>
    <clipPath id="cc"><circle cx="140" cy="140" r="137"/></clipPath>
    <radialGradient id="bgg" cx="42%" cy="36%" r="65%">
      <stop offset="0%" stop-color="${shade(s.bg,24)}"/>
      <stop offset="100%" stop-color="${shade(s.bg,-20)}"/>
    </radialGradient>
    <radialGradient id="fgrad" cx="36%" cy="28%" r="72%">
      <stop offset="0%" stop-color="${shade(s.skin,14)}"/>
      <stop offset="100%" stop-color="${s.skin}"/>
    </radialGradient>
  </defs>`);

  p.push(`<circle cx="140" cy="140" r="140" fill="url(#bgg)"/>`);
  p.push(`<g clip-path="url(#cc)">`);

  /* body */
  const bw = male ? 116 : 108;
  p.push(`<ellipse cx="140" cy="305" rx="${bw}" ry="72" fill="${s.outfitColor}"/>`);
  if (male) {
    /* shirt collar */
    p.push(`<path d="M128,248 L120,270 L140,258 L160,270 L152,248 Q140,256 128,248 Z" fill="${shade(s.outfitColor,-30)}"/>`);
    p.push(`<ellipse cx="140" cy="248" rx="52" ry="22" fill="${shade(s.outfitColor,-18)}"/>`);
  } else {
    p.push(`<ellipse cx="140" cy="248" rx="46" ry="22" fill="${shade(s.outfitColor,-22)}"/>`);
  }

  /* neck */
  p.push(`<path d="M128,210 Q127,238 140,244 Q153,238 152,210 Z" fill="${s.skin}"/>`);

  /* ears */
  if (!HIDE_EARS.has(s.hairStyle)) {
    p.push(`<ellipse cx="79" cy="158" rx="13" ry="16" fill="${s.skin}"/>`);
    p.push(`<ellipse cx="79" cy="158" rx="8"  ry="11" fill="${sk2}"/>`);
    p.push(`<ellipse cx="201" cy="158" rx="13" ry="16" fill="${s.skin}"/>`);
    p.push(`<ellipse cx="201" cy="158" rx="8"  ry="11" fill="${sk2}"/>`);
  }

  /* hair back */
  p.push(hairBack(s.hairStyle, hc, hd));

  /* face */
  if (male) {
    /* slightly squarer jaw */
    p.push(`<path d="M78,150 C78,90 104,86 140,86 C176,86 202,90 202,150 C202,192 196,216 182,228 Q163,242 140,244 Q117,242 98,228 C84,216 78,192 78,150 Z" fill="url(#fgrad)"/>`);
  } else {
    p.push(`<ellipse cx="140" cy="160" rx="62" ry="72" fill="url(#fgrad)"/>`);
  }

  /* subtle chin shadow */
  p.push(`<ellipse cx="140" cy="215" rx="36" ry="8" fill="${sk}" opacity="0.16"/>`);

  /* hair front */
  p.push(hairFront(s.hairStyle, hc, hd));

  /* cheek blush */
  p.push(`<ellipse cx="107" cy="180" rx="16" ry="9" fill="${shade(s.skin,18)}" opacity="0.32"/>`);
  p.push(`<ellipse cx="173" cy="180" rx="16" ry="9" fill="${shade(s.skin,18)}" opacity="0.32"/>`);

  /* eyebrows */
  const bwStroke = male ? 5.5 : 4;
  const byOff    = male ? 2   : 0;
  p.push(`<path d="M106,${128+byOff} Q119,${118+byOff} 133,${123+byOff}" stroke="${hd}" stroke-width="${bwStroke}" fill="none" stroke-linecap="round"/>`);
  p.push(`<path d="M147,${123+byOff} Q161,${118+byOff} 174,${128+byOff}" stroke="${hd}" stroke-width="${bwStroke}" fill="none" stroke-linecap="round"/>`);

  /* eyes */
  [[120,150],[160,150]].forEach(([cx,cy]) => {
    p.push(`<ellipse cx="${cx}" cy="${cy}" rx="14" ry="12" fill="white"/>`);
    p.push(`<circle  cx="${cx}" cy="${cy}" r="8.5" fill="${s.eyeColor}"/>`);
    p.push(`<circle  cx="${cx}" cy="${cy}" r="5.5" fill="#111"/>`);
    p.push(`<circle  cx="${cx+2.5}" cy="${cy-3}" r="2.8" fill="white" opacity="0.92"/>`);
    p.push(`<circle  cx="${cx-2}" cy="${cy+3}" r="1.4" fill="white" opacity="0.55"/>`);
    /* upper lash */
    p.push(`<path d="M${cx-14},${cy-8} Q${cx},${cy-16} ${cx+14},${cy-8}" stroke="#1a0a02" stroke-width="3" fill="none" stroke-linecap="round"/>`);
    /* lower lid */
    p.push(`<path d="M${cx-12},${cy+9} Q${cx},${cy+13} ${cx+12},${cy+9}" stroke="${sk}" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.4"/>`);
    if (!male) {
      /* female lashes */
      [[-10,-2],[-5,0],[0,1],[5,0],[10,-2]].forEach(([dx,dy],i) => {
        p.push(`<line x1="${cx+dx}" y1="${cy-12+dy}" x2="${cx+dx-1}" y2="${cy-18+dy-i}" stroke="#1a0a02" stroke-width="1.4" stroke-linecap="round"/>`);
      });
    }
  });

  /* nose */
  p.push(`<path d="M132,170 Q140,183 148,170" stroke="${sk}" stroke-width="2.6" fill="none" stroke-linecap="round" opacity="0.7"/>`);
  p.push(`<ellipse cx="134.5" cy="178" rx="4.5" ry="3" fill="${sk}" opacity="0.3"/>`);
  p.push(`<ellipse cx="145.5" cy="178" rx="4.5" ry="3" fill="${sk}" opacity="0.3"/>`);

  /* mouth */
  const lipDark = shade(s.lipColor, -32);
  p.push(`<path d="M122,194 Q140,210 158,194" fill="${s.lipColor}" opacity="0.82"/>`);
  p.push(`<path d="M122,194 Q131,186 140,190 Q149,186 158,194 Q140,189 122,194 Z" fill="${s.lipColor}"/>`);
  p.push(`<path d="M122,194 Q140,206 158,194" stroke="${lipDark}" stroke-width="1.4" fill="none" stroke-linecap="round"/>`);

  /* facial hair (male) */
  if (male && s.facialHair !== 'none') {
    const fc = shade(hc, -10);
    if (s.facialHair === 'stubble') {
      for(let row=0;row<3;row++) for(let col=0;col<8;col++) {
        const ox = 110+col*10+(row%2)*5, oy = 198+row*8;
        p.push(`<circle cx="${ox}" cy="${oy}" r="1.8" fill="${fc}" opacity="0.45"/>`);
      }
    } else if (s.facialHair === 'mustache') {
      p.push(`<path d="M120,190 Q130,183 140,187 Q150,183 160,190 Q150,193 140,192 Q130,193 120,190 Z" fill="${fc}" opacity="0.75"/>`);
    } else if (s.facialHair === 'beard') {
      p.push(`<path d="M95,200 Q90,225 100,240 Q118,258 140,260 Q162,258 180,240 Q190,225 185,200 Q174,208 164,212 Q154,215 140,216 Q126,215 116,212 Q106,208 95,200 Z" fill="${fc}" opacity="0.62"/>`);
      p.push(`<path d="M120,190 Q130,183 140,187 Q150,183 160,190 Q150,193 140,192 Q130,193 120,190 Z" fill="${fc}" opacity="0.75"/>`);
    }
  }

  /* glasses */
  if (s.hasGlasses) {
    p.push(`<rect x="103" y="140" width="34" height="24" rx="10" fill="rgba(200,225,255,.12)" stroke="#374151" stroke-width="2.8"/>`);
    p.push(`<rect x="143" y="140" width="34" height="24" rx="10" fill="rgba(200,225,255,.12)" stroke="#374151" stroke-width="2.8"/>`);
    p.push(`<line x1="137" y1="152" x2="143" y2="152" stroke="#374151" stroke-width="2.8"/>`);
    p.push(`<line x1="79"  y1="152" x2="103" y2="152" stroke="#374151" stroke-width="2.4"/>`);
    p.push(`<line x1="177" y1="152" x2="201" y2="152" stroke="#374151" stroke-width="2.4"/>`);
  }

  /* earrings */
  if (s.hasEarrings) {
    p.push(`<circle cx="79"  cy="178" r="7.5" fill="#F59E0B"/>`);
    p.push(`<circle cx="79"  cy="178" r="3.8" fill="#FDE68A"/>`);
    p.push(`<circle cx="201" cy="178" r="7.5" fill="#F59E0B"/>`);
    p.push(`<circle cx="201" cy="178" r="3.8" fill="#FDE68A"/>`);
  }

  p.push(`</g>`);
  p.push(`<circle cx="140" cy="140" r="137" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="4"/>`);
  return p.join('\n');
}

/* ─── RENDER ─────────────────────────────────────────── */
function render() {
  document.getElementById('avatar-svg').innerHTML = buildSVG(state);
  const name = document.getElementById('inp-name').value || 'Persona';
  const role = document.getElementById('inp-role').value || '';
  const tags = document.getElementById('inp-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  document.getElementById('card-name').textContent = name;
  document.getElementById('card-role').textContent = role;
  document.getElementById('card-tags').innerHTML = tags.map(t=>`<span class="persona-tag">${esc(t)}</span>`).join('');
}

/* ─── UI BUILDERS ────────────────────────────────────── */
function buildSwatches(id, pal, key) {
  const el = document.getElementById(id); el.innerHTML = '';
  pal.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (state[key]===c?' active':'');
    d.style.background = c;
    d.onclick = () => { state[key]=c; el.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active')); d.classList.add('active'); render(); };
    el.appendChild(d);
  });
}

function buildHairGrid() {
  const el = document.getElementById('hair-grid'); el.innerHTML = '';
  HAIR_STYLES.forEach(hs => {
    const b = document.createElement('div');
    b.className = 'hair-btn' + (state.hairStyle===hs.id?' active':'');
    b.innerHTML = `<span class="hi">${hs.hi}</span>${hs.label}`;
    b.onclick = () => { state.hairStyle=hs.id; el.querySelectorAll('.hair-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
    el.appendChild(b);
  });
}

function buildFacialHairGrid() {
  const el = document.getElementById('fhair-grid'); el.innerHTML = '';
  FACIAL_HAIR.forEach(fh => {
    const b = document.createElement('div');
    b.className = 'fhair-btn' + (state.facialHair===fh.id?' active':'');
    b.innerHTML = `<span class="fi">${fh.fi}</span>${fh.label}`;
    b.onclick = () => { state.facialHair=fh.id; el.querySelectorAll('.fhair-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
    el.appendChild(b);
  });
}

function buildToggle(id, key) {
  const el = document.getElementById(id);
  if (state[key]) el.classList.add('on');
  el.onclick = () => { state[key]=!state[key]; el.classList.toggle('on',state[key]); render(); };
}

function buildGender() {
  document.querySelectorAll('.gender-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.gender = btn.dataset.g;
      document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const fhSection = document.getElementById('fhair-section');
      fhSection.style.display = state.gender==='male' ? 'block' : 'none';
      if (state.gender==='male') state.facialHair='none';
      render();
    });
  });
}

/* ─── SPLITTER DRAG ──────────────────────────────────── */
function initSplitter() {
  const sp   = document.getElementById('splitter');
  const ctrl = document.getElementById('ctrl-panel');
  let dragging=false, startX=0, startW=0;

  const start = e => {
    dragging=true; startX=e.clientX||e.touches?.[0].clientX; startW=ctrl.offsetWidth;
    sp.classList.add('dragging'); document.body.style.userSelect='none'; document.body.style.cursor='col-resize';
  };
  const move = e => {
    if(!dragging) return;
    const cx = e.clientX ?? e.touches?.[0].clientX;
    const nw = Math.min(480, Math.max(200, startW + cx - startX));
    ctrl.style.width = nw + 'px';
  };
  const stop = () => {
    if(!dragging) return;
    dragging=false; sp.classList.remove('dragging');
    document.body.style.userSelect=''; document.body.style.cursor='';
  };

  sp.addEventListener('mousedown',  start);
  sp.addEventListener('touchstart', start, {passive:true});
  document.addEventListener('mousemove',  move);
  document.addEventListener('touchmove',  move, {passive:true});
  document.addEventListener('mouseup',   stop);
  document.addEventListener('touchend',  stop);
}

/* ─── EXPORT PNG ─────────────────────────────────────── */
function exportPNG() {
  const svg  = document.getElementById('avatar-svg');
  const blob = new Blob([new XMLSerializer().serializeToString(svg)], {type:'image/svg+xml'});
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = () => {
    const c = Object.assign(document.createElement('canvas'), {width:560,height:560});
    c.getContext('2d').drawImage(img,0,0,560,560);
    URL.revokeObjectURL(url);
    Object.assign(document.createElement('a'), {
      download:(document.getElementById('inp-name').value||'persona').replace(/\s+/g,'-').toLowerCase()+'-avatar.png',
      href: c.toDataURL('image/png'),
    }).click();
  };
  img.src = url;
}

/* ─── RANDOMIZE ──────────────────────────────────────── */
function randomize() {
  state.gender      = Math.random()>.5 ? 'female' : 'male';
  state.bg          = pick(PAL.bg);
  state.skin        = pick(PAL.skin);
  state.hairStyle   = pick(HAIR_STYLES).id;
  state.hairColor   = pick(PAL.hair);
  state.eyeColor    = pick(PAL.eye);
  state.lipColor    = pick(PAL.lip);
  state.outfitColor = pick(PAL.outfit);
  state.facialHair  = state.gender==='male' ? pick(FACIAL_HAIR).id : 'none';
  state.hasGlasses  = Math.random()>.65;
  state.hasEarrings = Math.random()>.5;

  document.querySelectorAll('.gender-btn').forEach(b=>{ b.classList.toggle('active', b.dataset.g===state.gender); });
  document.getElementById('fhair-section').style.display = state.gender==='male' ? 'block' : 'none';
  document.getElementById('tog-glasses').classList.toggle('on',  state.hasGlasses);
  document.getElementById('tog-earrings').classList.toggle('on', state.hasEarrings);
  initAll();
  render();
}

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ─── INIT ───────────────────────────────────────────── */
function initAll() {
  buildSwatches('sw-bg',     PAL.bg,     'bg');
  buildSwatches('sw-skin',   PAL.skin,   'skin');
  buildSwatches('sw-hair',   PAL.hair,   'hairColor');
  buildSwatches('sw-eye',    PAL.eye,    'eyeColor');
  buildSwatches('sw-lip',    PAL.lip,    'lipColor');
  buildSwatches('sw-outfit', PAL.outfit, 'outfitColor');
  buildHairGrid();
  buildFacialHairGrid();
}

['inp-name','inp-role','inp-tags'].forEach(id => document.getElementById(id).addEventListener('input', render));
buildGender();
buildToggle('tog-glasses',  'hasGlasses');
buildToggle('tog-earrings', 'hasEarrings');
initAll();
initSplitter();
render();
</script>
