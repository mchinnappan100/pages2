<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Image Slideshow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .slide { 
      display: none; 
      justify-content: center; 
      align-items: flex-start; 
      min-height: 500px;
      width: 100%;
      overflow: auto;
      padding: 1rem;
    }
    .slide[aria-hidden="false"] { display: flex; }
    .slide img { 
      max-width: 100%; 
      height: auto;
      object-fit: contain; 
      border-radius: 8px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
    }
    .thumb-button img { 
      width: 96px; 
      height: 64px; 
      object-fit: cover; 
      border-radius: 6px; 
      opacity: 0.7; 
      transition: all .2s; 
    }
    .thumb-button.active img { 
      opacity: 1; 
      transform: scale(1.05); 
      box-shadow: 0 4px 20px rgba(0,0,0,0.6); 
    }
    .control-btn {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: #e5e7eb;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
    }
    .control-btn:hover {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(147, 51, 234, 0.2) 100%);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .control-btn:active {
      transform: translateY(0);
    }
    .control-btn svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body class="bg-neutral-900 text-gray-100 min-h-screen flex flex-col">
  <header class="p-4 border-b border-neutral-800">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Image Slideshow</h1>
      <div class="text-sm text-neutral-400">4/2/2026, 11:30:16 PM</div>
    </div>
  </header>
  <main class="flex-1 max-w-6xl mx-auto p-6 w-full">
    <div class="bg-neutral-800 rounded-2xl shadow-2xl overflow-hidden">
      <div class="flex flex-col md:flex-row gap-6 p-6">
        <div class="flex-1">
          <div class="bg-black rounded-lg overflow-auto mb-4" style="max-height: calc(100vh - 280px);">
            
      <div class="slide" data-index="0" aria-hidden="false">
        <img src="turboQuant-1.png" alt="">
      </div>
      <div class="slide" data-index="1" aria-hidden="true">
        <img src="turboquant-ig.png" alt="">
      </div>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex gap-3">
              <button id="prev" class="control-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Prev
              </button>
              <button id="next" class="control-btn">
                Next
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
              </button>
              <button id="play" class="control-btn">
                
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6"/>
                </svg>
                Pause
              </button>
              <button id="fullscreen" class="control-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                </svg>
                Full Screen
              </button>
            </div>
            <div class="text-neutral-400" id="counter">1 / 2</div>
          </div>
        </div>
        <aside class="w-full md:w-80">
          <div class="text-sm text-neutral-400 mb-3">Thumbnails</div>
          <div id="thumbs" class="grid grid-cols-4 gap-2 overflow-y-auto max-h-96">
      <button class="thumb-button" data-index="0">
        <img src="turboQuant-1.png" alt="" loading="lazy">
      </button>
      <button class="thumb-button" data-index="1">
        <img src="turboquant-ig.png" alt="" loading="lazy">
      </button></div>
        </aside>
      </div>
    </div>
  </main>
  <footer class="p-4 text-center text-xs text-neutral-500 border-t border-neutral-800">
    ← → arrows • Space = play/pause • F11 = fullscreen • Click thumbnail to jump
  </footer>

  <script>
    const slides = document.querySelectorAll('.slide');
    const thumbs = document.querySelectorAll('.thumb-button');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const playBtn = document.getElementById('play');
    const fullscreenBtn = document.getElementById('fullscreen');
    const counter = document.getElementById('counter');
    let i = 0, timer = null;
    const total = slides.length;

    const playIcon = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>Play`;
    
    const pauseIcon = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6"/>
    </svg>Pause`;

    const fullscreenIcon = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
    </svg>Full Screen`;

    const exitFullscreenIcon = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M15 9h4.5M15 9V4.5M15 9l5.25-5.25M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25"/>
    </svg>Exit Full Screen`;

    function show(n) {
      i = (n + total) % total;
      slides.forEach(s => s.setAttribute('aria-hidden', true));
      thumbs.forEach(t => t.classList.remove('active'));
      slides[i].setAttribute('aria-hidden', false);
      thumbs[i].classList.add('active');
      counter.textContent = (i + 1) + ' / ' + total;
    }

    prev.onclick = () => { show(i - 1); reset(); };
    next.onclick = () => { show(i + 1); reset(); };
    thumbs.forEach((t, idx) => t.onclick = () => { show(idx); reset(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') show(i - 1);
      if (e.key === 'ArrowRight') show(i + 1);
      if (e.key === ' ') { e.preventDefault(); playBtn.click(); }
    });

    const sec = 5;
    function start() { 
      if (sec > 0) timer = setInterval(() => show(i + 1), sec * 1000); 
      playBtn.innerHTML = pauseIcon;
    }
    function stop() { 
      clearInterval(timer); 
      timer = null; 
      playBtn.innerHTML = playIcon;
    }
    function reset() { if (timer) { stop(); start(); } }
    playBtn.onclick = () => timer ? stop() : start();

    // Fullscreen functionality
    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          fullscreenBtn.innerHTML = exitFullscreenIcon;
        }).catch(err => {
          console.error('Error entering fullscreen:', err);
        });
      } else {
        document.exitFullscreen().then(() => {
          fullscreenBtn.innerHTML = fullscreenIcon;
        });
      }
    };

    // Update button on fullscreen change
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fullscreenBtn.innerHTML = fullscreenIcon;
      }
    });

    // Support F11 and ESC keys
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F11') {
        e.preventDefault();
        fullscreenBtn.click();
      }
    });

    show(0);
    if (sec > 0) start();
  </script>
</body>
</html>
