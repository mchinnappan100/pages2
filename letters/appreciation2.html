<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Appreciation App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

<div class="h-full flex flex-col">
  <!-- Header -->
  <header class="p-4 flex justify-between items-center border-b border-gray-300 dark:border-gray-700">
    <h1 class="text-xl font-bold">💌 Letter Appreciation App</h1>
    <button id="themeToggle" class="px-3 py-1 rounded bg-gray-200 dark:bg-gray-700">Toggle Theme</button>
  </header>

  <!-- Main -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Left Pane -->
    <div id="leftPane" class="w-1/2 p-4 overflow-auto">
      <h2 class="font-semibold mb-2">Input</h2>

      <input type="file" id="imageUpload" class="mb-3" accept="image/*" />

      <textarea id="inputText" class="w-full h-64 p-2 border rounded bg-white dark:bg-gray-800" placeholder="Write appreciation content..."></textarea>

      <input type="file" id="jsonUpload" class="mt-3" accept="application/json" />

      <button id="generateBtn" class="mt-3 px-4 py-2 bg-blue-500 text-white rounded">Generate</button>
    </div>

    <!-- Splitter -->
    <div id="splitter" class="w-2 bg-gray-300 dark:bg-gray-700 cursor-col-resize hover:bg-blue-400 transition-all"></div>

    <!-- Right Pane -->
    <div id="rightPane" class="w-1/2 p-4 overflow-auto">
      <h2 class="font-semibold mb-2">Preview</h2>

      <div id="preview" class="p-6 bg-white dark:bg-gray-800 rounded shadow">
        <img id="previewImage" class="w-32 h-32 object-cover rounded-full mb-4 hidden" />
        <div id="previewContent"></div>
      </div>

      <button id="downloadPdf" class="mt-3 px-4 py-2 bg-green-500 text-white rounded">Download PDF</button>
    </div>
        <button id="downloadJson" class="mt-3 ml-2 px-4 py-2 bg-purple-500 text-white rounded">Download JSON</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// Theme toggle
const themeToggle = document.getElementById('themeToggle');
themeToggle.onclick = () => {
  document.documentElement.classList.toggle('dark');
};

// Splitter logic
const splitter = document.getElementById('splitter');
const leftPane = document.getElementById('leftPane');
const rightPane = document.getElementById('rightPane');

let isDragging = false;

splitter.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const percent = (e.clientX / window.innerWidth) * 100;
  leftPane.style.width = percent + '%';
  rightPane.style.width = (100 - percent) + '%';
});

// Image upload
const imageUpload = document.getElementById('imageUpload');
const previewImage = document.getElementById('previewImage');

imageUpload.addEventListener('change', () => {
  const file = imageUpload.files[0];
  if (file) {
    previewImage.src = URL.createObjectURL(file);
    previewImage.classList.remove('hidden');
  }
});

// Generate content
const generateBtn = document.getElementById('generateBtn');
const inputText = document.getElementById('inputText');
const previewContent = document.getElementById('previewContent');

generateBtn.onclick = () => {
  previewContent.innerHTML = `<p class="whitespace-pre-line">${inputText.value}</p>`;
};

// JSON upload
const jsonUpload = document.getElementById('jsonUpload');

jsonUpload.addEventListener('change', () => {
  const file = jsonUpload.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    const data = JSON.parse(reader.result);
    inputText.value = data.content || '';
  };
  reader.readAsText(file);
});

// Load JSON via ?d=
const params = new URLSearchParams(window.location.search);
const dataUrl = params.get('d');
if (dataUrl) {
  fetch(dataUrl)
    .then(res => res.json())
    .then(data => {
      inputText.value = data.content || '';
    });
}

// PDF download
const downloadPdf = document.getElementById('downloadPdf');
downloadPdf.onclick = () => {
  const element = document.getElementById('preview');
  html2pdf().from(element).save('appreciation-letter.pdf');
};

// JSON download
const downloadJson = document.getElementById('downloadJson');
downloadJson.onclick = () => {
  const data = {
    content: inputText.value
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'appreciation-data.json';
  a.click();
  URL.revokeObjectURL(url);
};
</script>

</body>
</html>
