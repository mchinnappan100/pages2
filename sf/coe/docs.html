<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COE Portal</title>

  <link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            panel: '#0f172a',
            sidebar: '#020617',
            divider: '#1e293b'
          }
        }
      }
    }
  </script>

  <style>
    iframe {
      border: none;
    }
    .resizer {
      cursor: col-resize;
      user-select: none;
      transition: background-color 0.2s ease;
    }
    .toc-link {
      display: block;
      width: 100%;
      padding: 0.625rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: #cbd5e1;
      background-color: transparent;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      text-align: left;
      cursor: pointer;
    }
    .toc-link:hover {
      background-color: rgba(99, 102, 241, 0.1);
      color: #e2e8f0;
      border-color: rgba(99, 102, 241, 0.3);
    }
    .toc-link.active {
      background-color: rgba(99, 102, 241, 0.2);
      color: #c7d2fe;
      border-color: #6366f1;
      font-weight: 500;
    }
    .nav-section {
      transition: opacity 0.2s ease;
    }
    .nav-section:hover {
      opacity: 1;
    }
  </style>
</head>

<body class="h-screen overflow-hidden bg-slate-950 text-slate-200">

  <!-- App Container -->
  <div class="flex h-full">

    <!-- Left Pane -->
    <aside id="leftPane" class="w-72 min-w-[200px] bg-sidebar border-r border-divider flex flex-col">

      <!-- Header -->
      <div class="px-4 py-5 border-b border-divider bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900">
        <h1 class="text-xl font-bold tracking-tight text-slate-100 flex items-center gap-2">
          <span class="text-2xl">📚</span>
          <span>Documentation</span>
        </h1>
        <p class="text-xs text-slate-400 mt-1">Browse resources and guides</p>
      </div>

      <!-- 🔍 Search -->
      <div class="px-4 py-3 border-b border-divider bg-slate-900/50">
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
          <input
            id="navSearch"
            type="text"
            placeholder="Search docs…"
            class="w-full rounded-lg bg-slate-800 text-slate-200
                   placeholder-slate-500 px-10 py-2.5 text-sm
                   border border-slate-700
                   transition-all duration-200
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-slate-900"
          />
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-4">

        <!-- COE -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Core</h2>
          <ul class="space-y-1.5">
            <li><button onclick="loadPage('coe.html')" class="toc-link">📊 COE Overview</button></li>
            <li><button onclick="loadPage('coe-tracker.html')" class="toc-link">📈 COE Tracker</button></li>
            <li><button onclick="loadPage('coe-tracker-help.html')" class="toc-link">❓ Tracker Help</button></li>
            <li><button onclick="loadPage('coe-chart.html')" class="toc-link">📉 COE Charts</button></li>
          </ul>
        </div>

        <!-- OAuth -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Security</h2>
          <ul class="space-y-1.5">
            <li><button onclick="loadPage('oauth.html')" class="toc-link">🔐 OAuth Flow</button></li>
            <li><button onclick="loadPage('tokens.html')" class="toc-link">🔑 Tokens</button></li>
          </ul>
        </div>

        <!-- Deployments -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Deployment</h2>
          <ul class="space-y-1.5">
            <li><button onclick="loadPage('deployment.html')" class="toc-link">🚀 No-Big-Bang Deploy</button></li>
          </ul>
        </div>

        <!-- SF Events -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Events</h2>
          <ul class="space-y-1.5">
            <li>
              <button
                onclick="loadPage('https://www.npmjs.com/package/sf-event-monitor')"
                class="toc-link">
                📡 SF Events Monitor
              </button>
            </li>
          </ul>
        </div>

        <!-- Org Health -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Org Health</h2>
          <ul class="space-y-1.5">
            <li>
              <button
                onclick="loadPage('https://www.npmjs.com/package/salesforce-org-health')"
                class="toc-link">
                ❤️ SF Org Health
              </button>
            </li>

            <li>
              <button
                onclick="loadPage('https://www.npmjs.com/package/sf-kpi-dashboard')"
                class="toc-link">
                📊 SF Org KPI
              </button>
            </li>

            <li>
              <button onclick="loadPage('org-viz.html')" class="toc-link">🗺️ SF Org Viz</button>
            </li>
            <li>
              <button onclick="loadPage('org-check.html')" class="toc-link">✅ SF Org Check</button>
            </li>
          </ul>
        </div>

         <!-- Integration -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Integration</h2>
          <ul class="space-y-1.5">
            <li>
              <button onclick="loadPage('if.html')" class="toc-link">🔌 Mock Interfaces</button>
            </li>
          </ul>
        </div>

        <!-- Sandbox -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Sandbox</h2>
          <ul class="space-y-1.5">
            <li>
              <button
                onclick="loadPage('https://mchinnappan100.github.io/pages2/sandbox/tracker.html')"
                class="toc-link">
                ⏱️ Refresh Tracker
              </button>
            </li>
            <li>
              <button
                onclick="loadPage('https://mchinnappan100.github.io/pages2/sandbox/refresh.html')"
                class="toc-link">
                🔄 Full Copy Refresh
              </button>
            </li>
            

            <li>
              <button
                onclick="loadPage('https://www.npmjs.com/package/sf-metadata-selector')"
                class="toc-link">
                ⚙️ Metadata Selector
              </button>
            </li>
          </ul>
        </div>

          <!--  Backup -->
        <div class="nav-section">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2.5 px-2">Backup</h2>
          <ul class="space-y-1.5">
            <li>
              <button
                onclick="loadPage('https://www.npmjs.com/package/sf-data-extractor')"
                class="toc-link">
                💾 Data Extractor
              </button>
            </li>

                 <li>
              <button
                onclick="loadPage('https://mchinnappan100.github.io/pages2/sf/backup/demos/docs.html')"
                class="toc-link">
                💾 OwnBackup setup and use
              </button>
            </li>
         </ul>
        </div>

      </nav>
    </aside>

    <!-- Splitter -->
    <div id="resizer" class="resizer w-1 bg-divider hover:bg-slate-500"></div>

    <!-- Right Pane -->
    <main class="flex-1 bg-panel">
      <iframe
        id="contentFrame"
        src="coe.html"
        class="w-full h-full bg-white dark:bg-panel">
      </iframe>
    </main>

  </div>

  <!-- Scripts -->
  <script>
    const iframe = document.getElementById('contentFrame');

    function loadPage(page) {
      if (page.startsWith('http')) {
        window.open(page, '_blank', 'noopener,noreferrer');
      } else {
        iframe.src = page;
      }
    }

    /* Resizer */
    const resizer = document.getElementById('resizer');
    const leftPane = document.getElementById('leftPane');
    let isDragging = false;

    resizer.addEventListener('mousedown', () => {
      isDragging = true;
      document.body.style.cursor = 'col-resize';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const newWidth = e.clientX;
      if (newWidth > 180 && newWidth < 500) {
        leftPane.style.width = `${newWidth}px`;
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      document.body.style.cursor = 'default';
    });

    /* 🔍 Navigation Search */
    const searchInput = document.getElementById('navSearch');
    let activeLink = null;

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();

      document.querySelectorAll('nav > .nav-section').forEach(section => {
        const items = section.querySelectorAll('li');
        let hasVisible = false;

        items.forEach(li => {
          const text = li.innerText.toLowerCase();
          const match = text.includes(query);
          li.style.display = match ? '' : 'none';
          if (match) hasVisible = true;
        });

        section.style.display = hasVisible || query === '' ? '' : 'none';
      });
    });

    /* Active state tracking */
    document.querySelectorAll('.toc-link').forEach(link => {
      link.addEventListener('click', function() {
        if (activeLink) {
          activeLink.classList.remove('active');
        }
        this.classList.add('active');
        activeLink = this;
      });
    });

    // Set initial active link
    const initialLink = document.evaluate(
      "//button[contains(@onclick, 'coe.html')]",
      document,
      null,
      XPathResult.FIRST_ORDERED_NODE_TYPE,
      null
    ).singleNodeValue;
    if (initialLink) {
      initialLink.classList.add('active');
      activeLink = initialLink;
    }
  </script>


</body>
</html>
