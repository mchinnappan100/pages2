<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Release Plan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-all">

<div class="max-w-5xl mx-auto p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">🚀 Release Plan</h1>
    <button onclick="toggleTheme()" class="px-4 py-2 bg-gray-800 text-white dark:bg-gray-200 dark:text-black rounded-xl">
      Toggle Theme
    </button>
  </div>

  <!-- Goal -->
  <div class="bg-white dark:bg-gray-800 shadow rounded-2xl p-6 mb-6">
    <h2 class="text-xl font-semibold mb-2">🎯 Goal</h2>
    <p id="goal"></p>
  </div>

  <!-- Success Criteria -->
  <div class="bg-white dark:bg-gray-800 shadow rounded-2xl p-6 mb-6">
    <h2 class="text-xl font-semibold mb-2">✅ Success Criteria</h2>
    <ul id="successCriteria" class="list-disc ml-6"></ul>
  </div>

  <!-- Sprints & Stories -->
  <div class="bg-white dark:bg-gray-800 shadow rounded-2xl p-6 mb-6">
    <h2 class="text-xl font-semibold mb-4">📅 Sprints & Stories</h2>
    <div id="sprints"></div>
  </div>

  <!-- Teams -->
  <div class="bg-white dark:bg-gray-800 shadow rounded-2xl p-6 mb-6">
    <h2 class="text-xl font-semibold mb-2">👥 Teams Involved</h2>
    <ul id="teams" class="list-disc ml-6"></ul>
  </div>

  <!-- Risks -->
  <div class="bg-white dark:bg-gray-800 shadow rounded-2xl p-6">
    <h2 class="text-xl font-semibold mb-2">⚠️ Risks</h2>
    <ul id="risks" class="list-disc ml-6"></ul>
  </div>

</div>

<script>
// Default JSON (can be replaced dynamically)
const data = {
  feature: "AI-powered FFmpeg Assistant",
  userType: "Developers & Content Creators",
  date: "2026-04-30",
  successCriteria: [
    "Users can generate FFmpeg commands via AI",
    "CLI and Web UI both functional",
    "Performance under 2s response time"
  ],
  sprints: [
    {
      name: "Sprint 1",
      stories: [
        "Setup Node.js CLI with Commander",
        "Basic FFmpeg wrapper"
      ]
    },
    {
      name: "Sprint 2",
      stories: [
        "Integrate AI (OpenAI/Gemini)",
        "Build Web UI"
      ]
    }
  ],
  teams: [
    "Solution Team",
    "Architecture Team",
    "Platform Team",
    "Development Team",
    "DevOps Team"
  ],
  risks: [
    "AI response inaccuracies",
    "FFmpeg compatibility issues",
    "Performance bottlenecks"
  ]
};

// Populate Goal
const goalText = `Release of ${data.feature} to ${data.userType} by ${data.date}`;
document.getElementById("goal").innerText = goalText;

// Success Criteria
const scList = document.getElementById("successCriteria");
data.successCriteria.forEach(item => {
  const li = document.createElement("li");
  li.innerText = item;
  scList.appendChild(li);
});

// Sprints
const sprintContainer = document.getElementById("sprints");
data.sprints.forEach(sprint => {
  const div = document.createElement("div");
  div.className = "mb-4";

  const title = document.createElement("h3");
  title.className = "font-semibold";
  title.innerText = sprint.name;

  const ul = document.createElement("ul");
  ul.className = "list-disc ml-6";

  sprint.stories.forEach(story => {
    const li = document.createElement("li");
    li.innerText = story;
    ul.appendChild(li);
  });

  div.appendChild(title);
  div.appendChild(ul);
  sprintContainer.appendChild(div);
});

// Teams
const teamList = document.getElementById("teams");
data.teams.forEach(team => {
  const li = document.createElement("li");
  li.innerText = team;
  teamList.appendChild(li);
});

// Risks
const riskList = document.getElementById("risks");
data.risks.forEach(risk => {
  const li = document.createElement("li");
  li.innerText = risk;
  riskList.appendChild(li);
});

// Theme toggle
function toggleTheme() {
  document.documentElement.classList.toggle('dark');
}
</script>

</body>
</html>
