<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />
  <title>OwnBackup Screenshots Viewer</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <style>
    body {
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .card {
      animation: slideUp 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }
    .card:nth-child(7) { animation-delay: 0.35s; }
    .card:nth-child(8) { animation-delay: 0.4s; }
    .card:nth-child(9) { animation-delay: 0.45s; }

    .card-image {
      transition: transform 0.3s ease, filter 0.3s ease;
      overflow: hidden;
    }

    .card:hover .card-image img {
      transform: scale(1.08);
      filter: brightness(0.9);
    }

    .card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.2);
    }

    .modal {
      animation: fadeIn 0.3s ease-in;
    }

    .modal-content {
      animation: slideUp 0.3s ease-out;
    }

    #modalImage {
      max-height: 70vh;
      object-fit: contain;
    }
  </style>

</head>

<body class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 text-gray-900 dark:text-gray-200">

  <div class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="sticky top-0 z-40 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm">
      <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
            OwnBackup Screenshots
          </h1>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Setup and Configuration Guide</p>
        </div>

        <button id="themeToggle" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition transform hover:scale-105">
          🌙 Toggle Theme
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-12">
      
      <!-- GRID OF CARDS -->
      <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Cards will be generated here -->
      </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-12">
      <div class="max-w-7xl mx-auto px-6 py-6 text-center text-sm text-gray-500 dark:text-gray-400">
        <p>OwnBackup Setup Screenshots </p>
      </div>
    </footer>

  </div>

  <!-- MODAL FOR FULL IMAGE VIEW -->
  <div id="modal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-75 flex items-center justify-center p-4 modal">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl modal-content max-w-4xl w-full max-h-90vh overflow-auto">
      <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-700 sticky top-0 bg-white dark:bg-gray-800 z-10">
        <h2 id="modalTitle" class="text-xl font-bold"></h2>
        <button id="closeModal" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 text-2xl">&times;</button>
      </div>
      <div class="p-6 flex flex-col items-center">
        <img id="modalImage" src="" alt="Full view" class="rounded-lg">
        <p id="modalFileName" class="mt-4 text-sm text-gray-500 dark:text-gray-400"></p>
      </div>
    </div>
  </div>


  <script>

    const images = [
      "signup-for-trial.png",
      "signup-email.png",
      "add-salesforce.png",
      "add-service.png",
      "backup-status.png",
      "data-backup-complete-email.png",
      "data-backup-completed.png",
      "restore-screen.png",
      "comapare-screen.png"
    ];

    const cardsContainer = document.getElementById("cardsContainer");
    const modal = document.getElementById("modal");
    const modalImage = document.getElementById("modalImage");
    const modalTitle = document.getElementById("modalTitle");
    const modalFileName = document.getElementById("modalFileName");
    const closeModal = document.getElementById("closeModal");

    // Create cards for each image
    images.forEach((imgName, index) => {
      const card = document.createElement("div");
      card.className = "card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-lg cursor-pointer";
      
      card.innerHTML = `
        <div class="card-image relative bg-gray-200 dark:bg-gray-700 h-48 flex items-center justify-center overflow-hidden">
          <img src="${imgName}" alt="${imgName}" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 hover:opacity-100 transition-opacity flex items-end p-4">
            <span class="text-white text-sm font-medium">Click to view</span>
          </div>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-gray-800 dark:text-white truncate">${imgName}</h3>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Step ${index + 1}</p>
        </div>
      `;

      card.addEventListener("click", () => openModal(imgName, index + 1));
      cardsContainer.appendChild(card);
    });

    // Modal functions
    function openModal(imgName, step) {
      modalImage.src = imgName;
      modalTitle.textContent = `Step ${step}: ${imgName}`;
      modalFileName.textContent = imgName;
      modal.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeModalFunc() {
      modal.classList.add("hidden");
      document.body.style.overflow = "auto";
    }

    closeModal.addEventListener("click", closeModalFunc);

    // Close modal when clicking outside the content
    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        closeModalFunc();
      }
    });

    // Close modal with Escape key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !modal.classList.contains("hidden")) {
        closeModalFunc();
      }
    });

    // THEME TOGGLE
    const toggle = document.getElementById("themeToggle");
    const htmlElement = document.documentElement;

    // Initialize theme from localStorage
    if (localStorage.getItem("theme") === "dark" || (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      htmlElement.classList.add("dark");
    }

    toggle.addEventListener("click", () => {
      htmlElement.classList.toggle("dark");
      localStorage.setItem("theme", htmlElement.classList.contains("dark") ? "dark" : "light");
    });

  </script>

</body>

</html>
