
<!DOCTYPE html>
<html lang="en">

<head>
    <link href="css/jsoneditor.css?ver=1.0" rel="stylesheet" type="text/css">
    <script src="js/jsoneditor.js"></script>
    <script src="https://mohan-chinnappan-n5.github.io/pkg/js/lib/autocomplete.min.js"></script>
    <link rel="stylesheet" href="https://mohan-chinnappan-n5.github.io/pkg/css/lib/autocomplete.css">

    <script src="https://mohan-chinnappan-n.github.io/sfdc/gs/js/split.js"></script>
    <link rel="stylesheet" href="https://mohan-chinnappan-n.github.io/sfdc/gs/css/split.css">

    <link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/editor/img/favicon.ico" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"
        integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js" crossorigin="anonymous"
        integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s"></script>

    <!-- diff libraries (small, load eagerly) -->
    <script src="https://cdn.jsdelivr.net/npm/deep-diff@1.0.2/dist/deep-diff.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Editor - Kalam</title>
    <script src="https://unpkg.com/monaco-editor/min/vs/loader.js"></script>
    <link rel="stylesheet" href="css/xml2json.css?v=11">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-1">
        <a class="navbar-brand" href="#">&nbsp; JSON Editor - Kalam</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <div id="dropArea" style="border: 2px dashed #ccc; padding: 2px; text-align: center;">
                        <input class='btn btn-dark' type="file" id="jsonFileInput" accept=".json">
                        <span style="color: wheat;">Drag and drop a JSON file here</span>
                        <input type="text" autocomplete="off" id="autoCompleteMtype">
                        <button class="btn btn-primary" id="download-button">Download JSON</button>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Tab Navigation -->
    <ul class="nav nav-tabs bg-dark px-2 pt-1" id="mainTabs" role="tablist">
        <li class="nav-item">
            <a class="nav-link active" id="editor-tab" data-toggle="tab" href="#editor-pane" role="tab">
                &#128196; Editor
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="jq-tab" data-toggle="tab" href="#jq-pane" role="tab">
                &#9965; jq Query
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="diff-tab-nav" data-toggle="tab" href="#diff-pane" role="tab">
                &#128195; JSON Diff
            </a>
        </li>
    </ul>

    <div class="tab-content" id="mainTabContent">

        <!-- ===== Editor Tab ===== -->
        <div class="tab-pane fade show active" id="editor-pane" role="tabpanel">
            <div class="editor-container">
                <div class="split split-horizontal" id="content" style="z-index: 1;">
                    <div id="editor-json"></div>
                </div>
                <div class="split split-horizontal" id="je">
                    <div id="jsoneditor"></div>
                </div>
            </div>
        </div>

        <!-- ===== jq Query Tab ===== -->
        <div class="tab-pane fade" id="jq-pane" role="tabpanel">
            <div class="jq-toolbar bg-dark p-2">
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text bg-secondary text-white font-weight-bold"
                              title="jq filter expression">jq</span>
                    </div>
                    <input type="text" id="jq-query-input" class="form-control font-weight-bold"
                           style="font-family: monospace;"
                           placeholder='e.g.  .  |  .browsers[]  |  .gems | keys  |  .. | numbers  |  .[] | select(.age > 30)'
                           value=".">
                    <div class="input-group-append">
                        <button class="btn btn-success" id="jq-run-btn" title="Run query (Enter)">&#9654; Run</button>
                        <button class="btn btn-outline-light" id="jq-use-editor-btn"
                                title="Copy current editor JSON into the jq input pane">Use Editor JSON</button>
                        <button class="btn btn-warning" id="jq-help-btn" title="Open jq cheatsheet">&#10067; Help</button>
                    </div>
                </div>
                <small class="text-muted">Press <kbd>Enter</kbd> in the query box to run &bull; Supports full jq syntax</small>
            </div>
            <div class="jq-editors-row">
                <div class="jq-editor-col">
                    <div class="pane-label">Input JSON</div>
                    <div id="jq-input-editor" class="code-pane"></div>
                </div>
                <div class="jq-editor-col">
                    <div class="pane-label">Output</div>
                    <div id="jq-output-editor" class="code-pane"></div>
                </div>
            </div>
        </div>

        <!-- ===== Diff Tab ===== -->
        <div class="tab-pane fade" id="diff-pane" role="tabpanel">
            <!-- Input editors -->
            <div class="diff-inputs-row" id="diff-inputs-row">
                <div class="diff-editor-col" id="diff-col-a">
                    <div class="d-flex justify-content-between align-items-center pane-label">
                        <span>JSON A &mdash; Original</span>
                        <input type="file" id="diff-file-a" accept=".json" class="form-control-file small-file-input">
                    </div>
                    <div id="diff-editor-a" class="code-pane"></div>
                </div>
                <div id="diff-gutter" class="diff-gutter" title="Drag to resize">
                    <div class="diff-gutter-handle"></div>
                </div>
                <div class="diff-editor-col" id="diff-col-b">
                    <div class="d-flex justify-content-between align-items-center pane-label">
                        <span>JSON B &mdash; Modified</span>
                        <input type="file" id="diff-file-b" accept=".json" class="form-control-file small-file-input">
                    </div>
                    <div id="diff-editor-b" class="code-pane"></div>
                </div>
            </div>

            <!-- Horizontal animated splitter -->
            <div id="diff-h-gutter" class="diff-h-gutter" title="Drag to resize">
                <div class="diff-h-gutter-handle"></div>
            </div>

            <!-- Bottom: controls + results -->
            <div id="diff-bottom" class="diff-bottom">
                <!-- Controls -->
                <div class="diff-controls bg-dark d-flex align-items-center px-3 py-2">
                    <button class="btn btn-sm btn-primary mr-2" id="diff-semantic-btn">
                        &#9965; Semantic Diff
                    </button>
                    <button class="btn btn-sm btn-info mr-2" id="diff-verbatim-btn">
                        &#128195; Verbatim Diff
                    </button>
                    <button class="btn btn-sm btn-outline-light mr-3" id="diff-use-editor-btn">
                        Use Editor as A
                    </button>
                    <span id="diff-status" class="text-muted small"></span>
                </div>

                <!-- Verbatim: Monaco diff editor (shown on demand) -->
                <div id="monaco-diff-container" style="display:none; border:1px solid #555;"></div>

                <!-- Semantic: HTML results table -->
                <div id="diff-results" class="px-3 pb-3"></div>
            </div>
        </div>

    </div><!-- /tab-content -->

    <!-- ===== jq Help Drawer ===== -->
    <div id="jq-help-overlay" class="jq-help-overlay"></div>
    <div id="jq-help-drawer" class="jq-help-drawer" aria-label="jq Help">
        <div class="jq-help-header">
            <span>&#10067; jq Cheatsheet</span>
            <div class="d-flex align-items-center gap-2">
                <input type="text" id="jq-help-search" class="form-control form-control-sm"
                       placeholder="Search examples..." style="width:200px;">
                <button id="jq-help-close" class="btn btn-sm btn-outline-light ml-2">&times; Close</button>
            </div>
        </div>
        <div id="jq-help-body" class="jq-help-body">
            <!-- populated by JS -->
        </div>
    </div>

    <script type="module" src="js/jsonApp.js?v=5"></script>
</body>

</html>
