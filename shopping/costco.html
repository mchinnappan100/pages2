<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Costco Purchasing List Maker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white transition-all">
  <div class="max-w-5xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">🛒 Costco Purchasing List Maker</h1>
      <button onclick="toggleTheme()" class="px-4 py-2 rounded-lg bg-blue-500 text-white">Toggle Theme</button>
    </div>

    <div id="list" class="space-y-6"></div>
  </div>

<script>
const template = {
  "Food Court": ["Cooked Cheese Pizza","Hot dog"],
  "Pharmacy": ["Wet wipes","Diapers"],
  "Nuts": [["Peanuts","1 bag"],["Walnut","1 bag"],["Pistachio","1 bag"],["Almond","1 bag"]],
  "Oil": [["Olive Oil","1 bag"]],
  "Grains": [["Rice - 25 lb bag","1"],["Quinoa","1 bag"]],
  "Milk and Eggs": [["Red cap","8 gal"],["Eggs","24 count"]],
  "Frozen": ["Tortilios","Dyno Chicken","Chicken Melt","Frozen pizza","Tyson popcorn chicken"],
  "Paper": ["Paper towels","Toilet paper"],
  "Fruits and Vegs": ["Blueberry","Rasberry","Strawberry","Blackberry","Grapes","Corn","Banana"],
  "Bakery": ["Croissant","Bread"],
  "Indian": ["Naan"]
};

function render(){
 const list = document.getElementById('list');
 list.innerHTML='';
 Object.entries(template).forEach(([section,items])=>{
   const card=document.createElement('div');
   card.className='bg-white dark:bg-gray-800 rounded-xl shadow p-5';
   card.innerHTML=`<h2 class='text-xl font-semibold mb-3'>${section}</h2>`;
   const ul=document.createElement('div');
   ul.className='space-y-2';
   items.forEach(item=>{
     const [name,qty]=Array.isArray(item)?item:[item,''];
     const row=document.createElement('div');
     row.className='flex justify-between items-center border-b pb-2';
     row.innerHTML=`<label><input type='checkbox' class='mr-2'>${name}</label><input value='${qty}' class='px-2 py-1 rounded border dark:bg-gray-700'>`;
     ul.appendChild(row);
   });
   card.appendChild(ul);
   list.appendChild(card);
 });
}

function toggleTheme(){
 document.documentElement.classList.toggle('dark');
}

render();
</script>
</body>
</html>
