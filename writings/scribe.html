<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRIBE — AI Writing Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ===== THEME SYSTEM ===== */
  :root {
    --bg-primary: #0d0f14;
    --bg-secondary: #131620;
    --bg-card: #1a1d2e;
    --border: #2a2d4a;
    --accent: #f0c040;
    --accent2: #4a9eff;
    --text-primary: #e8e4d0;
    --text-muted: #666a8a;
    --text-dim: #3a3d5a;
    --success: #40c080;
    --danger: #ff4a6a;
    --font-ui: 'Share Tech Mono', monospace;
    --font-body: 'DM Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  [data-theme="parchment"] {
    --bg-primary: #f5f0e8;
    --bg-secondary: #ede8db;
    --bg-card: #faf7f0;
    --border: #c8b89a;
    --accent: #8b4513;
    --accent2: #2c5f8a;
    --text-primary: #2a1f0f;
    --text-muted: #7a6a50;
    --text-dim: #c0b090;
    --success: #2d7a2d;
    --danger: #c0392b;
    --font-ui: 'Crimson Pro', serif;
    --font-body: 'Crimson Pro', serif;
    --font-display: 'Playfair Display', serif;
  }

  [data-theme="arctic"] {
    --bg-primary: #f0f4f8;
    --bg-secondary: #e4eaf2;
    --bg-card: #ffffff;
    --border: #b8c8dc;
    --accent: #0066cc;
    --accent2: #00aa88;
    --text-primary: #1a2a3a;
    --text-muted: #5a7090;
    --text-dim: #b0c0d0;
    --success: #009966;
    --danger: #cc3344;
    --font-ui: 'DM Mono', monospace;
    --font-body: 'DM Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  [data-theme="obsidian"] {
    --bg-primary: #080808;
    --bg-secondary: #101010;
    --bg-card: #181818;
    --border: #282828;
    --accent: #e8e8e8;
    --accent2: #888888;
    --text-primary: #d8d8d8;
    --text-muted: #505050;
    --text-dim: #282828;
    --success: #60a060;
    --danger: #a04040;
    --font-ui: 'DM Mono', monospace;
    --font-body: 'DM Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    transition: all 0.4s ease;
  }

  /* ===== LAYOUT ===== */
  .app-shell {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 400;
    font-size: 0.7rem;
    display: block;
    letter-spacing: 0.3em;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--bg-primary);
    padding: 3px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 6px 16px;
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: var(--bg-primary);
  }

  /* ===== THEME SWITCHER ===== */
  .theme-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .theme-btn:hover { transform: scale(1.2); }
  .theme-btn.active { border-color: var(--accent); }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    display: grid;
    grid-template-columns: 1fr;
    overflow: hidden;
    position: relative;
  }

  /* ===== PANEL SYSTEM ===== */
  .panel { display: none; height: 100%; overflow: hidden; }
  .panel.active { display: flex; flex-direction: column; }

  /* ===== EDITOR PANEL ===== */
  .editor-panel {
    padding: 0;
    gap: 0;
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-wrap: wrap;
  }

  .toolbar-label {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .btn {
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 3px;
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg-primary);
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn-primary:hover {
    opacity: 0.85;
    color: var(--bg-primary);
  }

  .btn-secondary {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .btn-secondary:hover {
    background: var(--accent2);
    color: var(--bg-primary);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .word-count {
    margin-left: auto;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .editor-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #editor {
    width: 100%;
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-body);
    font-size: 1.05rem;
    line-height: 1.85;
    padding: 32px 40px;
    transition: background 0.3s, color 0.3s;
  }

  #editor::placeholder { color: var(--text-dim); font-style: italic; }

  .editor-footer {
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    display: inline-block;
    margin-right: 8px;
  }

  .status-dot.connected { background: var(--success); animation: pulse 2s infinite; }
  .status-dot.error { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ===== SETTINGS PANEL ===== */
  .settings-panel {
    padding: 32px;
    overflow-y: auto;
    background: var(--bg-primary);
    gap: 0;
  }

  .settings-title {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .provider-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 10px;
    background: var(--bg-card);
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .provider-card:hover { border-color: var(--accent); transform: translateX(3px); }
  .provider-card.selected { border-color: var(--accent); background: var(--bg-secondary); }

  .provider-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .provider-icon { font-size: 1.4rem; }

  .provider-name {
    font-family: var(--font-ui);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: var(--text-primary);
  }

  .provider-badge {
    font-family: var(--font-ui);
    font-size: 0.6rem;
    padding: 2px 8px;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 2px;
    letter-spacing: 0.1em;
  }

  .btn-use {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 3px;
  }

  .btn-use:hover, .provider-card.selected .btn-use {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* API Key input */
  .api-key-section {
    margin-top: 16px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    display: none;
  }

  .api-key-section.show { display: block; }

  .api-key-label {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .api-key-input {
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 0.8rem;
    padding: 10px 14px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .api-key-input:focus { border-color: var(--accent); }

  .settings-section-title {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin: 28px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .settings-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Ollama model input */
  .ollama-section { display: none; }
  .ollama-section.show { display: block; }

  /* ===== SLIDE-IN POPUP ===== */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .popup-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .popup {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(560px, 100vw);
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    z-index: 101;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .popup.show { transform: translateX(0); }

  .popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  .popup-title {
    font-family: var(--font-display);
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .popup-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 28px; height: 28px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .popup-close:hover { border-color: var(--danger); color: var(--danger); }

  .popup-mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .popup-mode-tab {
    flex: 1;
    padding: 10px;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .popup-mode-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .popup-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .diff-section {
    margin-bottom: 20px;
  }

  .diff-label {
    font-family: var(--font-ui);
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .diff-label .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .diff-label .dot-original { background: var(--text-muted); }
  .diff-label .dot-corrected { background: var(--success); }

  .diff-box {
    padding: 16px;
    border-radius: 4px;
    line-height: 1.75;
    font-family: var(--font-body);
    font-size: 0.95rem;
    border: 1px solid var(--border);
    background: var(--bg-primary);
    white-space: pre-wrap;
  }

  .diff-box .del {
    background: rgba(255, 74, 106, 0.15);
    color: var(--danger);
    text-decoration: line-through;
    border-radius: 2px;
    padding: 1px 2px;
  }

  .diff-box .ins {
    background: rgba(64, 192, 128, 0.15);
    color: var(--success);
    border-radius: 2px;
    padding: 1px 2px;
    border-bottom: 1px solid var(--success);
  }

  .explanation-box {
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-secondary);
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--text-primary);
  }

  .explanation-item {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    align-items: flex-start;
  }

  .explanation-item:last-child { margin-bottom: 0; }

  .explanation-bullet {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 9px;
    flex-shrink: 0;
  }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    gap: 16px;
  }

  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--font-ui);
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ===== POPUP ACTIONS ===== */
  .popup-actions {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  .btn-accept {
    flex: 1;
    background: var(--success);
    color: var(--bg-primary);
    border: 1px solid var(--success);
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .btn-accept:hover { opacity: 0.8; }

  .btn-reject {
    flex: 1;
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reject:hover { background: var(--danger); color: var(--bg-primary); }

  /* ===== SCAN LINE EFFECT (cyber theme) ===== */
  [data-theme="cyber"] body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  /* ===== CORNER DECORATION ===== */
  .corner-tl, .corner-br {
    position: absolute;
    width: 20px; height: 20px;
    pointer-events: none;
  }

  .corner-tl {
    top: 0; left: 0;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
  }

  .corner-br {
    bottom: 0; right: 0;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
  }

  /* ===== NOTIFICATION TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-card);
    border: 1px solid var(--accent);
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 10px 20px;
    border-radius: 4px;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== TEXTAREA BEAUTIFICATION ===== */
  [data-theme="parchment"] #editor {
    background-image: repeating-linear-gradient(transparent, transparent 41px, var(--border) 41px, var(--border) 42px);
    background-size: 100% 42px;
    line-height: 42px;
    padding-top: 0;
  }

  /* ===== SETTINGS SAVE BUTTON ===== */
  .settings-save-row {
    margin-top: 24px;
    display: flex;
    justify-content: flex-end;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    #editor { padding: 20px; font-size: 0.95rem; }
    .popup { width: 100vw; }
    .settings-panel { padding: 20px; }
  }
</style>
</head>
<body>

<div class="app-shell">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      SCRIBE
      <span>AI Writing Assistant</span>
    </div>

    <div class="header-controls">
      <!-- Theme Switcher -->
      <div style="display:flex;align-items:center;gap:6px;margin-right:8px;">
        <button class="theme-btn active" style="background:#f0c040;" onclick="setTheme('cyber')" title="Cyber" id="theme-cyber"></button>
        <button class="theme-btn" style="background:#8b4513;" onclick="setTheme('parchment')" title="Parchment" id="theme-parchment"></button>
        <button class="theme-btn" style="background:#0066cc;" onclick="setTheme('arctic')" title="Arctic" id="theme-arctic"></button>
        <button class="theme-btn" style="background:#888;" onclick="setTheme('obsidian')" title="Obsidian" id="theme-obsidian"></button>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchPanel('editor')">WRITE</button>
        <button class="tab" onclick="switchPanel('settings')">SETTINGS</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main-content">

    <!-- EDITOR PANEL -->
    <div class="panel editor-panel active" id="panel-editor">
      <div class="editor-toolbar">
        <span class="toolbar-label">Actions:</span>
        <button class="btn btn-primary" onclick="runAction('correct')" id="btn-correct">
          ✦ Correct
        </button>
        <button class="btn btn-secondary" onclick="runAction('enhance')" id="btn-enhance">
          ◈ Enhance
        </button>
        <button class="btn" onclick="runAction('summarize')" id="btn-summarize">
          ◎ Summarize
        </button>
        <button class="btn" onclick="runAction('formal')" id="btn-formal">
          ⊕ Make Formal
        </button>
        <button class="btn" onclick="clearEditor()" style="margin-left:auto;">
          ⊗ Clear
        </button>
        <span class="word-count" id="word-count">0 words</span>
      </div>

      <div class="editor-wrapper" style="position:relative;">
        <div class="corner-tl"></div>
        <div class="corner-br"></div>
        <textarea id="editor" spellcheck="true"
          placeholder="Begin writing here... Your thoughts, unfiltered. SCRIBE will help you refine them."></textarea>
      </div>

      <div class="editor-footer">
        <div>
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">No provider configured</span>
        </div>
        <span style="font-family:var(--font-ui);font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;">
          <span id="char-count">0</span> CHARS
        </span>
      </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div class="panel settings-panel" id="panel-settings">
      <div class="settings-title">⚙ Provider Settings</div>

      <div class="settings-section-title">AI Providers</div>

      <!-- Ollama -->
      <div class="provider-card" id="card-ollama" onclick="selectProvider('ollama')">
        <div class="provider-left">
          <span class="provider-icon">🦙</span>
          <span class="provider-name">Ollama</span>
          <span class="provider-badge">LOCAL</span>
        </div>
        <button class="btn-use" onclick="event.stopPropagation();selectProvider('ollama')">USE OLLAMA</button>
      </div>

      <!-- Claude -->
      <div class="provider-card" id="card-claude" onclick="selectProvider('claude')">
        <div class="provider-left">
          <span class="provider-icon">🔵</span>
          <span class="provider-name">Claude by Anthropic</span>
        </div>
        <button class="btn-use" onclick="event.stopPropagation();selectProvider('claude')">USE CLAUDE</button>
      </div>

      <!-- OpenAI -->
      <div class="provider-card" id="card-openai" onclick="selectProvider('openai')">
        <div class="provider-left">
          <span class="provider-icon">🤖</span>
          <span class="provider-name">OpenAI</span>
        </div>
        <button class="btn-use" onclick="event.stopPropagation();selectProvider('openai')">USE OPENAI</button>
      </div>

      <!-- xAI -->
      <div class="provider-card" id="card-xai" onclick="selectProvider('xai')">
        <div class="provider-left">
          <span class="provider-icon">✕</span>
          <span class="provider-name">xAI (Grok)</span>
        </div>
        <button class="btn-use" onclick="event.stopPropagation();selectProvider('xai')">USE XAI</button>
      </div>

      <!-- Gemini -->
      <div class="provider-card" id="card-gemini" onclick="selectProvider('gemini')">
        <div class="provider-left">
          <span class="provider-icon">✦</span>
          <span class="provider-name">Google Gemini</span>
        </div>
        <button class="btn-use" onclick="event.stopPropagation();selectProvider('gemini')">USE GEMINI</button>
      </div>

      <!-- Ollama URL -->
      <div class="ollama-section api-key-section" id="ollama-url-section">
        <label class="api-key-label">Ollama Host URL</label>
        <input type="text" class="api-key-input" id="ollama-url"
          placeholder="http://localhost:11434" value="http://localhost:11434">
        <label class="api-key-label" style="margin-top:12px;">Model</label>
        <input type="text" class="api-key-input" id="ollama-model"
          placeholder="llama3.2" value="llama3.2">
      </div>

      <!-- API Key section -->
      <div class="api-key-section" id="api-key-section">
        <label class="api-key-label" id="api-key-label">API Key</label>
        <input type="password" class="api-key-input" id="api-key-input"
          placeholder="sk-...">
      </div>

      <div class="settings-section-title">Behavior</div>

      <!-- Model override -->
      <div style="padding:14px 18px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);">
        <label class="api-key-label">Model Override (optional)</label>
        <input type="text" class="api-key-input" id="model-override"
          placeholder="Leave blank for default model">
      </div>

      <div class="settings-save-row">
        <button class="btn btn-primary" onclick="saveSettings()">SAVE SETTINGS</button>
      </div>
    </div>

  </div>
</div>

<!-- POPUP OVERLAY -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup()"></div>

<!-- SLIDE-IN POPUP -->
<div class="popup" id="result-popup">
  <div class="popup-header">
    <span class="popup-title" id="popup-title">◈ Correction</span>
    <button class="popup-close" onclick="closePopup()">✕</button>
  </div>

  <div class="popup-mode-tabs">
    <button class="popup-mode-tab active" onclick="switchPopupTab('diff')" id="tab-diff">Diff View</button>
    <button class="popup-mode-tab" onclick="switchPopupTab('result')" id="tab-result">Result</button>
    <button class="popup-mode-tab" onclick="switchPopupTab('explain')" id="tab-explain">Explanation</button>
  </div>

  <div class="popup-body" id="popup-body">
    <!-- Filled dynamically -->
  </div>

  <div class="popup-actions">
    <button class="btn-accept" onclick="acceptCorrection()">✓ Accept Changes</button>
    <button class="btn-reject" onclick="closePopup()">✕ Reject</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = {
  provider: null,
  apiKey: '',
  ollamaUrl: 'http://localhost:11434',
  ollamaModel: 'llama3.2',
  modelOverride: '',
  currentResult: '',
  currentAction: 'correct',
  popupTab: 'diff'
};

// Load from localStorage if available
try {
  const saved = localStorage.getItem('scribe-settings');
  if (saved) {
    const parsed = JSON.parse(saved);
    Object.assign(state, parsed);
  }
} catch(e) {}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  const editor = document.getElementById('editor');
  editor.addEventListener('input', updateCounts);

  // Restore settings
  if (state.provider) {
    selectProvider(state.provider, true);
    if (state.apiKey) document.getElementById('api-key-input').value = state.apiKey;
    if (state.ollamaUrl) document.getElementById('ollama-url').value = state.ollamaUrl;
    if (state.ollamaModel) document.getElementById('ollama-model').value = state.ollamaModel;
    if (state.modelOverride) document.getElementById('model-override').value = state.modelOverride;
  }

  updateStatus();
});

// ===== THEME =====
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('theme-' + theme);
  if (btn) btn.classList.add('active');
  try { localStorage.setItem('scribe-theme', theme); } catch(e) {}
}

// Restore theme
try {
  const t = localStorage.getItem('scribe-theme');
  if (t) setTheme(t);
} catch(e) {}

// ===== PANELS =====
function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (name === 'editor' && i === 0) || (name === 'settings' && i === 1));
  });
}

// ===== WORD COUNT =====
function updateCounts() {
  const text = document.getElementById('editor').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('word-count').textContent = words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('char-count').textContent = text.length;
}

function clearEditor() {
  document.getElementById('editor').value = '';
  updateCounts();
}

// ===== PROVIDER =====
function selectProvider(provider, silent) {
  state.provider = provider;

  document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('card-' + provider);
  if (card) card.classList.add('selected');

  // Show/hide inputs
  const apiSection = document.getElementById('api-key-section');
  const ollamaSection = document.getElementById('ollama-url-section');
  const keyLabel = document.getElementById('api-key-label');

  ollamaSection.classList.remove('show');
  apiSection.classList.remove('show');

  if (provider === 'ollama') {
    ollamaSection.classList.add('show');
  } else if (provider === 'claude') {
    apiSection.classList.add('show');
    keyLabel.textContent = 'Anthropic API Key';
  } else if (provider === 'openai') {
    apiSection.classList.add('show');
    keyLabel.textContent = 'OpenAI API Key';
  } else if (provider === 'xai') {
    apiSection.classList.add('show');
    keyLabel.textContent = 'xAI API Key';
  } else if (provider === 'gemini') {
    apiSection.classList.add('show');
    keyLabel.textContent = 'Google Gemini API Key';
  }

  if (!silent) updateStatus();
}

function saveSettings() {
  state.apiKey = document.getElementById('api-key-input').value;
  state.ollamaUrl = document.getElementById('ollama-url').value;
  state.ollamaModel = document.getElementById('ollama-model').value;
  state.modelOverride = document.getElementById('model-override').value;

  try {
    localStorage.setItem('scribe-settings', JSON.stringify({
      provider: state.provider,
      apiKey: state.apiKey,
      ollamaUrl: state.ollamaUrl,
      ollamaModel: state.ollamaModel,
      modelOverride: state.modelOverride
    }));
  } catch(e) {}

  updateStatus();
  showToast('Settings saved ✓');
  switchPanel('editor');
}

function updateStatus() {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');

  if (!state.provider) {
    dot.className = 'status-dot';
    text.textContent = 'No provider configured — go to Settings';
  } else if (state.provider === 'ollama') {
    dot.className = 'status-dot connected';
    text.textContent = 'Ollama @ ' + (state.ollamaModel || 'llama3.2');
  } else if (state.apiKey) {
    dot.className = 'status-dot connected';
    text.textContent = state.provider.toUpperCase() + ' — ready';
  } else {
    dot.className = 'status-dot error';
    text.textContent = state.provider.toUpperCase() + ' — API key required';
  }
}

// ===== AI ACTIONS =====
async function runAction(action) {
  const text = document.getElementById('editor').value.trim();
  if (!text) { showToast('Nothing to ' + action + ' — write something first!'); return; }

  if (!state.provider) {
    showToast('Configure a provider in Settings first');
    switchPanel('settings');
    return;
  }

  if (state.provider !== 'ollama' && !state.apiKey) {
    showToast('Add your API key in Settings');
    switchPanel('settings');
    return;
  }

  state.currentAction = action;

  const titles = {
    correct: '✦ Grammar & Spelling Correction',
    enhance: '◈ Writing Enhancement',
    summarize: '◎ Summary',
    formal: '⊕ Formal Version'
  };

  document.getElementById('popup-title').textContent = titles[action] || 'Result';
  showPopupLoading();

  try {
    const result = await callLLM(text, action);
    state.currentResult = result.corrected;
    showPopupResult(text, result.corrected, result.explanation, action);
  } catch (err) {
    showPopupError(err.message);
  }
}

// ===== LLM CALL =====
async function callLLM(text, action) {
  const prompts = {
    correct: `You are a precise writing assistant. Correct all grammar, spelling, and punctuation errors in the text below. 
Return a JSON object with exactly these fields:
- "corrected": the corrected text (preserve the original meaning and style)
- "explanation": an array of strings, each describing one specific change made (keep it concise, max 5 items)

If there are no errors, return the original text as "corrected" and an empty array for "explanation".

Text to correct:
"""
${text}
"""

Return ONLY valid JSON, no markdown, no backticks.`,

    enhance: `You are a skilled writing coach. Enhance the text below to make it more vivid, engaging, and impactful while preserving the author's voice and intent.
Return a JSON object with exactly these fields:
- "corrected": the enhanced text
- "explanation": an array of strings describing the key improvements made (max 5 items)

Text to enhance:
"""
${text}
"""

Return ONLY valid JSON, no markdown, no backticks.`,

    summarize: `Summarize the text below into 2-3 concise, well-formed sentences that capture the core ideas.
Return a JSON object with exactly these fields:
- "corrected": the summary
- "explanation": ["Summary condensed from ${text.split(' ').length} words"]

Text:
"""
${text}
"""

Return ONLY valid JSON, no markdown, no backticks.`,

    formal: `Rewrite the text below in a professional, formal tone suitable for business or academic communication. Preserve all key information.
Return a JSON object with exactly these fields:
- "corrected": the formal version
- "explanation": an array of strings describing the key tone adjustments (max 5 items)

Text:
"""
${text}
"""

Return ONLY valid JSON, no markdown, no backticks.`
  };

  const prompt = prompts[action];

  if (state.provider === 'claude') {
    return await callClaude(prompt);
  } else if (state.provider === 'openai') {
    return await callOpenAI(prompt);
  } else if (state.provider === 'ollama') {
    return await callOllama(prompt);
  } else if (state.provider === 'xai') {
    return await callXAI(prompt);
  } else if (state.provider === 'gemini') {
    return await callGemini(prompt);
  }
}

async function callClaude(prompt) {
  const model = state.modelOverride || 'claude-sonnet-4-20250514';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model,
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Claude API error ' + res.status);
  }
  const data = await res.json();
  return parseJSON(data.content[0].text);
}

async function callOpenAI(prompt) {
  const model = state.modelOverride || 'gpt-4o-mini';
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + state.apiKey
    },
    body: JSON.stringify({
      model,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 2000
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'OpenAI error ' + res.status);
  }
  const data = await res.json();
  return parseJSON(data.choices[0].message.content);
}

async function callXAI(prompt) {
  const model = state.modelOverride || 'grok-beta';
  const res = await fetch('https://api.x.ai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + state.apiKey
    },
    body: JSON.stringify({
      model,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 2000
    })
  });
  if (!res.ok) throw new Error('xAI error ' + res.status);
  const data = await res.json();
  return parseJSON(data.choices[0].message.content);
}

async function callGemini(prompt) {
  const model = state.modelOverride || 'gemini-1.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${state.apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { maxOutputTokens: 2000 }
    })
  });
  if (!res.ok) throw new Error('Gemini error ' + res.status);
  const data = await res.json();
  return parseJSON(data.candidates[0].content.parts[0].text);
}

async function callOllama(prompt) {
  const url = (state.ollamaUrl || 'http://localhost:11434') + '/api/generate';
  const model = state.modelOverride || state.ollamaModel || 'llama3.2';
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, prompt, stream: false })
  });
  if (!res.ok) throw new Error('Ollama error ' + res.status);
  const data = await res.json();
  return parseJSON(data.response);
}

function parseJSON(text) {
  const clean = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  try {
    return JSON.parse(clean);
  } catch(e) {
    // Fallback: return text as corrected
    return { corrected: text, explanation: ['Result returned as plain text'] };
  }
}

// ===== POPUP =====
function showPopupLoading() {
  document.getElementById('popup-overlay').classList.add('show');
  document.getElementById('result-popup').classList.add('show');

  const body = document.getElementById('popup-body');
  body.innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Processing with ${state.provider?.toUpperCase() || 'AI'}...</div>
    </div>
  `;

  // Hide actions during load
  document.querySelector('.popup-actions').style.opacity = '0.3';
  document.querySelector('.popup-actions').style.pointerEvents = 'none';
}

function showPopupResult(original, corrected, explanation, action) {
  state.popupTab = 'diff';
  document.getElementById('tab-diff').classList.add('active');
  document.getElementById('tab-result').classList.remove('active');
  document.getElementById('tab-explain').classList.remove('active');

  document.querySelector('.popup-actions').style.opacity = '1';
  document.querySelector('.popup-actions').style.pointerEvents = '';

  renderPopupTab(original, corrected, explanation);
}

function renderPopupTab(original, corrected, explanation) {
  const body = document.getElementById('popup-body');
  const tab = state.popupTab;

  if (tab === 'diff') {
    const diffHtml = computeDiff(original, corrected);
    body.innerHTML = `
      <div class="diff-section">
        <div class="diff-label">
          <span class="dot dot-original"></span> Original
        </div>
        <div class="diff-box">${escapeHtml(original)}</div>
      </div>
      <div class="diff-section">
        <div class="diff-label">
          <span class="dot dot-corrected"></span> Corrected
        </div>
        <div class="diff-box">${diffHtml}</div>
      </div>
    `;
  } else if (tab === 'result') {
    body.innerHTML = `
      <div class="diff-section">
        <div class="diff-label">
          <span class="dot dot-corrected"></span> Result
        </div>
        <div class="diff-box">${escapeHtml(corrected)}</div>
      </div>
    `;
  } else if (tab === 'explain') {
    const items = Array.isArray(explanation)
      ? explanation
      : [String(explanation)];
    const itemsHtml = items.map(item => `
      <div class="explanation-item">
        <div class="explanation-bullet"></div>
        <div>${escapeHtml(item)}</div>
      </div>
    `).join('');
    body.innerHTML = `
      <div class="diff-section">
        <div class="diff-label">Changes Made</div>
        <div class="explanation-box">${itemsHtml || '<div style="color:var(--text-muted)">No changes were necessary.</div>'}</div>
      </div>
    `;
  }

  // Store data for tab switching
  body.dataset.original = original;
  body.dataset.corrected = corrected;
  body.dataset.explanation = JSON.stringify(explanation);
}

function switchPopupTab(tab) {
  state.popupTab = tab;
  ['diff','result','explain'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });

  const body = document.getElementById('popup-body');
  const original = body.dataset.original || '';
  const corrected = body.dataset.corrected || '';
  let explanation = [];
  try { explanation = JSON.parse(body.dataset.explanation || '[]'); } catch(e) {}

  renderPopupTab(original, corrected, explanation);
}

function showPopupError(msg) {
  document.querySelector('.popup-actions').style.opacity = '1';
  document.querySelector('.popup-actions').style.pointerEvents = '';
  const body = document.getElementById('popup-body');
  body.innerHTML = `
    <div style="padding:24px;text-align:center;color:var(--danger);">
      <div style="font-size:2rem;margin-bottom:12px;">⚠</div>
      <div style="font-family:var(--font-ui);font-size:0.75rem;letter-spacing:0.1em;margin-bottom:8px;">ERROR</div>
      <div style="font-size:0.9rem;color:var(--text-primary);">${escapeHtml(msg)}</div>
      <div style="margin-top:16px;font-size:0.8rem;color:var(--text-muted);">Check your API key and provider settings.</div>
    </div>
  `;
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
  document.getElementById('result-popup').classList.remove('show');
}

function acceptCorrection() {
  if (state.currentResult) {
    document.getElementById('editor').value = state.currentResult;
    updateCounts();
    showToast('Changes accepted ✓');
    closePopup();
  }
}

// ===== DIFF ENGINE =====
function computeDiff(original, corrected) {
  // Word-level diff
  const orig = original.split(/(\s+)/);
  const corr = corrected.split(/(\s+)/);

  // Simple LCS-based diff
  const lcs = buildLCS(orig, corr);
  let result = '';
  let i = 0, j = 0, k = 0;

  while (i < orig.length || j < corr.length) {
    if (k < lcs.length && i < orig.length && j < corr.length &&
        orig[i] === lcs[k] && corr[j] === lcs[k]) {
      result += escapeHtml(orig[i]);
      i++; j++; k++;
    } else {
      // Check deletions
      let delBuf = '';
      while (i < orig.length && (k >= lcs.length || orig[i] !== lcs[k])) {
        delBuf += orig[i++];
      }
      // Check insertions
      let insBuf = '';
      while (j < corr.length && (k >= lcs.length || corr[j] !== lcs[k])) {
        insBuf += corr[j++];
      }
      if (delBuf) result += `<span class="del">${escapeHtml(delBuf)}</span>`;
      if (insBuf) result += `<span class="ins">${escapeHtml(insBuf)}</span>`;
    }
  }

  return result || escapeHtml(corrected);
}

function buildLCS(a, b) {
  // For performance, cap at 200 tokens
  const maxLen = 200;
  const A = a.slice(0, maxLen);
  const B = b.slice(0, maxLen);
  const m = A.length, n = B.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));

  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = A[i-1] === B[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }

  const lcs = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (A[i-1] === B[j-1]) { lcs.unshift(A[i-1]); i--; j--; }
    else if (dp[i-1][j] > dp[i][j-1]) i--;
    else j--;
  }
  return lcs;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===== TOAST =====
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runAction('correct');
  }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Enter') {
    e.preventDefault();
    runAction('enhance');
  }
  if (e.key === 'Escape') closePopup();
});
</script>
