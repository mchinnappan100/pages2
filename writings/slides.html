<!DOCTYPE html>
<html lang="en" data-theme="ink">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECK — AI Slide Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME SYSTEM
   ============================================================ */
:root {
  --bg: #f2ede6;
  --bg2: #e8e2d8;
  --bg3: #ddd6c8;
  --card: #faf8f4;
  --ink: #1a1510;
  --ink2: #3a3028;
  --muted: #8a7d6e;
  --dim: #c8bfb2;
  --accent: #c0390a;
  --accent2: #2a6496;
  --border: #cfc8be;
  --slide-bg: #fefcf8;
  --slide-border: #1a1510;
  --font-ui: 'DM Mono', monospace;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Instrument Serif', serif;
  --font-sans: 'Outfit', sans-serif;
}

[data-theme="noir"] {
  --bg: #0e0c0a;
  --bg2: #161410;
  --bg3: #1e1c18;
  --card: #181614;
  --ink: #f0ece4;
  --ink2: #c8c0b0;
  --muted: #6a6258;
  --dim: #2e2c28;
  --accent: #e8a020;
  --accent2: #4a8ab0;
  --border: #2a2820;
  --slide-bg: #141210;
  --slide-border: #f0ece4;
  --font-ui: 'DM Mono', monospace;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-sans: 'Outfit', sans-serif;
}

[data-theme="frost"] {
  --bg: #eef2f7;
  --bg2: #e4eaf2;
  --bg3: #d8e2ee;
  --card: #f8fafd;
  --ink: #0e1a2a;
  --ink2: #2a3a50;
  --muted: #607080;
  --dim: #b0c0d0;
  --accent: #0060c0;
  --accent2: #00a080;
  --border: #c0ccd8;
  --slide-bg: #ffffff;
  --slide-border: #0e1a2a;
  --font-ui: 'DM Mono', monospace;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-sans: 'Outfit', sans-serif;
}

[data-theme="terra"] {
  --bg: #1c1410;
  --bg2: #241c16;
  --bg3: #2e2418;
  --card: #201810;
  --ink: #f0e8d8;
  --ink2: #d0c4a8;
  --muted: #907060;
  --dim: #3e3028;
  --accent: #e06020;
  --accent2: #80c060;
  --border: #3a2e20;
  --slide-bg: #1a1208;
  --slide-border: #f0e8d8;
  --font-ui: 'DM Mono', monospace;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Instrument Serif', serif;
  --font-sans: 'Outfit', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  transition: background 0.4s, color 0.4s;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.shell {
  display: grid;
  grid-template-rows: 52px 1fr;
  height: 100vh;
}

.workspace {
  display: grid;
  grid-template-columns: 380px 1fr;
  overflow: hidden;
}

@media (max-width: 900px) {
  .workspace { grid-template-columns: 1fr; }
  .preview-pane { display: none; }
  .preview-pane.mobile-show { display: flex; }
}

/* ============================================================
   HEADER
   ============================================================ */
header {
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  gap: 16px;
  z-index: 10;
}

.logo {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: 0.05em;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.logo-sub {
  font-family: var(--font-ui);
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-weight: 400;
}

.header-sep { flex: 1; }

.theme-row {
  display: flex;
  align-items: center;
  gap: 5px;
}

.t-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
  position: relative;
}
.t-dot:hover { transform: scale(1.2); }
.t-dot.on { border-color: var(--accent); }

.hbtn {
  font-family: var(--font-ui);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.hbtn:hover { border-color: var(--accent); color: var(--accent); }
.hbtn.act { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }

/* ============================================================
   LEFT PANE — INPUT
   ============================================================ */
.input-pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg2);
  overflow: hidden;
}

.pane-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.pane-title {
  font-family: var(--font-ui);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.pane-sub {
  font-size: 0.78rem;
  color: var(--ink2);
  line-height: 1.4;
}

/* Settings row */
.settings-row {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex-shrink: 0;
  background: var(--bg3);
}

.field-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.field-label {
  font-family: var(--font-ui);
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  width: 64px;
  flex-shrink: 0;
}

.field-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 0.75rem;
  padding: 5px 10px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.2s;
  min-width: 0;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--dim); }

.field-select {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 0.72rem;
  padding: 5px 8px;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
  min-width: 0;
}

/* Key points textarea */
.keypoints-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
}

#keypoints {
  flex: 1;
  width: 100%;
  background: var(--bg2);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.8;
  border: none;
  outline: none;
  resize: none;
  padding: 20px 18px;
  transition: background 0.3s;
}
#keypoints::placeholder { color: var(--dim); font-style: italic; }

.input-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  flex-shrink: 0;
}

.generate-btn {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 10px 16px;
  border-radius: 2px;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.generate-btn:hover { opacity: 0.88; }
.generate-btn:active { transform: scale(0.98); }
.generate-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.slide-count-badge {
  font-family: var(--font-ui);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  white-space: nowrap;
}

/* ============================================================
   RIGHT PANE — PREVIEW
   ============================================================ */
.preview-pane {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

.preview-toolbar {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  gap: 8px;
  flex-shrink: 0;
}

.preview-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg3);
  padding: 3px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

.ptab {
  font-family: var(--font-ui);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 12px;
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.ptab.on { background: var(--accent); color: #fff; }

.nav-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}

.nav-btn {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink2);
  cursor: pointer;
  border-radius: 2px;
  font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.slide-indicator {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  min-width: 55px;
  text-align: center;
}

.export-btn {
  font-family: var(--font-ui);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.export-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* ============================================================
   SLIDE STAGE
   ============================================================ */
.slide-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 40px;
  overflow: hidden;
  position: relative;
  background: var(--bg3);
  background-image: radial-gradient(circle at 20% 80%, color-mix(in srgb, var(--accent) 4%, transparent), transparent 60%),
                    radial-gradient(circle at 80% 20%, color-mix(in srgb, var(--accent2) 4%, transparent), transparent 60%);
}

/* EMPTY STATE */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  opacity: 0.6;
}

.empty-icon {
  font-size: 3.5rem;
  line-height: 1;
  filter: grayscale(1);
}

.empty-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  color: var(--ink2);
}

.empty-sub {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* SLIDE CARD */
.slide-card {
  width: 100%;
  max-width: 800px;
  aspect-ratio: 16 / 9;
  background: var(--slide-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.1);
  transition: opacity 0.25s, transform 0.25s;
  display: flex;
  flex-direction: column;
}

.slide-card.fade-out { opacity: 0; transform: translateY(8px); }
.slide-card.fade-in { animation: slideIn 0.3s ease; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Slide corner decorations */
.slide-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: var(--accent);
}

/* Slide number badge */
.slide-number {
  position: absolute;
  bottom: 14px;
  right: 18px;
  font-family: var(--font-ui);
  font-size: 0.6rem;
  color: var(--dim);
  letter-spacing: 0.2em;
}

/* SLIDE CONTENT */
.slide-inner {
  padding: 10%;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ---- TITLE SLIDE ---- */
.slide-type-title .slide-inner {
  text-align: center;
  align-items: center;
}

.slide-type-title h1 {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 3.5vw, 2.4rem);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: 16px;
}

.slide-type-title .slide-subtitle {
  font-family: var(--font-sans);
  font-size: clamp(0.75rem, 1.5vw, 0.95rem);
  color: var(--muted);
  letter-spacing: 0.08em;
}

.slide-type-title .slide-accent-line {
  width: 60px;
  height: 3px;
  background: var(--accent);
  margin: 14px auto;
}

/* ---- CONTENT SLIDE ---- */
.slide-content-title {
  font-family: var(--font-display);
  font-size: clamp(1rem, 2.2vw, 1.5rem);
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
  line-height: 1.2;
}

.slide-body ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.slide-body ul li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-family: var(--font-body);
  font-size: clamp(0.75rem, 1.6vw, 1rem);
  line-height: 1.5;
  color: var(--ink2);
}

.slide-body ul li::before {
  content: '▸';
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 1px;
  font-size: 0.7em;
}

.slide-body p {
  font-family: var(--font-body);
  font-size: clamp(0.8rem, 1.6vw, 1rem);
  line-height: 1.65;
  color: var(--ink2);
  margin-bottom: 10px;
}

.slide-body h2 {
  font-family: var(--font-display);
  font-size: clamp(0.9rem, 2vw, 1.3rem);
  color: var(--ink);
  margin-bottom: 10px;
}

.slide-body blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  background: color-mix(in srgb, var(--accent) 6%, transparent);
  border-radius: 0 4px 4px 0;
  font-style: italic;
  color: var(--ink2);
  font-family: var(--font-body);
  font-size: clamp(0.8rem, 1.5vw, 1rem);
}

.slide-body strong { color: var(--ink); font-weight: 600; }
.slide-body em { color: var(--accent2); font-style: italic; }

.slide-body code {
  font-family: var(--font-ui);
  font-size: 0.85em;
  background: color-mix(in srgb, var(--accent2) 10%, transparent);
  color: var(--accent2);
  padding: 1px 6px;
  border-radius: 2px;
}

/* ============================================================
   MARKDOWN RAW VIEW
   ============================================================ */
.raw-view {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--bg);
}

#raw-md {
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 0.8rem;
  line-height: 1.8;
  resize: none;
  min-height: 400px;
}

/* LOADING STATE */
.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: color-mix(in srgb, var(--bg3) 90%, transparent);
  backdrop-filter: blur(4px);
  z-index: 10;
  gap: 18px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.loading-overlay.show { opacity: 1; pointer-events: all; }

.loading-ring {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-msg {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  text-align: center;
}

/* ============================================================
   THUMBNAIL STRIP
   ============================================================ */
.thumb-strip {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  overflow-x: auto;
  flex-shrink: 0;
}

.thumb-strip::-webkit-scrollbar { height: 3px; }
.thumb-strip::-webkit-scrollbar-track { background: var(--bg); }
.thumb-strip::-webkit-scrollbar-thumb { background: var(--border); }

.thumb {
  flex-shrink: 0;
  width: 72px;
  height: 44px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--slide-bg);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.thumb:hover { transform: scale(1.05); }
.thumb.active { border-color: var(--accent); border-width: 2px; }

.thumb-num {
  font-family: var(--font-ui);
  font-size: 0.55rem;
  color: var(--muted);
  position: absolute;
  bottom: 3px;
  right: 5px;
}

.thumb-title-text {
  font-family: var(--font-display);
  font-size: 0.38rem;
  color: var(--ink2);
  text-align: center;
  padding: 4px;
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--ink);
  color: var(--bg);
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  padding: 9px 18px;
  border-radius: 3px;
  z-index: 200;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============================================================
   SCROLLBAR GLOBAL
   ============================================================ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="shell">

  <!-- ====== HEADER ====== -->
  <header>
    <div class="logo">
      DECK
      <span class="logo-sub">AI Slide Generator</span>
    </div>

    <div class="header-sep"></div>

    <!-- Themes -->
    <div class="theme-row">
      <div class="t-dot on"  style="background:#c0390a;" onclick="setTheme('ink')"   title="Ink"   id="td-ink"></div>
      <div class="t-dot"     style="background:#e8a020;" onclick="setTheme('noir')"  title="Noir"  id="td-noir"></div>
      <div class="t-dot"     style="background:#0060c0;" onclick="setTheme('frost')" title="Frost" id="td-frost"></div>
      <div class="t-dot"     style="background:#e06020;" onclick="setTheme('terra')" title="Terra" id="td-terra"></div>
    </div>

    <button class="hbtn" onclick="showSettings()" id="settings-hbtn">⚙ Settings</button>
  </header>

  <!-- ====== WORKSPACE ====== -->
  <div class="workspace">

    <!-- ====== LEFT: INPUT PANE ====== -->
    <div class="input-pane">
      <div class="pane-header">
        <div class="pane-title">Key Points</div>
        <div class="pane-sub">Write your ideas — one per line or in paragraphs. DECK will craft slides.</div>
      </div>

      <!-- Settings drawer -->
      <div class="settings-row" id="settings-drawer" style="display:none;">
        <div class="field-row">
          <span class="field-label">Provider</span>
          <select class="field-select" id="sel-provider" onchange="onProviderChange()">
            <option value="claude">Claude (Anthropic)</option>
            <option value="openai">OpenAI</option>
            <option value="xai">xAI (Grok)</option>
            <option value="gemini">Google Gemini</option>
            <option value="ollama">Ollama (Local)</option>
          </select>
        </div>
        <div class="field-row" id="api-row">
          <span class="field-label">API Key</span>
          <input type="password" class="field-input" id="api-key" placeholder="sk-...">
        </div>
        <div class="field-row" id="ollama-row" style="display:none;">
          <span class="field-label">Ollama</span>
          <input type="text" class="field-input" id="ollama-url" placeholder="http://localhost:11434" value="http://localhost:11434">
        </div>
        <div class="field-row" id="ollama-model-row" style="display:none;">
          <span class="field-label">Model</span>
          <input type="text" class="field-input" id="ollama-model" placeholder="llama3.2" value="llama3.2">
        </div>
        <div class="field-row">
          <span class="field-label">Slides #</span>
          <select class="field-select" id="sel-slides">
            <option value="5">5 slides</option>
            <option value="8" selected>8 slides</option>
            <option value="10">10 slides</option>
            <option value="12">12 slides</option>
            <option value="15">15 slides</option>
          </select>
        </div>
        <div class="field-row">
          <span class="field-label">Style</span>
          <select class="field-select" id="sel-style">
            <option value="professional">Professional</option>
            <option value="pitch">Startup Pitch</option>
            <option value="academic">Academic</option>
            <option value="storytelling">Storytelling</option>
            <option value="minimal">Minimal</option>
          </select>
        </div>
        <div class="field-row">
          <span class="field-label">Override</span>
          <input type="text" class="field-input" id="model-override" placeholder="Model override (optional)">
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:4px;">
          <button class="generate-btn" style="flex:none;padding:6px 18px;" onclick="saveSettings()">Save</button>
        </div>
      </div>

      <!-- Textarea -->
      <div class="keypoints-wrap">
        <textarea id="keypoints" spellcheck="true" placeholder="e.g.

• The future of renewable energy
• Solar adoption grew 40% in 2024
• Wind + solar now cheaper than coal
• Battery storage is the bottleneck
• Emerging markets are leading the shift
• Policy & investment recommendations
• Call to action: accelerate transition"></textarea>
      </div>

      <div class="input-footer">
        <button class="generate-btn" id="gen-btn" onclick="generate()">
          <span id="gen-icon">✦</span>
          <span id="gen-label">Generate Slides</span>
        </button>
        <span class="slide-count-badge" id="slide-count-badge"></span>
      </div>
    </div>

    <!-- ====== RIGHT: PREVIEW PANE ====== -->
    <div class="preview-pane" id="preview-pane">
      <div class="preview-toolbar">
        <div class="preview-tabs">
          <button class="ptab on" id="ptab-slides" onclick="switchView('slides')">Slides</button>
          <button class="ptab" id="ptab-raw"    onclick="switchView('raw')">Markdown</button>
        </div>

        <div class="nav-controls">
          <button class="nav-btn" id="nav-prev" onclick="navigate(-1)" disabled>‹</button>
          <span class="slide-indicator" id="slide-indicator">— / —</span>
          <button class="nav-btn" id="nav-next" onclick="navigate(1)" disabled>›</button>
        </div>

        <button class="export-btn" onclick="exportMarkdown()">↓ Export .md</button>
      </div>

      <!-- SLIDE STAGE (slide view) -->
      <div id="view-slides" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;">
        <div class="slide-stage" id="slide-stage">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">🗂</div>
            <div class="empty-title">No slides yet</div>
            <div class="empty-sub">Write key points → Generate</div>
          </div>
          <!-- Slide card rendered here -->
        </div>
        <div class="loading-overlay" id="loading-overlay">
          <div class="loading-ring"></div>
          <div class="loading-msg" id="loading-msg">Generating slides…</div>
        </div>
        <div class="thumb-strip" id="thumb-strip" style="display:none;"></div>
      </div>

      <!-- RAW MARKDOWN VIEW -->
      <div id="view-raw" style="flex:1;display:none;overflow:hidden;">
        <div class="raw-view">
          <textarea id="raw-md" placeholder="Generated markdown will appear here…" oninput="onRawEdit()"></textarea>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
const S = {
  provider: 'claude',
  apiKey: '',
  ollamaUrl: 'http://localhost:11434',
  ollamaModel: 'llama3.2',
  modelOverride: '',
  slideCount: 8,
  style: 'professional',
  slides: [],       // [{title, body, type}]
  rawMd: '',
  current: 0,
  view: 'slides',
  settingsOpen: false
};

// Load saved settings
try {
  const saved = JSON.parse(localStorage.getItem('deck-settings') || '{}');
  Object.assign(S, saved);
} catch(e) {}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  restoreUI();
  updateNavButtons();
});

function restoreUI() {
  if (S.provider) document.getElementById('sel-provider').value = S.provider;
  if (S.apiKey)    document.getElementById('api-key').value = S.apiKey;
  if (S.ollamaUrl) document.getElementById('ollama-url').value = S.ollamaUrl;
  if (S.ollamaModel) document.getElementById('ollama-model').value = S.ollamaModel;
  if (S.modelOverride) document.getElementById('model-override').value = S.modelOverride;
  document.getElementById('sel-slides').value = String(S.slideCount);
  document.getElementById('sel-style').value = S.style || 'professional';
  onProviderChange(true);
}

// ============================================================
// THEME
// ============================================================
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.t-dot').forEach(d => d.classList.remove('on'));
  document.getElementById('td-' + t)?.classList.add('on');
  try { localStorage.setItem('deck-theme', t); } catch(e) {}
}
try { const t = localStorage.getItem('deck-theme'); if(t) setTheme(t); } catch(e){}

// ============================================================
// SETTINGS
// ============================================================
function showSettings() {
  S.settingsOpen = !S.settingsOpen;
  const drawer = document.getElementById('settings-drawer');
  drawer.style.display = S.settingsOpen ? 'flex' : 'none';
  document.getElementById('settings-hbtn').classList.toggle('act', S.settingsOpen);
}

function onProviderChange(silent) {
  const p = document.getElementById('sel-provider').value;
  const isOllama = p === 'ollama';
  document.getElementById('api-row').style.display = isOllama ? 'none' : 'flex';
  document.getElementById('ollama-row').style.display = isOllama ? 'flex' : 'none';
  document.getElementById('ollama-model-row').style.display = isOllama ? 'flex' : 'none';
  if (!silent) S.provider = p;
}

function saveSettings() {
  S.provider = document.getElementById('sel-provider').value;
  S.apiKey = document.getElementById('api-key').value;
  S.ollamaUrl = document.getElementById('ollama-url').value;
  S.ollamaModel = document.getElementById('ollama-model').value;
  S.modelOverride = document.getElementById('model-override').value;
  S.slideCount = parseInt(document.getElementById('sel-slides').value);
  S.style = document.getElementById('sel-style').value;
  try { localStorage.setItem('deck-settings', JSON.stringify(S)); } catch(e) {}
  showToast('Settings saved ✓');
  showSettings();
}

// ============================================================
// GENERATE
// ============================================================
async function generate() {
  const text = document.getElementById('keypoints').value.trim();
  if (!text) { showToast('Add some key points first!'); return; }

  if (!S.apiKey && S.provider !== 'ollama') {
    showToast('Open Settings → add your API key');
    if (!S.settingsOpen) showSettings();
    return;
  }

  setLoading(true, 'Generating slides…');

  try {
    const md = await callLLM(text);
    S.rawMd = md;
    document.getElementById('raw-md').value = md;
    S.slides = parseSlidesFromMd(md);
    S.current = 0;
    renderSlide();
    renderThumbs();
    updateNavButtons();
    document.getElementById('slide-count-badge').textContent = S.slides.length + ' slides';
    showToast('✦ ' + S.slides.length + ' slides generated!');
  } catch(err) {
    showToast('Error: ' + err.message);
    console.error(err);
  } finally {
    setLoading(false);
  }
}

// ============================================================
// PROMPT + LLM CALLS
// ============================================================
function buildPrompt(text) {
  const n = S.slideCount || 8;
  const style = S.style || 'professional';

  const styleGuides = {
    professional: 'Clear, authoritative, corporate-quality language. Use precise language and evidence-based points.',
    pitch: 'Bold, punchy, startup energy. Short impactful sentences. Problem → Solution → Market → Traction → Ask structure.',
    academic: 'Scholarly tone. Include methodology hints, cite possible references, structured argumentation.',
    storytelling: 'Narrative arc. Begin with a hook, build tension, resolve. Use metaphors and concrete examples.',
    minimal: 'Extremely concise. One big idea per slide. Minimal bullet points — prefer single strong statements.'
  };

  return `You are an expert presentation designer. Convert the following key points into exactly ${n} polished markdown slides in a ${style} style.

Style guide: ${styleGuides[style]}

FORMAT RULES (follow strictly):
- Separate slides with --- (three dashes on its own line)
- FIRST slide: title slide format:
  # [Compelling Presentation Title]
  ## [Subtitle or tagline]
- REMAINING slides: content slides:
  ## [Slide Title]
  - bullet point
  - bullet point
  (or use paragraphs, blockquotes for variety — mix formats for visual interest)
- Keep bullet points concise: max 10 words each
- Max 5-6 bullets per slide
- Use **bold** for key terms
- Occasionally use > blockquote for powerful quotes or key stats
- End with a strong conclusion/call-to-action slide

KEY POINTS TO CONVERT:
"""
${text}
"""

Return ONLY the markdown slides. No preamble. No explanation. No code fences. Just the slides separated by ---.`;
}

async function callLLM(text) {
  const prompt = buildPrompt(text);
  if (S.provider === 'claude')  return callClaude(prompt);
  if (S.provider === 'openai')  return callOpenAI(prompt);
  if (S.provider === 'xai')     return callXAI(prompt);
  if (S.provider === 'gemini')  return callGemini(prompt);
  if (S.provider === 'ollama')  return callOllama(prompt);
  throw new Error('No provider selected');
}

async function callClaude(prompt) {
  const model = S.modelOverride || 'claude-sonnet-4-20250514';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': S.apiKey, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({ model, max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'Claude error ' + res.status); }
  const d = await res.json();
  return d.content[0].text;
}

async function callOpenAI(prompt) {
  const model = S.modelOverride || 'gpt-4o-mini';
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.apiKey },
    body: JSON.stringify({ model, max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'OpenAI error ' + res.status); }
  const d = await res.json();
  return d.choices[0].message.content;
}

async function callXAI(prompt) {
  const model = S.modelOverride || 'grok-beta';
  const res = await fetch('https://api.x.ai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.apiKey },
    body: JSON.stringify({ model, max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
  });
  if (!res.ok) throw new Error('xAI error ' + res.status);
  const d = await res.json();
  return d.choices[0].message.content;
}

async function callGemini(prompt) {
  const model = S.modelOverride || 'gemini-1.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${S.apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 4000 } })
  });
  if (!res.ok) throw new Error('Gemini error ' + res.status);
  const d = await res.json();
  return d.candidates[0].content.parts[0].text;
}

async function callOllama(prompt) {
  const url = (S.ollamaUrl || 'http://localhost:11434') + '/api/generate';
  const model = S.modelOverride || S.ollamaModel || 'llama3.2';
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, prompt, stream: false })
  });
  if (!res.ok) throw new Error('Ollama error ' + res.status);
  const d = await res.json();
  return d.response;
}

// ============================================================
// SLIDE PARSER
// ============================================================
function parseSlidesFromMd(md) {
  const raw = md.replace(/```[a-z]*\n?/g, '').replace(/```/g, '').trim();
  const chunks = raw.split(/\n---+\n/).map(s => s.trim()).filter(Boolean);

  return chunks.map((chunk, i) => {
    const lines = chunk.split('\n');
    const firstLine = lines[0] || '';

    if (i === 0 && firstLine.startsWith('# ')) {
      // Title slide
      const title = firstLine.replace(/^#\s+/, '');
      const subtitle = lines.find(l => l.startsWith('## '))?.replace(/^##\s+/, '') || '';
      return { type: 'title', title, subtitle, raw: chunk };
    }

    // Content slide
    const titleLine = lines.find(l => l.startsWith('## ') || l.startsWith('# '));
    const title = titleLine ? titleLine.replace(/^#{1,2}\s+/, '') : ('Slide ' + (i + 1));
    const bodyLines = lines.filter(l => l !== titleLine);
    return { type: 'content', title, body: bodyLines.join('\n'), raw: chunk };
  });
}

// ============================================================
// RENDER SLIDE
// ============================================================
function renderSlide(animate) {
  const stage = document.getElementById('slide-stage');
  const empty = document.getElementById('empty-state');

  if (!S.slides.length) {
    empty.style.display = 'flex';
    const existing = stage.querySelector('.slide-card');
    if (existing) existing.remove();
    return;
  }

  empty.style.display = 'none';
  const slide = S.slides[S.current];

  // Build card HTML
  let inner = '';
  if (slide.type === 'title') {
    inner = `
      <div class="slide-type-title">
        <div class="slide-inner">
          <h1>${md2html(slide.title)}</h1>
          <div class="slide-accent-line"></div>
          ${slide.subtitle ? `<div class="slide-subtitle">${md2html(slide.subtitle)}</div>` : ''}
        </div>
      </div>`;
  } else {
    const bodyHtml = marked.parse(slide.body || '');
    inner = `
      <div class="slide-inner">
        <div class="slide-content-title">${md2html(slide.title)}</div>
        <div class="slide-body">${bodyHtml}</div>
      </div>`;
  }

  const cardHtml = `
    <div class="slide-card fade-in">
      ${inner}
      <div class="slide-number">${S.current + 1} / ${S.slides.length}</div>
    </div>`;

  const existing = stage.querySelector('.slide-card');
  if (existing) {
    existing.classList.add('fade-out');
    setTimeout(() => {
      existing.remove();
      stage.insertAdjacentHTML('beforeend', cardHtml);
    }, 200);
  } else {
    stage.insertAdjacentHTML('beforeend', cardHtml);
  }

  document.getElementById('slide-indicator').textContent = (S.current + 1) + ' / ' + S.slides.length;
}

// ============================================================
// THUMBNAILS
// ============================================================
function renderThumbs() {
  const strip = document.getElementById('thumb-strip');
  if (!S.slides.length) { strip.style.display = 'none'; return; }
  strip.style.display = 'flex';

  strip.innerHTML = S.slides.map((sl, i) => `
    <div class="thumb ${i === S.current ? 'active' : ''}" onclick="goToSlide(${i})">
      <div class="thumb-title-text">${escHtml(sl.title || '')}</div>
      <div class="thumb-num">${i + 1}</div>
    </div>
  `).join('');
}

function updateThumbActive() {
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === S.current);
  });
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(dir) {
  if (!S.slides.length) return;
  S.current = Math.max(0, Math.min(S.slides.length - 1, S.current + dir));
  renderSlide(true);
  updateNavButtons();
  updateThumbActive();
}

function goToSlide(i) {
  S.current = i;
  renderSlide(true);
  updateNavButtons();
  updateThumbActive();
}

function updateNavButtons() {
  document.getElementById('nav-prev').disabled = S.current <= 0 || !S.slides.length;
  document.getElementById('nav-next').disabled = S.current >= S.slides.length - 1 || !S.slides.length;
  if (!S.slides.length) document.getElementById('slide-indicator').textContent = '— / —';
}

// ============================================================
// VIEW SWITCHER
// ============================================================
function switchView(v) {
  S.view = v;
  document.getElementById('view-slides').style.display = v === 'slides' ? 'flex' : 'none';
  document.getElementById('view-raw').style.display    = v === 'raw'    ? 'flex' : 'none';
  document.getElementById('ptab-slides').classList.toggle('on', v === 'slides');
  document.getElementById('ptab-raw').classList.toggle('on', v === 'raw');
}

function onRawEdit() {
  S.rawMd = document.getElementById('raw-md').value;
  S.slides = parseSlidesFromMd(S.rawMd);
  S.current = Math.min(S.current, Math.max(0, S.slides.length - 1));
  renderThumbs();
  updateNavButtons();
  document.getElementById('slide-count-badge').textContent = S.slides.length + ' slides';
}

// ============================================================
// EXPORT
// ============================================================
function exportMarkdown() {
  if (!S.rawMd) { showToast('No slides to export yet'); return; }
  const blob = new Blob([S.rawMd], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'deck-slides.md';
  a.click();
  showToast('Markdown exported ✓');
}

// ============================================================
// HELPERS
// ============================================================
function md2html(str) {
  // Inline markdown only
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setLoading(on, msg) {
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.toggle('show', on);
  if (msg) document.getElementById('loading-msg').textContent = msg;
  const btn = document.getElementById('gen-btn');
  btn.disabled = on;
  document.getElementById('gen-label').textContent = on ? 'Generating…' : 'Generate Slides';
  document.getElementById('gen-icon').textContent = on ? '◌' : '✦';
}

function showToast(msg, dur = 2600) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});
</script>
