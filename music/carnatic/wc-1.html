<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Classical Scales</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #f5f0e8;
    --cream: #ede6d6;
    --parchment: #d6c9a8;
    --gold: #b8963e;
    --gold-light: #d4af5a;
    --ink: #1a1612;
    --ink-mid: #3d3228;
    --ink-light: #6b5a45;
    --red-accent: #8b2020;
    --sepia: #8b7355;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--ivory);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Decorative paper texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,120,0.07) 28px, rgba(180,160,120,0.07) 29px),
      radial-gradient(ellipse at 20% 50%, rgba(184,150,62,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,32,32,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 1;
    border-bottom: 1px solid var(--parchment);
    padding: 28px 40px 20px;
    display: flex; align-items: flex-end; justify-content: space-between;
    background: linear-gradient(180deg, var(--cream) 0%, var(--ivory) 100%);
  }

  .header-title { line-height: 1; }
  .header-title h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--ink);
  }
  .header-title p {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-light);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .header-meta {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--sepia);
    text-align: right;
  }

  .ornament {
    display: block;
    text-align: center;
    color: var(--gold);
    font-size: 22px;
    line-height: 1;
    margin: 2px 0;
  }

  /* Filter bar */
  .filter-bar {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 14px 40px;
    background: var(--cream);
    border-bottom: 1px solid var(--parchment);
  }

  .filter-btn {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    border: 1px solid var(--parchment);
    background: transparent;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: var(--ivory);
    border-color: var(--ink);
  }
  .filter-btn.active { color: var(--gold-light); }

  .search-wrap {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid var(--sepia);
    padding-bottom: 2px;
  }
  .search-wrap input {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
    background: transparent;
    border: none; outline: none;
    color: var(--ink);
    width: 160px;
  }
  .search-wrap input::placeholder { color: var(--sepia); }

  .count-badge {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--sepia);
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border: 1px solid var(--parchment);
    margin-left: 4px;
  }

  /* Main layout */
  .main {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 130px);
  }

  /* Scale list */
  .scale-list {
    border-right: 1px solid var(--parchment);
    overflow-y: auto;
    background: var(--cream);
  }
  .scale-list::-webkit-scrollbar { width: 4px; }
  .scale-list::-webkit-scrollbar-thumb { background: var(--parchment); }

  .scale-group-header {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--sepia);
    padding: 12px 20px 6px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--parchment);
    background: rgba(214,201,168,0.4);
    position: sticky; top: 0; z-index: 2;
  }

  .scale-item {
    display: flex; align-items: center;
    padding: 11px 20px;
    border-bottom: 1px solid rgba(214,201,168,0.5);
    cursor: pointer;
    transition: background 0.15s;
    gap: 12px;
  }
  .scale-item:hover { background: rgba(184,150,62,0.08); }
  .scale-item.selected {
    background: var(--ink);
    border-bottom-color: var(--ink);
  }
  .scale-item.selected .scale-num { color: var(--gold); }
  .scale-item.selected .scale-name { color: var(--ivory); }
  .scale-item.selected .scale-alias { color: var(--parchment); }
  .scale-item.hidden { display: none; }

  .scale-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--sepia);
    width: 28px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .scale-info { flex: 1; min-width: 0; }
  .scale-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
  }
  .scale-alias {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 1px;
  }
  .scale-mode-tag {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border: 1px solid currentColor;
    flex-shrink: 0;
  }
  .tag-major { color: var(--gold); }
  .tag-minor { color: var(--red-accent); }
  .tag-mode  { color: var(--sepia); }
  .tag-pent  { color: #4a7c59; }
  .tag-blues { color: #2c4a7c; }
  .tag-ethnic{ color: #7c4a2c; }
  .tag-church { color: #5a2c7c; }

  /* Detail panel */
  .detail-panel {
    overflow-y: auto;
    padding: 0;
    display: flex; flex-direction: column;
  }

  .detail-hero {
    padding: 36px 48px 28px;
    border-bottom: 1px solid var(--parchment);
    background: linear-gradient(135deg, var(--ivory) 0%, var(--cream) 100%);
  }

  .detail-category {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--sepia);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .detail-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 3.5vw, 40px);
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .detail-alias {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink-light);
    margin-bottom: 16px;
  }

  .detail-desc {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink-mid);
    max-width: 560px;
  }

  /* Key selector */
  .key-section {
    padding: 20px 48px;
    border-bottom: 1px solid var(--parchment);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .key-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--sepia);
  }
  .key-btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    padding: 4px 12px;
    border: 1px solid var(--parchment);
    background: transparent;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    min-width: 36px;
    text-align: center;
  }
  .key-btn:hover { background: var(--parchment); }
  .key-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ivory);
    font-weight: 600;
  }

  /* Interval info */
  .intervals-section {
    padding: 20px 48px;
    border-bottom: 1px solid var(--parchment);
  }
  .intervals-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--sepia);
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .interval-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .interval-pill {
    display: flex; flex-direction: column; align-items: center;
    background: var(--cream);
    border: 1px solid var(--parchment);
    padding: 8px 12px;
    min-width: 52px;
    transition: all 0.2s;
  }
  .interval-pill.active-note {
    background: var(--ink);
    border-color: var(--ink);
  }
  .interval-pill.active-note .pill-note { color: var(--gold-light); }
  .interval-pill.active-note .pill-deg { color: var(--parchment); }
  .pill-note {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
  }
  .pill-deg {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.05em;
    color: var(--sepia);
    margin-top: 2px;
  }

  /* Piano */
  .piano-section {
    padding: 24px 48px 28px;
    border-bottom: 1px solid var(--parchment);
  }
  .piano-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--sepia);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .piano-wrap {
    position: relative;
    display: inline-flex;
    border: 1px solid var(--parchment);
    box-shadow: 0 4px 20px rgba(26,22,18,0.12);
  }

  .piano-key {
    position: relative;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .piano-key.white {
    width: 40px; height: 140px;
    background: #faf8f4;
    border-right: 1px solid #c8c0b0;
    border-bottom: 3px solid #b0a898;
    z-index: 1;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 10px;
  }
  .piano-key.white:last-child { border-right: none; }
  .piano-key.white:active, .piano-key.white.pressed {
    background: #e8e0d0;
    border-bottom-width: 1px;
    transform: translateY(2px);
  }
  .piano-key.white.in-scale { background: #f0e8c8; }
  .piano-key.white.in-scale:hover { background: #e8d8a0; }
  .piano-key.white.root { background: var(--gold-light); }
  .piano-key.white.root:hover { background: var(--gold); }

  .piano-key.black {
    position: absolute;
    width: 26px; height: 88px;
    background: linear-gradient(180deg, #2a2018 0%, #1a1210 100%);
    z-index: 2;
    border-radius: 0 0 3px 3px;
    box-shadow: 2px 4px 6px rgba(0,0,0,0.4);
    top: 0;
  }
  .piano-key.black:active, .piano-key.black.pressed {
    background: linear-gradient(180deg, #3a3028 0%, #2a2218 100%);
    box-shadow: 1px 2px 3px rgba(0,0,0,0.4);
    transform: translateY(2px);
  }
  .piano-key.black.in-scale {
    background: linear-gradient(180deg, #4a3820 0%, #3a2810 100%);
  }
  .piano-key.black.root {
    background: linear-gradient(180deg, #9a7030 0%, #7a5020 100%);
  }

  .key-label-text {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--sepia);
    letter-spacing: 0.05em;
    pointer-events: none;
  }
  .piano-key.white.in-scale .key-label-text { color: var(--ink); font-weight: 600; }
  .piano-key.white.root .key-label-text { color: var(--ink); }

  /* Controls */
  .controls {
    padding: 20px 48px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .ctrl-btn {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 8px 20px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .ctrl-btn:hover { background: var(--ink); color: var(--ivory); }
  .ctrl-btn.primary { background: var(--ink); color: var(--gold-light); }
  .ctrl-btn.primary:hover { background: var(--ink-mid); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .tempo-wrap {
    display: flex; align-items: center; gap: 10px;
    margin-left: auto;
  }
  .tempo-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--sepia);
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100px; height: 2px;
    background: var(--parchment);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--gold);
    border-radius: 50%;
    cursor: pointer;
  }
  .tempo-val {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--ink);
    width: 30px;
  }

  /* Placeholder state */
  .detail-placeholder {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    padding: 60px;
    color: var(--sepia);
    text-align: center;
  }
  .detail-placeholder .big-clef {
    font-size: 80px;
    line-height: 1;
    opacity: 0.25;
  }
  .detail-placeholder p {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink-light);
  }

  /* Responsive */
  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 240px 1fr; }
    .detail-hero { padding: 20px 24px; }
    .key-section, .intervals-section, .piano-section, .controls { padding-left: 24px; padding-right: 24px; }
    header { padding: 16px 20px; }
    .filter-bar { padding: 10px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Western Classical Scales</h1>
    <p>A compendium of modes, scales &amp; tonalities in the Western tradition</p>
  </div>
  <div class="header-meta">
    <span class="ornament">𝄞</span>
    <span id="total-count">75</span> Scales
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="major">Major</button>
  <button class="filter-btn" data-filter="minor">Minor</button>
  <button class="filter-btn" data-filter="mode">Church Modes</button>
  <button class="filter-btn" data-filter="pent">Pentatonic</button>
  <button class="filter-btn" data-filter="blues">Blues</button>
  <button class="filter-btn" data-filter="ethnic">Ethnic/World</button>
  <span class="count-badge" id="visible-count">75 scales</span>
  <div class="search-wrap">
    <span style="color:var(--sepia);font-size:13px;">⌕</span>
    <input type="text" id="search" placeholder="Search scales…">
  </div>
</div>

<div class="main">
  <div class="scale-list" id="scaleList"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-placeholder">
      <div class="big-clef">𝄞</div>
      <p>Select a scale to explore its tones and modes</p>
    </div>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
// Intervals in semitones from root. W=2, H=1, WH=3
const SCALES = [
  // MAJOR & DERIVATIVES
  { id:1,  name:"Major (Ionian)",       alias:"Ionian Mode",        type:"major",  intervals:[0,2,4,5,7,9,11], desc:"The foundation of Western tonality. Bright, joyful, resolved. The tonic of countless classical works from Bach to Beethoven." },
  { id:2,  name:"Natural Minor (Aeolian)", alias:"Aeolian Mode",    type:"minor",  intervals:[0,2,3,5,7,8,10], desc:"The relative minor of the major scale. Melancholic, introspective, and deeply expressive. Ubiquitous in Romantic-era compositions." },
  { id:3,  name:"Harmonic Minor",       alias:"",                   type:"minor",  intervals:[0,2,3,5,7,8,11], desc:"Natural minor with a raised seventh degree, creating a characteristic augmented second. Essential in Bach's counterpoint and Baroque harmony." },
  { id:4,  name:"Melodic Minor",        alias:"Jazz Minor (asc.)",  type:"minor",  intervals:[0,2,3,5,7,9,11], desc:"Ascending form raises both the 6th and 7th degrees for smoother melodic motion. Descends as natural minor. Favored by Mozart and later jazz composers." },
  { id:5,  name:"Double Harmonic Major",alias:"Byzantine / Arabic", type:"major",  intervals:[0,1,4,5,7,8,11], desc:"Features two augmented seconds giving an exotic, tense quality. Known as the Byzantine scale, used in flamenco and Middle Eastern classical music." },
  { id:6,  name:"Neapolitan Major",     alias:"",                   type:"major",  intervals:[0,1,3,5,7,9,11], desc:"A flattened second degree gives this scale a distinctive half-step opening. Used dramatically in 18th-century operatic writing." },
  { id:7,  name:"Neapolitan Minor",     alias:"",                   type:"minor",  intervals:[0,1,3,5,7,8,11], desc:"Combines a lowered second with a raised seventh. Creates a dark, brooding tension favored by late Baroque composers." },
  { id:8,  name:"Hungarian Major",      alias:"",                   type:"major",  intervals:[0,3,4,6,7,9,10], desc:"Rich with augmented seconds, this scale has a bold, dramatic character associated with Hungarian folk music and Liszt's style." },
  { id:9,  name:"Hungarian Minor",      alias:"Double Harmonic Minor", type:"minor", intervals:[0,2,3,6,7,8,11], desc:"A distinctive scale with two augmented seconds and a raised 4th and 7th. Used extensively by Bartók and in Romani music traditions." },

  // CHURCH MODES
  { id:10, name:"Dorian",              alias:"",                    type:"mode",   intervals:[0,2,3,5,7,9,10], desc:"Minor with a raised sixth — melancholic yet with a brightness. Beloved in medieval chant, Renaissance polyphony, and folk traditions." },
  { id:11, name:"Phrygian",            alias:"",                    type:"mode",   intervals:[0,1,3,5,7,8,10], desc:"Begins with a half-step — dark, Spanish-flavored, and ancient. Prominent in Gregorian chant and flamenco harmonics." },
  { id:12, name:"Lydian",              alias:"",                    type:"mode",   intervals:[0,2,4,6,7,9,11], desc:"Major with a raised fourth — ethereal, floating, and luminous. Debussy and Ravel used it for dreamlike qualities." },
  { id:13, name:"Mixolydian",          alias:"",                    type:"mode",   intervals:[0,2,4,5,7,9,10], desc:"Major with a flattened seventh — a dominant quality that drives tension without fully resolving. Common in medieval secular music." },
  { id:14, name:"Locrian",             alias:"",                    type:"mode",   intervals:[0,1,3,5,6,8,10], desc:"The most dissonant diatonic mode with a diminished fifth above the root. Rarely used as a tonal center but important in counterpoint." },
  { id:15, name:"Lydian Dominant",     alias:"Lydian b7",           type:"mode",   intervals:[0,2,4,6,7,9,10], desc:"The 4th mode of melodic minor. Combines the raised 4th of Lydian with a dominant 7th. Creates an intriguing unresolved tension." },
  { id:16, name:"Altered Scale",       alias:"Super Locrian",       type:"mode",   intervals:[0,1,3,4,6,8,10], desc:"The 7th mode of melodic minor. Every degree above root is altered — maximum tension, used over dominant chords requiring resolution." },
  { id:17, name:"Phrygian Dominant",   alias:"Spanish Phrygian",    type:"mode",   intervals:[0,1,4,5,7,8,10], desc:"The 5th mode of harmonic minor. Widely used in flamenco, Sephardic music, and Middle Eastern classical traditions." },
  { id:18, name:"Lydian #2",           alias:"Lydian #9",           type:"mode",   intervals:[0,3,4,6,7,9,11], desc:"The 6th mode of harmonic minor. An unusual, symmetrical-feeling scale with both a raised second and fourth degree." },
  { id:19, name:"Locrian ♮2",          alias:"Half-Diminished",     type:"mode",   intervals:[0,2,3,5,6,8,10], desc:"The 6th mode of melodic minor. Locrian with a natural (raised) second — less dissonant and more usable as a scale center." },

  // PENTATONIC
  { id:20, name:"Major Pentatonic",    alias:"",                    type:"pent",   intervals:[0,2,4,7,9],      desc:"Five tones drawn from the major scale (omitting 4th & 7th). Universal across cultures from Chinese classical music to Western folk." },
  { id:21, name:"Minor Pentatonic",    alias:"",                    type:"pent",   intervals:[0,3,5,7,10],     desc:"The relative pentatonic minor. Used in Baroque and folk music for its open, resonant quality and absence of tritone tension." },
  { id:22, name:"Egyptian Pentatonic", alias:"Suspended Pent.",     type:"pent",   intervals:[0,2,5,7,10],     desc:"Also known as the suspended pentatonic — features a fourth in place of the third, giving it an open, ambiguous quality." },
  { id:23, name:"Man Gong",            alias:"Chinese Pent. II",    type:"pent",   intervals:[0,3,5,8,10],     desc:"One of the traditional Chinese pentatonic modes. Has a melancholic, introspective sound used in East Asian classical music." },
  { id:24, name:"Ritusen",             alias:"Chinese Pent. III",   type:"pent",   intervals:[0,2,5,7,9],      desc:"Another Chinese pentatonic mode, this one bright and folk-like. Used in Japanese koto music as well." },
  { id:25, name:"Hirajoshi",           alias:"Japanese Pentatonic", type:"pent",   intervals:[0,2,3,7,8],      desc:"Traditional Japanese scale used in koto music. Its half-steps create a hauntingly beautiful asymmetric sound." },
  { id:26, name:"In Scale",            alias:"Japanese In",         type:"pent",   intervals:[0,1,5,7,8],      desc:"Used in traditional Japanese music, especially shakuhachi compositions. Dark and evocative." },
  { id:27, name:"Yo Scale",            alias:"Japanese Yo",         type:"pent",   intervals:[0,2,5,7,9],      desc:"The brighter Japanese pentatonic, widely used in traditional Japanese folk songs and ceremonies." },

const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const ENHARMONIC  = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];
const DEGREE_NAMES = ['Root','♭2','2','♭3','3','4','♭5','5','♭6','6','♭7','7'];

// ── State ────────────────────────────────────────────────────────────────────
let selectedScale = null;
let selectedKey   = 0;  // semitone offset 0=C
let currentFilter = 'all';
let audioCtx      = null;
let playInterval  = null;
let tempo         = 90;

// ── Audio ────────────────────────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNote(midiNote, duration = 0.5) {
  const ctx = getAudioCtx();
  const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.35, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration * 1.2);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration * 1.2);
}

function stopPlayback() {
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
}

function playScale(direction = 'both') {
  if (!selectedScale) return;
  stopPlayback();
  const intervals = selectedScale.intervals;
  const baseMidi  = 60 + selectedKey; // C4 + key offset
  const stepMs    = (60 / tempo) * 1000 * 0.9;

  let seq = [];
  if (direction === 'asc' || direction === 'both') {
    seq = [...intervals, 12].map(i => baseMidi + i);
  }
  if (direction === 'desc') {
    seq = [...[...intervals, 12]].reverse().map(i => baseMidi + i);
  }
  if (direction === 'both') {
    const desc = [...intervals].reverse().map(i => baseMidi + i);
    seq = seq.concat(desc);
  }

  let idx = 0;
  function step() {
    if (idx >= seq.length) { stopPlayback(); return; }
    const key = seq[idx] - baseMidi;
    highlightPianoKey(key % 12, true);
    setTimeout(() => highlightPianoKey(key % 12, false), stepMs * 0.6);
    playNote(seq[idx], stepMs / 1000);
    idx++;
  }
  step();
  playInterval = setInterval(step, stepMs);
}

// ── Piano rendering ──────────────────────────────────────────────────────────
const WHITE_KEYS = [0,2,4,5,7,9,11]; // C D E F G A B
const BLACK_OFFSETS = { 1:23, 3:63, 6:143, 8:183, 10:223 }; // px from left of piano

function buildPiano() {
  const wrap = document.createElement('div');
  wrap.className = 'piano-wrap';
  wrap.style.cssText = 'position:relative;height:140px;';

  const totalWhite = WHITE_KEYS.length * 2 + 1; // ~2 octaves + C
  const whiteW = 40;

  // Two octaves C4..B5 + top C6
  const allWhite = [];
  for (let oct = 0; oct < 2; oct++) {
    WHITE_KEYS.forEach(s => allWhite.push({ semitone: s, octave: oct }));
  }
  allWhite.push({ semitone: 0, octave: 2 });

  allWhite.forEach((k, i) => {
    const el = document.createElement('div');
    el.className = 'piano-key white';
    el.dataset.semitone = k.semitone;
    el.dataset.absolute = k.semitone + k.octave * 12;
    const lbl = document.createElement('span');
    lbl.className = 'key-label-text';
    lbl.textContent = NOTE_NAMES[k.semitone];
    el.appendChild(lbl);
    el.addEventListener('mousedown', () => {
      playNote(60 + selectedKey + k.semitone + k.octave * 12 - (selectedKey % 12 > 6 ? 12 : 0), 0.6);
    });
    wrap.appendChild(el);
  });

  // Black keys
  allWhite.forEach((k, i) => {
    const blackSemi = k.semitone + 1;
    if (blackSemi > 11) return;
    if (!WHITE_KEYS.includes(blackSemi)) {
      // it's a black key
      const el = document.createElement('div');
      el.className = 'piano-key black';
      el.dataset.semitone = blackSemi;
      el.dataset.absolute = blackSemi + k.octave * 12;
      el.style.left = (i * whiteW + 27) + 'px';
      el.addEventListener('mousedown', () => {
        playNote(60 + selectedKey + blackSemi + k.octave * 12 - (selectedKey % 12 > 6 ? 12 : 0), 0.6);
      });
      wrap.appendChild(el);
    }
  });

  wrap.style.width = (allWhite.length * whiteW) + 'px';
  return wrap;
}

function updatePianoColors(scaleIntervals, keyOffset) {
  const wrap = document.querySelector('.piano-wrap');
  if (!wrap) return;
  const scaleSemitones = new Set(scaleIntervals.map(i => (i + keyOffset) % 12));
  const rootSemitone   = keyOffset % 12;

  wrap.querySelectorAll('.piano-key').forEach(el => {
    const semi = parseInt(el.dataset.semitone);
    const norm = semi % 12;
    el.classList.remove('in-scale', 'root');
    if (norm === rootSemitone) el.classList.add('root');
    else if (scaleSemitones.has(norm)) el.classList.add('in-scale');
  });
}

function highlightPianoKey(semitone, on) {
  const norm = ((semitone + selectedKey) % 12 + 12) % 12;
  document.querySelectorAll('.piano-key').forEach(el => {
    if (parseInt(el.dataset.semitone) % 12 === norm) {
      if (on) el.classList.add('pressed');
      else    el.classList.remove('pressed');
    }
  });
}

// ── Scale list rendering ─────────────────────────────────────────────────────
const TYPE_LABELS = { major:'MAJOR', minor:'MINOR', mode:'MODE', pent:'PENT.', blues:'BLUES', ethnic:'ETHNIC', church:'CHURCH' };

function buildScaleList() {
  const container = document.getElementById('scaleList');
  container.innerHTML = '';

  const groups = {};
  SCALES.forEach(s => {
    if (!groups[s.type]) groups[s.type] = [];
    groups[s.type].push(s);
  });

  const order = ['major','minor','mode','pent','blues','ethnic'];
  const groupNames = { major:'Major & Variants', minor:'Minor & Variants', mode:'Modes & Symmetrical', pent:'Pentatonic', blues:'Blues & Bebop', ethnic:'World & Ethnic' };

  order.forEach(type => {
    if (!groups[type]) return;
    const hdr = document.createElement('div');
    hdr.className = 'scale-group-header';
    hdr.dataset.group = type;
    hdr.textContent = groupNames[type] || type.toUpperCase();
    container.appendChild(hdr);

    groups[type].forEach(scale => {
      const item = document.createElement('div');
      item.className = 'scale-item';
      item.dataset.id = scale.id;
      item.dataset.type = scale.type;
      item.dataset.name = scale.name.toLowerCase();

      item.innerHTML = `
        <span class="scale-num">${scale.id}</span>
        <div class="scale-info">
          <div class="scale-name">${scale.name}</div>
          ${scale.alias ? `<div class="scale-alias">${scale.alias}</div>` : ''}
        </div>
        <span class="scale-mode-tag tag-${scale.type}">${TYPE_LABELS[scale.type]||scale.type}</span>
      `;

      item.addEventListener('click', () => selectScale(scale.id));
      container.appendChild(item);
    });
  });
}

function selectScale(id) {
  const scale = SCALES.find(s => s.id === id);
  if (!scale) return;
  selectedScale = scale;
  stopPlayback();

  // Highlight list item
  document.querySelectorAll('.scale-item').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.id) === id);
  });

  renderDetail(scale);
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function renderDetail(scale) {
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '';

  // Hero
  const hero = document.createElement('div');
  hero.className = 'detail-hero';
  hero.innerHTML = `
    <div class="detail-category">${TYPE_LABELS[scale.type]||scale.type} · Scale ${scale.id} of ${SCALES.length}</div>
    <div class="detail-name">${scale.name}</div>
    ${scale.alias ? `<div class="detail-alias">${scale.alias}</div>` : ''}
    <div class="detail-desc">${scale.desc}</div>
  `;
  panel.appendChild(hero);

  // Key selector
  const keySection = document.createElement('div');
  keySection.className = 'key-section';
  keySection.innerHTML = `<span class="key-label">ROOT KEY</span>`;
  NOTE_NAMES.forEach((n, i) => {
    const btn = document.createElement('button');
    btn.className = 'key-btn' + (i === selectedKey ? ' active' : '');
    btn.textContent = n;
    btn.addEventListener('click', () => {
      selectedKey = i;
      document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateIntervals(scale);
      updatePianoColors(scale.intervals, selectedKey);
    });
    keySection.appendChild(btn);
  });
  panel.appendChild(keySection);

  // Intervals
  const intSection = document.createElement('div');
  intSection.className = 'intervals-section';
  intSection.innerHTML = `<h3>Scale Tones</h3><div class="interval-row" id="intervalRow"></div>`;
  panel.appendChild(intSection);

  // Piano
  const pianoSection = document.createElement('div');
  pianoSection.className = 'piano-section';
  pianoSection.innerHTML = `<h3>🎹 Piano</h3>`;
  pianoSection.appendChild(buildPiano());
  panel.appendChild(pianoSection);

  // Controls
  const ctrl = document.createElement('div');
  ctrl.className = 'controls';
  ctrl.innerHTML = `
    <button class="ctrl-btn primary" id="playBoth">▶ Play Both</button>
    <button class="ctrl-btn" id="playAsc">↑ Ascending</button>
    <button class="ctrl-btn" id="playDesc">↓ Descending</button>
    <button class="ctrl-btn" id="stopBtn">■ Stop</button>
    <div class="tempo-wrap">
      <span class="tempo-label">TEMPO</span>
      <input type="range" id="tempoSlider" min="40" max="200" value="${tempo}">
      <span class="tempo-val" id="tempoVal">${tempo}</span>
    </div>
  `;
  panel.appendChild(ctrl);

  // Wire controls
  ctrl.querySelector('#playBoth').addEventListener('click',  () => playScale('both'));
  ctrl.querySelector('#playAsc').addEventListener('click',   () => playScale('asc'));
  ctrl.querySelector('#playDesc').addEventListener('click',  () => playScale('desc'));
  ctrl.querySelector('#stopBtn').addEventListener('click',   stopPlayback);
  ctrl.querySelector('#tempoSlider').addEventListener('input', e => {
    tempo = parseInt(e.target.value);
    ctrl.querySelector('#tempoVal').textContent = tempo;
  });

  updateIntervals(scale);
  updatePianoColors(scale.intervals, selectedKey);
}

function updateIntervals(scale) {
  const row = document.getElementById('intervalRow');
  if (!row) return;
  row.innerHTML = '';
  scale.intervals.forEach(i => {
    const note     = (i + selectedKey) % 12;
    const noteName = NOTE_NAMES[note];
    const degName  = DEGREE_NAMES[i] || i;
    const pill = document.createElement('div');
    pill.className = 'interval-pill active-note';
    pill.innerHTML = `<span class="pill-note">${noteName}</span><span class="pill-deg">${degName}</span>`;
    row.appendChild(pill);
  });
}

// ── Filters & Search ─────────────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let visible = 0;

  document.querySelectorAll('.scale-item').forEach(el => {
    const matchFilter = currentFilter === 'all' || el.dataset.type === currentFilter;
    const matchSearch = !q || el.dataset.name.includes(q);
    const show = matchFilter && matchSearch;
    el.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  // Hide group headers if all children hidden
  document.querySelectorAll('.scale-group-header').forEach(hdr => {
    const type = hdr.dataset.group;
    const anyVisible = [...document.querySelectorAll(`.scale-item[data-type="${type}"]`)]
      .some(el => !el.classList.contains('hidden'));
    hdr.style.display = anyVisible ? '' : 'none';
  });

  document.getElementById('visible-count').textContent = `${visible} scale${visible !== 1 ? 's' : ''}`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', applyFilters);

// ── Init ─────────────────────────────────────────────────────────────────────
buildScaleList();
document.getElementById('total-count').textContent = SCALES.length;
document.getElementById('visible-count').textContent = `${SCALES.length} scales`;
</script>
