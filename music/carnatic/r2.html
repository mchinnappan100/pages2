<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melakarta Ragas — 72 Scales of Carnatic Music</title>
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #0f0f1a;
    --bg3: #14141f;
    --panel: #111120;
    --border: rgba(255,255,255,0.07);
    --accent: #c9a84c;
    --accent2: #e8c87a;
    --accent3: #7c5c1e;
    --text: #e8e4d8;
    --text2: #9a9280;
    --text3: #5a5448;
    --sa: #e05c5c;
    --ri: #e07a3c;
    --ga: #d4b84a;
    --ma: #5cb85c;
    --pa: #4a9eca;
    --dha: #7b68ee;
    --ni: #c77dca;
    --glow: rgba(201, 168, 76, 0.15);
    --shadow: 0 25px 60px rgba(0,0,0,0.6);
    --radius: 12px;
  }

  [data-theme="ivory"] {
    --bg: #f5f0e8;
    --bg2: #ede8dc;
    --bg3: #e8e0d0;
    --panel: #faf7f0;
    --border: rgba(0,0,0,0.1);
    --accent: #8b5e1a;
    --accent2: #a07020;
    --accent3: #d4a85a;
    --text: #1a1510;
    --text2: #5a4a30;
    --text3: #9a8a6a;
    --glow: rgba(139, 94, 26, 0.1);
    --shadow: 0 25px 60px rgba(0,0,0,0.15);
  }

  [data-theme="forest"] {
    --bg: #050f0a;
    --bg2: #081509;
    --bg3: #0c1a0d;
    --panel: #0a160b;
    --border: rgba(100,200,100,0.08);
    --accent: #6abf69;
    --accent2: #88d788;
    --accent3: #2d6b2d;
    --text: #d4f0d4;
    --text2: #7aaa7a;
    --text3: #3a6a3a;
    --glow: rgba(106, 191, 105, 0.12);
    --shadow: 0 25px 60px rgba(0,0,0,0.7);
  }

  [data-theme="ocean"] {
    --bg: #030d1a;
    --bg2: #05111f;
    --bg3: #071525;
    --panel: #061019;
    --border: rgba(70,160,220,0.1);
    --accent: #4aa8e8;
    --accent2: #72c4f8;
    --accent3: #1a5a8a;
    --text: #d0ecff;
    --text2: #6aaad8;
    --text3: #2a6a9a;
    --glow: rgba(74, 168, 232, 0.12);
    --shadow: 0 25px 60px rgba(0,0,0,0.7);
  }

  [data-theme="crimson"] {
    --bg: #0f0508;
    --bg2: #180a0d;
    --bg3: #1f0e12;
    --panel: #140709;
    --border: rgba(220,80,80,0.1);
    --accent: #e05070;
    --accent2: #f07090;
    --accent3: #801828;
    --text: #ffe8ec;
    --text2: #c07080;
    --text3: #703040;
    --glow: rgba(224, 80, 112, 0.12);
    --shadow: 0 25px 60px rgba(0,0,0,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background 0.4s, color 0.4s;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 62px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.08em;
    font-style: italic;
  }

  .header-center {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chakra-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text3);
    letter-spacing: 0.05em;
    background: var(--bg3);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .theme-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .theme-btn:hover { border-color: var(--accent); transform: scale(1.15); }
  .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .theme-btn[data-t="dark"]    { background: linear-gradient(135deg, #1a1a2e 50%, #c9a84c 50%); }
  .theme-btn[data-t="ivory"]   { background: linear-gradient(135deg, #f5f0e8 50%, #8b5e1a 50%); }
  .theme-btn[data-t="forest"]  { background: linear-gradient(135deg, #050f0a 50%, #6abf69 50%); }
  .theme-btn[data-t="ocean"]   { background: linear-gradient(135deg, #030d1a 50%, #4aa8e8 50%); }
  .theme-btn[data-t="crimson"] { background: linear-gradient(135deg, #0f0508 50%, #e05070 50%); }

  .piano-toggle-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .piano-toggle-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* LEFT PANE */
  .left-pane {
    width: 340px;
    min-width: 200px;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    transition: background 0.4s;
  }

  .search-area {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 36px 9px 36px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .search-input::placeholder { color: var(--text3); }

  .search-clear {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    display: none;
    line-height: 1;
    padding: 2px 4px;
  }

  .search-clear.visible { display: block; }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  .raga-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
    align-self: center;
  }

  /* RAGA LIST */
  .raga-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent3) transparent;
  }

  .raga-list::-webkit-scrollbar { width: 4px; }
  .raga-list::-webkit-scrollbar-thumb { background: var(--accent3); border-radius: 2px; }

  .chakra-group { margin-bottom: 4px; }

  .chakra-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    position: sticky;
    top: 0;
    background: var(--panel);
    z-index: 2;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .chakra-header:hover { background: var(--bg3); }

  .chakra-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 700;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--accent3);
    color: var(--accent2);
    flex-shrink: 0;
  }

  .chakra-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .chakra-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    margin-left: auto;
  }

  .chakra-arrow {
    color: var(--text3);
    font-size: 10px;
    transition: transform 0.2s;
  }

  .chakra-arrow.open { transform: rotate(90deg); }

  .raga-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    margin: 1px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    border: 1px solid transparent;
  }

  .raga-item:hover {
    background: var(--bg3);
    border-color: var(--border);
  }

  .raga-item.active {
    background: var(--glow);
    border-color: var(--accent);
  }

  .raga-item.active .raga-num { color: var(--accent2); }
  .raga-item.active .raga-name { color: var(--accent); }

  .raga-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    width: 28px;
    flex-shrink: 0;
    text-align: right;
  }

  .raga-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .raga-ma-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    padding: 2px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .badge-shuddha { background: rgba(92,184,92,0.15); color: #5cb85c; border: 1px solid rgba(92,184,92,0.3); }
  .badge-prati   { background: rgba(74,158,202,0.15); color: #4a9eca; border: 1px solid rgba(74,158,202,0.3); }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-style: italic;
    font-size: 14px;
  }

  /* SPLITTER */
  .splitter {
    width: 8px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    transition: background 0.2s;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .splitter:hover, .splitter.dragging {
    background: var(--glow);
  }

  .splitter-dots {
    display: flex;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
  }

  .splitter-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.2s;
  }

  .splitter:hover .splitter-dot { background: var(--accent); animation: pulse-dot 0.8s ease-in-out infinite alternate; }
  .splitter-dot:nth-child(2) { animation-delay: 0.15s !important; }
  .splitter-dot:nth-child(3) { animation-delay: 0.3s !important; }

  @keyframes pulse-dot {
    from { transform: scale(1); opacity: 0.5; }
    to   { transform: scale(1.4); opacity: 1; }
  }

  /* RIGHT PANE */
  .right-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    transition: background 0.4s;
  }

  .raga-detail {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent3) transparent;
  }

  .raga-detail::-webkit-scrollbar { width: 4px; }
  .raga-detail::-webkit-scrollbar-thumb { background: var(--accent3); border-radius: 2px; }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    opacity: 0.4;
  }

  .empty-mandala {
    width: 120px; height: 120px;
    border: 2px solid var(--accent3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: rotate-slow 20s linear infinite;
  }

  @keyframes rotate-slow { to { transform: rotate(360deg); } }

  .empty-mandala::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px dashed var(--accent3);
    border-radius: 50%;
    animation: rotate-slow 15s linear infinite reverse;
  }

  .empty-mandala-inner {
    font-size: 36px;
    animation: rotate-slow 20s linear infinite reverse;
  }

  .empty-text {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* RAGA DETAIL CONTENT */
  .detail-header {
    margin-bottom: 32px;
    position: relative;
    padding-bottom: 24px;
  }

  .detail-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 80px; height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .detail-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .detail-title {
    font-family: 'Cinzel', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.06em;
    line-height: 1.1;
    text-shadow: 0 0 40px var(--glow);
  }

  .detail-meta {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .detail-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .detail-badge.chakra-badge-lg {
    background: var(--glow);
    border: 1px solid var(--accent3);
    color: var(--accent2);
  }

  .detail-badge.ma-badge {
    background: rgba(92,184,92,0.12);
    border: 1px solid rgba(92,184,92,0.3);
    color: #5cb85c;
  }

  .detail-badge.ma-badge.prati {
    background: rgba(74,158,202,0.12);
    border: 1px solid rgba(74,158,202,0.3);
    color: #4a9eca;
  }

  /* SWARA SECTION */
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    max-width: 200px;
  }

  /* SWARA DISPLAY */
  .swara-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .swara-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 10px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    min-width: 68px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .swara-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .swara-card.sa::before   { background: var(--sa); }
  .swara-card.ri::before   { background: var(--ri); }
  .swara-card.ga::before   { background: var(--ga); }
  .swara-card.ma::before   { background: var(--ma); }
  .swara-card.pa::before   { background: var(--pa); }
  .swara-card.dha::before  { background: var(--dha); }
  .swara-card.ni::before   { background: var(--ni); }

  .swara-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    border-color: var(--accent);
  }

  .swara-card.playing {
    animation: swara-glow 0.6s ease-out;
  }

  @keyframes swara-glow {
    0% { box-shadow: 0 0 0 0 var(--glow); transform: translateY(-4px) scale(1.03); }
    100% { box-shadow: 0 0 0 12px transparent; transform: translateY(-3px) scale(1); }
  }

  .swara-symbol {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .swara-card.sa .swara-symbol   { color: var(--sa); }
  .swara-card.ri .swara-symbol   { color: var(--ri); }
  .swara-card.ga .swara-symbol   { color: var(--ga); }
  .swara-card.ma .swara-symbol   { color: var(--ma); }
  .swara-card.pa .swara-symbol   { color: var(--pa); }
  .swara-card.dha .swara-symbol  { color: var(--dha); }
  .swara-card.ni .swara-symbol   { color: var(--ni); }

  .swara-full {
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    line-height: 1.2;
  }

  .swara-variant {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    margin-top: 1px;
  }

  /* AAROHANAM / AVAROHANAM ROWS */
  .aa-section {
    margin-bottom: 24px;
  }

  .aa-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .aa-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--text3);
    text-transform: uppercase;
    width: 76px;
    flex-shrink: 0;
  }

  .aa-arrow {
    font-size: 12px;
    color: var(--text3);
    margin-right: 2px;
    flex-shrink: 0;
  }

  /* NOTATION */
  .notation-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--text2);
    line-height: 2;
  }

  .notation-swara { 
    display: inline-block;
    margin: 0 3px;
    padding: 0 2px;
    transition: color 0.2s;
  }
  .notation-swara.sa  { color: var(--sa); }
  .notation-swara.ri  { color: var(--ri); }
  .notation-swara.ga  { color: var(--ga); }
  .notation-swara.ma  { color: var(--ma); }
  .notation-swara.pa  { color: var(--pa); }
  .notation-swara.dha { color: var(--dha); }
  .notation-swara.ni  { color: var(--ni); }

  /* ACTION BUTTONS */
  .action-row {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text2);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }

function renderList() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const list = document.getElementById('ragaList');
  const grouped = {};

  let visible = 0;

  RAGAS.forEach(r => {
    if (currentFilter === 'shuddha' && r.ma !== 'shuddha') return;
    if (currentFilter === 'prati'   && r.ma !== 'prati')   return;
    if (query && !r.name.toLowerCase().includes(query) &&
        !CHAKRAS[r.chakra-1].name.toLowerCase().includes(query) &&
        !String(r.num).includes(query)) return;

    if (!grouped[r.chakra]) grouped[r.chakra] = [];
    grouped[r.chakra].push(r);
    visible++;
  });

  document.getElementById('ragaCount').textContent = visible;

  let html = '';
  if (visible === 0) {
    html = '<div class="no-results">No ragas found</div>';
  } else {
    Object.keys(grouped).sort((a,b)=>+a-+b).forEach(cNum => {
      const ch = CHAKRAS[+cNum-1];
      const ragas = grouped[cNum];
      html += `
        <div class="chakra-group" id="cg-${cNum}">
          <div class="chakra-header" onclick="toggleChakra(${cNum})">
            <div class="chakra-num">${cNum}</div>
            <div class="chakra-name">${ch.name}</div>
            <div class="chakra-type">${ragas[0].ma === 'shuddha' ? 'M₁' : 'M₂'}</div>
            <div class="chakra-arrow open" id="ca-${cNum}">▶</div>
          </div>
          <div id="cr-${cNum}">
            ${ragas.map(r => `
              <div class="raga-item ${selectedRaga && selectedRaga.num === r.num ? 'active' : ''}"
                   id="ri-${r.num}" onclick="selectRaga(${r.num})">
                <span class="raga-num">${r.num}</span>
                <span class="raga-name">${r.name}</span>
                <span class="raga-ma-badge ${r.ma === 'shuddha' ? 'badge-shuddha' : 'badge-prati'}">${r.ma === 'shuddha' ? 'M₁' : 'M₂'}</span>
              </div>
            `).join('')}
          </div>
        </div>`;
    });
  }

  list.innerHTML = html;
}

function toggleChakra(n) {
  const el = document.getElementById(`cr-${n}`);
  const arrow = document.getElementById(`ca-${n}`);
  if (el.style.display === 'none') {
    el.style.display = '';
    arrow.classList.add('open');
  } else {
    el.style.display = 'none';
    arrow.classList.remove('open');
  }
}

function filterRagas() {
  const val = document.getElementById('searchInput').value;
  document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
  renderList();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  renderList();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

      <div class="swara-symbol">${sw.sym}</div>
      <div class="swara-full">${sw.full.replace(' ', '<br>')}</div>

function buildChakraWheel(active) {
  const cx = 35, cy = 35, r = 28, r2 = 18;
  let paths = '';
  for (let i = 0; i < 12; i++) {
    const a1 = (i / 12) * Math.PI * 2 - Math.PI/2;
    const a2 = ((i+1) / 12) * Math.PI * 2 - Math.PI/2;
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
    const x3 = cx + r2*Math.cos(a2), y3 = cy + r2*Math.sin(a2);
    const x4 = cx + r2*Math.cos(a1), y4 = cy + r2*Math.sin(a1);
    const isActive = (i + 1) === active;
    paths += `<path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} L${x3},${y3} A${r2},${r2} 0 0,0 ${x4},${y4} Z"
      fill="${isActive ? 'var(--accent)' : 'var(--bg3)'}"
      stroke="var(--bg2)" stroke-width="1.5"
      opacity="${isActive ? 1 : 0.5}"/>`;
  }
  return `<svg viewBox="0 0 70 70">${paths}<circle cx="35" cy="35" r="10" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/><text x="35" y="39" text-anchor="middle" font-family="Cinzel,serif" font-size="8" fill="var(--accent)">${active}</text></svg>`;
}

// AUDIO
// ============================================================
function getSynth() {
  if (!synth) {
    synth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'triangle' },
      envelope: { attack: 0.02, decay: 0.1, sustain: 0.5, release: 0.8 },
      volume: -8
    }).toDestination();
  }
  return synth;
}

function swaraToNote(s, octave = 4) {
  const semi = SEMITONES[s];
  if (semi === undefined) return null;
  const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const oct = semi === 12 ? octave + 1 : octave;
  const noteIdx = semi % 12;
  return notes[noteIdx] + oct;
}

async function playSingleSwara(s, oct = 4) {
  await Tone.start();
  // Handle high Sa (S') — play in oct 5
  const note = s === "S'" ? swaraToNote('S', 5) : swaraToNote(s, oct);
  if (!note) return;
  getSynth().triggerAttackRelease(note, '4n');
}

async function playRaga(mode) {
  if (!selectedRaga) return;
  await Tone.start();
  stopRaga(); // stop any current playback first
  isPlaying = true;

  // Aarohanam: S R G M P D N Ṡ (ascending, low oct → high Sa)
  const aarohanam = [...selectedRaga.swaras, "S'"];
  // Avarohanam: Ṡ N D P M G R S (descending, high oct → low Sa)
  const avarohanam = ["S'", ...selectedRaga.swaras.slice().reverse()];

  let sequence, octaves, btnAa, btnAv;
  if (mode === 'aarohanam') {
    sequence = aarohanam;
    octaves  = aarohanam.map(() => 4); // all in oct 4 (high Sa handled in swaraToNote)
  } else if (mode === 'avarohanam') {
    sequence = avarohanam;
    octaves  = avarohanam.map(() => 5); // all in oct 5 (S' = C5 hi, others descend)
  } else { // both
    sequence = [...aarohanam, ...avarohanam];
    octaves  = [...aarohanam.map(() => 4), ...avarohanam.map(() => 5)];
  }

  // Update piano play buttons
  const pianoPB = document.getElementById('playBtn');
  const pianoPBStop = document.getElementById('stopBtn');
  if (pianoPB) pianoPB.classList.add('hidden');
  if (pianoPBStop) pianoPBStop.classList.remove('hidden');

  // Update action row buttons
  btnAa = document.getElementById('playAarohaBtn');
  btnAv = document.getElementById('playAvarohaBtn');
  if (mode === 'aarohanam' || mode === 'both') {
    if (btnAa) { btnAa.classList.add('playing-btn'); btnAa.textContent = '♪ Playing…'; }
  }
  if (mode === 'avarohanam' || mode === 'both') {
    if (btnAv) { btnAv.classList.add('playing-btn'); btnAv.textContent = '♪ Playing…'; }
  }

  const tempo = +document.getElementById('tempoSlider').value;
  const interval = (60 / tempo) * 1000;

  let i = 0;
  const playNext = () => {
    if (!isPlaying || i >= sequence.length) { stopRaga(); return; }
    const s = sequence[i];
    const oct = octaves[i];
    const note = s === "S'" ? swaraToNote('S', oct === 4 ? 5 : 5) : swaraToNote(s, oct);
    if (note) getSynth().triggerAttackRelease(note, '8n');
    highlightPianoKey(s, oct === 5);
    i++;
    playTimeout = setTimeout(playNext, interval);
  };
  playNext();
}

function stopRaga() {
  isPlaying = false;
  clearTimeout(playTimeout);

  const planoPB = document.getElementById('playBtn');
  const pianoPBStop = document.getElementById('stopBtn');
  if (planoPB) { planoPB.classList.remove('hidden'); planoPB.classList.remove('playing-btn'); }
  if (pianoPBStop) pianoPBStop.classList.add('hidden');

  const btnAa = document.getElementById('playAarohaBtn');
  const btnAv = document.getElementById('playAvarohaBtn');
  if (btnAa) { btnAa.classList.remove('playing-btn'); btnAa.textContent = '▶ Play Aarohanam'; }
  if (btnAv) { btnAv.classList.remove('playing-btn'); btnAv.textContent = '▼ Play Avarohanam'; }

  document.querySelectorAll('.white-key.pressed, .black-key.pressed').forEach(k => k.classList.remove('pressed'));
}

function highlightPianoKey(swara, higherOct) {
  document.querySelectorAll('.white-key.pressed, .black-key.pressed').forEach(k => k.classList.remove('pressed'));
  const id = `pk-${swara}-${higherOct ? 'hi' : 'lo'}`;
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 400);
  }
  // Also highlight swara card
  const cards = document.querySelectorAll('.swara-card');
  cards.forEach(c => c.classList.remove('playing'));
}

const WHITE_KEYS = ['C','D','E','F','G','A','B'];
const BLACK_OFFSETS = { 'C#': 23, 'D#': 63, 'F#': 143, 'G#': 183, 'A#': 223 }; // px from octave start

function buildPiano() {
  const container = document.getElementById('pianoKeys');
  const octaves = [4, 5];
  let html = '';
  let whitePos = 0;

  octaves.forEach(oct => {
    const allKeys = [
      {note:'C',  type:'white'},
      {note:'C#', type:'black', offset: whitePos*40 + 27},
      {note:'D',  type:'white'},
      {note:'D#', type:'black', offset: whitePos*40 + 67},
      {note:'E',  type:'white'},
      {note:'F',  type:'white'},
      {note:'F#', type:'black', offset: whitePos*40 + 147},
      {note:'G',  type:'white'},
      {note:'G#', type:'black', offset: whitePos*40 + 187},
      {note:'A',  type:'white'},
      {note:'A#', type:'black', offset: whitePos*40 + 227},
      {note:'B',  type:'white'},
    ];

    allKeys.filter(k => k.type === 'white').forEach(k => {
      const swara = noteToSwara(k.note, oct);
      const id = swara ? `pk-${swara}-${oct === 5 ? 'hi' : 'lo'}` : '';
      const isRaga = swara && selectedRaga && selectedRaga.swaras.includes(swara);
      html += `<div class="white-key ${isRaga ? 'raga-note' : ''}"
        id="${id}"
        onclick="clickPianoKey('${k.note}', ${oct})"
        style="position:relative;">
        <div class="key-label">${swara || ''}<br>${k.note}${oct}</div>
      </div>`;
      whitePos++;
    });
  });
  // Now add black keys
  // Rebuild with absolute positioning
  container.innerHTML = '';
  container.style.position = 'relative';
  let wIdx = 0;
  octaves.forEach(oct => {
    const octStart = wIdx * 40;
    const keys = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    keys.forEach(note => {
      const isBlack = note.includes('#');
      const swara = noteToSwara(note, oct);
      const id = swara ? `pk-${swara}-${oct === 5 ? 'hi' : 'lo'}` : '';
      const isRaga = swara && selectedRaga && selectedRaga.swaras.includes(swara);
      if (!isBlack) {
        const div = document.createElement('div');
        div.className = `white-key ${isRaga ? 'raga-note' : ''}`;
        div.id = id;
        div.style.cssText = `left:${wIdx*40}px; position:absolute; top:0;`;
        div.innerHTML = `<div class="key-label">${swara || ''}<br><span style="font-size:7px">${note}${oct}</span></div>`;
        div.onclick = () => clickPianoKey(note, oct);
        container.appendChild(div);
        wIdx++;
      }
    });
  });
  // Black keys
  wIdx = 0;
  octaves.forEach(oct => {
    const blackConfigs = [
      {note:'C#', wBefore:0}, {note:'D#', wBefore:1},
      {note:'F#', wBefore:3}, {note:'G#', wBefore:4}, {note:'A#', wBefore:5}
    ];
    blackConfigs.forEach(bc => {
      const pos = wIdx + bc.wBefore;
      const swara = noteToSwara(bc.note, oct);
      const id = swara ? `pk-${swara}-${oct === 5 ? 'hi' : 'lo'}` : '';
      const isRaga = swara && selectedRaga && selectedRaga.swaras.includes(swara);
      const div = document.createElement('div');
      div.className = `black-key ${isRaga ? 'raga-note' : ''}`;
      div.id = id;
      div.style.cssText = `left:${pos*40+27}px; position:absolute; top:0;`;
      div.innerHTML = `<div class="key-label">${swara || ''}</div>`;
      div.onclick = () => clickPianoKey(bc.note, oct);
      container.appendChild(div);
    });
    wIdx += 7;
  });
  container.style.height = '120px';
  container.style.width = `${14 * 40 + 20}px`;
}

function noteToSwara(note, oct) {
  // reverse lookup
  const noteMap = {
    'C':0,'C#':1,'D':2,'D#':3,'E':4,'F':5,'F#':6,'G':7,'G#':8,'A':9,'A#':10,'B':11
  };
  const semi = noteMap[note];
  for (const [sw, s] of Object.entries(SEMITONES)) {
    if ((s % 12) === semi) return sw;
  }
  return null;
}

async function clickPianoKey(note, oct) {
  await Tone.start();
  getSynth().triggerAttackRelease(note + oct, '8n');
}

function updatePiano() {
  buildPiano();
}

// ============================================================
// PIANO POPUP
// ============================================================
function togglePiano() {
  const overlay = document.getElementById('pianoOverlay');
  if (overlay.classList.contains('open')) {
    closePiano();
  } else {
    overlay.classList.add('open');
    if (selectedRaga) document.getElementById('pianoRagaName').textContent = selectedRaga.name;
  }
}

function closePiano() {
  document.getElementById('pianoOverlay').classList.remove('open');
}

function closePianoOutside(e) {
  if (e.target === document.getElementById('pianoOverlay')) closePiano();
}

// ============================================================
// DOWNLOAD
// ============================================================
function downloadSwaras() {
  if (!selectedRaga) return;
  const r = selectedRaga;
  const ch = CHAKRAS[r.chakra-1];
  const aarohanam = [...r.swaras, "S'"];
  const avarohanam = ["S'", ...r.swaras.slice().reverse()];

  let txt = `MELAKARTA RAGA #${r.num}: ${r.name}\n`;
  txt += `${'='.repeat(50)}\n\n`;
  txt += `Chakra: ${r.chakra} — ${ch.name} (${ch.meaning})\n`;
  txt += `Madhyama: ${r.ma === 'shuddha' ? 'Shuddha Madhyama (M₁ — Natural 4th)' : 'Prati Madhyama (M₂ — Sharp 4th)'}\n\n`;

  txt += `AAROHANAM (Ascending)\n`;
  txt += `${'-'.repeat(30)}\n`;
  aarohanam.forEach((s,i) => {
    const sw = SWARA_NAMES[s];
    txt += `${i+1}. ${(sw?.sym || s).padEnd(6)} — ${sw?.full || ''}\n`;
  });

  txt += `\nAVAROHANAM (Descending)\n`;
  txt += `${'-'.repeat(30)}\n`;
  avarohanam.forEach((s,i) => {
    const sw = SWARA_NAMES[s];
    txt += `${i+1}. ${(sw?.sym || s).padEnd(6)} — ${sw?.full || ''}\n`;
  });

  txt += `\nNOTATION\n${'-'.repeat(30)}\n`;
  txt += `Aarohanam:  ` + aarohanam.map(s => SWARA_NAMES[s]?.sym || s).join(' — ') + '\n';
  txt += `Avarohanam: ` + avarohanam.map(s => SWARA_NAMES[s]?.sym || s).join(' — ') + '\n\n';

  txt += `PIANO MAPPING (from C/Sa)\n${'-'.repeat(30)}\n`;
  r.swaras.forEach(s => {
    const semi = SEMITONES[s];
    const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    txt += `${(SWARA_NAMES[s]?.sym || s).padEnd(6)} → ${notes[semi % 12]} (semitone ${semi})\n`;
  });
  txt += `\nGenerated from Melakarta Ragas Explorer\n`;

  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Melakarta_${r.num}_${r.name}.txt`;
  a.click();
}

// ============================================================
// SPLITTER DRAG
// ============================================================
let dragging = false, startX, startW;

function startDrag(e) {
  dragging = true;
  startX = e.clientX;
  startW = document.getElementById('leftPane').offsetWidth;
  document.getElementById('splitter').classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  window.addEventListener('mousemove', onDrag);
  window.addEventListener('mouseup', stopDrag);
}

function onDrag(e) {
  if (!dragging) return;
  const dx = e.clientX - startX;
  const newW = Math.min(Math.max(startW + dx, 200), 550);
  document.getElementById('leftPane').style.width = newW + 'px';
}

function stopDrag() {
  dragging = false;
  document.getElementById('splitter').classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  window.removeEventListener('mousemove', onDrag);
  window.removeEventListener('mouseup', stopDrag);
}
