<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />
<title>Hindustani Ragas — Classical Music of North India</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #13100c;
  --bg2:     #1a1510;
  --bg3:     #211a13;
  --panel:   #1e1812;
  --border:  rgba(210,160,80,0.12);
  --gold:    #d4a843;
  --gold2:   #f0cc78;
  --gold3:   #7a5a1a;
  --rust:    #c45a2a;
  --teal:    #3a9a8a;
  --cream:   #f0e8d0;
  --text:    #ede0c0;
  --text2:   #a08858;
  --text3:   #5a4a28;
  --glow:    rgba(212,168,67,0.14);
  --glow2:   rgba(212,168,67,0.06);
  --r:       10px;

  /* Swara colors */
  --sa-c:  #e8705a;
  --re-c:  #e89a3a;
  --ga-c:  #d4c040;
  --ma-c:  #6ab86a;
  --pa-c:  #5aaae8;
  --dha-c: #9a78e8;
  --ni-c:  #d870c8;

  /* Time colors */
  --morning:  #ff9b3a;
  --afternoon:#e8d840;
  --evening:  #d46030;
  --night:    #6080e8;
  --alltime:  #a0c080;
}

[data-theme="parchment"] {
  --bg:    #f4eed8;
  --bg2:   #ede4c8;
  --bg3:   #e8dcba;
  --panel: #faf5e8;
  --border:rgba(120,80,20,0.15);
  --gold:  #8b5e18;
  --gold2: #a87020;
  --gold3: #d4aa60;
  --rust:  #a04020;
  --teal:  #287060;
  --cream: #2a1a08;
  --text:  #1e1408;
  --text2: #5a3a18;
  --text3: #9a7848;
  --glow:  rgba(139,94,24,0.1);
  --glow2: rgba(139,94,24,0.05);
}

[data-theme="midnight"] {
  --bg:    #06080f;
  --bg2:   #090c16;
  --bg3:   #0d1020;
  --panel: #080b14;
  --border:rgba(100,130,220,0.12);
  --gold:  #7090e8;
  --gold2: #90b0ff;
  --gold3: #283070;
  --rust:  #6040c0;
  --teal:  #4080c0;
  --cream: #d0daff;
  --text:  #c0ccf8;
  --text2: #6070b8;
  --text3: #303870;
  --glow:  rgba(112,144,232,0.15);
  --glow2: rgba(112,144,232,0.06);
}

[data-theme="saffron"] {
  --bg:    #100808;
  --bg2:   #180d08;
  --bg3:   #201208;
  --panel: #150a06;
  --border:rgba(230,120,40,0.12);
  --gold:  #e87830;
  --gold2: #f8a060;
  --gold3: #703010;
  --rust:  #c04020;
  --teal:  #a06820;
  --cream: #fff0d8;
  --text:  #f8e0c0;
  --text2: #b07040;
  --text3: #604020;
  --glow:  rgba(232,120,48,0.14);
  --glow2: rgba(232,120,48,0.06);
}

[data-theme="jade"] {
  --bg:    #060f0a;
  --bg2:   #091507;
  --bg3:   #0d1a0a;
  --panel: #081308;
  --border:rgba(60,180,120,0.12);
  --gold:  #3cb878;
  --gold2: #60d898;
  --gold3: #1a6038;
  --rust:  #30a060;
  --teal:  #50c890;
  --cream: #d0f8e8;
  --text:  #c0f0d8;
  --text2: #509870;
  --text3: #286040;
  --glow:  rgba(60,184,120,0.14);
  --glow2: rgba(60,184,120,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background .4s, color .4s;
}

/* Subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* ─── HEADER ─── */
.header {
  height: 58px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  gap: 16px;
}

.header-ornament {
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--gold3) 20%, var(--gold) 50%, var(--gold3) 80%, transparent 100%);
  opacity: 0.7;
}

.logo-wrap {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.logo-main {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--gold);
  line-height: 1;
}

.logo-sub {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.header-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

.header-stats {
  display: flex;
  gap: 18px;
  flex: 1;
}

.hstat {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.hstat-val {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.hstat-lbl {
  font-family: 'Fira Code', monospace;
  font-size: 8px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.time-filters {
  display: flex;
  gap: 4px;
}

.time-chip {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  padding: 4px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.time-chip:hover { color: var(--gold); border-color: var(--gold); }
.time-chip.active { background: var(--glow); border-color: var(--gold); color: var(--gold2); }

.theme-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-left: 8px;
}

.tdot {
  width: 14px; height: 14px;
  border-radius: 50%;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.2s;
  flex-shrink: 0;
}
.tdot:hover, .tdot.active { border-color: var(--gold); transform: scale(1.2); box-shadow: 0 0 6px var(--glow); }
.tdot[data-t="amber"]     { background: radial-gradient(circle at 35% 35%, #d4a843, #5a2a08); }
.tdot[data-t="parchment"] { background: radial-gradient(circle at 35% 35%, #ede4c8, #8b5e18); }
.tdot[data-t="midnight"]  { background: radial-gradient(circle at 35% 35%, #283070, #7090e8); }
.tdot[data-t="saffron"]   { background: radial-gradient(circle at 35% 35%, #e87830, #100808); }
.tdot[data-t="jade"]      { background: radial-gradient(circle at 35% 35%, #3cb878, #060f0a); }

.piano-btn {
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 6px 14px;
  border: 1px solid var(--gold3);
  background: transparent;
  color: var(--gold);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}
.piano-btn:hover { background: var(--glow); border-color: var(--gold); }

/* ─── MAIN ─── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── LEFT PANE ─── */
.left-pane {
  width: 320px;
  min-width: 180px;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  overflow: hidden;
  transition: background .4s;
}

.search-box {
  padding: 14px 12px 10px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-inner {
  position: relative;
  margin-bottom: 8px;
}

.srch-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 13px;
  pointer-events: none;
  font-style: normal;
}

.srch-inp {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 30px 8px 32px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.srch-inp:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--glow2); }
.srch-inp::placeholder { color: var(--text3); }

.srch-clear {
  position: absolute;
  right: 8px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  font-size: 16px; display: none;
  padding: 2px 4px; line-height: 1;
}
.srch-clear.vis { display: block; }

.filter-row2 {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.fb {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 0.04em;
}
.fb:hover { border-color: var(--gold); color: var(--gold); }
.fb.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }

.rcount {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  color: var(--text3);
  margin-left: auto;
  align-self: center;
}

/* ─── RAGA LIST ─── */
.raga-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold3) transparent;
}
.raga-scroll::-webkit-scrollbar { width: 3px; }
.raga-scroll::-webkit-scrollbar-thumb { background: var(--gold3); border-radius: 2px; }

.thaat-group { margin-bottom: 2px; }

.thaat-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  cursor: pointer;
  border-radius: 6px;
  position: sticky;
  top: 0;
  background: var(--panel);
  z-index: 2;
  transition: background .15s;
}
.thaat-hdr:hover { background: var(--bg3); }

.thaat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.thaat-name-lbl {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.04em;
  flex: 1;
}

.thaat-count {
  font-family: 'Fira Code', monospace;
  font-size: 8px;
  color: var(--text3);
}

.thaat-arr {
  color: var(--text3);
  font-size: 9px;
  transition: transform .2s;
}
.thaat-arr.open { transform: rotate(90deg); }

.raga-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  margin: 1px 0;
  border-radius: 7px;
  cursor: pointer;
  transition: all .18s;
  border: 1px solid transparent;
  position: relative;
}
.raga-row:hover { background: var(--bg3); border-color: var(--border); }
.raga-row.sel {
  background: var(--glow);
  border-color: var(--gold);
}
.raga-row.sel .rname { color: var(--gold); }
.raga-row.sel .ridx { color: var(--gold2); }

.time-pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ridx {
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: var(--text3);
  width: 22px;
  text-align: right;
  flex-shrink: 0;
}

.rname {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.03em;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.season-chip {
  font-family: 'Fira Code', monospace;
  font-size: 7px;
  padding: 2px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  opacity: 0.7;
}

.noresult {
  text-align: center;
  padding: 36px 20px;
  color: var(--text3);
  font-style: italic;
  font-size: 15px;
}

/* ─── SPLITTER ─── */
.splitter {
  width: 7px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
.splitter:hover, .splitter.drag { background: var(--glow2); }

.spl-inner {
  display: flex;
  flex-direction: column;
  gap: 3px;
  pointer-events: none;
}
.spl-d {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--text3);
  transition: background .2s;
}
.splitter:hover .spl-d {
  background: var(--gold);
  animation: spl-pulse .7s ease-in-out infinite alternate;
}
.spl-d:nth-child(2) { animation-delay: .12s !important; }
.spl-d:nth-child(3) { animation-delay: .24s !important; }
.spl-d:nth-child(4) { animation-delay: .36s !important; }
@keyframes spl-pulse {
  from { transform: scale(1); opacity:.4; }
  to   { transform: scale(1.5); opacity:1; }
}

/* ─── RIGHT PANE ─── */
.right-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  transition: background .4s;
}

.detail-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 36px 44px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold3) transparent;
}
.detail-scroll::-webkit-scrollbar { width: 3px; }
.detail-scroll::-webkit-scrollbar-thumb { background: var(--gold3); border-radius: 2px; }

/* ─── EMPTY STATE ─── */
.empty {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  opacity: 0.35;
}

.empty-tanpura {
  position: relative;
  width: 80px; height: 160px;
}
.tp-body {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 48px; height: 90px;
  border-radius: 24px 24px 12px 12px;
  border: 2px solid var(--gold3);
  animation: tp-glow 3s ease-in-out infinite alternate;
}
@keyframes tp-glow {
  from { border-color: var(--gold3); box-shadow: none; }
  to   { border-color: var(--gold); box-shadow: 0 0 20px var(--glow); }
}
.tp-neck {
  position: absolute;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  width: 14px; height: 80px;
  border-radius: 7px;
  border: 2px solid var(--gold3);
  animation: tp-glow 3s ease-in-out infinite alternate;
  animation-delay: .5s;
}
.tp-strings {
  position: absolute;
  top: 22px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
}
.tp-str {
  width: 1px; height: 78px;
  background: var(--gold3);
  animation: tp-str-glow 2s ease-in-out infinite alternate;
}
.tp-str:nth-child(2) { animation-delay: .3s; }
.tp-str:nth-child(3) { animation-delay: .6s; }
.tp-str:nth-child(4) { animation-delay: .9s; }
@keyframes tp-str-glow {
  from { background: var(--gold3); }
  to   { background: var(--gold); }
}

.empty-label {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-align: center;
  font-style: italic;
  line-height: 1.6;
}

/* ─── DETAIL CONTENT ─── */
.d-header {
  margin-bottom: 36px;
  padding-bottom: 28px;
  position: relative;
}
.d-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100px; height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.d-idx {
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.14em;
  margin-bottom: 8px;
}

.d-title {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 0.04em;
  line-height: 1.05;
  text-shadow: 0 2px 40px var(--glow);
  margin-bottom: 6px;
}

.d-alt {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-style: italic;
  color: var(--text3);
  margin-bottom: 14px;
}

.d-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.dtag {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 0.06em;
  border: 1px solid var(--border);
  background: var(--glow2);
  color: var(--text2);
}

.dtag.thaat { border-color: var(--gold3); color: var(--gold2); }
.dtag.time  { color: var(--text2); }
.time-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--glow2);
}
.time-dot-sm {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── SWARA DISPLAY ─── */
.sec-title {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sec-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
  max-width: 160px;
}

/* AROHA / AVAROHA rows */
.aa-wrap {
  margin-bottom: 24px;
}

.aa-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.aa-lbl {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.12em;
  width: 56px;
  flex-shrink: 0;
}

.swara-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 8px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--panel);
  min-width: 52px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.swara-pill::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
}
.swara-pill.sa  .sp-sym { color: var(--sa-c); }
.swara-pill.re  .sp-sym { color: var(--re-c); }
.swara-pill.ga  .sp-sym { color: var(--ga-c); }
.swara-pill.ma  .sp-sym { color: var(--ma-c); }
.swara-pill.pa  .sp-sym { color: var(--pa-c); }
.swara-pill.dha .sp-sym { color: var(--dha-c); }
.swara-pill.ni  .sp-sym { color: var(--ni-c); }
.swara-pill.sa::after  { background: var(--sa-c); }
.swara-pill.re::after  { background: var(--re-c); }
.swara-pill.ga::after  { background: var(--ga-c); }
.swara-pill.ma::after  { background: var(--ma-c); }

  { id:3,  name:"Kedar",          alt:"Kedara",             thaat:"kalyan",   time:"evening", vadi:"M#", samvadi:"S", jati:"shadav",  aaroha:["S","M#","P","M#","D","N","S'"],   avaroha:["S'","N","D","P","M#","G","M#","R","S"], desc:"A majestic evening raga that uses both Ma and M♯. Known for its devotional and grand character." },
  { id:4,  name:"Shyam Kalyan",   alt:"Shyam Kalyani",      thaat:"kalyan",   time:"evening", vadi:"G", samvadi:"N", jati:"sampurna", aaroha:["S","R","G","M","M#","P","D","N","S'"], avaroha:["S'","N","D","P","M#","G","R","S"], desc:"Uses both shuddha and tivra Ma, giving it a complex personality — Shyam (dark/Krishna) mixed with Kalyan's grandeur." },
  { id:5,  name:"Hameer",         alt:"Hamir",              thaat:"kalyan",   time:"evening", vadi:"D", samvadi:"G", jati:"sampurna", aaroha:["S","R","G","M","D","N","S'"],     avaroha:["S'","N","D","P","M#","G","M","G","R","S"], desc:"A raga of bold dignity. Uses both Ma and M♯. Typically sung late evening with powerful emotive phrases." },
  { id:6,  name:"Kalyani",        alt:"Kalyan",             thaat:"kalyan",   time:"evening", vadi:"G", samvadi:"N", jati:"sampurna", aaroha:["S","R","G","M#","P","D","N","S'"], avaroha:["S'","N","D","P","M#","G","R","S"], desc:"The parent raga of Kalyan thaat. Pure, bright and expansive — the very definition of the evening mood." },
  { id:7,  name:"Shuddha Kalyan", alt:"",                   thaat:"kalyan",   time:"evening", vadi:"G", samvadi:"N", jati:"audav",    aaroha:["S","R","G","P","D","N","S'"],     avaroha:["S'","N","D","P","G","R","S"],      desc:"A lighter, more playful relative of Yaman. Uses shuddha Ma (or avoids it) while maintaining the Kalyan spirit." },

  // ─── BILAWAL ───
  { id:8,  name:"Alhaiya Bilawal",alt:"Bilawal",            thaat:"bilawal",  time:"morning", vadi:"D", samvadi:"G", jati:"sampurna", aaroha:["S","R","G","P","D","S'"],         avaroha:["S'","D","N","D","P","M","G","R","S"], desc:"The morning raga of the natural scale. Clear, fresh and devotional — associated with dawn prayers." },
  { id:9,  name:"Shankara",       alt:"Shankar",            thaat:"bilawal",  time:"evening", vadi:"G", samvadi:"N", jati:"audav",    aaroha:["S","R","G","P","N","S'"],         avaroha:["S'","N","P","G","R","S"],          desc:"Dedicated to Lord Shiva. Omits Ma and Dha. Solemn, devotional and transcendent in character." },
  { id:10, name:"Durga",          alt:"",                   thaat:"bilawal",  time:"evening", vadi:"R", samvadi:"P", jati:"audav",    aaroha:["S","R","M","P","D","S'"],         avaroha:["S'","D","P","M","R","S"],          desc:"Dedicated to Goddess Durga. A pentatonic raga omitting Ga and Ni. Bright, festive and powerful." },
  { id:11, name:"Deskar",         alt:"",                   thaat:"bilawal",  time:"afternoon",vadi:"D",samvadi:"G",jati:"audav",    aaroha:["S","R","G","P","D","S'"],         avaroha:["S'","D","P","G","R","S"],          desc:"An afternoon raga of calm dignity. Close to Bhupali but uses shuddha swaras giving it a different character." },
  { id:12, name:"Bihag",          alt:"Behag",              thaat:"bilawal",  time:"night",   vadi:"G", samvadi:"N", jati:"shadav",   aaroha:["S","G","M","P","D","N","S'"],     avaroha:["S'","N","D","P","M","G","M","G","S"], desc:"A romantic late-night raga. Its characteristic omission of Re in the ascent gives it a distinctive leap and yearning quality." },
  { id:13, name:"Hamir Kalyani",  alt:"",                   thaat:"bilawal",  time:"evening", vadi:"D", samvadi:"G", jati:"sampurna", aaroha:["S","R","G","M","P","D","N","S'"], avaroha:["S'","N","D","P","M","G","R","S"], desc:"An evening raga blending the character of Hamir and Kalyani. Rich, expansive and deeply classical." },

  // ─── KHAMAJ ───
  { id:14, name:"Khamaj",         alt:"",                   thaat:"khamaj",   time:"evening", vadi:"G", samvadi:"N", jati:"shadav",   aaroha:["S","G","M","P","D","N","S'"],     avaroha:["S'","n","D","P","M","G","M","G","R","S"], desc:"The parent raga of Khamaj thaat. Deeply romantic with its komal Ni in descent. Perfect for thumri and light classical." },
  { id:15, name:"Des",            alt:"Desh",               thaat:"khamaj",   time:"night",   vadi:"R", samvadi:"P", jati:"audav",    aaroha:["S","R","M","P","N","S'"],         avaroha:["S'","n","D","P","M","G","M","R","S"],  desc:"A popular monsoon raga evoking joy and separation. Uses both Ni variants. Often associated with the longing of the rains." },
  { id:16, name:"Tilak Kamod",    alt:"",                   thaat:"khamaj",   time:"night",   vadi:"R", samvadi:"P", jati:"sampurna", aaroha:["S","R","G","M","P","R","P","D","S'"], avaroha:["S'","n","D","P","M","G","M","G","R","S"], desc:"A playful night raga with characteristic melodic movements. Popular in thumri and light classical forms." },
  { id:17, name:"Jhinjhoti",      alt:"Jinjhoti",           thaat:"khamaj",   time:"night",   vadi:"G", samvadi:"N", jati:"sampurna", aaroha:["S","R","G","M","P","D","n","S'"], avaroha:["S'","n","D","P","M","G","R","S"],  desc:"A romantic night raga with a gentle, playful quality. Often used in light classical compositions and film music." },
  { id:18, name:"Rageshri",       alt:"Rageshwari",         thaat:"khamaj",   time:"night",   vadi:"G", samvadi:"N", jati:"audav",    aaroha:["S","G","M","D","n","S'"],         avaroha:["S'","n","D","M","G","R","S"],      desc:"A serene, introspective night raga. Omits Re in ascent and Pa entirely, giving it a distinctive floating quality." },

  // ─── BHAIRAV ───
  { id:19, name:"Bhairav",        alt:"",                   thaat:"bhairav",  time:"morning", vadi:"d", samvadi:"r", jati:"sampurna", aaroha:["S","r","G","M","P","d","N","S'"], avaroha:["S'","N","d","P","M","G","r","S"], desc:"The majestic morning raga dedicated to Shiva. Komal Re and Dha create a profoundly grave, meditative atmosphere. One of the grandest ragas." },
  { id:20, name:"Ramkali",        alt:"Ramkali Bhairav",    thaat:"bhairav",  time:"morning", vadi:"d", samvadi:"M", jati:"sampurna", aaroha:["S","r","G","M","P","d","n","N","S'"], avaroha:["S'","N","n","d","P","M","G","r","G","r","S"], desc:"An elaborate morning raga closely related to Bhairav. Uses both Ni variants in descent, adding to its complex beauty." },
  { id:21, name:"Ahir Bhairav",   alt:"",                   thaat:"bhairav",  time:"morning", vadi:"d", samvadi:"G", jati:"sampurna", aaroha:["S","r","G","M","P","D","n","S'"], avaroha:["S'","n","D","P","M","G","r","G","r","S"], desc:"Blends Bhairav's solemnity with Kafi's sweetness. Uses shuddha Dha instead of komal, creating a uniquely gentle morning mood." },
  { id:22, name:"Nat Bhairav",    alt:"",                   thaat:"bhairav",  time:"morning", vadi:"d", samvadi:"G", jati:"sampurna", aaroha:["S","r","G","M","P","d","N","S'"], avaroha:["S'","N","d","P","M","G","r","G","S"], desc:"A raga that combines the elements of Nat and Bhairav. Lighter than pure Bhairav with characteristic leaping phrases." },
  { id:23, name:"Kalingda",       alt:"Kalingra",           thaat:"bhairav",  time:"morning", vadi:"P", samvadi:"S", jati:"shadav",   aaroha:["S","r","M","P","d","N","S'"],     avaroha:["S'","N","d","P","M","r","S"],      desc:"A morning raga omitting Ga. Related to Bhairav but lighter. The omission creates an interesting meditative quality." },

  // ─── BHAIRAVI ───
  { id:24, name:"Bhairavi",       alt:"",                   thaat:"bhairavi", time:"morning", vadi:"M", samvadi:"S", jati:"sampurna", aaroha:["S","r","g","M","P","d","n","S'"], avaroha:["S'","n","d","P","M","g","r","S"], desc:"The queen of all ragas — deeply emotive with all four komal swaras. Traditionally played at the conclusion of every concert. Can express every emotion." },
  { id:25, name:"Sindhu Bhairavi",alt:"",                   thaat:"bhairavi", time:"morning", vadi:"M", samvadi:"S", jati:"sampurna", aaroha:["S","r","g","M","P","d","n","S'"], avaroha:["S'","n","d","P","M","g","r","S"], desc:"A lighter, more romantic variant of Bhairavi. Popular in semi-classical forms and used extensively in film music for emotional scenes." },
  { id:26, name:"Malkauns",       alt:"Malkosh",            thaat:"bhairavi", time:"night",   vadi:"M", samvadi:"S", jati:"audav",    aaroha:["S","g","M","d","n","S'"],         avaroha:["S'","n","d","M","g","S"],          desc:"A powerful midnight raga omitting Re and Pa. One of the oldest and most revered ragas. Deep, mysterious and hypnotic." },
  { id:27, name:"Bageshri",       alt:"Bageshwari",         thaat:"khamaj",   time:"night",   vadi:"g", samvadi:"d", jati:"shadav",   aaroha:["S","g","M","P","D","n","S'"],     avaroha:["S'","n","D","P","M","g","M","R","S"], desc:"A romantic, longing raga of midnight. The komal Ga and Ni create a poignant, yearning quality. Beloved for its sweetness." },
  { id:28, name:"Chandrakauns",   alt:"",                   thaat:"bhairavi", time:"night",   vadi:"g", samvadi:"n", jati:"audav",    aaroha:["S","g","M","d","n","S'"],         avaroha:["S'","n","d","M","g","S"],          desc:"'Moonlight Kauns' — a derivative of Malkauns with a slightly brighter quality due to the use of komal Dha instead of shuddha." },

  // ─── ASAVARI ───
  { id:29, name:"Asavari",        alt:"",                   thaat:"asavari",  time:"morning", vadi:"d", samvadi:"g", jati:"audav",    aaroha:["S","R","M","P","d","S'"],         avaroha:["S'","n","d","P","M","g","M","R","S"], desc:"A serious, melancholic morning raga. Its komal Ga, Dha and Ni give it a yearning, reflective quality. Very ancient in origin." },
  { id:30, name:"Jaunpuri",       alt:"",                   thaat:"asavari",  time:"morning", vadi:"g", samvadi:"d", jati:"sampurna", aaroha:["S","R","g","M","P","d","n","S'"], avaroha:["S'","n","d","P","M","g","R","S"], desc:"A beautiful morning raga of serious character. Similar to Asavari but with a more complete scale and a distinctive melancholic flavor." },
  { id:31, name:"Darbari Kanada", alt:"Darbari",            thaat:"asavari",  time:"night",   vadi:"r", samvadi:"g", jati:"sampurna", aaroha:["S","R","g","M","P","d","n","S'"], avaroha:["S'","n","d","P","M","g","r","g","R","g","S"], desc:"The raga of the royal court (darbar). Created by Miyan Tansen. Majestic, weighty, with characteristic gamakas. One of the grandest ragas." },
  { id:32, name:"Adana",          alt:"",                   thaat:"asavari",  time:"night",   vadi:"P", samvadi:"g", jati:"sampurna", aaroha:["S","R","g","M","P","d","n","S'"], avaroha:["S'","n","d","P","M","g","M","P","R","g","R","S"], desc:"A late night raga of great power and expressiveness. Shares features with Darbari but lighter and more agile in movement." },
  { id:33, name:"Nat Kamod",      alt:"",                   thaat:"bilawal",  time:"evening", vadi:"G", samvadi:"N", jati:"sampurna", aaroha:["S","R","G","P","D","S'"],         avaroha:["S'","N","D","P","M","G","R","S"], desc:"An evening raga combining Nat and Kamod characteristics. Bright, energetic and festive with a stately quality." },

  // ─── KAFI ───
  { id:34, name:"Kafi",           alt:"",                   thaat:"bhairavi2",time:"afternoon",vadi:"g",samvadi:"n",jati:"sampurna",  aaroha:["S","R","g","M","P","D","n","S'"], avaroha:["S'","n","D","P","M","g","R","S"], desc:"The parent raga of Kafi thaat. Associated with devotional music. Komal Ga and Ni. Holi songs are often composed in this raga." },
  { id:35, name:"Pilu",           alt:"",                   thaat:"bhairavi2",time:"afternoon",vadi:"g",samvadi:"d",jati:"sampurna",  aaroha:["S","R","g","M","P","D","n","S'"], avaroha:["S'","n","D","P","M","g","M","R","S"], desc:"One of the most flexible ragas, using many swara variants. Popular in thumri, dadra and folk music. Associated with separation and longing." },
  { id:36, name:"Gaud Sarang",    alt:"",                   thaat:"bilawal",  time:"afternoon",vadi:"R",samvadi:"P",jati:"sampurna",  aaroha:["S","R","G","M","P","D","N","S'"], avaroha:["S'","N","P","G","M","G","P","M","G","R","S"], desc:"An afternoon raga of the Sarang family. Bright and lively with characteristic phrases. Associated with summer afternoons." },
  { id:37, name:"Brindavani Sarang",alt:"Vrindavani Sarang",thaat:"khamaj",  time:"afternoon",vadi:"R",samvadi:"P",jati:"audav",      aaroha:["S","R","M","P","n","S'"],         avaroha:["S'","n","D","P","M","R","S"],      desc:"Evokes the atmosphere of Vrindavan (Brindaban). A playful, romantic afternoon raga. Uses both Ni variants in some renditions." },
  { id:38, name:"Megh",           alt:"Megh Malhar",        thaat:"bhairavi2",time:"allday",  vadi:"S", samvadi:"P", jati:"audav",    aaroha:["S","R","M","P","n","S'"],         avaroha:["S'","n","P","M","R","S"],          desc:"The raga of rain clouds. Associated with invoking rains and monsoon. One of the Malhar family ragas, sung in the rainy season." },
  { id:39, name:"Miyan ki Malhar",alt:"Mian Malhar",        thaat:"bhairavi2",time:"allday",  vadi:"n", samvadi:"S", jati:"sampurna", aaroha:["S","R","g","M","P","n","S'"],     avaroha:["S'","n","D","n","P","M","g","R","S"], desc:"Created by the legendary Miyan Tansen. The definitive rain raga. Deep, intense and mysterious with its characteristic komal Ni emphasis." },

  // ─── PURVI ───
  { id:40, name:"Purvi",          alt:"Poorvi",             thaat:"purvi",    time:"evening", vadi:"G", samvadi:"d", jati:"sampurna", aaroha:["S","r","G","M#","P","d","N","S'"], avaroha:["S'","N","d","P","M#","G","r","S"], desc:"The parent raga of Purvi thaat. An evening raga of intense yearning — the combination of komal Re, Dha and tivra Ma creates a unique twilight atmosphere." },
  { id:41, name:"Shri",           alt:"Shree",              thaat:"purvi",    time:"evening", vadi:"d", samvadi:"r", jati:"sampurna", aaroha:["S","r","M","M#","P","d","N","S'"], avaroha:["S'","N","d","P","M#","r","S"],    desc:"A raga of immense grandeur. Uses both Ma variants. One of the most respected and difficult ragas. Associated with the divine." },
  { id:42, name:"Paraj",          alt:"Parraj",             thaat:"purvi",    time:"evening", vadi:"N", samvadi:"G", jati:"sampurna", aaroha:["S","r","G","M#","P","d","N","S'"], avaroha:["S'","N","d","P","M#","G","r","G","r","S"], desc:"A rare and beautiful late evening raga of the Purvi family. Intensely lyrical with complex melodic movements." },
  { id:43, name:"Gauri",          alt:"",                   thaat:"purvi",    time:"morning", vadi:"G", samvadi:"N", jati:"sampurna", aaroha:["S","r","G","M","P","d","N","S'"], avaroha:["S'","N","d","P","M","G","r","S"], desc:"A morning raga related to Bhairav but with the addition of shuddha Ga. More tender and devotional than pure Bhairav." },

  // ─── MARWA ───
  { id:44, name:"Marwa",          alt:"",                   thaat:"marwa",    time:"evening", vadi:"r", samvadi:"D", jati:"shadav",   aaroha:["S","r","G","M#","D","N","S'"],    avaroha:["S'","N","D","M#","G","r","S"],    desc:"The parent raga of Marwa thaat. Intense and dramatic — the omission of Pa and the use of komal Re with tivra Ma creates a unique suspended tension." },
  { id:45, name:"Bibhas",         alt:"",                   thaat:"marwa",    time:"morning", vadi:"d", samvadi:"r", jati:"audav",    aaroha:["S","r","G","P","d","S'"],         avaroha:["S'","d","P","G","r","S"],         desc:"An early morning raga of serenity and solemnity. The omission of Ma and Ni gives it a sparse, meditative quality." },
  { id:46, name:"Sohni",          alt:"",                   thaat:"marwa",    time:"evening", vadi:"D", samvadi:"G", jati:"audav",    aaroha:["S","r","G","M#","D","S'"],        avaroha:["S'","N","D","M#","G","r","S"],    desc:"Named after the legendary Punjabi heroine. A raga of love and longing. Uses tivra Ma, giving it an aching, yearning quality." },
  { id:47, name:"Lalit",          alt:"",                   thaat:"purvi",    time:"morning", vadi:"M", samvadi:"S", jati:"shadav",   aaroha:["S","r","G","M","M#","d","N","S'"],avaroha:["S'","N","d","M#","M","G","r","S"], desc:"A unique pre-dawn raga that uses both Ma variants. Omits Pa. Has a profound, introspective quality suitable only for the hours before sunrise." },

  // ─── TODI ───
  { id:48, name:"Miyan ki Todi",  alt:"Todi",               thaat:"todi",     time:"morning", vadi:"d", samvadi:"G", jati:"sampurna", aaroha:["S","r","g","M#","P","d","N","S'"], avaroha:["S'","N","d","P","M#","g","r","S"], desc:"Perhaps the pinnacle of Hindustani ragas. Three komal swaras and tivra Ma. Profound, weighty and deeply expressive. Considered the most complete raga." },
  { id:49, name:"Gurjari Todi",   alt:"Gujari Todi",        thaat:"todi",     time:"morning", vadi:"d", samvadi:"G", jati:"sampurna", aaroha:["S","r","g","M#","P","d","N","S'"], avaroha:["S'","N","d","P","M#","g","r","g","r","S"], desc:"A variant of Todi with characteristic oscillating movements. Equally powerful and considered very auspicious for morning performances." },
  { id:50, name:"Multani",        alt:"",                   thaat:"todi",     time:"afternoon",vadi:"d",samvadi:"S", jati:"sampurna", aaroha:["S","r","g","M#","P","d","N","S'"], avaroha:["S'","N","d","P","M#","g","r","S"], desc:"An afternoon raga of the Todi family. Similar to Todi but with a somewhat different treatment of phrases. Serious and meditative." },

  // ─── MISC / WELL-KNOWN ───
  { id:51, name:"Bhoopali",       alt:"Bhupali",            thaat:"kalyan",   time:"evening", vadi:"G", samvadi:"D", jati:"audav",    aaroha:["S","R","G","P","D","S'"],         avaroha:["S'","D","P","G","R","S"],          desc:"One of the most popular pentatonic ragas. Omits Ma and Ni. Serene, pleasant and well-suited to devotional compositions." },
  { id:52, name:"Charukeshi",     alt:"Charukesi",          thaat:"bilawal",  time:"anytime", vadi:"D", samvadi:"G", jati:"sampurna", aaroha:["S","R","G","M","P","d","n","S'"], avaroha:["S'","n","d","P","M","G","R","S"], desc:"A versatile raga that can be played at any time. Uses komal Dha and Ni — borrowed from South Indian music (same as Kharaharapriya)." },
  { id:53, name:"Bairagi",        alt:"Bairagi Bhairav",    thaat:"bhairav",  time:"morning", vadi:"r", samvadi:"P", jati:"audav",    aaroha:["S","r","P","r","n","S'"],         avaroha:["S'","n","P","r","S"],             desc:"The raga of renunciation (bairagi = ascetic). A skeletal, deeply meditative raga using only Sa, komal Re, Pa and komal Ni." },
  { id:54, name:"Kirwani",        alt:"",                   thaat:"bhairavi", time:"night",   vadi:"n", samvadi:"r", jati:"sampurna", aaroha:["S","R","g","M","P","d","N","S'"], avaroha:["S'","N","d","P","M","g","R","S"], desc:"A night raga with South Indian origins (Kiravani). Uses shuddha Re and Ni but komal Ga and Dha, giving it an unusual combination." },
  { id:55, name:"Bhimpalasi",     alt:"",                   thaat:"bhairavi2",time:"afternoon",vadi:"g",samvadi:"n",jati:"audav",     aaroha:["S","M","g","M","P","n","S'"],     avaroha:["S'","n","D","P","M","g","R","S"], desc:"A deeply romantic afternoon raga omitting Re and Dha in ascent. Lyrical, tender and melancholic — favored for expressing the longing of separation." },
  { id:56, name:"Chandrakauns",   alt:"",                   thaat:"bhairavi", time:"night",   vadi:"g", samvadi:"n", jati:"audav",    aaroha:["S","g","M","d","n","S'"],         avaroha:["S'","n","d","M","g","S"],          desc:"A nocturnal raga related to Malkauns. Austere and meditative with an ethereal moonlit quality from its komal swaras." },
  { id:57, name:"Tilang",         alt:"",                   thaat:"khamaj",   time:"evening", vadi:"G", samvadi:"N", jati:"audav",    aaroha:["S","G","M","P","n","S'"],         avaroha:["S'","n","P","M","G","S"],          desc:"A light, pleasant evening raga with a distinctive omission of Re and Dha. Popular for bhajans and lighter compositions." },
  { id:58, name:"Basant",         alt:"Vasant",             thaat:"purvi",    time:"allday",  vadi:"M#", samvadi:"S", jati:"sampurna", aaroha:["S","r","G","M#","P","d","N","S'"], avaroha:["S'","N","d","P","M#","G","r","S"], desc:"The raga of spring. Traditionally sung during the festival of Basant Panchami. Joyful, colorful and celebratory in character." },
  { id:59, name:"Malhar",         alt:"Shuddha Malhar",     thaat:"khamaj",   time:"allday",  vadi:"R", samvadi:"P", jati:"sampurna", aaroha:["S","R","M","P","N","D","n","S'"], avaroha:["S'","n","D","P","M","G","M","R","S"], desc:"The foundational rain raga. Traditionally sung during the monsoon to invoke rain. Evokes the joy and anticipation of the rainy season." },
  { id:60, name:"Kamod",          alt:"",                   thaat:"kalyan",   time:"evening", vadi:"G", samvadi:"N", jati:"shadav",   aaroha:["S","R","G","P","D","S'"],         avaroha:["S'","D","N","P","M#","G","P","G","R","S"], desc:"A joyful evening raga. Often performed at festive occasions. Its characteristic phrases give it a distinctive playful energy." },
  { id:61, name:"Nayaki Kanada",  alt:"",                   thaat:"asavari",  time:"night",   vadi:"g", samvadi:"d", jati:"sampurna", aaroha:["S","R","g","M","P","d","n","S'"], avaroha:["S'","n","d","P","M","g","R","g","S"], desc:"A night raga of the Kanada family with a tender, feminine quality. More lyrical than Darbari while sharing its komal swaras." },
  { id:62, name:"Jog",            alt:"Yog",                thaat:"bhairavi2",time:"night",   vadi:"g", samvadi:"n", jati:"audav",    aaroha:["S","g","M","P","n","S'"],         avaroha:["S'","n","P","M","g","S"],          desc:"A deeply meditative night raga. Simple yet profound with only five swaras. Associated with spiritual practice and yoga." },

function getJatiClass(r) {
  const n = (r.aaroha || []).filter(s => s !== "S'").length;
  if (n <= 5) return 'audav';
  if (n <= 6) return 'shadav';
  return 'sampurna';
}

function renderList() {
  const q = document.getElementById('srchInp').value.toLowerCase().trim();
  const scroll = document.getElementById('ragaScroll');

  let visible = [];

  RAGAS.forEach(r => {
    if (timeFilter !== 'all' && r.time !== timeFilter && r.time !== 'allday' && r.time !== 'anytime') return;
    if (grpFilter !== 'all' && getJatiClass(r) !== grpFilter) return;
    if (q && !r.name.toLowerCase().includes(q) && !r.thaat.toLowerCase().includes(q) &&
        !String(r.id).includes(q) && !(r.alt || '').toLowerCase().includes(q)) return;
    visible.push(r);
  });

  document.getElementById('rcount').textContent = visible.length;

  // Group by thaat
  const byThaat = {};
  visible.forEach(r => {
    if (!byThaat[r.thaat]) byThaat[r.thaat] = [];
    byThaat[r.thaat].push(r);
  });

  let html = '';

  if (visible.length === 0) {
    html = '<div class="noresult">No ragas found</div>';
  } else {
    Object.keys(byThaat).sort().forEach(tKey => {
      const th = THAATS[tKey];
      if (!th) return;
      const ragas = byThaat[tKey];
      html += `
        <div class="thaat-group" id="tg-${tKey}">
          <div class="thaat-hdr" onclick="toggleThaat('${tKey}')">
            <div class="thaat-dot" style="background:${th.color}"></div>
            <div class="thaat-name-lbl">${th.name} Thaat</div>
            <div class="thaat-count">${ragas.length}</div>
            <div class="thaat-arr open" id="ta-${tKey}">▶</div>
          </div>
          <div id="tr-${tKey}">
            ${ragas.map(r => {
              const tc = TIME_COLORS[r.time] || TIME_COLORS.anytime;
              const jati = getJatiClass(r);
              return `<div class="raga-row ${selRaga && selRaga.id === r.id ? 'sel' : ''}"
                id="rr-${r.id}" onclick="selectRaga(${r.id})">
                <div class="time-pip" style="background:${tc}" title="${r.time}"></div>
                <div class="ridx">${r.id}</div>
                <div class="rname">${r.name}</div>
                <div class="season-chip" style="background:${tc}22;color:${tc};border:1px solid ${tc}44;">${jati.substring(0,3)}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    });
  }

  scroll.innerHTML = html;
}

function toggleThaat(key) {
  const el = document.getElementById(`tr-${key}`);
  const arr = document.getElementById(`ta-${key}`);
  if (el.style.display === 'none') { el.style.display = ''; arr.classList.add('open'); }
  else { el.style.display = 'none'; arr.classList.remove('open'); }
}

function buildSwaraCards(swaras) {
  return swaras.map(s => {
    const sw = SWARA_INFO[s];
    if (!sw) return `<div class="swara-pill pa"><div class="sp-sym">${s}</div></div>`;
    return `<div class="swara-pill ${sw.cls}" onclick="playSingleSwara('${s}')">
      <div class="sp-sym">${sw.sym}</div>
      <div class="sp-full">${sw.full.replace(' ','\n')}</div>
      ${sw.komal ? '<div class="sp-komal">komal</div>' : ''}
      ${sw.tivra ? '<div class="sp-tivra">tivra</div>' : ''}
    </div>`;
  }).join('');
}

function buildNotation(swaras) {
  return swaras.map(s => {
    const sw = SWARA_INFO[s];
    if (!sw) return `<span class="ns pa">${s}</span>`;
    const cls = `ns ${sw.cls}${sw.komal ? ' komal' : ''}${sw.tivra ? ' tivra' : ''}`;
    return `<span class="${cls}">${sw.sym.replace('♭','').replace('♯','')}</span>`;
  }).join('');
}

function buildClock(time, color) {
  // Clock showing time of day
  const timeRanges = {
    morning:   { start: 6,  end: 10, label: "6am – 10am" },
    afternoon: { start: 12, end: 16, label: "12pm – 4pm" },
    evening:   { start: 17, end: 21, label: "5pm – 9pm"  },
    night:     { start: 22, end: 4,  label: "10pm – 4am" },
    allday:    { start: 0,  end: 24, label: "Any time"   },
    anytime:   { start: 0,  end: 24, label: "Any time"   },
  };
  const tr = timeRanges[time] || timeRanges.anytime;
  const cx = 36, cy = 36, r = 28;

  // Draw arc
  const toAngle = h => (h / 12) * Math.PI * 2 - Math.PI / 2;
  let arcPath = '';
  if (tr.start === 0 && tr.end === 24) {
    arcPath = `<circle cx="${cx}" cy="${cy}" r="${r-4}" fill="none" stroke="${color}" stroke-width="5" opacity=".6"/>`;
  } else {
    const a1 = toAngle(tr.start % 12);
    const a2 = toAngle(tr.end % 12 || 12);
    const x1 = cx + (r-4)*Math.cos(a1), y1 = cy + (r-4)*Math.sin(a1);
    const x2 = cx + (r-4)*Math.cos(a2), y2 = cy + (r-4)*Math.sin(a2);
    const large = (tr.end - tr.start + 24) % 24 > 6 ? 1 : 0;
    arcPath = `<path d="M${x1},${y1} A${r-4},${r-4} 0 ${large},1 ${x2},${y2}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round" opacity=".7"/>`;
  }

  // Hour ticks
  let ticks = '';
  for (let h = 0; h < 12; h++) {
    const a = (h/12)*Math.PI*2 - Math.PI/2;
    const x1 = cx + r*Math.cos(a), y1 = cy + r*Math.sin(a);
    const x2 = cx + (r-5)*Math.cos(a), y2 = cy + (r-5)*Math.sin(a);
    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--text3)" stroke-width="1.5"/>`;
  }

  return `<svg viewBox="0 0 72 72" width="72" height="72">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--bg3)" stroke="var(--border)" stroke-width="1"/>
    ${ticks}
    ${arcPath}
    <circle cx="${cx}" cy="${cy}" r="3" fill="${color}"/>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="Fira Code,monospace" font-size="6" fill="${color}" opacity=".8">${tr.label}</text>
  </svg>`;
}

function buildThaatWheel(activeThaatKey) {
  const tkeys = Object.keys(THAATS);
  const cx = 36, cy = 36, r = 30, r2 = 16;
  let paths = '';
  tkeys.forEach((k, i) => {
    const a1 = (i / tkeys.length) * Math.PI * 2 - Math.PI/2;
    const a2 = ((i+1) / tkeys.length) * Math.PI * 2 - Math.PI/2;
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
    const x3 = cx + r2*Math.cos(a2), y3 = cy + r2*Math.sin(a2);
    const x4 = cx + r2*Math.cos(a1), y4 = cy + r2*Math.sin(a1);
    const isActive = k === activeThaatKey;
    const col = THAATS[k].color;
    paths += `<path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} L${x3},${y3} A${r2},${r2} 0 0,0 ${x4},${y4} Z"
      fill="${isActive ? col : 'var(--bg3)'}"
      stroke="var(--bg2)" stroke-width="1.5"
      opacity="${isActive ? 0.9 : 0.4}"/>`;
  });
  return `<svg viewBox="0 0 72 72" width="72" height="72">
    ${paths}
    <circle cx="${cx}" cy="${cy}" r="${r2-2}" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="Playfair Display,serif" font-size="7" fill="var(--gold)" font-style="italic">${THAATS[activeThaatKey]?.name||''}</text>
  </svg>`;
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
}

function timeLabel(t) {
  const labels = { morning:'Morning (Prabhaat)', afternoon:'Afternoon (Madhyaahn)', evening:'Evening (Sandhya)', night:'Night (Raatri)', allday:'Seasonal / Any Time', anytime:'Any Time' };
  return labels[t] || capitalize(t);
}

function timeDesc(t) {
  const descs = {
    morning: "Sung between dawn and mid-morning (6am–10am). Morning ragas carry a spiritual, meditative quality, often associated with prayer and the freshness of a new day.",
    afternoon: "Performed between noon and late afternoon (12pm–4pm). These ragas are typically serious and dignified, suitable for the contemplative afternoon hours.",
    evening: "Performed at dusk and evening (5pm–9pm). Evening ragas have a romantic, yearning quality — reflecting the transition from day to night.",
    night: "Performed late at night (10pm onwards). Night ragas are often the most profound and deeply emotive, suited for the stillness and introspection of night.",
    allday: "A seasonal raga without strict time restrictions. Often associated with specific seasons like monsoon (Malhar ragas) or spring (Basant, Bahar).",
    anytime: "A versatile raga that can be performed at any hour.",
  };
  return descs[t] || '';
}

// AUDIO
// ════════════════════════════════════════════════════════
const SEMI = { S:0, r:1, R:2, g:3, G:4, M:5, "M#":6, P:7, d:8, D:9, n:10, N:11, "S'":12 };

function getSynth() {
  if (!synth) {
    synth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'sine' },
      envelope: { attack: 0.04, decay: 0.15, sustain: 0.55, release: 1.0 },
      volume: -10,
    }).toDestination();
  }
  return synth;
}

function semiToNote(semi, oct = 4) {
  const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  if (semi === 12) return 'C' + (oct+1);
  return notes[semi] + oct;
}

async function playSingleSwara(s) {
  await Tone.start();
  const semi = SEMI[s];
  if (semi === undefined) return;
  const note = semiToNote(semi, 4);
  getSynth().triggerAttackRelease(note, '4n');
}

async function playRaga() {
  if (!selRaga) return;
  await Tone.start();
  isPlaying = true;

  document.getElementById('playBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.remove('hidden');
  const actBtn = document.getElementById('actPlayBtn');
  if (actBtn) { actBtn.classList.add('pulse'); actBtn.textContent = '♪ Playing…'; }

  const tempo = +document.getElementById('tempoSlider').value;
  const interval = (60 / tempo) * 1000;

  const seq = [...(selRaga.aaroha || []), ...(selRaga.avaroha || [])];
  let i = 0;
  const isAvaroha = idx => idx >= (selRaga.aaroha || []).length;

  const next = () => {
    if (!isPlaying || i >= seq.length) { stopPlay(); return; }
    const s = seq[i];
    const semi = SEMI[s];
    if (semi !== undefined) {
      const oct = isAvaroha(i) ? 5 : 4;
      getSynth().triggerAttackRelease(semiToNote(semi, oct), '8n');
      hlKey(s, isAvaroha(i));
    }
    i++;
    playTmr = setTimeout(next, interval);
  };
  next();
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(playTmr);
  const pb = document.getElementById('playBtn');
  const sb = document.getElementById('stopBtn');
  if (pb) pb.classList.remove('hidden');
  if (sb) sb.classList.add('hidden');
  const actBtn = document.getElementById('actPlayBtn');
  if (actBtn) { actBtn.classList.remove('pulse'); actBtn.textContent = '▶ Play Aarohan'; }
  document.querySelectorAll('.wkey.pressed,.bkey.pressed').forEach(k => k.classList.remove('pressed'));
}

function hlKey(swara, hi) {
  document.querySelectorAll('.wkey.pressed,.bkey.pressed').forEach(k => k.classList.remove('pressed'));
  const id = `pk-${swara.replace('#','s')}-${hi?'hi':'lo'}`;
  const el = document.getElementById(id);
  if (el) { el.classList.add('pressed'); setTimeout(() => el.classList.remove('pressed'), 380); }
}

// ════════════════════════════════════════════════════════
// PIANO
// ════════════════════════════════════════════════════════
function buildPianoKeys() {
  const container = document.getElementById('pianoKeys');
  container.innerHTML = '';
  container.style.position = 'relative';
  container.style.height = '120px';

  const octaves = [4, 5];
  const keyLayout = [
    {note:'C',  semi:0,  black:false},
    {note:'C#', semi:1,  black:true},
    {note:'D',  semi:2,  black:false},
    {note:'D#', semi:3,  black:true},
    {note:'E',  semi:4,  black:false},
    {note:'F',  semi:5,  black:false},
    {note:'F#', semi:6,  black:true},
    {note:'G',  semi:7,  black:false},
    {note:'G#', semi:8,  black:true},
    {note:'A',  semi:9,  black:false},
    {note:'A#', semi:10, black:true},
    {note:'B',  semi:11, black:false},
  ];

  const blackOffsets = { 1: 0.65, 3: 1.65, 6: 3.65, 8: 4.65, 10: 5.65 };

  octaves.forEach((oct, octIdx) => {
    const octStart = octIdx * 7;
    let wIdx = 0;
    keyLayout.forEach(k => {
      const swara = semiToSwara(k.semi);
      const id = swara ? `pk-${swara.replace('#','s')}-${oct===5?'hi':'lo'}` : '';
      const isRaga = swara && selRaga && (
        (selRaga.aaroha||[]).includes(swara) || (selRaga.avaroha||[]).includes(swara)
      );

      if (!k.black) {
        const x = (octStart + wIdx) * 40;
        const div = document.createElement('div');
        div.className = `wkey ${isRaga ? 'rn' : ''}`;
        div.id = id;
        div.style.cssText = `left:${x}px; position:absolute; top:0;`;
        const sw = swara ? SWARA_INFO[swara] : null;
        div.innerHTML = `<div class="klbl">${sw ? sw.sym.replace('♭','').replace('♯','') : ''}<br><span style="font-size:6px;">${k.note}${oct}</span></div>`;
        div.onclick = () => clickKey(k.note, oct);
        container.appendChild(div);
        wIdx++;
      }
    });

    // Black keys
    keyLayout.forEach(k => {
      if (!k.black) return;
      const bOff = blackOffsets[k.semi];
      if (bOff === undefined) return;
      const x = (octStart + bOff) * 40 + 14;
      const swara = semiToSwara(k.semi);
      const id = swara ? `pk-${swara.replace('#','s')}-${oct===5?'hi':'lo'}` : '';
      const isRaga = swara && selRaga && (
        (selRaga.aaroha||[]).includes(swara) || (selRaga.avaroha||[]).includes(swara)
      );
      const div = document.createElement('div');
      div.className = `bkey ${isRaga ? 'rn' : ''}`;
      div.id = id;
      div.style.cssText = `left:${x}px; position:absolute; top:0;`;
      const sw = swara ? SWARA_INFO[swara] : null;
      div.innerHTML = `<div class="klbl">${sw ? sw.sym.replace('♭','').replace('♯','') : ''}</div>`;
      div.onclick = () => clickKey(k.note, oct);
      container.appendChild(div);
    });
  });

  container.style.width = `${14 * 40 + 20}px`;
}

function semiToSwara(semi) {
  for (const [sw, info] of Object.entries(SWARA_INFO)) {
    if (info.semi === semi) return sw;
  }
  return null;
}

async function clickKey(note, oct) {
  await Tone.start();
  getSynth().triggerAttackRelease(note + oct, '8n');
}

// ════════════════════════════════════════════════════════
// PIANO POPUP
// ════════════════════════════════════════════════════════
function togglePiano() {
  const o = document.getElementById('pioOverlay');
  o.classList.contains('open') ? closePiano() : o.classList.add('open');
}
function closePiano() { document.getElementById('pioOverlay').classList.remove('open'); }
function closePioOutside(e) { if (e.target === document.getElementById('pioOverlay')) closePiano(); }

// ════════════════════════════════════════════════════════
// DOWNLOAD
// ════════════════════════════════════════════════════════
function downloadRaga() {
  if (!selRaga) return;
  const r = selRaga;
  const th = THAATS[r.thaat];
  let txt = `HINDUSTANI RAGA: ${r.name}\n`;
  if (r.alt) txt += `Also known as: ${r.alt}\n`;
  txt += `${'─'.repeat(50)}\n\n`;
  txt += `Thaat:      ${th ? th.name : r.thaat}\n`;
  txt += `Time:       ${timeLabel(r.time)}\n`;
  txt += `Jati:       ${capitalize(getJatiClass(r))}\n`;
  txt += `Vadi:       ${r.vadi || '—'}\n`;
  txt += `Samvadi:    ${r.samvadi || '—'}\n\n`;
  txt += `AAROHAN (Ascent)\n${'─'.repeat(30)}\n`;
  (r.aaroha || []).forEach((s,i) => {
    const sw = SWARA_INFO[s];
    txt += `${i+1}. ${(sw ? sw.sym : s).padEnd(8)} — ${sw ? sw.full : ''}\n`;
  });
  txt += `\nAVAROHAN (Descent)\n${'─'.repeat(30)}\n`;
  (r.avaroha || []).forEach((s,i) => {
    const sw = SWARA_INFO[s];
    txt += `${i+1}. ${(sw ? sw.sym : s).padEnd(8)} — ${sw ? sw.full : ''}\n`;
  });
  txt += `\nCHARACTER\n${'─'.repeat(30)}\n${r.desc}\n\n`;
  txt += `THAAT\n${'─'.repeat(30)}\n${th ? th.name+': '+th.desc : ''}\n\n`;
  txt += `PIANO SEMITONE MAP\n${'─'.repeat(30)}\n`;
  (r.aaroha || []).forEach(s => {
    const sw = SWARA_INFO[s];
    if (sw) txt += `${(sw.sym).padEnd(8)} → semitone ${sw.semi}\n`;
  });
  txt += `\nGenerated from Hindustani Ragas Explorer\n`;

  const blob = new Blob([txt], { type:'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Hindustani_Raga_${r.name.replace(/\s+/g,'_')}.txt`;
  a.click();
}

// ════════════════════════════════════════════════════════
// SPLITTER
// ════════════════════════════════════════════════════════
let drg = false, dsx, dsw;

function startDrag(e) {
  drg = true; dsx = e.clientX; dsw = document.getElementById('leftPane').offsetWidth;
  document.getElementById('spl').classList.add('drag');
  document.body.style.cssText += ';cursor:col-resize;user-select:none;';
  window.addEventListener('mousemove', onDrg);
  window.addEventListener('mouseup', endDrg);
}

function onDrg(e) {
  if (!drg) return;
  const w = Math.min(Math.max(dsw + e.clientX - dsx, 180), 520);
  document.getElementById('leftPane').style.width = w + 'px';
}

function endDrg() {
  drg = false;
  document.getElementById('spl').classList.remove('drag');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  window.removeEventListener('mousemove', onDrg);
  window.removeEventListener('mouseup', endDrg);
}
