<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - MCP Files</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .prose {
            --tw-prose-body: rgb(55 65 81);
            --tw-prose-headings: rgb(17 24 39);
            --tw-prose-lead: rgb(75 85 99);
            --tw-prose-links: rgb(59 130 246);
            --tw-prose-bold: rgb(17 24 39);
            --tw-prose-counters: rgb(107 114 128);
            --tw-prose-bullets: rgb(209 213 219);
            --tw-prose-hr: rgb(229 231 235);
            --tw-prose-quotes: rgb(55 65 81);
            --tw-prose-quote-borders: rgb(229 231 235);
            --tw-prose-captions: rgb(107 114 128);
            --tw-prose-kbd: rgb(17 24 39);
            --tw-prose-kbd-shadows: rgb(17 24 39);
            --tw-prose-code: rgb(59 130 246);
            --tw-prose-pre-bg: rgb(31 41 55);
            --tw-prose-pre-code: rgb(229 231 235);
        }

        .dark .prose {
            --tw-prose-body: rgb(229 231 235);
            --tw-prose-headings: rgb(243 244 246);
            --tw-prose-lead: rgb(209 213 219);
            --tw-prose-links: rgb(147 197 253);
            --tw-prose-bold: rgb(243 244 246);
            --tw-prose-counters: rgb(156 163 175);
            --tw-prose-bullets: rgb(75 85 99);
            --tw-prose-hr: rgb(55 65 81);
            --tw-prose-quotes: rgb(229 231 235);
            --tw-prose-quote-borders: rgb(75 85 99);
            --tw-prose-captions: rgb(156 163 175);
            --tw-prose-kbd: rgb(243 244 246);
            --tw-prose-kbd-shadows: rgb(17 24 39);
            --tw-prose-code: rgb(147 197 253);
            --tw-prose-pre-bg: rgb(17 24 39);
            --tw-prose-pre-code: rgb(209 213 219);
        }

        .prose h1, .prose h2, .prose h3 {
            margin: 0.5rem 0;
            font-weight: 600;
        }

        .prose p {
            margin: 0.25rem 0;
        }

        .prose code {
            background-color: var(--tw-prose-pre-bg);
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875em;
        }

        .prose pre {
            background-color: var(--tw-prose-pre-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-size: 0.875em;
            margin: 0.5rem 0;
        }

        .line-clamp-6 {
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Modal Animations */
        .modal-backdrop {
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal-content {
            animation: slideIn 0.4s ease-out;
        }

        .modal-backdrop.closing {
            animation: fadeOut 0.3s ease-in-out;
        }

        .modal-content.closing {
            animation: slideOut 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(100%);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 min-h-screen py-10 px-4 transition-colors duration-300">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 flex-wrap">
            <div class="text-center flex-1 min-w-96">
                <h1 class="text-4xl md:text-5xl font-bold text-white drop-shadow-lg mb-2">📚 Documentation Hub</h1>
                <p class="text-lg text-white/90">MCP Collection Files</p>
            </div>
            <button id="themeToggle" class="flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-3 rounded-full border-2 border-white/30 hover:border-white/50 transition-all cursor-pointer text-white font-semibold">
                <span id="themeIcon" class="text-xl">🌙</span>
                <span id="themeLabel">Dark</span>
            </button>
        </header>

        <!-- Cards Grid -->
        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

        <!-- Modal for viewing markdown -->
        <div id="modal" class="fixed inset-0 z-50 hidden">
            <!-- Backdrop -->
            <div id="modalBackdrop" class="modal-backdrop absolute inset-0 bg-black/50 dark:bg-black/70 cursor-pointer"></div>
            
            <!-- Modal Content -->
            <div id="modalContent" class="modal-content fixed right-0 top-0 bottom-0 w-full md:w-3/4 lg:w-2/3 xl:w-1/2 bg-white dark:bg-slate-900 shadow-2xl flex flex-col">
                <!-- Header -->
                <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-slate-700 bg-gradient-to-r from-indigo-500 to-purple-600 dark:from-indigo-600 dark:to-purple-700 text-white">
                    <h2 id="modalTitle" class="text-2xl font-bold">Document</h2>
                    <button id="modalClose" class="text-white hover:text-gray-200 dark:hover:text-gray-300 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Content -->
                <div id="modalBody" class="flex-1 overflow-y-auto p-8 prose dark:prose-invert prose-sm md:prose-base max-w-none">
                    <p class="text-center text-gray-500">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');
        const html = document.documentElement;

        // Initialize theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            html.classList.add('dark');
            themeIcon.textContent = '☀️';
            themeLabel.textContent = 'Light';
        }

        // Theme toggle handler
        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '🌙';
                themeLabel.textContent = 'Dark';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.textContent = '☀️';
                themeLabel.textContent = 'Light';
            }
        });

        // File descriptions
        const fileDescriptions = {
            'mcp-slides.md': 'Model Context Protocol (MCP) - Technical White Paper slides covering the protocol definition, core problems, industry adoption, architecture, and implementation details.',
            'mcp-slides.md.html': 'Pre-rendered HTML version of the MCP slides markdown document. Ready-to-view in any browser without additional processing.',
            'mcp.html': 'MCP Protocol documentation and reference guide. Contains detailed specifications and developer information about the Model Context Protocol.',
            'mn-mplusn.html': 'Mathematical reference document covering M+N integration patterns and protocol design principles used in MCP architecture.',
            'slm-arch.html': 'Small Language Model — SLM'
        };

        const files = [
            { name: 'mcp-slides.md', type: 'markdown', isMarkdown: true },
            { name: 'mcp-slides.md.html', type: 'html', isMarkdown: false },
            { name: 'mcp.html', type: 'html', isMarkdown: false },
            { name: 'mn-mplusn.html', type: 'html', isMarkdown: false },
            { name: 'slm-arch.html', type: 'html', isMarkdown: false }
        ];

        const fileTypeIcons = {
            markdown: '📝',
            html: '🌐'
        };

        async function loadAndRenderFiles() {
            const contentDiv = document.getElementById('content');
            let html = '';

            for (const file of files) {
                try {
                    if (file.isMarkdown) {
                        // Load and render markdown file
                        const response = await fetch(file.name);
                        if (!response.ok) throw new Error(`Failed to load ${file.name}`);
                        const markdown = await response.text();
                        const htmlContent = marked.parse(markdown);

                        html += createCard(
                            file.name,
                            file.type,
                            htmlContent,
                            fileDescriptions[file.name],
                            true
                        );
                    } else {
                        // For HTML files, just create a card with link
                        html += createCard(file.name, file.type, null, fileDescriptions[file.name], false);
                    }
                } catch (error) {
                    console.error(`Error loading ${file.name}:`, error);
                    html += createCard(file.name, file.type, null, `Error loading file: ${error.message}`, false);
                }
            }

            contentDiv.innerHTML = html;

            // Add event listeners for view buttons
            document.querySelectorAll('.btn-view').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const filename = btn.dataset.file;
                    const isMarkdown = btn.dataset.isMarkdown === 'true';
                    
                    if (isMarkdown) {
                        openModal(filename);
                    } else {
                        window.open(filename, '_blank');
                    }
                });
            });
        }

        // Modal functions
        function openModal(filename) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');

            modalTitle.textContent = filename;
            modalBody.innerHTML = '<p class="text-center text-gray-500">Loading...</p>';
            modal.classList.remove('hidden');

            // Load and display markdown content
            fetch(filename)
                .then(response => {
                    if (!response.ok) throw new Error(`Failed to load ${filename}`);
                    return response.text();
                })
                .then(markdown => {
                    const htmlContent = marked.parse(markdown);
                    modalBody.innerHTML = htmlContent;
                })
                .catch(error => {
                    modalBody.innerHTML = `<p class="text-red-500">Error loading file: ${error.message}</p>`;
                });
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalBackdrop = document.getElementById('modalBackdrop');
            const modalContent = document.getElementById('modalContent');

            // Add closing animation
            modalBackdrop.classList.add('closing');
            modalContent.classList.add('closing');

            // Hide modal after animation completes
            setTimeout(() => {
                modal.classList.add('hidden');
                modalBackdrop.classList.remove('closing');
                modalContent.classList.remove('closing');
            }, 400);
        }

        function createCard(filename, type, fullContent, description, isMarkdown) {
            const icon = fileTypeIcons[type] || '📄';
            const badgeClass = type === 'markdown' 
                ? 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300' 
                : 'bg-amber-100 dark:bg-amber-900 text-amber-700 dark:text-amber-300';
            
            let bodyContent = '';
            if (isMarkdown && fullContent) {
                bodyContent = `
                    <p class="text-sm text-gray-600 dark:text-gray-400 italic mb-4 pb-4 border-b border-gray-200 dark:border-gray-700">
                        ${escapeHtml(description)}
                    </p>
                    <div class="prose dark:prose-invert prose-sm max-w-none mb-3 text-gray-800 dark:text-gray-200 line-clamp-6 overflow-hidden">
                        ${fullContent}
                    </div>
                `;
            } else {
                bodyContent = `
                    <p class="text-sm text-gray-600 dark:text-gray-400 italic">
                        ${escapeHtml(description || 'Click "View" to open this file')}
                    </p>
                `;
            }

            return `
                <div class="bg-white dark:bg-slate-800 rounded-lg shadow-lg hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 flex flex-col h-full">
                    <!-- Card Header -->
                    <div class="bg-gradient-to-r from-indigo-500 to-purple-600 dark:from-indigo-600 dark:to-purple-700 text-white p-5 flex items-center gap-3">
                        <span class="text-2xl">${icon}</span>
                        <span class="font-semibold text-base break-words">${escapeHtml(filename)}</span>
                    </div>
                    
                    <!-- Card Body -->
                    <div class="p-5 flex-grow overflow-y-auto max-h-96">
                        ${bodyContent}
                        <span class="inline-block px-3 py-1 rounded text-xs font-bold mt-3 ${badgeClass}">
                            ${type.toUpperCase()}
                        </span>
                    </div>
                    
                    <!-- Card Footer -->
                    <div class="p-4 bg-gray-50 dark:bg-slate-700 border-t border-gray-200 dark:border-slate-600 flex gap-2">
                        <button class="btn-view flex-1 bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-700 dark:hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded transition-colors text-center text-sm" data-file="${filename}" data-isMarkdown="${isMarkdown}">
                            View
                        </button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load and render files when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupPage);
        } else {
            setupPage();
        }

        function setupPage() {
            loadAndRenderFiles();

            // Setup modal close handlers
            const modal = document.getElementById('modal');
            const modalClose = document.getElementById('modalClose');
            const modalBackdrop = document.getElementById('modalBackdrop');

            if (modalClose) {
                modalClose.addEventListener('click', closeModal);
            }
            if (modalBackdrop) {
                modalBackdrop.addEventListener('click', closeModal);
            }

            // Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            });
        }
    </script>
</body>
</html>
