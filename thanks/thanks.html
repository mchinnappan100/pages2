<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colorful Thank You Word Cloud</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- D3 + Word Cloud -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/d3-cloud/build/d3.layout.cloud.js"></script>
  <link rel="icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

  <!-- Card Container -->
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-[950px] h-[500px]">
    <div id="cloud" class="w-full h-full"></div>
  </div>

  <script>
    const words = [
      { text: "நன்றி",size: 40 },
      { text: "Thank You", size: 80 },
      { text: "gracias", size: 55 },
      { text: "merci", size: 50 },
      { text: "danke", size: 52 },
      { text: "grazie", size: 48 },
      { text: "谢谢", size: 46 },
      { text: "ありがとう", size: 44 },
      { text: "감사합니다", size: 40 },
      { text: "спасибо", size: 42 },
      { text: "obrigado", size: 44 },
      { text: "धन्यवाद", size: 40 },
      { text: "شكراً", size: 42 },
      { text: "asante", size: 32 },
      { text: "terima kasih", size: 34 },
      { text: "salamat", size: 30 },
      { text: "dziękuję", size: 32 },
      { text: "tack", size: 26 },
      { text: "ngiyabonga", size: 30 },
      { text: "teşekkür ederim", size: 36 },
      { text: "kiitos", size: 26 },
      { text: "grazie mille", size: 34 },
      { text: "muchas gracias", size: 38 },
      { text: "arigato", size: 32 },
      { text: "shukran", size: 30 },
      { text: "mahalo", size: 28 }
    ];

    const colors = [
      "#ef4444", "#22c55e", "#3b82f6", "#eab308",
      "#a855f7", "#ec4899", "#14b8a6", "#f97316"
    ];

    const width = 900;
    const height = 460;

    const svg = d3.select("#cloud")
      .append("svg")
      .attr("width", width)
      .attr("height", height);

    const group = svg.append("g")
      .attr("transform", `translate(${width / 2}, ${height / 2})`);

    function draw(words) {
      group.selectAll("text")
        .data(words)
        .enter()
        .append("text")
        .style("font-size", d => d.size + "px")
        .style("fill", () => colors[Math.floor(Math.random() * colors.length)])
        .style("font-family", "sans-serif")
        .style("font-weight", "700")
        .attr("text-anchor", "middle")
        .attr("transform", d => `translate(${d.x}, ${d.y}) rotate(${d.rotate})`)
        .text(d => d.text);
    }

    d3.layout.cloud()
      .size([width, height])
      .words(words.map(d => ({ ...d })))
      .padding(4)
      .rotate(() => (Math.random() > 0.7 ? 90 : 0))
      .font("sans-serif")
      .fontSize(d => d.size)
      .on("end", draw)
      .start();
  </script>

</body>
</html>
