    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {

            </div>
            <button id="theme-toggle" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 dark:bg-gray-700 dark:hover:bg-gray-600 transition">
                Toggle Dark Mode
            </button>
        </div>
        <div class="max-w-3xl mx-auto px-4 pb-4">
            <input id="search" type="text" placeholder="Search name or description (sf-, bulk, viewer, metadata...)"
                   class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary">
        </div>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards generated below via JS from JSON data -->

    <footer class="text-center py-6 text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-800">

            html.classList.add('dark');
            toggle.textContent = 'Toggle Light Mode';
        }
        toggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';

        // Render cards
        const grid = document.getElementById('grid');
        packages.forEach(pkg => {
            const card = document.createElement('div');
            card.className = 'package-card bg-white dark:bg-gray-800 rounded-xl shadow-md p-5 border border-gray-200 dark:border-gray-700 hover:shadow-lg transition-shadow';
            card.innerHTML = `
                <h2 class="text-lg font-bold text-primary mb-1">${pkg.name}</h2>
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">v${pkg.version} • ${pkg.date}</p>
                <p class="text-sm mb-3 line-clamp-3">${pkg.desc}</p>
                <span class="inline-block text-xs font-medium px-2.5 py-1 rounded-full ${pkg.name.includes('sf-') || pkg.name.includes('salesforce') ? 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300' : 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300'}">
                    ${pkg.name.includes('sf-') || pkg.name.includes('salesforce') ? 'Salesforce Core' : 'Supporting Tool'}
                </span>
            `;
            grid.appendChild(card);
        });

        // Live search
        const search = document.getElementById('search');
        search.addEventListener('input', e => {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.package-card').forEach(card => {
                const title = card.querySelector('h2').textContent.toLowerCase();
                const desc = card.querySelector('p.mb-3').textContent.toLowerCase();
                card.style.display = (title.includes(term) || desc.includes(term)) ? '' : 'none';
            });
        });
