
<!DOCTYPE html>
<html lang="en" data-theme="midnight">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPM Packages Explorer</title>
    <link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Reveal.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.0/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.0/theme/black.min.css" id="reveal-theme">

    <style>
        /* ───── CSS Variables / Themes ───── */
        :root {
            --radius: 16px;
            --radius-sm: 8px;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Instrument Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* MIDNIGHT — dark electric blue */
        [data-theme="midnight"] {
            --bg: #08090f;
            --bg2: #0f1117;
            --bg3: #161924;
            --border: #1e2333;
            --border-hover: #3b82f6;
            --text: #e8eaf6;
            --text-muted: #7b82a8;
            --text-dim: #3d4463;
            --accent: #3b82f6;
            --accent2: #818cf8;
            --accent-glow: rgba(59,130,246,0.25);
            --tag-sf: rgba(16,185,129,0.15);
            --tag-sf-text: #34d399;
            --tag-util: rgba(59,130,246,0.15);
            --tag-util-text: #60a5fa;
            --downloads-color: #f59e0b;
            --header-blur: rgba(8,9,15,0.85);
            --gradient: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
            --card-shine: rgba(255,255,255,0.03);
        }

        /* AURORA — deep green / teal dark */
        [data-theme="aurora"] {
            --bg: #060d0b;
            --bg2: #0b1510;
            --bg3: #0f1e18;
            --border: #1a2e24;
            --border-hover: #10b981;
            --text: #d1fae5;
            --text-muted: #6b9e85;
            --text-dim: #2d4a3c;
            --accent: #10b981;
            --accent2: #34d399;
            --accent-glow: rgba(16,185,129,0.25);
            --tag-sf: rgba(16,185,129,0.15);
            --tag-sf-text: #6ee7b7;
            --tag-util: rgba(56,189,248,0.15);
            --tag-util-text: #7dd3fc;
            --downloads-color: #fbbf24;
            --header-blur: rgba(6,13,11,0.9);
            --gradient: linear-gradient(135deg, #064e3b 0%, #0c4a6e 100%);
            --card-shine: rgba(255,255,255,0.03);
        }

        /* SOLAR — warm amber / dark brown */
        [data-theme="solar"] {
            --bg: #0e0a00;
            --bg2: #160f00;
            --bg3: #1f1600;
            --border: #2e2000;
            --border-hover: #f59e0b;
            --text: #fef3c7;
            --text-muted: #a37b30;
            --text-dim: #4a3800;
            --accent: #f59e0b;
            --accent2: #fbbf24;
            --accent-glow: rgba(245,158,11,0.25);
            --tag-sf: rgba(245,158,11,0.15);
            --tag-sf-text: #fcd34d;
            --tag-util: rgba(251,191,36,0.15);
            --tag-util-text: #fde68a;
            --downloads-color: #f87171;
            --header-blur: rgba(14,10,0,0.9);
            --gradient: linear-gradient(135deg, #78350f 0%, #92400e 100%);
            --card-shine: rgba(255,255,255,0.04);
        }

        /* SAKURA — soft light pastel */
        [data-theme="sakura"] {
            --bg: #fdf4f8;
            --bg2: #fff0f6;
            --bg3: #fff;
            --border: #f3d0e0;
            --border-hover: #ec4899;
            --text: #2d1b26;
            --text-muted: #9f6880;
            --text-dim: #d4a8be;
            --accent: #ec4899;
            --accent2: #f472b6;
            --accent-glow: rgba(236,72,153,0.15);
            --tag-sf: rgba(236,72,153,0.12);
            --tag-sf-text: #be185d;
            --tag-util: rgba(139,92,246,0.12);
            --tag-util-text: #7c3aed;
            --downloads-color: #f97316;
            --header-blur: rgba(253,244,248,0.9);
            --gradient: linear-gradient(135deg, #fce7f3 0%, #ede9fe 100%);
            --card-shine: rgba(255,255,255,0.6);
        }

        /* OBSIDIAN — near-black high-contrast */
        [data-theme="obsidian"] {
            --bg: #0a0a0a;
            --bg2: #111;
            --bg3: #161616;
            --border: #222;
            --border-hover: #fff;
            --text: #f5f5f5;
            --text-muted: #777;
            --text-dim: #333;
            --accent: #fff;
            --accent2: #ccc;
            --accent-glow: rgba(255,255,255,0.1);
            --tag-sf: rgba(255,255,255,0.08);
            --tag-sf-text: #ddd;
            --tag-util: rgba(255,255,255,0.05);
            --tag-util-text: #aaa;
            --downloads-color: #f87171;
            --header-blur: rgba(10,10,10,0.92);
            --gradient: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
            --card-shine: rgba(255,255,255,0.025);
        }

        /* ───── Reset & Base ───── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        /* Ambient background blob */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: var(--accent-glow);
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            transition: background var(--transition);
        }

        /* ───── Header ───── */
        header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--header-blur);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-brand { flex: 1; min-width: 200px; }

        #page-title {
            font-family: var(--font-display);
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.02em;
            line-height: 1;
        }

        #subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: var(--font-mono);
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Theme switcher */
        .theme-switcher {
            display: flex;
            gap: 4px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px;
        }

        .theme-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .theme-dot:hover { transform: scale(1.2); }
        .theme-dot.active { border-color: var(--text); }
        .theme-dot[data-t="midnight"] { background: linear-gradient(135deg, #0f1117, #3b82f6); }
        .theme-dot[data-t="aurora"]   { background: linear-gradient(135deg, #060d0b, #10b981); }
        .theme-dot[data-t="solar"]    { background: linear-gradient(135deg, #0e0a00, #f59e0b); }
        .theme-dot[data-t="sakura"]   { background: linear-gradient(135deg, #fce7f3, #ec4899); }
        .theme-dot[data-t="obsidian"] { background: linear-gradient(135deg, #0a0a0a, #444); }

        .btn {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.82rem;
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition), color var(--transition);
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--bg3);
            border-color: var(--border-hover);
            color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent2);
            border-color: var(--accent2);
            color: #000;
        }

        /* Search bar */
        .search-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 24px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #search {
            flex: 1;
            padding: 10px 18px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        #search::placeholder { color: var(--text-muted); }

        #search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #sort-select {
            padding: 10px 14px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
        }

        /* ───── Main ───── */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 24px 60px;
            position: relative;
            z-index: 1;
        }

        /* Stats bar */
        #stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            padding: 12px 18px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        #stats {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .view-toggle {
            display: flex;
            gap: 4px;
        }

        .view-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all var(--transition);
        }

        .view-btn.active, .view-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* ───── Grid ───── */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
        }

        #grid.list-view {
            grid-template-columns: 1fr;
        }

        /* ───── Cards ───── */
        .package-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
        }

        .package-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--card-shine);
            border-radius: inherit;
            pointer-events: none;
        }

        .package-card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 0 0 1px var(--border-hover), 0 12px 40px rgba(0,0,0,0.25);
            transform: translateY(-2px);
        }

        /* Card shimmer line at top */
        .card-topbar {
            height: 3px;
            border-radius: 3px 3px 0 0;
            background: var(--gradient);
            position: absolute;
            top: 0; left: 0; right: 0;
        }

        /* Card header */
        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .card-name {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.01em;
            line-height: 1.2;
            word-break: break-all;
            flex: 1;
        }

        .card-scope {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-muted);
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 2px 7px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Meta row */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .meta-chip {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .meta-chip .dot {
            display: inline-block;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        /* Description */
        .card-desc {
            font-size: 0.84rem;
            line-height: 1.6;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            margin-bottom: 16px;
        }

        /* Keywords */
        .card-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 14px;
        }

        .kw-tag {
            font-size: 0.68rem;
            font-family: var(--font-mono);
            color: var(--text-dim);
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 4px;
            transition: color var(--transition), border-color var(--transition);
        }

        .kw-tag:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Stats row */
        .card-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.62rem;
            font-family: var(--font-mono);
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 0.85rem;
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--text);
        }

        .stat-value.downloads { color: var(--downloads-color); }

        /* Footer row */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-top: auto;
        }

        .pkg-tag {
            font-size: 0.7rem;
            font-family: var(--font-mono);
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            letter-spacing: 0.04em;
        }

        .pkg-tag.salesforce {
            background: var(--tag-sf);
            color: var(--tag-sf-text);
        }

        .pkg-tag.utility {
            background: var(--tag-util);
            color: var(--tag-util-text);
        }

        .card-links {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            transition: all var(--transition);
        }

        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .npm-btn {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: background var(--transition), opacity var(--transition);
            white-space: nowrap;
        }

        .npm-btn:hover { opacity: 0.85; }

        /* ───── Loading skeleton ───── */
        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position: 600px 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
            background-size: 600px 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        .skel-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 280px;
        }

        /* ───── Empty / Error ───── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            grid-column: 1/-1;
            font-size: 1rem;
        }

        /* ───── Slides overlay ───── */
        #slides-container {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #0a0a14;
        }

        #slides-container.open { display: block; }

        #close-slides {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 60;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.82rem;
            backdrop-filter: blur(10px);
        }

        .reveal section { text-align: left; padding: 0 80px; }
        .reveal h2 { color: #60a5fa; margin-bottom: 0.4em; }
        .reveal .pkg-tag-slide {
            display: inline-block;
            padding: 4px 12px;
            font-size: 0.75em;
            border-radius: 999px;
            margin-top: 1em;
        }
        .reveal .salesforce { background: rgba(16,185,129,0.2); color: #34d399; }
        .reveal .utility    { background: rgba(59,130,246,0.2);  color: #60a5fa; }
        .reveal a.npm-link-slide {
            display: inline-block;
            margin-top: 1.5em;
            padding: 0.6em 1.2em;
            background: #3b82f6;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        /* ───── Footer ───── */
        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            font-family: var(--font-mono);
            position: relative;
            z-index: 1;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ───── Fade in cards ───── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .package-card {
            animation: fadeUp 0.35s ease both;
        }

        /* ───── Responsive ───── */
        @media (max-width: 600px) {
            .header-inner { padding: 12px 16px; }
            .search-wrap { padding: 8px 16px 12px; }
            main { padding: 16px 16px 40px; }
            #grid { grid-template-columns: 1fr; }
        }

        /* Tooltip for theme dots */
        .theme-dot::after {
            content: attr(data-label);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            font-family: var(--font-mono);
            z-index: 100;
        }
        .theme-dot:hover::after { opacity: 1; }
    </style>
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="header-brand">
                <h1 id="page-title">NPM Explorer</h1>
                <p id="subtitle">Loading packages…</p>
            </div>
            <div class="header-controls">
                <!-- Theme dots -->
                <div class="theme-switcher" title="Switch theme">
                    <button class="theme-dot active" data-t="midnight" data-label="Midnight" onclick="setTheme('midnight')"></button>
                    <button class="theme-dot"        data-t="aurora"   data-label="Aurora"   onclick="setTheme('aurora')"></button>
                    <button class="theme-dot"        data-t="solar"    data-label="Solar"    onclick="setTheme('solar')"></button>
                    <button class="theme-dot"        data-t="sakura"   data-label="Sakura"   onclick="setTheme('sakura')"></button>
                    <button class="theme-dot"        data-t="obsidian" data-label="Obsidian" onclick="setTheme('obsidian')"></button>
                </div>
                <button class="btn btn-primary" id="slides-btn">▶ Slides</button>
            </div>
        </div>
        <div class="search-wrap">
            <input id="search" type="text" placeholder="🔍  Search packages…" autocomplete="off">
            <select id="sort-select">
                <option value="score">Sort: Relevance</option>
                <option value="name">Sort: Name</option>
                <option value="date">Sort: Date</option>
            </select>
        </div>
    </header>

    <main>
        <div id="stats-bar">
            <span id="stats">Loading…</span>
            <div class="view-toggle">
                <button class="view-btn active" id="grid-btn" title="Grid view">⊞ Grid</button>
                <button class="view-btn" id="list-btn" title="List view">☰ List</button>
            </div>
        </div>
        <div id="grid">
            <!-- Skeleton loaders -->
            ${Array(8).fill('<div class="skel-card"><div class="skeleton" style="height:14px;width:55%"></div><div class="skeleton" style="height:10px;width:35%"></div><div class="skeleton" style="height:10px;width:90%"></div><div class="skeleton" style="height:10px;width:75%"></div></div>').join('')}
        </div>
    </main>

    <!-- Slides overlay -->
    <div id="slides-container">
        <div class="reveal">
            <div class="slides" id="slides-content"></div>
        </div>
        <button id="close-slides">✕ Close</button>
    </div>

    <footer>
        <p>Data from <a href="https://registry.npmjs.org">registry.npmjs.org</a> ·
           <a id="profile-link" href="#">npm profile</a></p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.0/reveal.min.js"></script>
    <script>
        // ── Theme ──
        const themes = ['midnight','aurora','solar','sakura','obsidian'];
        let currentTheme = localStorage.getItem('npm-explorer-theme') || 'midnight';

        function setTheme(t) {
            currentTheme = t;
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('npm-explorer-theme', t);
            document.querySelectorAll('.theme-dot').forEach(d => {
                d.classList.toggle('active', d.dataset.t === t);
            });
        }
        setTheme(currentTheme);

        // ── URL params ──
        const params = new URLSearchParams(location.search);
        const username = params.get('u') || 'mohanchinnappan';
        document.getElementById('page-title').textContent = `${username}'s Packages`;
        document.getElementById('subtitle').textContent = `maintainer:${username}`;
        document.getElementById('profile-link').href = `https://www.npmjs.com/~${username}`;
        document.getElementById('profile-link').textContent = `${username} on npm`;

        // ── Data ──
        let allPackages = [];
        let displayedPackages = [];

        const API = `https://registry.npmjs.org/-/v1/search?text=maintainer:${username}&size=250`;

        // Format big numbers
        function fmt(n) {
            if (n == null || isNaN(n)) return '—';
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
            return n.toString();
        }

        function timeAgo(dateStr) {
            if (!dateStr) return '—';
            const diff = Date.now() - new Date(dateStr).getTime();
            const d = Math.floor(diff / 86400000);
            if (d < 1) return 'today';
            if (d < 30) return `${d}d ago`;
            const m = Math.floor(d/30);
            if (m < 12) return `${m}mo ago`;
            return `${Math.floor(m/12)}y ago`;
        }

        function buildCard(pkg, score, idx) {
            const dl = pkg.downloads?.weekly ?? null;
            const name = pkg.name || '';
            const version = pkg.version || '—';
            const desc = pkg.description || 'No description available.';
            const date = pkg.date;
            const kws = (pkg.keywords || []).slice(0, 5);
            const npmUrl = `https://www.npmjs.com/package/${name}`;
            const ghUrl = pkg.links?.repository;
            const isSF = name.includes('sf-') || name.includes('salesforce') || (kws.join(' ').includes('salesforce'));
            const tagLabel = isSF ? 'Salesforce' : 'Utility';
            const tagClass = isSF ? 'salesforce' : 'utility';
            const scoreVal = score ? Math.round(score.final * 100) : '—';
            const maintCount = (pkg.maintainers || []).length;

            // Scope badge
            const scopeParts = name.split('/');
            const scopeBadge = scopeParts.length > 1
                ? `<span class="card-scope">${scopeParts[0]}</span>` : '';

            // Keywords html
            const kwsHtml = kws.map(k => `<span class="kw-tag">${k}</span>`).join('');

            // Download badge color class
            const dlClass = dl != null ? 'downloads' : '';

            const card = document.createElement('div');
            card.className = 'package-card';
            card.style.animationDelay = `${Math.min(idx * 0.04, 0.5)}s`;
            card.dataset.name = name;
            card.dataset.desc = desc;
            card.dataset.date = date || '';

            card.innerHTML = `
                <div class="card-topbar"></div>
                <div class="card-header">
                    <span class="card-name">${name}</span>
                    ${scopeBadge}
                </div>
                <div class="card-meta">
                    <span class="meta-chip">v${version}</span>
                    <span class="meta-chip"><span class="dot"></span>${timeAgo(date)}</span>
                    ${maintCount > 1 ? `<span class="meta-chip"><span class="dot"></span>${maintCount} maintainers</span>` : ''}
                </div>
                <p class="card-desc">${desc}</p>
                ${kwsHtml ? `<div class="card-keywords">${kwsHtml}</div>` : ''}
                <div class="card-stats">
                    <div class="stat-item">
                        <div class="stat-label">Weekly ↓</div>
                        <div class="stat-value ${dlClass}">${fmt(dl)}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Score</div>
                        <div class="stat-value">${scoreVal}%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Published</div>
                        <div class="stat-value" style="font-size:0.68rem">${date ? new Date(date).toISOString().split('T')[0] : '—'}</div>
                    </div>
                </div>
                <div class="card-footer">
                    <span class="pkg-tag ${tagClass}">${tagLabel}</span>
                    <div class="card-links">
                        ${ghUrl ? `<a href="${ghUrl}" target="_blank" rel="noopener" class="icon-btn" title="Repository">⎈</a>` : ''}
                        <a href="https://bundlephobia.com/package/${name}" target="_blank" rel="noopener" class="icon-btn" title="Bundle size">⚖</a>
                        <a href="${npmUrl}" target="_blank" rel="noopener" class="npm-btn">npm →</a>
                    </div>
                </div>
            `;
            return card;
        }

        function renderGrid(packages) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            if (!packages.length) {
                grid.innerHTML = '<div class="empty-state">No packages found.</div>';
                return;
            }
            packages.forEach((obj, i) => {
                grid.appendChild(buildCard(obj.package, obj.score, i));
            });
        }

        function updateStats() {
            const visible = document.querySelectorAll('.package-card').length;
            document.getElementById('stats').textContent =
                `${visible} of ${allPackages.length} packages · ${new Date().toLocaleDateString()}`;
        }

        async function loadPackages() {
            try {
                const res = await fetch(API);
                if (!res.ok) throw new Error();
                const data = await res.json();
                allPackages = data.objects || [];
                displayedPackages = [...allPackages];
                renderGrid(displayedPackages);
                updateStats();
            } catch {
                document.getElementById('stats').textContent = 'Error loading packages.';
                document.getElementById('grid').innerHTML = '<div class="empty-state" style="color:#f87171">Failed to load data. Check network or username.</div>';
            }
        }

        // ── Search + Sort ──
        function filterAndSort() {
            const term = document.getElementById('search').value.toLowerCase().trim();
            const sortBy = document.getElementById('sort-select').value;

            let filtered = allPackages.filter(obj => {
                const p = obj.package;
                return (
                    p.name?.toLowerCase().includes(term) ||
                    p.description?.toLowerCase().includes(term) ||
                    (p.keywords || []).some(k => k.toLowerCase().includes(term))
                );
            });

            if (sortBy === 'name') {
                filtered.sort((a,b) => a.package.name.localeCompare(b.package.name));
            } else if (sortBy === 'date') {
                filtered.sort((a,b) => new Date(b.package.date) - new Date(a.package.date));
            }

            displayedPackages = filtered;
            renderGrid(displayedPackages);
            updateStats();
        }

        document.getElementById('search').addEventListener('input', filterAndSort);
        document.getElementById('sort-select').addEventListener('change', filterAndSort);

        // ── View toggle ──
        document.getElementById('grid-btn').addEventListener('click', () => {
            document.getElementById('grid').classList.remove('list-view');
            document.getElementById('grid-btn').classList.add('active');
            document.getElementById('list-btn').classList.remove('active');
        });
        document.getElementById('list-btn').addEventListener('click', () => {
            document.getElementById('grid').classList.add('list-view');
            document.getElementById('list-btn').classList.add('active');
            document.getElementById('grid-btn').classList.remove('active');
        });

        // ── Slides ──
        let revealInit = false;
        document.getElementById('slides-btn').addEventListener('click', () => {
            const sc = document.getElementById('slides-content');
            sc.innerHTML = '';

            // Title slide
            const title = document.createElement('section');
            title.innerHTML = `<h1>${username}'s NPM Packages</h1><p style="opacity:.6;margin-top:1em">${displayedPackages.length} packages · ${new Date().toLocaleDateString()}</p>`;
            sc.appendChild(title);

            displayedPackages.forEach(obj => {
                const p = obj.package;
                const isSF = p.name.includes('sf-') || p.name.includes('salesforce');
                const slide = document.createElement('section');
                slide.innerHTML = `
                    <h2>${p.name}</h2>
                    <p style="opacity:.6;font-size:.85em;margin-bottom:1em">v${p.version} · ${timeAgo(p.date)}</p>
                    <p style="font-size:1.1em;line-height:1.7;margin-bottom:1.5em">${p.description || 'No description.'}</p>
                    ${(p.keywords||[]).slice(0,5).map(k=>`<code style="background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:4px;margin:2px;font-size:.75em">${k}</code>`).join(' ')}
                    <br>
                    <span class="pkg-tag-slide ${isSF?'salesforce':'utility'}">${isSF?'Salesforce':'Utility'}</span>
                    <br>
                    <a href="https://www.npmjs.com/package/${p.name}" target="_blank" class="npm-link-slide">View on npm →</a>
                `;
                sc.appendChild(slide);
            });

            document.getElementById('slides-container').classList.add('open');
            if (!revealInit) {
                Reveal.initialize({ hash:false, transition:'slide', slideNumber:'c / t', controls:true, progress:true, center:true, width:'100%', height:'100%', margin:0.04 });
                revealInit = true;
            } else {
                Reveal.sync();
                Reveal.slide(0);
            }
        });

        document.getElementById('close-slides').addEventListener('click', () => {
            document.getElementById('slides-container').classList.remove('open');
        });

        // ── Boot ──
        loadPackages();
    </script>
</body>
</html>
