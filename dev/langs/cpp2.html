<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />
<title>Mastering C++ — Complete Guide</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<style>
:root {
  --bg:        #0d0e14;
  --bg2:       #12141d;
  --bg3:       #181a26;
  --panel:     #1c1f2e;
  --border:    rgba(255,255,255,0.07);
  --accent:    #00d4ff;
  --accent2:   #7c3aed;
  --accent3:   #f59e0b;
  --green:     #10b981;
  --red:       #ef4444;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #475569;
  --glow:      rgba(0,212,255,0.12);
  --glow2:     rgba(124,58,237,0.12);
  --r:         10px;
}

[data-theme="light"] {
  --bg: #f0f4f8; --bg2: #e8edf5; --bg3: #dde4ef;
  --panel: #ffffff; --border: rgba(0,0,0,0.08);
  --text: #1e293b; --text2: #475569; --text3: #94a3b8;
  --glow: rgba(0,212,255,0.08); --glow2: rgba(124,58,237,0.08);
}

[data-theme="amber"] {
  --bg: #0f0a00; --bg2: #1a1200; --bg3: #221800;
  --panel: #1f1600; --border: rgba(255,200,0,0.08);
  --accent: #f59e0b; --accent2: #ef4444;
  --text: #fef3c7; --text2: #d97706; --text3: #92400e;
  --glow: rgba(245,158,11,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

/* ── HEADER ── */
.header {
  height: 56px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 50;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  opacity: 0.6;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -1px;
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; }

.header-sep { flex: 1; }

.level-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg3);
  border-radius: 8px;
  padding: 4px;
  border: 1px solid var(--border);
}

.level-tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}

.level-tab:hover { color: var(--text2); }

.level-tab.active-basic    { background: var(--green);  color: #000; font-weight: 600; }
.level-tab.active-medium   { background: var(--accent3); color: #000; font-weight: 600; }
.level-tab.active-advanced { background: var(--accent2); color: #fff; font-weight: 600; }

.theme-btns {
  display: flex;
  gap: 6px;
}

.theme-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); transform: scale(1.15); }
.theme-btn.active { border-color: var(--accent); box-shadow: 0 0 6px var(--accent); }
.theme-btn[data-t="dark"]  { background: linear-gradient(135deg,#0d0e14 50%,#00d4ff 50%); }
.theme-btn[data-t="light"] { background: linear-gradient(135deg,#f0f4f8 50%,#7c3aed 50%); }
.theme-btn[data-t="amber"] { background: linear-gradient(135deg,#0f0a00 50%,#f59e0b 50%); }

.header-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.header-btn:hover { background: var(--accent); color: var(--bg); }

/* ── LAYOUT ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── LEFT SIDEBAR ── */
.sidebar {
  width: 280px;
  min-width: 180px;
  max-width: 420px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: background 0.3s;
}

.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}

.search-box {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 13px;
  pointer-events: none;
}

.search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 10px 8px 32px;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
.search-input::placeholder { color: var(--text3); }

.topic-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--text3) transparent;
}
.topic-list::-webkit-scrollbar { width: 4px; }
.topic-list::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 2px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 8px 6px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.15s;
  position: sticky;
  top: 0;
  background: var(--panel);
  z-index: 2;
  margin-top: 4px;
}
.section-header:hover { background: var(--bg3); }

.section-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-basic    { background: var(--green); }
.dot-medium   { background: var(--accent3); }
.dot-advanced { background: var(--accent2); }

.section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text2);
  flex: 1;
}

.section-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.section-arrow {
  font-size: 9px;
  color: var(--text3);
  transition: transform 0.2s;
}
.section-arrow.open { transform: rotate(90deg); }

.topic-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  margin: 1px 0;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.topic-item:hover { background: var(--bg3); border-color: var(--border); }
.topic-item.active { background: var(--glow); border-color: var(--accent); }

.topic-icon {
  font-size: 14px;
  flex-shrink: 0;
  width: 20px;
  text-align: center;
}

.topic-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.topic-item.active .topic-name { color: var(--accent); }

.topic-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  padding: 2px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}
.badge-basic    { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
.badge-medium   { background: rgba(245,158,11,0.15); color: var(--accent3); border: 1px solid rgba(245,158,11,0.3); }
.badge-advanced { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }

/* ── SPLITTER ── */
.splitter {
  width: 6px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.splitter:hover, .splitter.dragging { background: var(--glow); }
.splitter-line { width: 2px; height: 30px; background: var(--text3); border-radius: 1px; opacity: 0.5; }

/* ── CONTENT AREA ── */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* ── TABS ── */
.content-tabs {
  height: 40px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  padding: 0 20px;
  gap: 2px;
  flex-shrink: 0;
}

.content-tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 8px 16px;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}
.content-tab:hover { color: var(--text2); background: var(--bg3); }
.content-tab.active {
  background: var(--bg);
  border-color: var(--border);
  color: var(--accent);
  font-weight: 600;
}

/* ── SPLIT CONTENT/EDITOR ── */
.content-editor-split {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.lesson-pane {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  scrollbar-width: thin;
  scrollbar-color: var(--text3) transparent;
  min-width: 0;
}
.lesson-pane::-webkit-scrollbar { width: 4px; }
.lesson-pane::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 2px; }

/* ── EDITOR PANE ── */
.editor-panel {
  width: 520px;
  min-width: 300px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width 0.3s;
}

.editor-panel.collapsed { width: 0; min-width: 0; overflow: hidden; }

.editor-header {
  height: 40px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
}

.editor-dots {
  display: flex;
  gap: 5px;
}
.editor-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

.editor-filename {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  flex: 1;
}

.editor-actions {
  display: flex;
  gap: 6px;
}

.editor-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.editor-btn:hover { border-color: var(--accent); color: var(--accent); }
.editor-btn.run-btn { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }
.editor-btn.run-btn:hover { background: #0ea572; }

.monaco-container {
  flex: 1;
  min-height: 0;
}

.output-panel {
  height: 160px;
  min-height: 80px;
  background: #0a0c10;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.output-header {
  height: 30px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
}
.output-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.output-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
}
.output-indicator.running { background: var(--accent3); animation: blink 0.8s infinite; }
.output-indicator.success { background: var(--green); }
.output-indicator.error   { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.output-clear {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: color 0.2s;
}
.output-clear:hover { color: var(--red); }

.output-content {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: #a8c9a8;
  scrollbar-width: thin;
  scrollbar-color: var(--text3) transparent;
}
.output-content.has-error { color: #f87171; }
.output-content .line-prompt { color: var(--text3); }
.output-content .line-success { color: var(--green); }
.output-content .line-info { color: var(--accent); }
.output-content .line-warn { color: var(--accent3); }

/* ── LESSON CONTENT ── */
.lesson-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 20px;
  opacity: 0.35;
}

.lesson-empty-icon { font-size: 64px; }
.lesson-empty-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--text3);
  text-align: center;
}

/* Lesson typography */
.lesson-title {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.2;
}

.lesson-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.lesson-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 0.05em;
}

.lesson-divider {
  height: 1px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  opacity: 0.3;
  margin-bottom: 28px;
}

.lesson-section {
  margin-bottom: 28px;
}

.lesson-h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.lesson-h2::before {
  content: '';
  display: block;
  width: 4px; height: 20px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  border-radius: 2px;
  flex-shrink: 0;
}

.lesson-h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 8px;
  margin-top: 16px;
  letter-spacing: 0.03em;
}

.lesson-p {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text2);
  margin-bottom: 14px;
}

.lesson-ul {
  padding-left: 20px;
  margin-bottom: 14px;
}
.lesson-ul li {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text2);
  margin-bottom: 4px;
}
.lesson-ul li code, .lesson-p code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent);
  border: 1px solid var(--border);
}

/* Code block */
.code-block {
  margin: 18px 0;
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--border);
  background: #0d1117;
}

.code-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: #161b22;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.code-block-lang {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.code-block-actions {
  display: flex;
  gap: 6px;
}

.code-copy-btn, .code-edit-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #8b949e;
  cursor: pointer;
  transition: all 0.2s;
}
.code-copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.code-edit-btn:hover { border-color: var(--green); color: var(--green); }
.code-edit-btn { border-color: rgba(16,185,129,0.3); color: var(--green); }

.code-block pre {
  padding: 16px 18px;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  margin: 0;
}

/* Syntax highlight classes */
.kw  { color: #ff7b72; }   /* keywords */
.ty  { color: #79c0ff; }   /* types */
.fn  { color: #d2a8ff; }   /* functions */
.st  { color: #a5d6ff; }   /* strings */
.cm  { color: #8b949e; font-style:italic; }  /* comments */
.nm  { color: #79c0ff; }   /* numbers */
.pp  { color: #ffa657; }   /* preprocessor */
.op  { color: #ff7b72; }   /* operators */
.id  { color: #e6edf3; }   /* identifiers */
.lit { color: #a5d6ff; }   /* literals */

/* Compile box */
.compile-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 20px;
  margin: 16px 0;
}

.compile-box-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.compile-step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}

.compile-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  width: 20px; height: 20px;
  background: var(--accent2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  flex-shrink: 0;
  margin-top: 1px;
}

.compile-cmd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 14px;
  color: var(--green);
  flex: 1;
  overflow-x: auto;
  white-space: nowrap;
}

.compile-desc {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
  line-height: 1.5;
}

/* Info callout */
.callout {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--r);
  margin: 16px 0;
  border: 1px solid;
}
.callout-info  { background: rgba(0,212,255,0.06); border-color: rgba(0,212,255,0.2); }
.callout-warn  { background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.25); }
.callout-tip   { background: rgba(16,185,129,0.07); border-color: rgba(16,185,129,0.25); }
.callout-danger{ background: rgba(239,68,68,0.07); border-color: rgba(239,68,68,0.25); }

<p class="lesson-p">C++ is a powerful, high-performance, compiled programming language created by Bjarne Stroustrup in 1979 as an extension of C. It supports multiple programming paradigms — procedural, object-oriented, and generic — making it ideal for systems programming, game engines, embedded systems, and high-performance applications.</p>

<div class="lesson-h2">Fundamental Types</div>
<p class="lesson-p">C++ is a <em>statically typed</em> language — every variable must have a type known at compile time. The compiler uses the type to determine how much memory to allocate and what operations are valid.</p>

<div class="code-block">

<span class="ty">int</span> <span class="fn">main</span>() {

    return (a > b) ? a : b;

template<typename T, int SIZE = 10>

    T data[SIZE];
    int top = -1;

    void push(T val) {

    int  size()  const { return top + 1; }

#include <memory>
#include <vector>
using namespace std;

struct Resource {
    string name;
    Resource(const string& n) : name(n) {
        cout << "Acquired: " << name << "\n";
    }
    ~Resource() {
        cout << "Released: " << name << "\n";
    }
    void use() { cout << "Using: " << name << "\n"; }
};

void demonstrateUniquePtr() {
    cout << "\n--- unique_ptr (exclusive ownership) ---\n";
    auto res = make_unique<Resource>("FileHandle");
    res->use();
    // No delete needed! Released automatically when res goes out of scope.

    // Transfer ownership with std::move
    auto res2 = move(res);   // res is now null
    if (!res) cout << "res is null after move\n";
    res2->use();
}  // res2 destroyed here → ~Resource() called

void demonstrateSharedPtr() {
    cout << "\n--- shared_ptr (shared ownership) ---\n";
    shared_ptr<Resource> a = make_shared<Resource>("NetworkConn");
    {
        shared_ptr<Resource> b = a;  // ref count = 2
        cout << "use_count: " << a.use_count() << "\n"; // 2
        b->use();
    }  // b destroyed → ref count = 1
    cout << "use_count: " << a.use_count() << "\n"; // 1
}  // a destroyed → ref count = 0 → ~Resource()

int main() {
    demonstrateUniquePtr();
    demonstrateSharedPtr();
    return 0;
}`,

using namespace std;

// Default parameters — must be at the END

    double r = 1.0;
    for (int i = 0; i < exp; ++i) r *= base;
    return r;
}
// Overloading — same name, different parameter types
int    add(int a, int b)          { return a + b; }
double add(double a, double b)    { return a + b; }
string add(string a, string b)    { return a + b; }

// Pass by reference — modifies the original
void  increment(int& x)           { ++x; }
// Pass by const ref — no copy, read-only
void  printStr(const string& s)   { cout << s << "\\n"; }

// Recursive function
int   factorial(int n) {
    return (n <= 1) ? 1 : n * factorial(n - 1);
}

int main() {
    cout << power(3)     << "\\n";  // 9   (default exp=2)
    cout << power(3, 3)  << "\\n";  // 27
    cout << add(1, 2)           << "\\n";  // int overload
    cout << add(1.5, 2.5)       << "\\n";  // double overload
    cout << add(string("foo"), string("bar")) << "\\n";
    int x = 10; increment(x); cout << x << "\\n";  // 11

class Shape {

    virtual ~Shape() = default;           // ALWAYS virtual in base!
    virtual double area()  const = 0;     // pure virtual
    virtual string name()  const = 0;
    void describe() const {               // non-virtual: same for all
        cout << name() << " [" << color << "] area=" << area() << "\\n";
    }
};

class Circle : public Shape {
    double r;
public:
    Circle(double r, const string& c="red") : Shape(c), r(r) {}
    double area()  const override { return 3.14159*r*r; }
    string name()  const override { return "Circle"; }
};

class Rectangle : public Shape {
    double w, h;
public:
    Rectangle(double w, double h, const string& c="blue") : Shape(c), w(w), h(h) {}
    double area()  const override { return w*h; }
    string name()  const override { return "Rectangle"; }
};

int main() {
    vector<unique_ptr<Shape>> shapes;
    shapes.push_back(make_unique<Circle>(5.0, "red"));
    shapes.push_back(make_unique<Rectangle>(4.0, 6.0, "blue"));
    shapes.push_back(make_unique<Circle>(3.0, "green"));

using namespace std;

// Custom exception — inherit from std::exception hierarchy
class AppError : public runtime_error {
    int code_;
public:
    AppError(const string& msg, int code)
        : runtime_error(msg), code_(code) {}
    int code() const { return code_; }
};

double divide(double a, double b) {
    if (b == 0.0) throw invalid_argument("Division by zero");
    return a / b;
}

int main() {
    // Basic try-catch
    try {
        cout << divide(10, 3)  << "\\n";  // 3.333
        cout << divide(10, 0)  << "\\n";  // throws!
    } catch (const invalid_argument& e) {
        cerr << "Invalid: " << e.what() << "\\n";
    }

    // Catch hierarchy — specific before general
    try {
        throw AppError("DB connection failed", 503);
    }
    catch (const AppError& e)      { cerr << "[" << e.code() << "] " << e.what() << "\\n"; }
    catch (const runtime_error& e) { cerr << "Runtime: " << e.what() << "\\n"; }
    catch (const exception& e)     { cerr << "Std: " << e.what() << "\\n"; }
    catch (...)                    { cerr << "Unknown!\\n"; }

    // noexcept — promise not to throw (enables optimizer)
    auto safe = []() noexcept { return 42; };
    cout << safe() << "\\n";
    return 0;
}`,

  code: `#include <iostream>
#include <string>
#include <utility>
#include <vector>
using namespace std;

class Buffer {
    int*   data;
    size_t size_;
public:
    Buffer(size_t n) : data(new int[n]()), size_(n) {
        cout << "Constructed(n=" << n << ")\\n";
    }
    ~Buffer() { delete[] data; cout << "Destroyed\\n"; }
    Buffer(const Buffer& o)        // Copy — expensive O(n)
        : data(new int[o.size_]), size_(o.size_) {
        copy(o.data, o.data+size_, data);
        cout << "Copied (expensive!)\\n";
    }
    Buffer(Buffer&& o) noexcept    // Move — O(1) steal!
        : data(o.data), size_(o.size_) {
        o.data = nullptr; o.size_ = 0;
        cout << "Moved (cheap!)\\n";
    }
    size_t size() const { return size_; }
};

int main() {
    Buffer a(1000000);

    Buffer b = a;            // COPY (a still valid)
    Buffer c = move(a);      // MOVE (a is now empty!)
    cout << "a=" << a.size() << " b=" << b.size() << " c=" << c.size() << "\\n";

    // std::move on string
    string s1 = "hello world";
    string s2 = move(s1);   // steal s1's buffer in O(1)
    cout << "s2='" << s2 << "' s1='" << s1 << "'\\n";  // s1 is now empty
    return 0;
}`,
  content: () => `
<div class="lesson-h2">The Problem Move Semantics Solves</div>
<p class="lesson-p">Before C++11, returning a large object from a function or inserting it into a container required an expensive deep copy. Move semantics let you <em>transfer ownership</em> of heap resources in O(1) time — "stealing" the internal pointer instead of copying all the data.</p>

<div class="callout callout-info">
  <div class="callout-icon">🧠</div>
  <div class="callout-body">
    <div class="callout-title">lvalue vs rvalue</div>
    <div class="callout-text"><strong>lvalue</strong>: has a name and persists — <code>int x = 5</code>. <strong>rvalue</strong>: temporary, about to be destroyed — <code>42</code>, <code>x+y</code>, or a function return. Move is safe from rvalues: we're stealing from something that's about to die anyway.</div>
  </div>
</div>

    for (int i = 0; i < n; ++i) ++counter;  // atomic — no mutex needed
    lock_guard<mutex> lk(print_mtx);         // protect cout
    cout << "Thread " << id << " done, counter=" << counter << "\\n";

    for (long long i = a; i < b; ++i) s += i;

    for (int i = 0; i < 4; ++i)

  code: `#include <iostream>
#include <string>
#include <type_traits>
using namespace std;

// CRTP: static polymorphism — no vtable, no runtime overhead
template<typename Derived>
class Printable {
public:
    void print()   const { static_cast<const Derived*>(this)->printImpl(); }
    void println() const { print(); cout << "\\n"; }
};

class Circle : public Printable<Circle> {
    double r;
public:
    Circle(double r) : r(r) {}
    void printImpl() const { cout << "Circle(r=" << r << ")"; }
};

class Square : public Printable<Square> {
    double s;
public:
    Square(double s) : s(s) {}
    void printImpl() const { cout << "Square(s=" << s << ")"; }
};

// CRTP: per-type instance counter
template<typename T>
class Counter {
    static inline int count = 0;
public:
    Counter()  { ++count; }
    ~Counter() { --count; }
    static int getCount() { return count; }
};

class Widget : public Counter<Widget> {};
class Gadget : public Counter<Gadget> {};

// TMP: Fibonacci at compile time via template specialization
template<int N> struct Fib {
    static constexpr int value = Fib<N-1>::value + Fib<N-2>::value;
};
template<> struct Fib<0> { static constexpr int value = 0; };
template<> struct Fib<1> { static constexpr int value = 1; };

int main() {
    Circle c(5.0); Square s(3.0);
    c.println(); s.println();

    { Widget w1, w2; Gadget g1; }   // create and destroy
    Widget w; Gadget g1, g2;
    cout << "Widgets: " << Widget::getCount() << "\\n";  // 1
    cout << "Gadgets: " << Gadget::getCount() << "\\n";  // 2

    cout << "Fib<10>=" << Fib<10>::value << "\\n";  // 55
    cout << "Fib<20>=" << Fib<20>::value << "\\n";  // 6765
    return 0;
}`,
  content: () => `
<div class="lesson-h2">CRTP — Curiously Recurring Template Pattern</div>
<p class="lesson-p">CRTP is an idiom where a class <code>Derived</code> inherits from a template base instantiated with <code>Derived</code> itself. This enables <em>static polymorphism</em> — all dispatch is resolved at compile time with zero vtable overhead.</p>

<div class="code-block">
  <div class="code-block-header"><span class="code-block-lang">C++ — CRTP Pattern</span>
    <div class="code-block-actions">

      <button class="code-copy-btn" onclick="copyCodeBlock(this)">⎘ Copy</button>
    </div>
  </div>
  <pre><span class="kw">template</span><span class="op">&lt;</span><span class="kw">typename</span> Derived<span class="op">&gt;</span>
<span class="kw">class</span> <span class="ty">Base</span> {
<span class="kw">public</span>:
    <span class="ty">void</span> <span class="fn">interface</span>() {
        static_cast<span class="op">&lt;</span>Derived<span class="op">*&gt;</span>(<span class="kw">this</span>)<span class="op">-&gt;</span><span class="fn">implementation</span>(); <span class="cm">// static dispatch!</span>
    }
};
<span class="kw">class</span> <span class="ty">ConcreteA</span> : <span class="kw">public</span> <span class="ty">Base</span><span class="op">&lt;</span><span class="ty">ConcreteA</span><span class="op">&gt;</span> {  <span class="cm">// ← "Curiously Recurring"</span>
<span class="kw">public</span>:
    <span class="ty">void</span> <span class="fn">implementation</span>() { cout <span class="op">&lt;&lt;</span> <span class="st">"ConcreteA\n"</span>; }
};
<span class="cm">// No virtual keyword. No vtable. Dispatch decided at compile time.</span></pre>
</div>

<div class="lesson-h2">Template Metaprogramming</div>
<p class="lesson-p">TMP exploits template instantiation as compile-time computation. Largely superseded by <code>constexpr</code> in modern C++, but still seen in library code and legacy systems.</p>

<div class="code-block">

<span class="kw">template</span><span class="op">&lt;</span><span class="ty">int</span> N<span class="op">&gt;</span> <span class="kw">struct</span> <span class="ty">Fib</span> {

};

<span class="kw">template</span><span class="op">&lt;&gt;</span> <span class="kw">struct</span> <span class="ty">Fib</span><span class="op">&lt;</span><span class="nm">0</span><span class="op">&gt;</span> { <span class="kw">static constexpr</span> <span class="ty">int</span> value = <span class="nm">0</span>; };
<span class="kw">template</span><span class="op">&lt;&gt;</span> <span class="kw">struct</span> <span class="ty">Fib</span><span class="op">&lt;</span><span class="nm">1</span><span class="op">&gt;</span> { <span class="kw">static constexpr</span> <span class="ty">int</span> value = <span class="nm">1</span>; };

    cout << "\nBitwise (10=0b1010, 3=0b0011):\n";
    cout << "AND=" << (a&b) << " OR=" << (a|b)
         << " XOR=" << (a^b) << " <<1=" << (a<<1) << "\n";
    bool p=true,q=false;

`<div class="lesson-h2">Arithmetic Operators</div>
<p class="lesson-p">C++ integer division <strong>truncates</strong> toward zero — <code>10/3 == 3</code>. For a floating-point result, cast one operand to <code>double</code> or use a float literal like <code>10.0</code>.</p>

<pre><span class="ty">int</span> a=<span class="nm">10</span>, b=<span class="nm">3</span>;

<span class="cm">// Increment: pre vs post</span>

<div class="lesson-h2">Comparison & Logical Operators</div>
<div class="code-block"><div class="code-block-header"><span class="code-block-lang">C++ — Comparison & Logic</span><div class="code-block-actions"><button class="code-copy-btn" onclick="copyCodeBlock(this)">⎘ Copy</button></div></div>
<pre><span class="cm">// Comparison — return bool (true=1, false=0)</span>
a<span class="op">==</span>b  a<span class="op">!=</span>b  a<span class="op">&lt;</span>b  a<span class="op">&gt;</span>b  a<span class="op">&lt;=</span>b  a<span class="op">&gt;=</span>b
<span class="cm">// Logical — short-circuit: right side skipped if result known</span>
(a<span class="op">&gt;</span><span class="nm">5</span>) <span class="op">&amp;&amp;</span> (b<span class="op">&lt;</span><span class="nm">5</span>)  <span class="cm">// AND: both must be true</span>
(a<span class="op">&gt;</span><span class="nm">5</span>) <span class="op">||</span> (b<span class="op">&gt;</span><span class="nm">5</span>)  <span class="cm">// OR:  at least one true</span>
<span class="op">!</span>flag           <span class="cm">// NOT: flip bool</span>
<span class="cm">// C++20: three-way / spaceship operator</span>
<span class="kw">auto</span> cmp = a <span class="op">&lt;=&gt;</span> b;  <span class="cm">// negative / zero / positive</span></pre></div>
<div class="lesson-h2">Bitwise Operators</div>
<div class="code-block"><div class="code-block-header"><span class="code-block-lang">C++ — Bitwise</span><div class="code-block-actions"><button class="code-copy-btn" onclick="copyCodeBlock(this)">⎘ Copy</button></div></div>
<pre><span class="cm">// 10 = 0b1010   3 = 0b0011</span>
<span class="nm">10</span> <span class="op">&amp;</span>  <span class="nm">3</span>  <span class="cm">// 2  = 0b0010  AND</span>
<span class="nm">10</span> <span class="op">|</span>  <span class="nm">3</span>  <span class="cm">// 11 = 0b1011  OR</span>

<span class="nm">10</span> <span class="op">&gt;&gt;</span> <span class="nm">1</span>  <span class="cm">// 5  = ÷2     right shift</span>

`<div class="lesson-h2">if / else if / else</div>

void swap(int& a, int& b){ int t=a; a=b; b=t; }
int& maxOf(vector<int>& v){

    return *m;
}
int main(){

    int a=10,b=20; swap(a,b);

    return 0;
}`,

}

<span class="kw">catch</span>(<span class="kw">const</span> std::runtime_error<span class="op">&amp;</span> e)   { cerr<span class="op">&lt;&lt;</span>e.<span class="fn">what</span>(); }

makeFull('move','Move Semantics','advanced',
`#include <iostream>
#include <string>
#include <utility>
#include <vector>
using namespace std;
class Buffer{
    int* data; size_t size_;
public:
    Buffer(size_t n):data(new int[n]()),size_(n){
        cout<<"Constructed(n="<<n<<")\n";
    }
    ~Buffer(){delete[] data; cout<<"Destroyed\n";}
    Buffer(const Buffer& o):data(new int[o.size_]),size_(o.size_){
        copy(o.data,o.data+size_,data); cout<<"Copied(slow!)\n";
    }
    Buffer(Buffer&& o)noexcept:data(o.data),size_(o.size_){
        o.data=nullptr; o.size_=0; cout<<"Moved(fast!)\n";
    }
    size_t size()const{return size_;}
};
int main(){
    Buffer a(1000000);
    Buffer b=a;           // COPY  — expensive
    Buffer c=move(a);     // MOVE  — O(1), a is now empty!
    cout<<"a.size="<<a.size()<<" c.size="<<c.size()<<"\n";
    string s1="hello world";
    string s2=move(s1);   // steal s1's internal buffer
    cout<<"s2='"<<s2<<"' s1='"<<s1<<"'\n";
    return 0;
}`,
`<div class="lesson-h2">Why Move Semantics Exist</div>
<p class="lesson-p">Before C++11, returning a vector from a function meant copying every element — O(n). Move semantics let you <em>steal</em> the internal buffer in O(1) by transferring ownership of heap memory from a temporary that's about to be destroyed anyway.</p>
<div class="callout callout-info"><div class="callout-icon">🧠</div><div class="callout-body"><div class="callout-title">lvalue vs rvalue</div><div class="callout-text"><strong>lvalue</strong>: has a name, persists beyond the expression (e.g. <code>int x</code>). <strong>rvalue</strong>: temporary, about to be destroyed (e.g. <code>42</code>, function return). It's only safe to steal resources from rvalues.</div></div></div>
<div class="code-block"><div class="code-block-header"><span class="code-block-lang">C++ — std::move</span><div class="code-block-actions"><button class="code-edit-btn" onclick="loadCodeToEditor(0)">⊞ Editor</button><button class="code-copy-btn" onclick="copyCodeBlock(this)">⎘ Copy</button></div></div>
<pre>string s1=<span class="st">"hello"</span>;
string s2=std::<span class="fn">move</span>(s1);  <span class="cm">// steal s1's buffer — O(1)!</span>
cout<span class="op">&lt;&lt;</span>s2;  <span class="cm">// "hello"</span>
cout<span class="op">&lt;&lt;</span>s1;  <span class="cm">// "" — moved-from: valid but unspecified</span>
<span class="cm">// Move constructor signature (rvalue reference &&)</span>
<span class="fn">Buffer</span>(<span class="ty">Buffer</span><span class="op">&amp;&amp;</span> o) <span class="kw">noexcept</span> : data(o.data), size_(o.size_) {
    o.data=<span class="kw">nullptr</span>; o.size_=<span class="nm">0</span>;  <span class="cm">// leave source valid but empty</span>
}</pre></div>
<div class="callout callout-warn"><div class="callout-icon">⚠️</div><div class="callout-body"><div class="callout-title">Mark move operations noexcept</div><div class="callout-text">STL containers like <code>vector</code> will only use your move constructor during reallocation if it is marked <code>noexcept</code>. Without it, they fall back to the copy constructor for strong exception safety.</div></div></div>

    double r;

public:

    static int getCount(){ return count; }
};

function setTheme(t, btn) {
  document.body.setAttribute('data-theme', t);

// LEVEL
// ─────────────────────────────────────────
function setLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.level-tab').forEach(b => {
    b.className = 'level-tab';
    if (b.getAttribute('data-level') === level) b.classList.add(`active-${level}`);
  });
  renderTopicList();
  // Auto-select first topic in new level
  const first = CURRICULUM[level][0];
  if (first) selectTopic(first.id);
}

// ─────────────────────────────────────────
// TOPIC LIST
// ─────────────────────────────────────────
function renderTopicList() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('topicList');
  let html = '';

  const levels = query ? ['basic','medium','advanced'] : [currentLevel];
  levels.forEach(level => {
    const topics = CURRICULUM[level].filter(t =>
      !query || t.name.toLowerCase().includes(query)
    );
    if (topics.length === 0) return;

    html += `
      <div class="section-header">
        <div class="section-dot dot-${level}"></div>
        <div class="section-title">${level}</div>
        <div class="section-count">${topics.length}</div>
      </div>
      <div id="sec-${level}">
        ${topics.map(t => `
          <div class="topic-item ${currentTopic === t.id ? 'active' : ''}" id="ti-${t.id}" onclick="selectTopic('${t.id}')">
            <span class="topic-icon">${t.icon}</span>
            <span class="topic-name">${t.name}</span>
          </div>
        `).join('')}
      </div>`;
  });

  list.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">No topics found</div>';
}

function filterTopics() { renderTopicList(); }

// ─────────────────────────────────────────
// SELECT TOPIC
// ─────────────────────────────────────────
function selectTopic(id) {
  currentTopic = id;
  const lesson = LESSONS[id];
  if (!lesson) return;

  // Update sidebar
  document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`ti-${id}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }

  // Extract code examples from content (simple index array)
  codeExamples = [lesson.code];
  currentCode = lesson.code;

  // Load into editor
  if (monacoLoaded && monacoEditor) {
    monacoEditor.setValue(lesson.code);
    document.getElementById('editorFilename').textContent = `${id}.cpp`;
  }

  // Render lesson
  renderLesson(lesson);
  clearOutput();
}

function renderLesson(lesson) {
  document.getElementById('emptyState').classList.add('hidden');
  const content = document.getElementById('lessonContent');
  content.classList.remove('hidden');

  const levelColors = { basic:'var(--green)', medium:'var(--accent3)', advanced:'var(--accent2)' };
  const levelColor = levelColors[lesson.level] || 'var(--accent)';

  content.innerHTML = `
    <div class="fade-in">
      <div class="lesson-title">${lesson.title}</div>
      <div class="lesson-meta">
        <span class="lesson-tag" style="background:${levelColor}20;border:1px solid ${levelColor}50;color:${levelColor}">
          ${lesson.level.toUpperCase()}
        </span>
        <span class="lesson-tag" style="background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;">
          C++17/20
        </span>
      </div>
      <div class="lesson-divider"></div>
      <div class="lesson-section">${lesson.content()}</div>
      <div class="lesson-nav">
        <button class="nav-btn primary" onclick="runCode()">▶ Run in Editor</button>
        <button class="nav-btn" onclick="nextTopic()">Next Topic →</button>
      </div>
    </div>`;
}

function nextTopic() {
  const all = [...CURRICULUM.basic, ...CURRICULUM.medium, ...CURRICULUM.advanced];
  const idx = all.findIndex(t => t.id === currentTopic);
  if (idx >= 0 && idx < all.length - 1) {
    const next = all[idx + 1];
    setLevel(next.tag, document.querySelector(`[data-level="${next.tag}"]`));
    selectTopic(next.id);
  }
}

// ─────────────────────────────────────────
// CODE ACTIONS
// ─────────────────────────────────────────
function loadCodeToEditor(idx) {
  const code = codeExamples[idx] || codeExamples[0] || '';
  if (monacoLoaded && monacoEditor) monacoEditor.setValue(code);
  else document.getElementById('editorPanel').scrollIntoView();
}

function copyCodeBlock(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function copyCode() {
  if (!monacoEditor) return;
  navigator.clipboard.writeText(monacoEditor.getValue()).then(() => {
    showOutputLine('// Code copied to clipboard!', 'line-info');
  });
}

function resetCode() {
  if (!monacoEditor || !currentTopic) return;
  const lesson = LESSONS[currentTopic];
  if (lesson) monacoEditor.setValue(lesson.code);
  clearOutput();
}

async function runCode() {
  const indicator = document.getElementById('outputIndicator');
  const out = document.getElementById('outputContent');
  indicator.className = 'output-indicator running';
  out.innerHTML = '<span class="line-info">// Compiling...</span>';

  await sleep(400);
  out.innerHTML = '<span class="line-info">// Linking...</span>';
  await sleep(300);

  indicator.className = 'output-indicator success';
  const lines = SIMULATION[currentTopic] || ['// (No simulated output — modify and explore!)'];
  out.innerHTML = '';

  out.innerHTML += `<span class="line-info">// ─── Compiled successfully ───────────────</span>\n`;
  out.innerHTML += `<span class="line-info">// g++ -std=c++17 -O2 -o program program.cpp</span>\n`;
  out.innerHTML += `<span class="line-info">// ./program</span>\n\n`;

  for (const line of lines) {
    out.innerHTML += escapeHtml(line) + '\n';
    await sleep(60);
  }
  out.innerHTML += `\n<span class="line-success">// ─── Process exited with code 0 ──────────</span>`;
  out.scrollTop = out.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showOutputLine(text, cls) {
  const out = document.getElementById('outputContent');
  out.innerHTML += `<span class="${cls}">${escapeHtml(text)}</span>\n`;
  out.scrollTop = out.scrollHeight;
}

function clearOutput() {
  document.getElementById('outputContent').innerHTML = '<span class="line-info">// Ready — click ▶ Compile &amp; Run to execute your code</span>';
  document.getElementById('outputIndicator').className = 'output-indicator';
}

function toggleEditor() {

// ─────────────────────────────────────────
// SPLITTER DRAG
// ─────────────────────────────────────────
let dragging = false, startX, startW;

function startDrag(e) {
  dragging = true; startX = e.clientX;
  startW = document.getElementById('sidebar').offsetWidth;
  document.getElementById('splitter').classList.add('dragging');
  document.body.style.cssText += 'cursor:col-resize;user-select:none';
  window.addEventListener('mousemove', onDrag);
  window.addEventListener('mouseup', stopDrag);
}

function onDrag(e) {
  if (!dragging) return;
  const w = Math.min(Math.max(startW + (e.clientX - startX), 180), 420);
  document.getElementById('sidebar').style.width = w + 'px';
}

function stopDrag() {
  dragging = false;
  document.getElementById('splitter').classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  window.removeEventListener('mousemove', onDrag);
  window.removeEventListener('mouseup', stopDrag);
  if (monacoEditor) monacoEditor.layout();
}
