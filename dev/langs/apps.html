<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Learning Apps</title>

  <link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            panel: '#0f172a',
            sidebar: '#020617',
            divider: '#1e293b'
          }
        }
      }
    }
  </script>

  <style>
    iframe {
      border: none;
    }
    .resizer {
      cursor: col-resize;
      user-select: none;
    }
  </style>
</head>

<body class="h-screen overflow-hidden bg-slate-950 text-slate-200">

  <!-- App Container -->
  <div class="flex h-full">

    <!-- Left Pane -->
    <aside id="leftPane" class="w-72 min-w-[200px] bg-sidebar border-r border-divider flex flex-col">

      <!-- Header -->
      <div class="px-4 py-4 border-b border-divider">
        <h1 class="text-lg font-semibold tracking-wide">📘 Language Learning Apps</h1>
      </div>

      <!-- 🔍 Search -->
      <div class="px-4 pb-3 border-b border-divider">
        <input
          id="navSearch"
          type="text"
          placeholder="Search docs…"
          class="w-full rounded-lg bg-slate-900 text-slate-200
                 placeholder-slate-400 px-3 py-2 text-sm
                 border border-slate-700
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <!-- Navigation -->
      <nav class="flex-1 overflow-y-auto px-4 py-3 space-y-6">

        <!-- Langs -->
        <div>
          <h2 class="text-xs uppercase tracking-wider text-slate-400 mb-2">Apps</h2>
          <ul class="space-y-1">
            <li><button onclick="loadPage('c-ai.html')" class="toc-link">C Lang</button></li>
            <li><button onclick="loadPage('cpp-ai.html')" class="toc-link">C++</button></li>
            <li><button onclick="loadPage('go-ai.html')" class="toc-link">Go Lang</button></li>
            <li><button onclick="loadPage('rust-ai.html')" class="toc-link">Rust</button></li>
            <li><button onclick="loadPage('py/py.html')" class="toc-link">Python</button></li>
            <li><button onclick="loadPage('ts/ts.html')" class="toc-link">TypeScript</button></li>


          </ul>
        </div>


      </nav>
    </aside>

    <!-- Splitter -->
    <div id="resizer" class="resizer w-1 bg-divider hover:bg-slate-500"></div>

    <!-- Right Pane -->
    <main class="flex-1 bg-panel">
      <iframe
        id="contentFrame"
        src="langs.html"
        class="w-full h-full bg-white dark:bg-panel">
      </iframe>
    </main>

  </div>

  <!-- Scripts -->
  <script>
    const iframe = document.getElementById('contentFrame');

    function loadPage(page) {
      if (page.startsWith('http')) {
        window.open(page, '_blank', 'noopener,noreferrer');
      } else {
        iframe.src = page;
      }
    }

    /* Resizer */
    const resizer = document.getElementById('resizer');
    const leftPane = document.getElementById('leftPane');
    let isDragging = false;

    resizer.addEventListener('mousedown', () => {
      isDragging = true;
      document.body.style.cursor = 'col-resize';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const newWidth = e.clientX;
      if (newWidth > 180 && newWidth < 500) {
        leftPane.style.width = `${newWidth}px`;
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      document.body.style.cursor = 'default';
    });

    /* 🔍 Navigation Search */
    const searchInput = document.getElementById('navSearch');

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();

      document.querySelectorAll('nav > div').forEach(section => {
        const items = section.querySelectorAll('li');
        let hasVisible = false;

        items.forEach(li => {
          const text = li.innerText.toLowerCase();
          const match = text.includes(query);
          li.style.display = match ? '' : 'none';
          if (match) hasVisible = true;
        });

        section.style.display = hasVisible ? '' : 'none';
      });
    });
  </script>

  <!-- Shared styles -->
  <style>
    .toc-link {
      width: 100%;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      color: #cbd5f5;
      font-size: 0.875rem;
    }
    .toc-link:hover {
      background-color: #1e293b;
      color: #ffffff;
    }
  </style>

</body>
</html>
