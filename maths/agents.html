<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENT.SYS — AI Agents Academy</title>

<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<style>
/* ══════════════════════════════════════════
   CSS VARIABLES / THEMES
══════════════════════════════════════════ */
:root {
  --bg:       #050a05;
  --bg2:      #080f08;
  --bg3:      #0c160c;
  --bg4:      #111e11;
  --border:   #1a2e1a;
  --accent:   #00ff41;
  --accent2:  #00d4ff;
  --accent3:  #ff6b35;
  --warn:     #ffd700;
  --danger:   #ff3333;
  --text:     #c8ffc8;
  --text2:    #6bab6b;
  --text3:    #2d5c2d;
  --beg:      #00ff41;
  --med:      #ffd700;
  --adv:      #ff6b35;
  --glow-g:   0 0 20px rgba(0,255,65,0.2);
  --glow-b:   0 0 20px rgba(0,212,255,0.15);
  --card:     rgba(8,15,8,0.95);
  --code-bg:  #020802;
  --sidebar-w:300px;
  --header-h: 56px;
  --font-mono:'Share Tech Mono', monospace;
  --font-head:'Syne', sans-serif;
}
[data-theme="phosphor"] {
  --bg:#050a0a; --bg2:#080f0f; --bg3:#0c1616; --bg4:#111e1e;
  --border:#1a2e2e; --accent:#00ffcc; --accent2:#00ff88; --accent3:#ff6bcd;
  --text:#c8fff8; --text2:#6baba8; --text3:#2d5c5a;
  --glow-g:0 0 20px rgba(0,255,204,0.2); --card:rgba(8,15,15,0.95); --code-bg:#020808;
}
[data-theme="red-alert"] {
  --bg:#0a0303; --bg2:#0f0505; --bg3:#160808; --bg4:#1e0e0e;
  --border:#2e1a1a; --accent:#ff3333; --accent2:#ff8800; --accent3:#ffdd00;
  --text:#ffc8c8; --text2:#ab6b6b; --text3:#5c2d2d;
  --glow-g:0 0 20px rgba(255,51,51,0.2); --card:rgba(15,5,5,0.95); --code-bg:#080202;
}
[data-theme="neural"] {
  --bg:#05050f; --bg2:#08080f; --bg3:#0c0c1a; --bg4:#111128;
  --border:#1a1a35; --accent:#a78bfa; --accent2:#60a5fa; --accent3:#34d399;
  --text:#e0d8ff; --text2:#8b80b8; --text3:#3d3670;
  --glow-g:0 0 20px rgba(167,139,250,0.2); --card:rgba(8,8,15,0.95); --code-bg:#030308;
}
[data-theme="ghost"] {
  --bg:#f5f7f5; --bg2:#ffffff; --bg3:#eef2ee; --bg4:#e4eae4;
  --border:#c8d8c8; --accent:#006600; --accent2:#004080; --accent3:#804000;
  --text:#0a1a0a; --text2:#3a5a3a; --text3:#7a9a7a;
  --glow-g:none; --card:#ffffff; --code-bg:#0a1a0a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-head);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background .3s, color .3s;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════════════
   SCANLINE EFFECT
══════════════════════════════════════════ */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 1;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  position: relative;
  z-index: 100;
  flex-shrink: 0;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  opacity: 0.4;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 34px; height: 34px;
  border: 2px solid var(--accent);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 700;
  text-shadow: var(--glow-g);
  box-shadow: var(--glow-g), inset 0 0 8px rgba(0,255,65,0.05);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.logo-mark::before {
  content: '';
  position: absolute;
  top: -100%;
  left: 0; right: 0;
  height: 100%;
  background: linear-gradient(transparent, rgba(0,255,65,0.12), transparent);
  animation: scanDown 3s linear infinite;
}
@keyframes scanDown {
  0%   { top: -100%; }
  100% { top: 200%; }
}

.logo-name {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-shadow: var(--glow-g);
  font-weight: 700;
}
.logo-name span { color: var(--text3); }

.sys-status {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text3);
  border-left: 1px solid var(--border);
  padding-left: 12px;
  letter-spacing: 0.1em;
}
.sys-status .online {
  color: var(--accent);
  text-shadow: var(--glow-g);
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 5px 10px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text2);
}
.prog-track {
  width: 64px; height: 3px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 6px var(--accent);
}
.prog-pct {
  color: var(--accent);
  min-width: 30px;
  text-shadow: var(--glow-g);
}

.hdr-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 5px 12px;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.7rem;
  font-family: var(--font-mono);
  transition: all .15s;
  letter-spacing: 0.05em;
}
.hdr-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  text-shadow: var(--glow-g);
  box-shadow: var(--glow-g);
}

.theme-flyout {
  position: absolute;
  top: calc(var(--header-h) + 4px);
  right: 16px;
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: 3px;
  padding: 4px;
  display: none;
  flex-direction: column;
  gap: 2px;
  z-index: 300;
  box-shadow: var(--glow-g), 0 12px 40px rgba(0,0,0,.6);
  min-width: 170px;
}
.theme-flyout.open { display: flex; }
.th-opt {
  padding: 7px 12px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text2);
  transition: all .12s;
  letter-spacing: 0.05em;
  border-radius: 2px;
}
.th-opt:hover, .th-opt.active {
  background: var(--bg4);
  color: var(--accent);
  text-shadow: var(--glow-g);
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.shell {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.sidebar::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--accent), var(--accent2), transparent);
  opacity: 0.15;
}

.sb-top {
  padding: 10px 10px 0;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text3);
  letter-spacing: 0.1em;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.sb-top .prompt { color: var(--accent); }

.sb-search {
  padding: 8px;
  border-bottom: 1px solid var(--border);
}
.sb-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 7px 10px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  outline: none;
  transition: border-color .15s;
  letter-spacing: 0.03em;
}
.sb-search input::placeholder { color: var(--text3); }
.sb-search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 6px rgba(0,255,65,0.1);
}

.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--border); }
.sb-nav::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.lvl-block { margin-bottom: 4px; }
.lvl-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--text3);
  transition: color .12s;
  user-select: none;
  border-radius: 2px;
}
.lvl-hdr:hover { color: var(--text2); background: var(--bg3); }
.lvl-pip { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
.lvl-block.beg .lvl-pip { background: var(--beg); box-shadow: 0 0 4px var(--beg); }
.lvl-block.med .lvl-pip { background: var(--med); box-shadow: 0 0 4px var(--med); }
.lvl-block.adv .lvl-pip { background: var(--adv); box-shadow: 0 0 4px var(--adv); }
.lvl-name { font-weight: 700; }
.lvl-block.beg .lvl-name { color: var(--beg); }
.lvl-block.med .lvl-name { color: var(--med); }
.lvl-block.adv .lvl-name { color: var(--adv); }
.lvl-count { margin-left: auto; font-size: 0.6rem; color: var(--text3); }
.lvl-chev { font-size: 0.6rem; color: var(--text3); transition: transform .15s; }
.lvl-block.shut .lvl-chev { transform: rotate(-90deg); }
.lvl-block.shut .topic-list { display: none; }

.topic-list { padding: 2px 0 4px; }
.t-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px 6px 18px;
  border-radius: 2px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text2);
  transition: all .12s;
  letter-spacing: 0.02em;
}
.t-item:hover { background: var(--bg3); color: var(--text); }
.t-item.active {
  background: var(--bg3);
  color: var(--accent);
  border-left: 2px solid var(--accent);
  padding-left: 16px;
  text-shadow: var(--glow-g);
}
.t-check {
  width: 14px; height: 14px;
  border: 1px solid var(--border);
  border-radius: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px;
  flex-shrink: 0;
  margin-left: auto;
  transition: all .15s;
  font-family: var(--font-mono);
}
.t-check.done {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  box-shadow: 0 0 4px var(--accent);
}

.sb-foot {
  padding: 8px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.dl-btn {
  width: 100%;
  padding: 8px;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: 0.05em;
}
.dl-btn.primary {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  text-shadow: var(--glow-g);
}
.dl-btn.primary:hover {
  background: rgba(0,255,65,0.08);
  box-shadow: var(--glow-g);
}
.dl-btn.secondary {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}
.dl-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ══════════════════════════════════════════
   CONTENT PANE
══════════════════════════════════════════ */
.content-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.c-toolbar {
  height: 44px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 10px;
  flex-shrink: 0;
}
.breadcrumb {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text3);
  display: flex; align-items: center; gap: 6px;
  letter-spacing: 0.04em;
}
.breadcrumb .sep { color: var(--accent); opacity: 0.5; }
.breadcrumb span { color: var(--text2); }

.tb-right {
  margin-left: auto;
  display: flex;
  gap: 6px;
}
.tb-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 5px 12px;
  color: var(--text2);
  font-size: 0.68rem;
  cursor: pointer;
  font-family: var(--font-mono);
  transition: all .15s;
  letter-spacing: 0.05em;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow-g); }
.tb-btn.exec {
  background: rgba(0,255,65,0.08);
  border-color: var(--accent);
  color: var(--accent);
  text-shadow: var(--glow-g);
}
.tb-btn.exec:hover { background: rgba(0,255,65,0.15); box-shadow: var(--glow-g); }

.c-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  max-width: 940px;
  width: 100%;
  margin: 0 auto;
}
.c-scroll::-webkit-scrollbar { width: 4px; }
.c-scroll::-webkit-scrollbar-thumb { background: var(--border); }
.c-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ══════════════════════════════════════════
   CONTENT ELEMENTS
══════════════════════════════════════════ */
.t-header { margin-bottom: 28px; }

.lvl-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 10px;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}
.lb-beg { background: rgba(0,255,65,0.08);  color: var(--beg); border: 1px solid rgba(0,255,65,0.25); }
.lb-med { background: rgba(255,215,0,0.08); color: var(--med); border: 1px solid rgba(255,215,0,0.25); }
.lb-adv { background: rgba(255,107,53,0.08); color: var(--adv); border: 1px solid rgba(255,107,53,0.25); }

.t-title {
  font-family: var(--font-mono);
  font-size: 1.9rem;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.t-title .hl { color: var(--accent); text-shadow: var(--glow-g); }

.t-desc {
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 14px;
  font-weight: 400;
  font-family: var(--font-head);
}

.prereq-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px;
}
.prereq-lbl {
  font-family: var(--font-mono);
  font-size: 0.6rem; color: var(--text3);
  letter-spacing: .12em; text-transform: uppercase;
}
.prereq-chip {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 2px;
  padding: 2px 8px; font-family: var(--font-mono); font-size: 0.65rem; color: var(--text2);
  cursor: pointer; transition: all .12s;
}
.prereq-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Section */
.sec { margin-bottom: 28px; }
.sec-title {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 0.04em;
}
.sec-title::before {
  content: '>';
  color: var(--accent);
  text-shadow: var(--glow-g);
  font-size: 1.1rem;
}
.sec-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.prose {
  font-size: 0.88rem;
  line-height: 1.8;
  color: var(--text2);
  margin-bottom: 12px;
  font-family: var(--font-head);
}
.prose strong { color: var(--text); font-weight: 600; }
.prose code {
  font-family: var(--font-mono);
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 2px;
  font-size: 0.82em;
  color: var(--accent2);
}

/* Callouts */
.callout {
  border-radius: 2px;
  padding: 12px 14px;
  margin: 12px 0;
  font-size: 0.83rem;
  line-height: 1.7;
  display: flex;
  gap: 10px;
  font-family: var(--font-head);
}
.callout-ico { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.callout.info  { background: rgba(0,212,255,0.05);  border: 1px solid rgba(0,212,255,0.2);  border-left: 3px solid var(--accent2); }
.callout.warn  { background: rgba(255,215,0,0.05);  border: 1px solid rgba(255,215,0,0.2);  border-left: 3px solid var(--warn); }
.callout.tip   { background: rgba(0,255,65,0.04);   border: 1px solid rgba(0,255,65,0.18);  border-left: 3px solid var(--accent); }
.callout.danger{ background: rgba(255,51,51,0.05);  border: 1px solid rgba(255,51,51,0.2);  border-left: 3px solid var(--danger); }
.callout strong { color: var(--text); }

/* Math card */
.math-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px 20px;
  margin: 12px 0;
  position: relative;
  overflow: hidden;
}
.math-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
}
.math-card .lbl {
  font-family: var(--font-mono);
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
  text-shadow: var(--glow-g);
}
.math-disp {
  text-align: center;
  font-size: 1rem;
  overflow-x: auto;
  padding: 4px 0;
}

/* Code block */
.code-wrap {
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin: 12px 0;
  position: relative;
}
.code-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  opacity: 0.5;
}

    <pre><code class="language-python">import re

REACT_SYSTEM_PROMPT = """You are a ReAct agent. Solve tasks step by step using this format:

Thought: Reason about what to do next.
Action: tool_name[argument]
Observation: (result of action, provided by system)
... (repeat Thought/Action/Observation as needed)
Thought: I now have enough information to answer.
Final Answer: Your complete answer here.

Available tools:
- search[query]: Search the web
- calculator[expr]: Evaluate math expression
- lookup[entity]: Look up facts about an entity

def parse_react_output(text: str):
    """Parse Thought/Action/Final Answer from LLM output."""
    if "Final Answer:" in text:
        answer = text.split("Final Answer:")[-1].strip()
        return {"type": "final", "content": answer}

    action_match = re.search(r"Action:\s*(\w+)\[(.+?)\]", text)
    if action_match:

            "tool":   action_match.group(1),
            "args":   action_match.group(2).strip()
        }

    thought_match = re.search(r"Thought:\s*(.+?)(?=\n|$)", text)

def calculator(expr): return str(eval(expr, {"__builtins__": {}}))

    history = REACT_SYSTEM_PROMPT + f"\n\nTask: {goal}\n"

    for step in range(max_steps):

        history += response_text + "\n"

        parsed = parse_react_output(response_text)

<div class="sec">
  <h2 class="sec-title">The Planning Problem</h2>
  <p class="prose">Simple goals ("search for X") need no planning. Complex goals ("build a SaaS app") require <strong>decomposition</strong> — breaking the goal into sub-tasks, ordering them, and handling dependencies. Different strategies suit different problem types.</p>
</div>
<div class="sec">
  <h2 class="sec-title">Plan-and-Execute</h2>
  <p class="prose">A <strong>Planner</strong> LLM creates a full task list upfront. An <strong>Executor</strong> agent carries out each step. After execution, a <strong>Replanner</strong> updates the plan based on what actually happened.</p>
  <div class="code-wrap">
    <div class="code-hdr"><div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><span class="file-lbl">plan_execute.py</span><span class="lang-badge">PYTHON</span><button class="cp-btn" onclick="copyCode(this)">copy</button></div>
    <pre><code class="language-python">from dataclasses import dataclass, field
from typing import List, Optional
from enum import Enum

class StepStatus(Enum):
    PENDING   = "pending"
    RUNNING   = "running"
    DONE      = "done"
    FAILED    = "failed"

@dataclass
class PlanStep:
    id:          int
    description: str
    tool:        Optional[str] = None
    depends_on:  List[int]     = field(default_factory=list)
    status:      StepStatus    = StepStatus.PENDING
    result:      Optional[str] = None

@dataclass
class Plan:
    goal:  str
    steps: List[PlanStep]

    def next_executable(self) -> List[PlanStep]:
        """Return steps whose dependencies are all DONE."""
        completed_ids = {s.id for s in self.steps if s.status == StepStatus.DONE}
        return [
            s for s in self.steps
            if s.status == StepStatus.PENDING
            and all(dep in completed_ids for dep in s.depends_on)
        ]

    def is_complete(self):
        return all(s.status == StepStatus.DONE for s in self.steps)

def create_plan(goal: str) -> Plan:
    """LLM creates a structured plan. Simulated here."""
    return Plan(goal=goal, steps=[
        PlanStep(1, "Search for recent info on topic",   tool="web_search"),
        PlanStep(2, "Extract key data points",           tool="python_repl",   depends_on=[1]),
        PlanStep(3, "Search for comparison data",        tool="web_search"),
        PlanStep(4, "Analyze and compare findings",      tool="python_repl",   depends_on=[2, 3]),
        PlanStep(5, "Write final summary",               tool=None,            depends_on=[4]),
    ])

def execute_plan(plan: Plan, tools: dict):
    print(f"\n[PLAN] Goal: {plan.goal}")
    print(f"[PLAN] Steps: {len(plan.steps)}\n")

    while not plan.is_complete():
        ready = plan.next_executable()
        if not ready:
            print("[ERROR] No executable steps — possible deadlock")
            break

        # Execute ready steps (could be parallel!)
        for step in ready:
            step.status = StepStatus.RUNNING
            print(f"[EXEC] Step {step.id}: {step.description}")

            if step.tool and step.tool in tools:
                step.result = tools[step.tool](step.description)
            else:
                step.result = f"Completed: {step.description}"

            step.status = StepStatus.DONE
            print(f"[DONE] Step {step.id} ✓")

    print(f"\n[COMPLETE] All {len(plan.steps)} steps finished!")</code></pre>

<div class="sec">
  <h2 class="sec-title">Tree of Thoughts (ToT)</h2>
  <p class="prose"><strong>Tree of Thoughts</strong> (Yao et al., 2023) treats problem solving as a search over a tree of possible reasoning paths. The agent generates multiple candidate next thoughts, evaluates each, and expands the most promising branches — like chess search for language tasks.</p>

    <div class="math-disp">\\( \\text{solution} = \\arg\\max_{t_{1:T}} \\prod_{i=1}^{T} P_{\\text{LLM}}(t_i \\mid t_{1:i-1}, x) \\cdot V(t_{1:i}) \\)</div>
  </div>
  <div class="callout info"><div class="callout-ico">🌳</div><div><strong>ToT shines on</strong> tasks requiring exploration: math proofs, creative writing, game solving. BFS/DFS can be used as the search strategy. Evaluation (V) is itself an LLM call that scores each thought branch.</div></div>

        results.append({"role": "tool", "content": result, "name": call["name"]})
    return {"messages": results, "tool_calls": [], "iteration": state["iteration"], "final_answer": None}

def should_continue(state: AgentState) -> str:
    """Router: decide next node."""
    if state.get("final_answer"):
        return "END"
    if state["iteration"] >= 10:
        return "END"
    if state["tool_calls"]:
        return "tools"
    return "llm"

# ── Build graph (conceptual — requires langgraph installed) ──────
print("Graph nodes: llm_node → [tools | END]")
print("Edges: llm → should_continue() → tools → llm → ...")
print("State: persisted across all nodes, append-only messages")

# Key LangGraph concepts:
# - Nodes are Python functions that transform state
# - Edges are conditional routers (should_continue)
# - State is a typed dict shared across the whole graph
# - Checkpointing: graph state auto-saved, resumable on failure</code></pre>

function buildSidebar(filter = '') {
  const nav = document.getElementById('sbNav');
  nav.innerHTML = '';
  const levels = ['beginner', 'medium', 'advanced'];
  levels.forEach(lvl => {
    const items = TOPICS.filter(t => t.level === lvl &&
      (!filter || t.title.toLowerCase().includes(filter.toLowerCase())));
    if (!items.length) return;
    const done = items.filter(t => S.completed[t.id]).length;
    const block = document.createElement('div');
    block.className = `lvl-block ${lvl.slice(0, 3)}`;
    block.innerHTML = `
      <div class="lvl-hdr" onclick="this.parentElement.classList.toggle('shut')">
        <div class="lvl-pip"></div>
        <span class="lvl-name">${lvl.toUpperCase()}</span>
        <span class="lvl-count">[${done}/${items.length}]</span>
        <span class="lvl-chev">▾</span>
      </div>
      <div class="topic-list">
        ${items.map(t => `
          <div class="t-item ${S.current?.id === t.id ? 'active' : ''}" onclick="loadTopic('${t.id}')">
            <span style="flex:1">${t.title}</span>
            <div class="t-check ${S.completed[t.id] ? 'done' : ''}">
              ${S.completed[t.id] ? '✓' : ''}
            </div>
          </div>`).join('')}
      </div>`;
    nav.appendChild(block);
  });
}

// LOAD TOPIC

function loadTopic(id) {
  const t = TOPICS.find(x => x.id === id);
  if (!t) return;
  S.current = t;

  const lc  = t.level;
  const tag = lc === 'beginner' ? 'lb-beg' : lc === 'medium' ? 'lb-med' : 'lb-adv';
  const dot = lc === 'beginner' ? '[ BEG ]' : lc === 'medium' ? '[ MED ]' : '[ ADV ]';
  const idx  = TOPICS.indexOf(t);
  const prev = idx > 0 ? TOPICS[idx - 1] : null;
  const next = idx < TOPICS.length - 1 ? TOPICS[idx + 1] : null;
  const marked = S.completed[t.id];

  document.getElementById('tbRight').style.display = 'flex';
  document.getElementById('breadcrumb').innerHTML = `
    <span style="color:var(--accent);font-family:var(--font-mono)">agent@sys</span>
    <span class="sep">:</span>
    <a href="#" onclick="renderWelcome()" style="color:var(--text3);text-decoration:none;font-family:var(--font-mono)">~</a>
    <span class="sep">/</span>
    <span style="font-family:var(--font-mono)">${t.level}</span>
    <span class="sep">/</span>
    <span style="font-family:var(--font-mono)">${t.id}</span>`;

  document.getElementById('cScroll').innerHTML = `
    <div class="t-header">
      <div class="lvl-badge ${tag}">${dot} ${lc.toUpperCase()}</div>
      <h1 class="t-title">${t.title.replace(/AI/, '<span class="hl">AI</span>').replace(/Agent/, '<span class="hl">Agent</span>')}</h1>
      <p class="t-desc">${t.desc}</p>
      ${t.prereqs.length ? `
        <div class="prereq-row">
          <span class="prereq-lbl">requires:</span>
          ${t.prereqs.map(p => {
            const pt = TOPICS.find(x => x.id === p);
            return `<span class="prereq-chip" onclick="loadTopic('${p}')">${pt?.title || p}</span>`;
          }).join('')}
        </div>` : ''}
    </div>

    ${t.content}

    <button class="done-btn ${marked ? 'marked' : ''}" id="doneBtn" onclick="toggleDone('${t.id}')">
      ${marked ? '[✓] MODULE COMPLETE' : '[ ] MARK COMPLETE'}
    </button>

    <div class="nav-row">
      ${prev ? `<button class="nav-btn" onclick="loadTopic('${prev.id}')">← ${prev.title}</button>` : '<div></div>'}
      ${next ? `<button class="nav-btn fwd" onclick="loadTopic('${next.id}')">${next.title} →</button>` : '<div></div>'}
    </div>`;

  renderMathInElement(document.getElementById('cScroll'), {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '\\(', right: '\\)', display: false },
      { left: '\\[', right: '\\]', display: true }
    ],
    throwOnError: false
  });
  Prism.highlightAllUnder(document.getElementById('cScroll'));
  document.getElementById('cScroll').scrollTop = 0;
  buildSidebar();
}

function toggleDone(id) {
  S.completed[id] = !S.completed[id];
  save(); updateProgress();
  const btn = document.getElementById('doneBtn');
  if (btn) {
    btn.textContent = S.completed[id] ? '[✓] MODULE COMPLETE' : '[ ] MARK COMPLETE';
    btn.className   = `done-btn ${S.completed[id] ? 'marked' : ''}`;
  }
  buildSidebar();
}

function openQuiz() {
  if (!S.current?.quiz?.length) return;
  S.quiz = { qs: [...S.current.quiz], cur: 0, answers: [], answered: false };
  renderQuizQ();
  document.getElementById('quizOverlay').classList.add('open');
}

function renderQuizQ() {
  const { qs, cur } = S.quiz;
  const q   = qs[cur];
  const pct = (cur / qs.length) * 100;
  document.getElementById('quizModal').innerHTML = `
    <div class="m-head">
      <div class="m-ico">?</div>
      <div>
        <div class="m-title">// KNOWLEDGE CHECK</div>
        <div class="m-sub">${S.current.title}</div>
      </div>
      <button class="m-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="qprog">
      <div class="qprog-bar"><div class="qprog-fill" style="width:${pct}%"></div></div>
      <span class="qprog-lbl">${cur + 1}/${qs.length}</span>
    </div>
    <div class="q-text">Q${cur + 1}. ${q.q}</div>
    <div class="q-opts">
      ${q.opts.map((o, i) => `<button class="q-opt" id="opt${i}" onclick="pickAnswer(${i})">${o}</button>`).join('')}
    </div>
    <div class="q-exp" id="qExp">${q.exp}</div>
    <div class="q-acts">
      <button class="q-btn sec" onclick="closeQuiz()">exit</button>
      <button class="q-btn pri" id="qNext" onclick="nextQ()" disabled>next →</button>
    </div>`;
  renderMathInElement(document.getElementById('quizModal'), {
    delimiters: [{ left: '\\(', right: '\\)', display: false }],
    throwOnError: false
  });
}

function pickAnswer(i) {
  if (S.quiz.answered) return;
  S.quiz.answered = true;
  const q = S.quiz.qs[S.quiz.cur];
  S.quiz.answers.push(i === q.ans ? 1 : 0);
  document.querySelectorAll('.q-opt').forEach((el, idx) => {
    if (idx === q.ans) el.classList.add('correct');
    else if (idx === i && i !== q.ans) el.classList.add('wrong');
  });
  document.getElementById('qExp').classList.add('show');
  const nb = document.getElementById('qNext');
  nb.disabled = false;
  nb.textContent = S.quiz.cur < S.quiz.qs.length - 1 ? 'next →' : 'results';
}

function nextQ() {
  S.quiz.cur++;
  S.quiz.answered = false;
  if (S.quiz.cur >= S.quiz.qs.length) showResult();
  else renderQuizQ();
}

function showResult() {
  const correct = S.quiz.answers.reduce((a, b) => a + b, 0);
  const total   = S.quiz.qs.length;
  const pct     = Math.round(correct / total * 100);
  const emoji   = pct >= 80 ? '🟢' : pct >= 50 ? '🟡' : '🔴';
  const msg     = pct >= 80 ? 'SYSTEMS NOMINAL' : pct >= 50 ? 'NEEDS CALIBRATION' : 'REBOOT REQUIRED';
  if (pct === 100) { S.completed[S.current.id] = true; save(); updateProgress(); buildSidebar(); }
  document.getElementById('quizModal').innerHTML = `
    <div class="m-head">
      <div class="m-ico">${emoji}</div>
      <div><div class="m-title">// EVAL COMPLETE</div><div class="m-sub">${S.current.title}</div></div>
      <button class="m-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="result-wrap">
      <div class="res-score">${pct}%</div>
      <div class="res-msg">${correct}/${total} CORRECT — ${msg}</div>
    </div>
    <div class="q-acts" style="margin-top:20px">
      <button class="q-btn sec" onclick="closeQuiz()">exit</button>
      <button class="q-btn pri" onclick="retakeQuiz()">retry</button>
    </div>`;
}

function retakeQuiz() {
  S.quiz = { qs: [...S.current.quiz], cur: 0, answers: [], answered: false };
  renderQuizQ();
}
function closeQuiz() { document.getElementById('quizOverlay').classList.remove('open'); }
document.getElementById('quizOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('quizOverlay')) closeQuiz();
});

.qi-q{font-size:.83rem;color:#0a0a0a;font-weight:600;margin-bottom:6px;line-height:1.5;font-family:'Share Tech Mono',monospace}
.qi-opts{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}

.footer{text-align:center;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:#aaa;margin-top:32px;padding-top:10px;border-top:1px solid #e0e0e0}

@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.cover{min-height:100vh}}
`;

function hlCode(c) {
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(import|from|def|class|return|for|if|elif|else|in|as|not|and|or|with|yield|lambda|async|await|True|False|None|print|pass|raise|try|except|finally)\b/g,'<span class="kw">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span class="st">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="nm">$1</span>');
}

function buildPdf(topics) {
  const parser = new DOMParser();
  const done = Object.keys(S.completed).filter(k => S.completed[k]).length;
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AGENT.SYS</title><style>${PDF_CSS}</style></head><body>`;

  html += `<div class="cover">
    <div class="cover-logo">AGENT.SYS</div>
    <div class="cover-sub">// AI AGENTS CURRICULUM — EXPORT</div>
    <div class="cover-title">From Minimal Loops to<br>Production Multi-Agent Systems</div>
    <div class="cover-desc">A complete guide to building, deploying, and evaluating AI agents — ReAct, multi-agent orchestration, safety, and production-grade frameworks.</div>
    <div class="cover-stats">
      <div><div class="cs-n">${topics.length}</div><div class="cs-l">MODULES</div></div>
      <div><div class="cs-n">3</div><div class="cs-l">LEVELS</div></div>
      <div><div class="cs-n">${done}</div><div class="cs-l">DONE</div></div>
    </div>
  </div>`;

  html += `<div class="toc"><div class="toc-title">// TABLE OF CONTENTS</div><div class="toc-rule"></div>`;
  ['beginner','medium','advanced'].forEach(lvl => {
    const ts = topics.filter(t => t.level === lvl);
    html += `<div class="toc-lvl"><div class="toc-lh ${lvl.slice(0,3)}">[${lvl.toUpperCase()}]</div>`;
    ts.forEach(t => {
      html += `<div class="toc-row"><span style="flex:1">${t.title}</span><span class="toc-n">MODULE_${String(topics.indexOf(t)+1).padStart(2,'0')}</span></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  topics.forEach((t, idx) => {
    const tc  = t.level === 'beginner' ? 'tp-beg' : t.level === 'medium' ? 'tp-med' : 'tp-adv';
    const lbl = t.level === 'beginner' ? '[ BEG ]' : t.level === 'medium' ? '[ MED ]' : '[ ADV ]';
    const doc = parser.parseFromString(`<div>${t.content}</div>`, 'text/html');

    html += `<div class="tp">
      <div class="tp-tag ${tc}">${lbl} ${t.level.toUpperCase()}</div>
      <div class="tp-title">${t.title}</div>
      <div class="tp-desc">${t.desc}</div>
      <div class="div"></div>`;

    doc.querySelectorAll('.sec').forEach(sec => {
      const h = sec.querySelector('.sec-title');
      if (h) html += `<div class="sec-h">${h.textContent.trim()}</div>`;

      sec.querySelectorAll('.prose').forEach(p => {
        const txt = p.innerHTML.replace(/<code>(.*?)<\/code>/g,'$1').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        html += `<div class="prose">${txt}</div>`;
      });

      sec.querySelectorAll('.math-card').forEach(mc => {
        const lbl  = mc.querySelector('.lbl')?.textContent?.trim() || '';
        const math = mc.querySelector('.math-disp')?.innerHTML?.trim() || '';
        html += `<div class="math-box"><div class="ml">${lbl}</div><div class="mc">${math}</div></div>`;
      });

      sec.querySelectorAll('.callout').forEach(c => {
        const txt = c.innerHTML.replace(/<div class="callout-ico">.*?<\/div>/gs,'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        html += `<div class="callout-pdf">${txt}</div>`;
      });

      sec.querySelectorAll('.step-item').forEach(si => {
        const n = si.querySelector('.step-num')?.textContent || '';
        const st = si.querySelector('.step-title')?.textContent || '';
        const sd = si.querySelector('.step-desc')?.textContent || '';
        html += `<div class="step-pdf"><div class="step-n-pdf">${n}</div><div><div class="step-t">${st}</div><div class="step-d">${sd}</div></div></div>`;
      });

      sec.querySelectorAll('.flow-diagram').forEach(fd => {
        html += `<div class="flow-pdf">${fd.textContent}</div>`;
      });

      const statCards = sec.querySelectorAll('.stat-card');
      if (statCards.length) {
        html += `<div class="stats-row">`;
        statCards.forEach(sc => {
          html += `<div class="stat-c"><div class="stat-n">${sc.querySelector('.stat-n')?.textContent||''}</div><div class="stat-l">${sc.querySelector('.stat-l')?.textContent||''}</div></div>`;
        });
        html += `</div>`;
      }

      sec.querySelectorAll('.chip-row').forEach(cr => {
        html += `<div class="chip-row-pdf">`;
        cr.querySelectorAll('.chip').forEach(c => {
          html += `<span class="chip-pdf">${c.textContent}</span>`;
        });
        html += `</div>`;
      });

      sec.querySelectorAll('.cmp-table').forEach(tbl => {
        html += tbl.outerHTML.replace(/class="[^"]*good[^"]*"/g,'').replace(/class="[^"]*bad[^"]*"/g,'').replace(/class="[^"]*ok[^"]*"/g,'');
      });

      sec.querySelectorAll('code.language-python').forEach(ce => {
        const fn = ce.closest('.code-wrap')?.querySelector('.file-lbl')?.textContent || 'python';
        html += `<div class="code-box">
          <div class="code-hdr-pdf"><span style="color:#ff5f57">●</span><span style="color:#ffbd2e">●</span><span style="color:#28c840">●</span><span style="margin-left:8px;color:#3d6b3d">${fn}</span></div>
          <div class="code-body">${hlCode(ce.textContent)}</div>
        </div>`;
      });
    });

    if (t.quiz?.length) {
      html += `<div class="quiz-sec"><div class="quiz-hdr">// KNOWLEDGE CHECK</div>`;
      t.quiz.forEach((q, qi) => {
        html += `<div class="qi">
          <div class="qi-n">QUESTION_${String(qi+1).padStart(2,'0')}</div>
          <div class="qi-q">${q.q}</div>
          <div class="qi-opts">${q.opts.map((o,oi) => `<div class="qi-opt ${oi===q.ans?'cor':''}">${oi===q.ans?'[✓] ':'[ ] '}${o}</div>`).join('')}</div>
          <div class="qi-exp">// ${q.exp}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `<div class="footer">// AGENT.SYS — MODULE_${String(idx+1).padStart(2,'0')} OF ${String(topics.length).padStart(2,'0')} — ${t.title.toUpperCase()}</div></div>`;
  });

  html += `</body></html>`;
  return html;
}

function openPdf(html) {
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.onload = () => {
    const link = win.document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css';
    win.document.head.appendChild(link);
    const s1 = win.document.createElement('script');
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js';
    win.document.head.appendChild(s1);
    s1.onload = () => {
      const s2 = win.document.createElement('script');
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js';
      win.document.head.appendChild(s2);
      s2.onload = () => {
        win.renderMathInElement(win.document.body, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true }
          ],
          throwOnError: false
        });
        setTimeout(() => { win.focus(); win.print(); }, 900);
      };
    };
  };
}

function downloadAll()     { openPdf(buildPdf(TOPICS)); }
function downloadCurrent() { if (S.current) openPdf(buildPdf([S.current])); }
