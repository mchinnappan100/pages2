<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico">
<title>Maths and LLMs</title>
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      animation: {
        fadeIn: "fadeIn 0.3s ease-out"
      },
      keyframes: {
        fadeIn: {
          "0%": { opacity: 0 },
          "100%": { opacity: 1 }
        }
      }
    }
  }
}
</script>

<style>

html, body {
  height: 100%;
}

.sepia {
  filter: sepia(0.85) hue-rotate(330deg);
  background-color: #f4ecd8;
}

.sidebar-item {
  cursor: pointer;
  transition: all 0.15s;
}

.sidebar-item:hover {
  background-color: rgba(59,130,246,0.2);
}

.active {
  background-color: rgba(59,130,246,0.35);
}

#splitter {
  width: 6px;
  cursor: col-resize;
  background: transparent;
  position: relative;
}

#splitter::before {
  content: "";
  position: absolute;
  left: 2px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: rgba(100,100,100,0.4);
  transition: all 0.2s;
}

#splitter:hover::before {
  background: rgb(59,130,246);
  width: 4px;
  left: 1px;
}

</style>

</head>


<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">


<!-- Top bar -->

<header class="flex items-center justify-between px-6 py-4 border-b border-gray-300 dark:border-gray-700">

<div class="text-xl font-bold">Math and AI </div>

<div class="flex gap-2">

<button onclick="setTheme('light')" class="px-3 py-1 rounded bg-gray-200 dark:bg-gray-700">
☀️
</button>

<button onclick="setTheme('dark')" class="px-3 py-1 rounded bg-gray-800 text-white">
🌙
</button>

<button onclick="setTheme('sepia')" class="px-3 py-1 rounded bg-yellow-700 text-white">
📜
</button>

</div>

</header>



<!-- Main layout -->

<div id="container" class="flex w-full" style="height: calc(100vh - 65px);">


<!-- Sidebar -->

<aside id="sidebar"
  class="border-r border-gray-300 dark:border-gray-700 overflow-y-auto"
  style="width:280px; min-width:180px; max-width:600px;">


<div class="p-4 font-semibold text-gray-500 uppercase text-sm">
Math and LLMs
</div>


<nav class="space-y-1 p-2">


<div class="sidebar-item px-4 py-2 rounded" onclick="loadPage('la.html', this)"> Linear Algebra </div>
<div class="sidebar-item px-4 py-2 rounded" onclick="loadPage('llm.html', this)"> LLMs </div>
<div class="sidebar-item px-4 py-2 rounded" onclick="loadPage('agents.html', this)"> Agents </div>
<div class="sidebar-item px-4 py-2 rounded" onclick="loadPage('rl.html', this)"> Reinforcement Learning </div>
<div class="sidebar-item px-4 py-2 rounded" onclick="loadPage('aayn.html', this)"> Attention is all you need </div>




</nav>

</aside>



<!-- Splitter -->

<div id="splitter"></div>



<!-- Content -->

<main id="main" class="flex-1 overflow-auto">

<div id="content" class="h-full">

<div class="flex items-center justify-center h-full text-gray-500 text-xl">

Select a page from the left panel

</div>

</div>

</main>


</div>



<script>

/* ---------- Load Pages ---------- */

async function loadPage(file, element) {

document.querySelectorAll(".sidebar-item")
.forEach(e => e.classList.remove("active"));

element.classList.add("active");

const content = document.getElementById("content");

content.innerHTML =
`<div class="p-6 text-gray-500">Loading...</div>`;

try {

const response = await fetch(file);

const text = await response.text();

if(file.endsWith(".md")) {

content.innerHTML =
`<div class="prose dark:prose-invert max-w-none p-8 animate-fadeIn">
${marked.parse(text)}
</div>`;

}
else {

content.innerHTML =
`<iframe src="${file}"
class="w-full h-full border-0 animate-fadeIn">
</iframe>`;

}

}
catch {

content.innerHTML =
`<div class="p-6 text-red-500">
Failed to load ${file}
</div>`;

}

}



/* ---------- Theme ---------- */

function setTheme(theme) {

const html = document.documentElement;

html.classList.remove("dark", "sepia");

if(theme === "dark")
html.classList.add("dark");

if(theme === "sepia")
html.classList.add("sepia");

localStorage.setItem("theme", theme);

}

(function(){

const saved = localStorage.getItem("theme");

if(saved)
setTheme(saved);

})();



/* ---------- Splitter ---------- */

const sidebar = document.getElementById("sidebar");
const splitter = document.getElementById("splitter");

let dragging = false;

splitter.addEventListener("mousedown", () => {

dragging = true;
document.body.style.cursor = "col-resize";

});

document.addEventListener("mousemove", (e) => {

if(!dragging) return;

let newWidth = e.clientX;

if(newWidth < 180) newWidth = 180;
if(newWidth > 600) newWidth = 600;

sidebar.style.width = newWidth + "px";

});

document.addEventListener("mouseup", () => {

dragging = false;
document.body.style.cursor = "default";

});


/* Touch */

splitter.addEventListener("touchstart", () => {
dragging = true;
});

document.addEventListener("touchmove", (e) => {

if(!dragging) return;

let newWidth = e.touches[0].clientX;

if(newWidth < 180) newWidth = 180;
if(newWidth > 600) newWidth = 600;

sidebar.style.width = newWidth + "px";

});

document.addEventListener("touchend", () => {
dragging = false;
});


/* Double click reset */

splitter.addEventListener("dblclick", () => {

sidebar.style.width = "280px";

});


</script>



</body>
</html>
