<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinearAlgebra.AI — Master the Math Behind AI</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Prism.js for syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   THEMES
═══════════════════════════════════════════ */
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1a2233;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #f59e0b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --success: #10b981;
  --danger: #ef4444;
  --beginner: #10b981;
  --medium: #f59e0b;
  --advanced: #ef4444;
  --sidebar-w: 300px;
  --header-h: 60px;
  --glow: 0 0 20px rgba(0,212,255,0.15);
  --card-bg: rgba(26, 34, 51, 0.8);
  --code-bg: #0d1117;
}

[data-theme="light"] {
  --bg: #f0f4ff;
  --bg2: #ffffff;
  --bg3: #e8eef8;
  --border: #c7d4e8;
  --accent: #2563eb;
  --accent2: #7c3aed;
  --accent3: #d97706;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --glow: 0 0 20px rgba(37,99,235,0.1);
  --card-bg: rgba(255,255,255,0.9);
  --code-bg: #1e1e2e;
}

[data-theme="forest"] {
  --bg: #0a1628;
  --bg2: #0f2040;
  --bg3: #163052;
  --border: #1e4060;
  --accent: #4ade80;
  --accent2: #22d3ee;
  --accent3: #fbbf24;
  --text: #e0f2fe;
  --text2: #7dd3fc;
  --text3: #38bdf8;
  --glow: 0 0 20px rgba(74,222,128,0.15);
  --card-bg: rgba(15,32,64,0.9);
  --code-bg: #0a1628;
}

[data-theme="sunset"] {
  --bg: #1a0a2e;
  --bg2: #2d1b69;
  --bg3: #3d2482;
  --border: #5b35a0;
  --accent: #ff6b6b;
  --accent2: #ffd93d;
  --accent3: #6bcb77;
  --text: #ffe4e6;
  --text2: #fca5a5;
  --text3: #f87171;
  --glow: 0 0 20px rgba(255,107,107,0.2);
  --card-bg: rgba(45,27,105,0.8);
  --code-bg: #1a0a2e;
}

[data-theme="minimal"] {
  --bg: #fafafa;
  --bg2: #ffffff;
  --bg3: #f4f4f5;
  --border: #e4e4e7;
  --accent: #18181b;
  --accent2: #52525b;
  --accent3: #a1a1aa;
  --text: #18181b;
  --text2: #52525b;
  --text3: #a1a1aa;
  --glow: none;
  --card-bg: #ffffff;
  --code-bg: #18181b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: relative;
  z-index: 100;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  color: var(--accent);
  text-shadow: var(--glow);
}

.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  font-family: 'Space Mono', monospace;
  color: white;
  font-weight: 700;
}

.header-subtitle {
  font-size: 0.7rem;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-left: 1px solid var(--border);
  padding-left: 12px;
  margin-left: 4px;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress-pill {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.75rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}

.progress-bar-mini {
  width: 60px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.5s;
}

.theme-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

.theme-picker {
  position: absolute;
  top: calc(var(--header-h) + 4px);
  right: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px;
  display: none;
  z-index: 200;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.theme-picker.open { display: flex; }
.theme-opt {
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text2);
  transition: all 0.15s;
  white-space: nowrap;
}
.theme-opt:hover, .theme-opt.active { background: var(--bg3); color: var(--accent); }

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.2s;
}
.sidebar-search input::placeholder { color: var(--text3); }
.sidebar-search input:focus { border-color: var(--accent); }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.level-section { margin-bottom: 8px; }

.level-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  cursor: pointer;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.15s;
  user-select: none;
}
.level-header:hover { background: var(--bg3); }

.level-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.beginner .level-dot { background: var(--beginner); }
.medium .level-dot { background: var(--medium); }
.advanced .level-dot { background: var(--advanced); }

.level-label.beginner { color: var(--beginner); }
.level-label.medium { color: var(--medium); }
.level-label.advanced { color: var(--advanced); }

.level-chevron {
  margin-left: auto;
  font-size: 0.7rem;
  color: var(--text3);
  transition: transform 0.2s;
}
.level-section.collapsed .level-chevron { transform: rotate(-90deg); }
.level-section.collapsed .topic-list { display: none; }

.topic-list { padding: 2px 0 4px 0; }

.topic-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px 7px 22px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--text2);
  transition: all 0.15s;
  position: relative;
}
.topic-item:hover { background: var(--bg3); color: var(--text); }
.topic-item.active {
  background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(124,58,237,0.08));
  color: var(--accent);
  border: 1px solid rgba(0,212,255,0.15);
}
.topic-check {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
  margin-left: auto;
  transition: all 0.2s;
}
.topic-check.done {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
}
.download-all-btn {
  width: 100%;
  padding: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 8px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.download-all-btn:hover { opacity: 0.85; }

/* ═══════════════════════════════════════════
   CONTENT AREA
═══════════════════════════════════════════ */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.content-toolbar {
  height: 48px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  color: var(--text3);
}
.breadcrumb span { color: var(--text); font-weight: 500; }

.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.tool-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 12px;
  color: var(--text2);
  font-size: 0.75rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: white;
}
.tool-btn.primary:hover { opacity: 0.85; }

.content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.content-scroll::-webkit-scrollbar { width: 6px; }
.content-scroll::-webkit-scrollbar-track { background: transparent; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══════════════════════════════════════════
   CONTENT STYLES
═══════════════════════════════════════════ */
.topic-header {
  margin-bottom: 32px;
}

.topic-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.tag-beginner { background: rgba(16,185,129,0.12); color: var(--beginner); border: 1px solid rgba(16,185,129,0.2); }
.tag-medium { background: rgba(245,158,11,0.12); color: var(--medium); border: 1px solid rgba(245,158,11,0.2); }
.tag-advanced { background: rgba(239,68,68,0.12); color: var(--advanced); border: 1px solid rgba(239,68,68,0.2); }

.topic-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 8px;
}

.topic-desc {
  font-size: 1rem;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 12px;
}

.llm-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(0,212,255,0.1));
  border: 1px solid rgba(124,58,237,0.3);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.8rem;
  color: var(--accent2);
}

.section {
  margin-bottom: 28px;
}

.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.prose {
  font-size: 0.92rem;
  line-height: 1.75;
  color: var(--text2);
  margin-bottom: 16px;
}

/* Math card */
.math-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 16px 0;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}
.math-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.math-card .label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.math-display {
  font-size: 1.1rem;
  text-align: center;
  padding: 8px 0;
  overflow-x: auto;
}

/* Code block */
.code-wrap {
  position: relative;
  margin: 16px 0;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.code-header {
  background: #1a1f2e;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: #64748b;
}
.code-header .dots { display: flex; gap: 5px; }
.code-header .dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #ffbd2e; }
.dot-g { background: #28c840; }
.code-label { margin-left: auto; color: #4ade80; font-size: 0.65rem; letter-spacing: 0.1em; }
.copy-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  padding: 2px 8px;
  color: #94a3b8;
  cursor: pointer;
  font-size: 0.65rem;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.copy-btn:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }

pre[class*="language-"] {
  margin: 0 !important;
  border-radius: 0 !important;
  font-size: 0.82rem !important;
  background: var(--code-bg) !important;
  padding: 16px !important;
}
code[class*="language-"] { font-family: 'Space Mono', monospace !important; }

/* Visualization grid */
.visual-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin: 16px 0;
}

.visual-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  font-size: 0.8rem;
  text-align: center;
}
.visual-card .vc-label { color: var(--text3); font-size: 0.7rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.visual-card .vc-value { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 0.85rem; line-height: 1.6; }

/* Matrix display */
.matrix-container {
  display: inline-flex;
  align-items: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
}
.matrix-bracket {
  font-size: 2.5rem;
  color: var(--text2);
  line-height: 1;
  padding: 0 4px;
}
.matrix-vals { display: flex; flex-direction: column; gap: 4px; }
.matrix-row { display: flex; gap: 16px; }
.matrix-cell { color: var(--accent); min-width: 30px; text-align: right; }

/* Callout boxes */
.callout {
  border-radius: 10px;
  padding: 14px 18px;
  margin: 16px 0;
  font-size: 0.87rem;
  line-height: 1.6;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.callout-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.callout.info { background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.15); color: var(--text2); }
.callout.tip { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.15); color: var(--text2); }
.callout.llm { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2); color: var(--text2); }
.callout strong { color: var(--text); }

/* Nav buttons */
.nav-btns {
  display: flex;
  gap: 12px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  flex: 1;
  padding: 12px 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.next {
  background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(124,58,237,0.08));
  border-color: rgba(0,212,255,0.2);
  color: var(--accent);
}

/* Mark complete btn */
.complete-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 24px;
}
.complete-btn:hover { border-color: var(--success); color: var(--success); }
.complete-btn.done { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: var(--success); }

/* ═══════════════════════════════════════════
   QUIZ MODAL
═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 90%;
  max-width: 580px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}

.modal-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 24px;
}
.modal-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.modal-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--text); }

def scaled_dot_product_attention(Q, K, V):
    """
    Q: queries  (seq_len, d_k)
    K: keys     (seq_len, d_k)
    V: values   (seq_len, d_v)

def pca_from_scratch(X, n_components=2):
    """
    PCA via eigendecomposition of covariance matrix.
    X: (n_samples, n_features)
    """
    # Step 1: Center the data
    X_centered = X - X.mean(axis=0)
    
    # Step 2: Covariance matrix
    n = X.shape[0]
    C = (X_centered.T @ X_centered) / (n - 1)
    
    # Step 3: Eigendecomposition
    eigenvalues, eigenvectors = np.linalg.eig(C)
    
    # Step 4: Sort by descending eigenvalue
    idx = np.argsort(eigenvalues)[::-1]
    eigenvalues = eigenvalues[idx]
    eigenvectors = eigenvectors[:, idx]
    
    # Step 5: Project onto top n_components
    components = eigenvectors[:, :n_components]
    X_reduced = X_centered @ components
    
    # Explained variance ratio
    exp_var = eigenvalues[:n_components] / eigenvalues.sum()
    print(f"Explained variance: {exp_var.round(3)}")
    return X_reduced

loss = 0.5 * np.sum((y - target)**2)  # MSE loss

# Backward pass (analytical gradients)
dL_dy = y - target            # ∂L/∂y  shape: (n_out,)
dL_dW = np.outer(dL_dy, x)   # ∂L/∂W = (∂L/∂y) ⊗ x
dL_db = dL_dy                 # ∂L/∂b = ∂L/∂y
dL_dx = W.T @ dL_dy           # ∂L/∂x = W^T (∂L/∂y)

print(f"Loss:    {loss:.6f}")
print(f"dL/dW:\n{dL_dW.round(4)}")
print(f"dL/db:   {dL_db.round(4)}")
print(f"dL/dx:   {dL_dx.round(4)}")

# Verify with numerical gradient
eps = 1e-5
dL_dW_num = np.zeros_like(W)
for i in range(n_out):
    for j in range(n_in):
        W[i,j] += eps
        y_plus = W @ x + b
        loss_plus = 0.5 * np.sum((y_plus - target)**2)
        W[i,j] -= 2*eps
        y_minus = W @ x + b
        loss_minus = 0.5 * np.sum((y_minus - target)**2)
        W[i,j] += eps
        dL_dW_num[i,j] = (loss_plus - loss_minus) / (2*eps)

print(f"\nNumerical dL/dW:\n{dL_dW_num.round(4)}")
print(f"Match: {np.allclose(dL_dW, dL_dW_num, atol=1e-4)}")</code></pre>

function setTheme(theme) {
  state.theme = theme;
  localStorage.setItem('la_theme', theme);
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? '' : theme);
  // Light needs no attribute override
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else if (theme === 'forest') document.documentElement.setAttribute('data-theme', 'forest');
  else if (theme === 'sunset') document.documentElement.setAttribute('data-theme', 'sunset');
  else if (theme === 'minimal') document.documentElement.setAttribute('data-theme', 'minimal');
  else document.documentElement.removeAttribute('data-theme');
  
  document.querySelectorAll('.theme-opt').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  toggleThemePicker();
}

function toggleThemePicker() {
  document.getElementById('themePicker').classList.toggle('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.theme-btn') && !e.target.closest('.theme-picker')) {
    document.getElementById('themePicker').classList.remove('open');
  }
});

// ═══════════════════════════════════════════
function buildSidebar(filter = '') {
  const nav = document.getElementById('sidebarNav');
  const levels = ['beginner', 'medium', 'advanced'];
  nav.innerHTML = '';
  
  levels.forEach(level => {
    const topics = TOPICS.filter(t => t.level === level && 
      (!filter || t.title.toLowerCase().includes(filter.toLowerCase())));
    if (topics.length === 0) return;
    
    const section = document.createElement('div');
    section.className = `level-section`;
    
    const completedInLevel = topics.filter(t => state.completed[t.id]).length;
    
    section.innerHTML = `
      <div class="level-header" onclick="toggleSection(this)">
        <div class="level-dot"></div>
        <span class="level-label ${level}">${level.charAt(0).toUpperCase()+level.slice(1)}</span>
        <span style="color:var(--text3);font-size:0.7rem;margin-left:auto">${completedInLevel}/${topics.length}</span>
        <span class="level-chevron">▾</span>
      </div>
      <div class="topic-list">
        ${topics.map(t => `
          <div class="topic-item ${state.currentTopic?.id === t.id ? 'active' : ''}" 
               onclick="loadTopic('${t.id}')">
            <span style="flex:1">${t.title}</span>
            ${t.llm ? '<span class="llm-icon" title="LLM Connection">🧠</span>' : ''}
            <div class="topic-check ${state.completed[t.id] ? 'done' : ''}">
              ${state.completed[t.id] ? '✓' : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
    
    nav.appendChild(section);
  });
}

function toggleSection(header) {
  header.parentElement.classList.toggle('collapsed');
}

function filterTopics(val) {
  buildSidebar(val);
}

// LOAD TOPIC
// ═══════════════════════════════════════════
function loadTopic(id) {
  const topic = TOPICS.find(t => t.id === id);
  if (!topic) return;
  state.currentTopic = topic;
  
  // Update toolbar
  document.getElementById('toolbarRight').style.display = 'flex';
  document.getElementById('breadcrumb').innerHTML = `
    <a href="#" onclick="renderWelcome()" style="color:var(--text3);text-decoration:none">Home</a>
    <span style="color:var(--text3)"> / </span>
    <span style="text-transform:capitalize">${topic.level}</span>
    <span style="color:var(--text3)"> / </span>
    <span>${topic.title}</span>
  `;
  
  // Build content
  const levelTag = topic.level;
  const isCompleted = state.completed[topic.id];
  
  const idx = TOPICS.indexOf(topic);
  const prev = idx > 0 ? TOPICS[idx - 1] : null;
  const next = idx < TOPICS.length - 1 ? TOPICS[idx + 1] : null;
  
  document.getElementById('contentScroll').innerHTML = `
    <div class="topic-header">
      <div class="topic-tag tag-${levelTag}">
        <span>${levelTag === 'beginner' ? '🟢' : levelTag === 'medium' ? '🟡' : '🔴'}</span>
        ${levelTag.toUpperCase()}
      </div>
      <div class="topic-title">${topic.title}</div>
      <div class="topic-desc">${topic.desc}</div>
      ${topic.llm ? `<div class="llm-badge">🧠 <strong>LLM Application:</strong> &nbsp;${topic.llm}</div>` : ''}
    </div>
    
    ${topic.content}
    
    <button class="complete-btn ${isCompleted ? 'done' : ''}" 
            id="completeBtn"
            onclick="toggleComplete('${topic.id}')">
      ${isCompleted ? '✓ Completed' : '○ Mark as Complete'}
    </button>
    
    <div class="nav-btns">
      ${prev ? `<button class="nav-btn" onclick="loadTopic('${prev.id}')">← ${prev.title}</button>` : '<div></div>'}
      ${next ? `<button class="nav-btn next" onclick="loadTopic('${next.id}')">${next.title} →</button>` : '<div></div>'}
    </div>
  `;
  
  // Render math
  renderMathInElement(document.getElementById('contentScroll'), {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\(', right: '\\)', display: false},
      {left: '\\[', right: '\\]', display: true}
    ],
    throwOnError: false
  });
  
  // Highlight code
  Prism.highlightAllUnder(document.getElementById('contentScroll'));
  
  // Scroll to top
  document.getElementById('contentScroll').scrollTop = 0;
  
  // Rebuild sidebar to update active state
  buildSidebar();
}

function toggleComplete(id) {
  state.completed[id] = !state.completed[id];
  saveCompleted();
  updateProgress();
  
  const btn = document.getElementById('completeBtn');
  if (btn) {
    btn.textContent = state.completed[id] ? '✓ Completed' : '○ Mark as Complete';
    btn.className = `complete-btn ${state.completed[id] ? 'done' : ''}`;
  }
  buildSidebar();
}

function copyCode(btn) {
  const code = btn.closest('.code-wrap').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// QUIZ
// ═══════════════════════════════════════════
function openQuiz() {
  if (!state.currentTopic?.quiz) return;
  
  state.quizState = {
    questions: [...state.currentTopic.quiz],
    current: 0,
    answers: [],
    answered: false
  };
  
  renderQuizQuestion();
  document.getElementById('quizModal').classList.add('open');
}

function renderQuizQuestion() {
  const qs = state.quizState;
  const q = qs.questions[qs.current];
  const total = qs.questions.length;
  const pct = (qs.current / total) * 100;
  
  document.getElementById('quizContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-icon">✦</div>
      <div>
        <div class="modal-title">Knowledge Check</div>
        <div class="modal-subtitle">${state.currentTopic.title}</div>
      </div>
      <button class="modal-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="quiz-progress">
      <div class="quiz-prog-bar">
        <div class="quiz-prog-fill" style="width:${pct}%"></div>
      </div>
      <span class="quiz-prog-label">${qs.current + 1} / ${total}</span>
    </div>
    <div class="quiz-question">
      <div class="q-text" id="qText">Q${qs.current+1}. ${q.q}</div>
      <div class="q-options" id="qOpts">
        ${q.opts.map((opt, i) => `
          <button class="q-option" id="opt${i}" onclick="selectAnswer(${i})">${opt}</button>
        `).join('')}
      </div>
      <div class="q-explanation" id="qExp">${q.exp}</div>
    </div>
    <div class="quiz-actions">
      <button class="quiz-btn secondary" onclick="closeQuiz()">Exit</button>
      <button class="quiz-btn primary" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
    </div>
  `;
  
  // Render math in quiz
  renderMathInElement(document.getElementById('quizContent'), {
    delimiters: [{left:'\\(', right:'\\)', display:false}],
    throwOnError: false
  });
}

function selectAnswer(idx) {
  const qs = state.quizState;
  if (qs.answered) return;
  qs.answered = true;
  
  const q = qs.questions[qs.current];
  qs.answers.push(idx === q.ans ? 1 : 0);
  
  document.querySelectorAll('.q-option').forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && idx !== q.ans) el.classList.add('wrong');
  });
  
  document.getElementById('qExp').classList.add('show');
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = 
    qs.current < qs.questions.length - 1 ? 'Next →' : 'See Results';
}

function nextQuestion() {
  const qs = state.quizState;
  qs.current++;
  qs.answered = false;
  
  if (qs.current >= qs.questions.length) {
    showQuizResults();
  } else {
    renderQuizQuestion();
  }
}

function showQuizResults() {
  const qs = state.quizState;
  const correct = qs.answers.reduce((a, b) => a + b, 0);
  const total = qs.questions.length;
  const pct = Math.round((correct / total) * 100);
  
  let emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '📚';
  let msg = pct >= 80 ? 'Excellent work!' : pct >= 50 ? 'Good progress!' : 'Keep studying!';
  
  document.getElementById('quizContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-icon">🏆</div>
      <div>
        <div class="modal-title">Quiz Complete!</div>
        <div class="modal-subtitle">${state.currentTopic.title}</div>
      </div>
      <button class="modal-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="quiz-result">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-label">${correct} / ${total} correct — ${msg}</div>
      <div style="margin-top:16px;font-size:0.8rem;color:var(--text3)">
        ${pct >= 80 ? "You've mastered this topic!" : "Review the material and try again."}
      </div>
    </div>
    <div class="quiz-actions" style="margin-top:24px">
      <button class="quiz-btn secondary" onclick="closeQuiz()">Close</button>
      <button class="quiz-btn primary" onclick="retakeQuiz()">Retake Quiz</button>
    </div>
  `;
  
  if (pct === 100) {
    state.completed[state.currentTopic.id] = true;
    saveCompleted();
    updateProgress();
    buildSidebar();
  }
}

function retakeQuiz() {
  state.quizState = {
    questions: [...state.currentTopic.quiz],
    current: 0,
    answers: [],
    answered: false
  };
  renderQuizQuestion();
}

function closeQuiz() {
  document.getElementById('quizModal').classList.remove('open');
}

// Close modal on overlay click
document.getElementById('quizModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('quizModal')) closeQuiz();
});

function syntaxHighlightForPdf(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#[^\n]*)/g, '<span class="cm">$1</span>')
    .replace(/\b(import|from|def|return|for|if|else|in|as|class|print|True|False|None|and|or|not|with|yield|lambda)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(np|numpy|math|os|sys)\b/g, '<span class="fn">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="st">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="nm">$1</span>');
}

function buildPdfHtml(topics) {
  const done = Object.keys(state.completed).filter(k => state.completed[k]).length;

  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>LinearAlgebra.AI — Complete Curriculum</title>
  <style>${PDF_STYLES}</style></head><body>`;

  // Cover page
  html += `
  <div class="pdf-cover">
    <div class="pdf-cover-logo">Λ LinearAlgebra.AI</div>
    <div class="pdf-cover-sub">Master the Math Behind AI</div>
    <div class="pdf-cover-title">Complete Curriculum</div>
    <div class="pdf-cover-desc">From scalars and vectors to SVD and tensor calculus — every concept explained with Python code and real LLM applications.</div>
    <div class="pdf-cover-stats">
      <div class="stat"><div class="stat-n">${topics.length}</div><div class="stat-l">Topics</div></div>
      <div class="stat"><div class="stat-n">3</div><div class="stat-l">Levels</div></div>
      <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">Completed</div></div>
    </div>
  </div>`;

  // Table of contents
  html += `<div class="toc-page">
    <div class="toc-title">Table of Contents</div>
    <div class="toc-line"></div>`;
  ['beginner','medium','advanced'].forEach(level => {
    const lt = topics.filter(t => t.level === level);
    html += `<div class="toc-level">
      <div class="toc-level-title ${level}">${level}</div>`;
    lt.forEach(t => {
      const globalIdx = topics.indexOf(t) + 1;
      html += `<div class="toc-item">
        <span class="toc-item-title">${t.title}</span>
        <span class="toc-item-num">Topic ${globalIdx}</span>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // Topic pages — parse raw content string via a detached DOM parser
  // so LaTeX is still raw \( ... \) and not yet KaTeX-rendered
  const parser = new DOMParser();

  topics.forEach((t, idx) => {
    const tagClass = t.level === 'beginner' ? 'tag-b' : t.level === 'medium' ? 'tag-m' : 'tag-a';
    const emoji = t.level === 'beginner' ? '🟢' : t.level === 'medium' ? '🟡' : '🔴';

    // Parse the raw content (LaTeX intact, not yet rendered)
    const doc = parser.parseFromString(`<div>${t.content}</div>`, 'text/html');

    html += `<div class="topic-page">
      <div class="topic-level-tag ${tagClass}">${emoji} ${t.level}</div>
      <div class="topic-title">${t.title}</div>
      <div class="topic-desc">${t.desc}</div>`;

    if (t.llm) {
      html += `<div class="llm-box"><strong>🧠 LLM Application:</strong> ${t.llm}</div>`;
    }

    html += `<div class="divider"></div>`;

    doc.querySelectorAll('.section').forEach(sec => {
      // Section heading
      const h = sec.querySelector('.section-title');
      if (h) {
        // Strip the ::after pseudo-element text — just use the text node
        html += `<div class="section-h">${h.childNodes[0]?.textContent?.trim() || h.textContent.trim()}</div>`;
      }

      // Prose paragraphs
      sec.querySelectorAll('.prose').forEach(p => {
        // Keep inline HTML like <strong> but strip complex tags
        html += `<div class="prose">${p.innerHTML.replace(/<\/?(?:strong|em)>/g, m => m).replace(/<[^>]+>/g, '')}</div>`;
      });

      // Math cards — raw LaTeX preserved since we parsed from string
      sec.querySelectorAll('.math-card').forEach(mc => {
        const lbl  = mc.querySelector('.label')?.textContent?.trim() || '';
        const math = mc.querySelector('.math-display')?.innerHTML?.trim() || '';
        html += `<div class="math-box"><div class="lbl">${lbl}</div><div class="math-content">${math}</div></div>`;
      });

      // Callout boxes
      sec.querySelectorAll('.callout').forEach(c => {
        const inner = c.innerHTML
          .replace(/<div class="callout-icon">.*?<\/div>/s, '')
          .replace(/<[^>]+>/g, ' ')
          .replace(/\s+/g, ' ').trim();
        html += `<div class="prose" style="background:#f1f5f9;border-left:3px solid #6366f1;padding:10px 14px;border-radius:0 6px 6px 0;margin:10px 0">${inner}</div>`;
      });

      // Visual grids — render as simple table
      sec.querySelectorAll('.visual-grid').forEach(vg => {
        html += `<div style="display:flex;gap:10px;margin:12px 0;flex-wrap:wrap">`;
        vg.querySelectorAll('.visual-card').forEach(vc => {
          const lbl = vc.querySelector('.vc-label')?.textContent || '';
          const val = vc.querySelector('.vc-value')?.textContent || '';
          html += `<div style="flex:1;min-width:120px;background:#f8faff;border:1px solid #e0e7ff;border-radius:8px;padding:10px;text-align:center;font-size:0.78rem">
            <div style="color:#6366f1;font-size:0.65rem;font-weight:700;text-transform:uppercase;margin-bottom:5px">${lbl}</div>
            <div style="font-family:'Space Mono',monospace;color:#1e293b">${val}</div>
          </div>`;
        });
        html += `</div>`;
      });

      // Code blocks
      sec.querySelectorAll('code.language-python').forEach(codeEl => {
        const header = codeEl.closest('.code-wrap')?.querySelector('.code-header span:nth-child(2)')?.textContent || 'python';
        const raw    = codeEl.textContent;
        html += `<div class="code-box">
          <div class="code-header-pdf">
            <span style="color:#ff5f57">●</span><span style="color:#ffbd2e">●</span><span style="color:#28c840">●</span>
            <span style="margin-left:8px">${header}</span>
          </div>
          <div class="code-content">${syntaxHighlightForPdf(raw)}</div>
        </div>`;
      });
    });

    // Quiz section
    if (t.quiz && t.quiz.length > 0) {
      html += `<div class="quiz-section">
        <div class="quiz-title">✦ Knowledge Check Quiz</div>`;
      t.quiz.forEach((q, qi) => {
        html += `<div class="q-item">
          <div class="q-num">Question ${qi + 1}</div>
          <div class="q-text">${q.q}</div>
          <div class="q-opts">
            ${q.opts.map((o, oi) => `<div class="q-opt ${oi === q.ans ? 'correct' : ''}">${oi === q.ans ? '✓ ' : '○ '}${o}</div>`).join('')}
          </div>
          <div class="q-exp">💡 ${q.exp}</div>
        </div>`;
      });
      html += `</div>`;
    }

    html += `<div class="footer">LinearAlgebra.AI — Topic ${idx + 1} of ${topics.length}: ${t.title}</div></div>`;
  });

  html += `</body></html>`;
  return html;
}

function openPdfWindow(html, filename) {
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();

  win.onload = () => {
    // 1. Inject KaTeX CSS
    const link = win.document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css';
    win.document.head.appendChild(link);

    // 2. Inject KaTeX core JS
    const script1 = win.document.createElement('script');
    script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js';
    win.document.head.appendChild(script1);

    script1.onload = () => {
      // 3. Inject auto-render extension
      const script2 = win.document.createElement('script');
      script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js';
      win.document.head.appendChild(script2);

      script2.onload = () => {
        // 4. Render all \( ... \) and $$ ... $$ in the PDF window
        win.renderMathInElement(win.document.body, {
          delimiters: [
            { left: '$$',  right: '$$',  display: true  },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true  }
          ],
          throwOnError: false
        });

        // 5. Short delay to let KaTeX finish layout, then open print dialog
        setTimeout(() => {
          win.focus();
          win.print();
        }, 900);
      };
    };
  };
}

function downloadTopic() {
  if (!state.currentTopic) return;
  openPdfWindow(buildPdfHtml([state.currentTopic]), `LinearAlgebra_${state.currentTopic.id}.pdf`);
}

function downloadAllTopics() {
  openPdfWindow(buildPdfHtml(TOPICS), 'LinearAlgebra_AI_Complete.pdf');
}

function initMatrixBg() {
  const bg = document.getElementById('matrixBg');
  const symbols = ['0','1','∑','Λ','∇','∂','∈','⊗','⊕','α','β','σ','λ','μ'];
  for (let i = 0; i < 18; i++) {
    const col = document.createElement('div');
    col.className = 'matrix-col';
    col.style.animationDuration = (8 + Math.random() * 12) + 's';
    col.style.animationDelay = (Math.random() * 10) + 's';
    col.style.opacity = (0.3 + Math.random() * 0.7).toString();
    for (let j = 0; j < 20; j++) {
      const span = document.createElement('div');
      span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      col.appendChild(span);
    }
    bg.appendChild(col);
  }
}

function init() {
  // Apply saved theme
  if (state.theme && state.theme !== 'dark') {
    document.documentElement.setAttribute('data-theme', state.theme);
  }
  
  initMatrixBg();
  buildSidebar();
  updateProgress();
  renderWelcome();
}
