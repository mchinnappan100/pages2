<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculus.AI — Master Differential & Integral Calculus</title>
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Prism.js for syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   THEMES
═══════════════════════════════════════════ */
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1a2233;
  --border: #1e2d45;
  --accent: #ff6b35;
  --accent2: #e91e8c;
  --accent3: #fbbf24;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --success: #10b981;
  --danger: #ef4444;
  --beginner: #10b981;
  --medium: #f59e0b;
  --advanced: #ef4444;
  --sidebar-w: 300px;
  --header-h: 60px;
  --glow: 0 0 20px rgba(255,107,53,0.15);
  --card-bg: rgba(26, 34, 51, 0.8);
  --code-bg: #0d1117;
}

[data-theme="light"] {
  --bg: #fff8f5;
  --bg2: #ffffff;
  --bg3: #fff1eb;
  --border: #ffd4c2;
  --accent: #e8440a;
  --accent2: #c2185b;
  --accent3: #d97706;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --glow: 0 0 20px rgba(232,68,10,0.1);
  --card-bg: rgba(255,255,255,0.9);
  --code-bg: #1e1e2e;
}

[data-theme="ocean"] {
  --bg: #020c1b;
  --bg2: #0a192f;
  --bg3: #112240;
  --border: #1d3557;
  --accent: #64ffda;
  --accent2: #ccd6f6;
  --accent3: #ffd700;
  --text: #ccd6f6;
  --text2: #8892b0;
  --text3: #4a5568;
  --glow: 0 0 20px rgba(100,255,218,0.15);
  --card-bg: rgba(10,25,47,0.9);
  --code-bg: #020c1b;
}

[data-theme="sunset"] {
  --bg: #1a0a2e;
  --bg2: #2d1b69;
  --bg3: #3d2482;
  --border: #5b35a0;
  --accent: #ff6b6b;
  --accent2: #ffd93d;
  --accent3: #6bcb77;
  --text: #ffe4e6;
  --text2: #fca5a5;
  --text3: #f87171;
  --glow: 0 0 20px rgba(255,107,107,0.2);
  --card-bg: rgba(45,27,105,0.8);
  --code-bg: #1a0a2e;
}

[data-theme="minimal"] {
  --bg: #fafafa;
  --bg2: #ffffff;
  --bg3: #f4f4f5;
  --border: #e4e4e7;
  --accent: #18181b;
  --accent2: #52525b;
  --accent3: #a1a1aa;
  --text: #18181b;
  --text2: #52525b;
  --text3: #a1a1aa;
  --glow: none;
  --card-bg: #ffffff;
  --code-bg: #18181b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: relative;
  z-index: 100;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  color: var(--accent);
  text-shadow: var(--glow);
}

.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  font-family: 'Space Mono', monospace;
  color: white;
  font-weight: 700;
}

.header-subtitle {
  font-size: 0.7rem;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-left: 1px solid var(--border);
  padding-left: 12px;
  margin-left: 4px;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress-pill {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.75rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}

.progress-bar-mini {
  width: 60px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.5s;
}

.theme-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

.theme-picker {
  position: absolute;
  top: calc(var(--header-h) + 4px);
  right: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px;
  display: none;
  z-index: 200;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.theme-picker.open { display: flex; }
.theme-opt {
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text2);
  transition: all 0.15s;
  white-space: nowrap;
}
.theme-opt:hover, .theme-opt.active { background: var(--bg3); color: var(--accent); }

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.2s;
}
.sidebar-search input::placeholder { color: var(--text3); }
.sidebar-search input:focus { border-color: var(--accent); }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.level-section { margin-bottom: 8px; }

.level-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  cursor: pointer;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.15s;
  user-select: none;
}
.level-header:hover { background: var(--bg3); }

.level-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.beginner .level-dot { background: var(--beginner); }
.medium .level-dot { background: var(--medium); }
.advanced .level-dot { background: var(--advanced); }

.level-label.beginner { color: var(--beginner); }
.level-label.medium { color: var(--medium); }
.level-label.advanced { color: var(--advanced); }

.level-chevron {
  margin-left: auto;
  font-size: 0.7rem;
  color: var(--text3);
  transition: transform 0.2s;
}
.level-section.collapsed .level-chevron { transform: rotate(-90deg); }
.level-section.collapsed .topic-list { display: none; }

.topic-list { padding: 2px 0 4px 0; }

.topic-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px 7px 22px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--text2);
  transition: all 0.15s;
  position: relative;
}
.topic-item:hover { background: var(--bg3); color: var(--text); }
.topic-item.active {
  background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(233,30,140,0.08));
  color: var(--accent);
  border: 1px solid rgba(255,107,53,0.15);
}
.topic-check {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
  margin-left: auto;
  transition: all 0.2s;
}
.topic-check.done {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
}
.download-all-btn {
  width: 100%;
  padding: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 8px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.download-all-btn:hover { opacity: 0.85; }

/* ═══════════════════════════════════════════
   CONTENT AREA
═══════════════════════════════════════════ */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.content-toolbar {
  height: 48px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  color: var(--text3);
}
.breadcrumb span { color: var(--text); font-weight: 500; }

.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.tool-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 12px;
  color: var(--text2);
  font-size: 0.75rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: white;
}
.tool-btn.primary:hover { opacity: 0.85; }

.content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.content-scroll::-webkit-scrollbar { width: 6px; }
.content-scroll::-webkit-scrollbar-track { background: transparent; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══════════════════════════════════════════
   CONTENT STYLES
═══════════════════════════════════════════ */
.topic-header { margin-bottom: 32px; }

.topic-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.tag-beginner { background: rgba(16,185,129,0.12); color: var(--beginner); border: 1px solid rgba(16,185,129,0.2); }
.tag-medium { background: rgba(245,158,11,0.12); color: var(--medium); border: 1px solid rgba(245,158,11,0.2); }
.tag-advanced { background: rgba(239,68,68,0.12); color: var(--advanced); border: 1px solid rgba(239,68,68,0.2); }

.topic-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 8px;
}

.topic-desc {
  font-size: 1rem;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 12px;
}

.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, rgba(255,107,53,0.12), rgba(233,30,140,0.08));
  border: 1px solid rgba(255,107,53,0.25);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.8rem;
  color: var(--accent);
}

.section { margin-bottom: 28px; }

.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.prose {
  font-size: 0.92rem;
  line-height: 1.75;
  color: var(--text2);
  margin-bottom: 16px;
}

/* Math card */
.math-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 16px 0;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}
.math-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.math-card .label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.math-display {
  font-size: 1.1rem;
  text-align: center;
  padding: 8px 0;
  overflow-x: auto;
}

/* Code block */
.code-wrap {
  position: relative;
  margin: 16px 0;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.code-header {
  background: #1a1f2e;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: #64748b;
}
.code-header .dots { display: flex; gap: 5px; }
.code-header .dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #ffbd2e; }
.dot-g { background: #28c840; }
.code-label { margin-left: auto; color: #4ade80; font-size: 0.65rem; letter-spacing: 0.1em; }
.copy-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  padding: 2px 8px;
  color: #94a3b8;
  cursor: pointer;
  font-size: 0.65rem;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.copy-btn:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }

pre[class*="language-"] {
  margin: 0 !important;
  border-radius: 0 !important;
  font-size: 0.82rem !important;
  background: var(--code-bg) !important;
  padding: 16px !important;
}
code[class*="language-"] { font-family: 'Space Mono', monospace !important; }

/* Visualization grid */
.visual-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.visual-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  font-size: 0.8rem;
  text-align: center;
}
.visual-card .vc-label { color: var(--text3); font-size: 0.7rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.visual-card .vc-value { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 0.85rem; line-height: 1.6; }

/* Callout boxes */
.callout {
  border-radius: 10px;
  padding: 14px 18px;
  margin: 16px 0;
  font-size: 0.87rem;
  line-height: 1.6;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.callout-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.callout.info { background: rgba(255,107,53,0.06); border: 1px solid rgba(255,107,53,0.15); color: var(--text2); }
.callout.tip { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.15); color: var(--text2); }
.callout.ai { background: rgba(233,30,140,0.07); border: 1px solid rgba(233,30,140,0.2); color: var(--text2); }
.callout strong { color: var(--text); }

/* Nav buttons */
.nav-btns {
  display: flex;
  gap: 12px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  flex: 1;
  padding: 12px 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.next {
  background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(233,30,140,0.08));
  border-color: rgba(255,107,53,0.2);
  color: var(--accent);
}

/* Mark complete btn */
.complete-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 24px;
}
.complete-btn:hover { border-color: var(--success); color: var(--success); }
.complete-btn.done { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: var(--success); }

/* ═══════════════════════════════════════════
   QUIZ MODAL
═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 90%;
  max-width: 580px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}

.modal-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 24px;
}
.modal-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.modal-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--text); }
.modal-subtitle { font-size: 0.82rem; color: var(--text3); margin-top: 2px; }
.modal-close {
  margin-left: auto;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 1rem;
  flex-shrink: 0;
  transition: all 0.2s;
}
.modal-close:hover { border-color: var(--danger); color: var(--danger); }

.quiz-question { margin-bottom: 24px; }
.q-text {

  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}
.quiz-prog-bar {
  flex: 1; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));

  cursor: pointer;

  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}

.quiz-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: white;
}

# Numerically approximate a limit
def numerical_limit(f, a, side='both', tol=1e-8):

    epsilons = [1e-3, 1e-5, 1e-7]
    results = []
    for eps in epsilons:
        if side in ('right', 'both'):
            results.append(f(a + eps))
        if side in ('left', 'both'):
            results.append(f(a - eps))
    return np.mean(results)

# Example 1: lim_{x->2} (x^2 - 4)/(x - 2)

# Common activation functions and their limits

def relu(x):

def gelu(x):

# Minimize f(w) = (w - 3)^2 + 1

# ── Numerical Integration (Riemann sums → trapezoidal) ──
def riemann_sum(f, a, b, n=1000, method='midpoint'):
    """Approximate ∫_a^b f(x) dx numerically."""
    dx = (b - a) / n
    if method == 'midpoint':
        x = np.linspace(a + dx/2, b - dx/2, n)
    elif method == 'trapezoid':
        x = np.linspace(a, b, n + 1)
        return dx * (f(a)/2 + np.sum(f(x[1:-1])) + f(b)/2)
    return dx * np.sum(f(x))

from scipy.integrate import solve_ivp

# ── Euler method (simple but inaccurate) ──
def euler(f, t_span, y0, n_steps=100):
    t = np.linspace(t_span[0], t_span[1], n_steps)
    dt = t[1] - t[0]
    y = np.zeros(n_steps)
    y[0] = y0
    for i in range(1, n_steps):
        y[i] = y[i-1] + dt * f(t[i-1], y[i-1])
    return t, y

# ── RK4 (Runge-Kutta 4th order) — much more accurate ──
def rk4(f, t_span, y0, n_steps=100):
    t = np.linspace(t_span[0], t_span[1], n_steps)
    dt = t[1] - t[0]
    y = np.zeros(n_steps)
    y[0] = y0
    for i in range(1, n_steps):
        k1 = f(t[i-1],        y[i-1])
        k2 = f(t[i-1]+dt/2,   y[i-1] + dt*k1/2)
        k3 = f(t[i-1]+dt/2,   y[i-1] + dt*k2/2)
        k4 = f(t[i-1]+dt,     y[i-1] + dt*k3)
        y[i] = y[i-1] + (dt/6) * (k1 + 2*k2 + 2*k3 + k4)
    return t, y

# Solve dy/dt = -2y,  y(0) = 1  → exact: y(t) = e^{-2t}

t_rk4,   y_rk4   = rk4(f_ode,   (0, 3), 1.0, n_steps=30)
exact = np.exp(-2 * t_euler)

print(f"  RK4   RMS error: {np.sqrt(np.mean((y_rk4 - exact)**2)):.8f}")

# ── Using scipy (production-grade solver) ──

print(f"\nscipy solve_ivp at t=3: y = {sol.sol(3.0)[0]:.8f}")
print(f"exact at t=3:           y = {np.exp(-6):.8f}")</code></pre>

  const qs = state.quizState;
  if (qs.answered) return;
  qs.answered = true;
  const q = qs.questions[qs.current];
  qs.answers.push(idx === q.ans ? 1 : 0);
  document.querySelectorAll('.q-option').forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && idx !== q.ans) el.classList.add('wrong');
  });
  document.getElementById('qExp').classList.add('show');
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = qs.current < qs.questions.length-1 ? 'Next →' : 'See Results';
}

  const qs = state.quizState;
  qs.current++; qs.answered = false;
  if (qs.current >= qs.questions.length) showQuizResults();
  else renderQuizQuestion();
}

function showQuizResults() {
  const qs = state.quizState;
  const correct = qs.answers.reduce((a,b)=>a+b,0);
  const total   = qs.questions.length;
  const pct     = Math.round((correct/total)*100);
  const emoji   = pct>=80?'🎉':pct>=50?'👍':'📚';
  const msg     = pct>=80?'Excellent work!':pct>=50?'Good progress!':'Keep studying!';
  document.getElementById('quizContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-icon">🏆</div>
      <div><div class="modal-title">Quiz Complete!</div><div class="modal-subtitle">${state.currentTopic.title}</div></div>
      <button class="modal-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="quiz-result">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-label">${correct} / ${total} correct — ${msg}</div>
    </div>
    <div class="quiz-actions" style="margin-top:24px">
      <button class="quiz-btn secondary" onclick="closeQuiz()">Close</button>
      <button class="quiz-btn primary" onclick="retakeQuiz()">Retake Quiz</button>
    </div>`;
  if (pct===100) { state.completed[state.currentTopic.id]=true; saveCompleted(); updateProgress(); buildSidebar(); }
}

function retakeQuiz() {
  state.quizState = { questions:[...state.currentTopic.quiz], current:0, answers:[], answered:false };
  renderQuizQuestion();
}

function closeQuiz() {
  document.getElementById('quizModal').classList.remove('open');
}
document.getElementById('quizModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('quizModal')) closeQuiz();
});

function syntaxHighlightForPdf(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(import|from|def|return|for|if|else|elif|in|as|class|print|True|False|None|and|or|not|with|yield|lambda|try|except)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(np|scipy|integrate|math)\b/g,'<span class="fn">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span class="st">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="nm">$1</span>');
}

function buildPdfHtml(topics) {
  const done = Object.keys(state.completed).filter(k => state.completed[k]).length;
  const parser = new DOMParser();
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Calculus.AI — Complete Curriculum</title><style>${PDF_STYLES}</style></head><body>`;

  html += `<div class="pdf-cover">
    <div class="pdf-cover-logo">∂ Calculus.AI</div>
    <div class="pdf-cover-sub">Differential &amp; Integral Calculus</div>
    <div class="pdf-cover-title">Complete Curriculum</div>
    <div class="pdf-cover-desc">From limits and derivatives to ODEs and Gaussian integrals — with Python code and real AI/ML applications throughout.</div>
    <div class="pdf-cover-stats">
      <div class="stat"><div class="stat-n">${topics.length}</div><div class="stat-l">Topics</div></div>
      <div class="stat"><div class="stat-n">3</div><div class="stat-l">Levels</div></div>
      <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">Completed</div></div>
    </div>
  </div>`;

  html += `<div class="toc-page"><div class="toc-title">Table of Contents</div><div class="toc-line"></div>`;
  ['beginner','medium','advanced'].forEach(level => {
    const lt = topics.filter(t => t.level === level);
    html += `<div class="toc-level"><div class="toc-level-title ${level}">${level}</div>`;
    lt.forEach(t => {
      html += `<div class="toc-item"><span class="toc-item-title">${t.title}</span><span class="toc-item-num">Topic ${topics.indexOf(t)+1}</span></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  topics.forEach((t, idx) => {
    const tagClass = t.level==='beginner'?'tag-b':t.level==='medium'?'tag-m':'tag-a';
    const emoji    = t.level==='beginner'?'🟢':t.level==='medium'?'🟡':'🔴';
    const doc = parser.parseFromString(`<div>${t.content}</div>`, 'text/html');

    html += `<div class="topic-page">
      <div class="topic-level-tag ${tagClass}">${emoji} ${t.level}</div>
      <div class="topic-title">${t.title}</div>
      <div class="topic-desc">${t.desc}</div>`;
    if (t.ai) html += `<div class="ai-box"><strong>🧠 AI Application:</strong> ${t.ai}</div>`;
    html += `<div class="divider"></div>`;

    doc.querySelectorAll('.section').forEach(sec => {
      const h = sec.querySelector('.section-title');
      if (h) html += `<div class="section-h">${h.childNodes[0]?.textContent?.trim() || h.textContent.trim()}</div>`;
      sec.querySelectorAll('.prose').forEach(p => {
        html += `<div class="prose">${p.innerHTML.replace(/<[^>]+>/g,'')}</div>`;
      });
      sec.querySelectorAll('.math-card').forEach(mc => {
        const lbl  = mc.querySelector('.label')?.textContent?.trim() || '';
        const math = mc.querySelector('.math-display')?.innerHTML?.trim() || '';
        html += `<div class="math-box"><div class="lbl">${lbl}</div><div class="math-content">${math}</div></div>`;
      });
      sec.querySelectorAll('.callout').forEach(c => {
        const inner = c.innerHTML.replace(/<div class="callout-icon">.*?<\/div>/s,'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        html += `<div class="prose" style="background:#fff8f5;border-left:3px solid #ea580c;padding:10px 14px;border-radius:0 6px 6px 0;margin:10px 0">${inner}</div>`;
      });
      sec.querySelectorAll('.visual-grid').forEach(vg => {
        html += `<div style="display:flex;gap:10px;margin:12px 0;flex-wrap:wrap">`;
        vg.querySelectorAll('.visual-card').forEach(vc => {
          const lbl = vc.querySelector('.vc-label')?.textContent || '';
          const val = vc.querySelector('.vc-value')?.textContent || '';
          html += `<div style="flex:1;min-width:120px;background:#fff8f5;border:1px solid #fed7aa;border-radius:8px;padding:10px;text-align:center;font-size:0.78rem"><div style="color:#ea580c;font-size:0.65rem;font-weight:700;text-transform:uppercase;margin-bottom:5px">${lbl}</div><div style="font-family:'Space Mono',monospace;color:#1e293b">${val}</div></div>`;
        });
        html += `</div>`;
      });
      sec.querySelectorAll('code.language-python').forEach(codeEl => {
        const fname = codeEl.closest('.code-wrap')?.querySelector('.code-header span:nth-child(2)')?.textContent || 'python';
        html += `<div class="code-box"><div class="code-header-pdf"><span style="color:#ff5f57">●</span><span style="color:#ffbd2e">●</span><span style="color:#28c840">●</span><span style="margin-left:8px">${fname}</span></div><div class="code-content">${syntaxHighlightForPdf(codeEl.textContent)}</div></div>`;
      });
    });

    if (t.quiz && t.quiz.length) {
      html += `<div class="quiz-section"><div class="quiz-title">✦ Knowledge Check Quiz</div>`;
      t.quiz.forEach((q, qi) => {
        html += `<div class="q-item"><div class="q-num">Question ${qi+1}</div><div class="q-text">${q.q}</div><div class="q-opts">${q.opts.map((o,oi)=>`<div class="q-opt ${oi===q.ans?'correct':''}">${oi===q.ans?'✓ ':'○ '}${o}</div>`).join('')}</div><div class="q-exp">💡 ${q.exp}</div></div>`;
      });
      html += `</div>`;
    }
    html += `<div class="footer">Calculus.AI — Topic ${idx+1} of ${topics.length}: ${t.title}</div></div>`;
  });
  html += `</body></html>`;
  return html;
}

function openPdfWindow(html) {
  const win = window.open('', '_blank');
  win.document.write(html); win.document.close();
  win.onload = () => {
    const link = win.document.createElement('link');
    link.rel = 'stylesheet'; link.href = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css';
    win.document.head.appendChild(link);
    const s1 = win.document.createElement('script');
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js';
    win.document.head.appendChild(s1);
    s1.onload = () => {
      const s2 = win.document.createElement('script');
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js';
      win.document.head.appendChild(s2);
      s2.onload = () => {
        win.renderMathInElement(win.document.body, {
          delimiters: [{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],
          throwOnError: false
        });
        setTimeout(() => { win.focus(); win.print(); }, 900);
      };
    };
  };
}

function downloadTopic()   { if (state.currentTopic) openPdfWindow(buildPdfHtml([state.currentTopic])); }
function downloadAllTopics() { openPdfWindow(buildPdfHtml(TOPICS)); }

function initSymbolBg() {
  const bg = document.getElementById('symbolBg');
  const symbols = ['∂','∫','∑','dx','dy','∇','lim','→','∞','d/dt','∫∫','Δ','ε','δ','∂²','∮'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'symbol-float';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = (Math.random() * 100) + '%';
    el.style.animationDuration = (10 + Math.random() * 15) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    el.style.fontSize = (0.7 + Math.random() * 0.6) + 'rem';
    bg.appendChild(el);
  }
}
