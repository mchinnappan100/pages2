<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico">
<title>LLM.Academy — Understand Large Language Models</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Prism.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<style>
/* ════════════════════════════════════════
   THEMES
════════════════════════════════════════ */
:root {
  --bg:        #0f0e0c;
  --bg2:       #181612;
  --bg3:       #221f19;
  --bg4:       #2c2820;
  --border:    #332e25;
  --accent:    #f59e0b;
  --accent2:   #ef4444;
  --accent3:   #10b981;
  --text:      #f5f0e8;
  --text2:     #b8aa95;
  --text3:     #6b5f4e;
  --beginner:  #10b981;
  --medium:    #f59e0b;
  --advanced:  #ef4444;
  --glow:      0 0 30px rgba(245,158,11,0.12);
  --card-bg:   rgba(34,31,25,0.9);
  --code-bg:   #0d0c0a;
  --sidebar-w: 290px;
  --header-h:  58px;
}
[data-theme="light"] {
  --bg: #faf8f4; --bg2: #ffffff; --bg3: #f4f0e8; --bg4: #ede8dc;
  --border: #ddd5c4; --accent: #b45309; --accent2: #dc2626; --accent3: #059669;
  --text: #1c1a15; --text2: #5c5040; --text3: #a89880;
  --glow: 0 0 20px rgba(180,83,9,0.08); --card-bg: #ffffff; --code-bg: #1c1a15;
}
[data-theme="slate"] {
  --bg: #0c1220; --bg2: #111a2e; --bg3: #162240; --bg4: #1c2a4e;
  --border: #1e3260; --accent: #38bdf8; --accent2: #818cf8; --accent3: #34d399;
  --text: #e0f2fe; --text2: #7dd3fc; --text3: #38bdf8;
  --glow: 0 0 20px rgba(56,189,248,0.12); --card-bg: rgba(17,26,46,0.9); --code-bg: #080e1a;
}
[data-theme="rose"] {
  --bg: #12050a; --bg2: #1e0910; --bg3: #2a0d18; --bg4: #371221;
  --border: #4a1830; --accent: #fb7185; --accent2: #fbbf24; --accent3: #4ade80;
  --text: #fff1f2; --text2: #fda4af; --text3: #f43f5e;
  --glow: 0 0 20px rgba(251,113,133,0.15); --card-bg: rgba(30,9,16,0.9); --code-bg: #0a0205;
}
[data-theme="mono"] {
  --bg: #111111; --bg2: #1a1a1a; --bg3: #222222; --bg4: #2a2a2a;
  --border: #333333; --accent: #ffffff; --accent2: #aaaaaa; --accent3: #666666;
  --text: #f0f0f0; --text2: #aaaaaa; --text3: #666666;
  --glow: none; --card-bg: #1a1a1a; --code-bg: #0d0d0d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background .3s, color .3s;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1rem;
  color: #0f0e0c;
  letter-spacing: -0.05em;
  flex-shrink: 0;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.logo-text em { color: var(--accent); font-style: italic; }

.header-sep {
  width: 1px; height: 22px;
  background: var(--border);
  margin: 0 2px;
}
.header-tag {
  font-size: 0.68rem;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.xp-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.72rem;
  color: var(--text2);
}
.xp-track {
  width: 56px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.xp-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent);
  min-width: 28px;
}

.hdr-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 12px;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'Outfit', sans-serif;
  display: flex; align-items: center; gap: 5px;
  transition: all .18s;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

.theme-flyout {
  position: absolute;
  top: calc(var(--header-h) + 4px);
  right: 18px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  display: none;
  flex-direction: column;
  gap: 2px;
  z-index: 300;
  box-shadow: 0 12px 40px rgba(0,0,0,.4);
  min-width: 160px;
}
.theme-flyout.open { display: flex; }
.th-opt {
  padding: 8px 12px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text2);
  transition: all .15s;
  white-space: nowrap;
}
.th-opt:hover, .th-opt.active { background: var(--bg3); color: var(--accent); }

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
.shell {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sb-search {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}
.sb-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 11px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  outline: none;
  transition: border-color .2s;
}
.sb-search input::placeholder { color: var(--text3); }
.sb-search input:focus { border-color: var(--accent); }

.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.lvl-block { margin-bottom: 6px; }
.lvl-hdr {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 9px;
  cursor: pointer;
  border-radius: 7px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: background .15s;
  user-select: none;
}
.lvl-hdr:hover { background: var(--bg3); }
.lvl-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.beg .lvl-pip { background: var(--beginner); }
.med .lvl-pip { background: var(--medium); }
.adv .lvl-pip { background: var(--advanced); }
.lvl-name.beg { color: var(--beginner); }
.lvl-name.med { color: var(--medium); }
.lvl-name.adv { color: var(--advanced); }
.lvl-count { margin-left: auto; font-size: 0.65rem; color: var(--text3); }
.lvl-chev { font-size: 0.65rem; color: var(--text3); transition: transform .2s; }
.lvl-block.shut .lvl-chev { transform: rotate(-90deg); }
.lvl-block.shut .topic-list { display: none; }

.topic-list { padding: 2px 0 4px; }
.t-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 9px 6px 20px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text2);
  transition: all .15s;
}
.t-item:hover { background: var(--bg3); color: var(--text); }
.t-item.active {
  background: rgba(245,158,11,0.08);
  color: var(--accent);
  border: 1px solid rgba(245,158,11,0.18);
}
.t-check {
  width: 15px; height: 15px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px;
  flex-shrink: 0;
  margin-left: auto;
  transition: all .2s;
}
.t-check.done { background: var(--beginner); border-color: var(--beginner); color: #fff; }

.sb-foot {
  padding: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.dl-btn {
  width: 100%;
  padding: 9px;
  border: none;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
}
.dl-btn.primary { background: var(--accent); color: #0f0e0c; }
.dl-btn.primary:hover { opacity: .85; }
.dl-btn.secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
.dl-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ════════════════════════════════════════
   CONTENT
════════════════════════════════════════ */
.content-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.c-toolbar {
  height: 46px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 10px;
  flex-shrink: 0;
}
.breadcrumb {
  font-size: 0.78rem;
  color: var(--text3);
  display: flex; align-items: center; gap: 6px;
}
.breadcrumb span { color: var(--text); font-weight: 500; }
.tb-right {
  margin-left: auto;
  display: flex;
  gap: 7px;
}
.tb-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 12px;
  color: var(--text2);
  font-size: 0.73rem;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  display: flex; align-items: center; gap: 5px;
  transition: all .18s;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn.hot {
  background: var(--accent);
  border-color: var(--accent);
  color: #0f0e0c;
  font-weight: 600;
}
.tb-btn.hot:hover { opacity: .85; }

.c-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 36px 44px;
  max-width: 920px;
  width: 100%;
  margin: 0 auto;
}
.c-scroll::-webkit-scrollbar { width: 5px; }
.c-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ════════════════════════════════════════
   CONTENT TYPOGRAPHY
════════════════════════════════════════ */
.t-header { margin-bottom: 30px; }

.lvl-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.lb-beg { background: rgba(16,185,129,.1); color: var(--beginner); border: 1px solid rgba(16,185,129,.2); }
.lb-med { background: rgba(245,158,11,.1); color: var(--medium);   border: 1px solid rgba(245,158,11,.2); }
.lb-adv { background: rgba(239,68,68,.1);  color: var(--advanced); border: 1px solid rgba(239,68,68,.2); }

.t-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}

.t-desc {
  font-size: 1rem;
  color: var(--text2);
  line-height: 1.65;
  margin-bottom: 14px;
  font-weight: 300;
}

.prereq-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.prereq-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; }
.prereq-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 9px;
  font-size: 0.7rem;
  color: var(--text2);
}

/* Section */
.sec { margin-bottom: 30px; }
.sec-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  color: var(--text);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-icon { font-size: 1rem; }

.prose {
  font-size: 0.9rem;
  line-height: 1.8;
  color: var(--text2);
  margin-bottom: 14px;
  font-weight: 300;
}
.prose strong { color: var(--text); font-weight: 600; }

/* Callouts */
.callout {
  border-radius: 10px;
  padding: 13px 16px;
  margin: 14px 0;
  font-size: 0.85rem;
  line-height: 1.65;
  display: flex;
  gap: 10px;
}
.callout-ico { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.callout.info  { background: rgba(56,189,248,.06);  border: 1px solid rgba(56,189,248,.15); color: var(--text2); }
.callout.warn  { background: rgba(245,158,11,.06);  border: 1px solid rgba(245,158,11,.18); color: var(--text2); }
.callout.tip   { background: rgba(16,185,129,.06);  border: 1px solid rgba(16,185,129,.18); color: var(--text2); }
.callout.key   { background: rgba(239,68,68,.06);   border: 1px solid rgba(239,68,68,.18);  color: var(--text2); }
.callout strong { color: var(--text); }

/* Math card */
.math-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 18px 22px;
  margin: 14px 0;
  position: relative;
  overflow: hidden;
}
.math-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.math-card .lbl {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}
.math-disp {
  text-align: center;
  font-size: 1.05rem;
  overflow-x: auto;
  padding: 4px 0;
}

/* Code block */
.code-wrap {
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin: 14px 0;
}
.code-hdr {
  background: #16140f;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.67rem;
  color: var(--text3);
}
.dots { display: flex; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dr { background: #ff5f57; } .dy { background: #ffbd2e; } .dg { background: #28c840; }
.file-lbl { margin-left: 2px; color: var(--text3); }
.lang-lbl { margin-left: auto; color: var(--accent3); font-size: 0.62rem; letter-spacing: .08em; }
.cp-btn {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 4px;
  padding: 2px 7px;
  color: var(--text3);
  cursor: pointer;
  font-size: 0.62rem;
  font-family: 'Outfit', sans-serif;
  transition: all .15s;
}
.cp-btn:hover { background: rgba(255,255,255,.1); color: var(--text2); }
pre[class*="language-"] {
  margin: 0 !important;
  border-radius: 0 !important;
  background: var(--code-bg) !important;
  font-size: 0.8rem !important;
  padding: 16px !important;
}
code[class*="language-"] { font-family: 'JetBrains Mono', monospace !important; }

/* Architecture diagram */
.arch-diagram {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 20px;
  margin: 14px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--text2);
  line-height: 1.8;
  overflow-x: auto;
}
.arch-diagram .hi { color: var(--accent); font-weight: 500; }
.arch-diagram .hi2 { color: var(--accent2); }
.arch-diagram .hi3 { color: var(--accent3); }
.arch-diagram .dim { color: var(--text3); }

/* Stat cards */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin: 14px 0;
}
.stat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
}
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-lbl {
  font-size: 0.68rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
}

/* Timeline */
.timeline { margin: 16px 0; }
.tl-item {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  position: relative;
}
.tl-item::before {
  content: '';
  position: absolute;
  left: 16px; top: 32px;
  width: 1px; height: calc(100% + 4px);
  background: var(--border);
}
.tl-item:last-child::before { display: none; }
.tl-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg4);
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  flex-shrink: 0;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  z-index: 1;
}
.tl-body { flex: 1; padding-top: 4px; }
.tl-year { font-size: 0.68rem; color: var(--accent); font-weight: 600; letter-spacing: .08em; margin-bottom: 2px; }
.tl-title { font-size: 0.88rem; color: var(--text); font-weight: 600; margin-bottom: 3px; }
.tl-desc { font-size: 0.8rem; color: var(--text2); line-height: 1.6; }

/* Compare table */
.cmp-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 0.82rem;
}
.cmp-table th {
  background: var(--bg3);
  color: var(--accent);
  font-weight: 600;
  padding: 10px 14px;
  border: 1px solid var(--border);
  text-align: left;
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.cmp-table td {
  padding: 9px 14px;
  border: 1px solid var(--border);
  color: var(--text2);
  line-height: 1.5;
}
.cmp-table tr:hover td { background: var(--bg3); }
.cmp-table .good { color: var(--beginner); font-weight: 500; }
.cmp-table .bad  { color: var(--advanced); }
.cmp-table .ok   { color: var(--medium); }

/* Nav buttons */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 36px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  flex: 1;
  padding: 11px 18px;

<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">🧠</span> The One-Sentence Definition</h2>
  <p class="prose">A <strong>Large Language Model (LLM)</strong> is a neural network trained on massive amounts of text to predict the next token — and from that surprisingly simple task, it learns to reason, write, code, and converse.</p>
  <div class="callout info"><div class="callout-ico">💡</div><div><strong>Key insight:</strong> LLMs are not programmed with rules about language. They discover grammar, facts, and reasoning patterns by compressing billions of text examples into billions of numerical parameters.</div></div>

  <p class="prose">A <strong>token</strong> is the atomic unit of text that an LLM processes. Tokens are <em>not</em> words — they're subword pieces. The word "tokenization" might become ["token", "ization"]. Spaces, punctuation, and code symbols are all tokens too.</p>
  <div class="callout tip"><div class="callout-ico">💡</div><div>As a rough rule: <strong>1 token ≈ 4 characters ≈ ¾ of a word</strong> in English. A page of text ≈ 500 tokens.</div></div>

<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">⚙️</span> Byte-Pair Encoding (BPE)</h2>
  <p class="prose"><strong>BPE</strong> is the most common tokenization algorithm (used by GPT series). It starts with individual characters and iteratively merges the most frequent adjacent pairs until a vocabulary of size V is reached.</p>
  <div class="code-wrap">
    <div class="code-hdr"><div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><span class="file-lbl">bpe_demo.py</span><span class="lang-lbl">PYTHON</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
    <pre><code class="language-python">from collections import Counter, defaultdict

def get_vocab(text):
    """Build initial character-level vocabulary."""
    words = text.lower().split()
    vocab = Counter()
    for w in words:
        vocab[' '.join(list(w)) + ' </w>'] += 1
    return vocab

def get_pairs(vocab):
    """Count all adjacent symbol pairs."""
    pairs = defaultdict(int)
    for word, freq in vocab.items():
        symbols = word.split()
        for i in range(len(symbols) - 1):
            pairs[(symbols[i], symbols[i+1])] += freq
    return pairs

def merge_pair(pair, vocab):
    """Merge the most frequent pair in vocabulary."""
    new_vocab = {}
    bigram = ' '.join(pair)
    replacement = ''.join(pair)
    for word in vocab:
        new_word = word.replace(bigram, replacement)
        new_vocab[new_word] = vocab[word]
    return new_vocab

# Demo

    pairs = get_pairs(vocab)
    if not pairs: break
    best = max(pairs, key=pairs.get)
    vocab = merge_pair(best, vocab)
    print(f"Step {i+1}: merged {best} → {''.join(best)}")</code></pre>

    <pre><code class="language-python">import numpy as np

def sinusoidal_pe(max_len, d_model):
    """Original Transformer positional encoding."""
    pe  = np.zeros((max_len, d_model))
    pos = np.arange(max_len)[:, None]           # (max_len, 1)
    div = np.exp(np.arange(0, d_model, 2) *
                 (-np.log(10000.0) / d_model))  # (d_model/2,)

    pe[:, 0::2] = np.sin(pos * div)  # even dims
    pe[:, 1::2] = np.cos(pos * div)  # odd  dims
    return pe

<div class="sec">

<div class="sec">

  <p class="prose">Each token projects itself into three roles: a <strong>Query</strong> (what am I looking for?), a <strong>Key</strong> (what do I offer?), and a <strong>Value</strong> (what information do I share?).</p>
  <div class="math-card">
    <div class="lbl">Scaled Dot-Product Attention</div>
    <div class="math-disp">\\( \\text{Attention}(Q, K, V) = \\text{softmax}\\!\\left(\\frac{QK^T}{\\sqrt{d_k}}\\right) V \\)</div>
  </div>
  <div class="code-wrap">
    <div class="code-hdr"><div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><span class="file-lbl">self_attention.py</span><span class="lang-lbl">PYTHON</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
    <pre><code class="language-python">import numpy as np

def softmax(x, axis=-1):
    e = np.exp(x - x.max(axis=axis, keepdims=True))
    return e / e.sum(axis=axis, keepdims=True)

def scaled_dot_product_attention(Q, K, V, mask=None):
    """
    Q: (batch, heads, seq, d_k)
    K: (batch, heads, seq, d_k)
    V: (batch, heads, seq, d_v)
    """
    d_k = Q.shape[-1]

    # Step 1: compute raw attention scores
    scores = Q @ K.swapaxes(-2, -1) / np.sqrt(d_k)  # (B, H, seq, seq)

    # Step 2: apply causal mask (GPT-style: can't see future tokens)
    if mask is not None:
        scores = np.where(mask == 0, -1e9, scores)

    # Step 3: softmax → attention weights
    weights = softmax(scores)   # rows sum to 1

    # Step 4: weighted sum of values
    output = weights @ V        # (B, H, seq, d_v)
    return output, weights

# Example: 1 batch, 1 head, 4 tokens, d_k=64

K = np.random.randn(B, H, S, dk)
V = np.random.randn(B, H, S, dk)

mask = np.tril(np.ones((S, S)))

<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">🏗️</span> The Transformer Block</h2>
  <p class="prose">A Transformer consists of <strong>L stacked blocks</strong>. Each block has two sub-layers: Multi-Head Self-Attention and a Feed-Forward Network (FFN). Both are wrapped with Layer Normalization and Residual Connections.</p>
  <div class="arch-diagram">
    <div>                    Input x</div>
    <div>                      │</div>
    <div>       ┌──────────────┴──────────────┐</div>
    <div>       │         <span class="hi">LayerNorm(x)</span>          │</div>
    <div>       │              │              │  </div>
    <div>       │    <span class="hi">Multi-Head Attention</span>      │  Residual</div>
    <div>       │              │              │  Stream</div>
    <div>       └──────────────┬──────────────┘</div>
    <div>                      │  x = x + Attn(LN(x))</div>
    <div>       ┌──────────────┴──────────────┐</div>
    <div>       │         <span class="hi2">LayerNorm(x)</span>          │</div>
    <div>       │              │              │</div>
    <div>       │    <span class="hi2">Feed-Forward Network</span>      │  Residual</div>
    <div>       │        <span class="dim">(expand → contract)</span>      │  Stream</div>
    <div>       └──────────────┬──────────────┘</div>
    <div>                      │  x = x + FFN(LN(x))</div>
    <div>                    Output</div>
  </div>
</div>
<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">⚡</span> Feed-Forward Network (FFN)</h2>
  <p class="prose">Each position goes through an identical FFN independently. It expands the dimension by 4× with a non-linearity (GELU/SwiGLU), then contracts back. This is where most parameters live.</p>
  <div class="math-card">
    <div class="lbl">FFN with GELU Activation</div>
    <div class="math-disp">\\( \\text{FFN}(x) = W_2 \\cdot \\text{GELU}(W_1 x + b_1) + b_2 \\quad W_1 \\in \\mathbb{R}^{4d \\times d}, \\; W_2 \\in \\mathbb{R}^{d \\times 4d} \\)</div>
  </div>
  <div class="code-wrap">
    <div class="code-hdr"><div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><span class="file-lbl">transformer_block.py</span><span class="lang-lbl">PYTHON</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
    <pre><code class="language-python">import numpy as np

def gelu(x):
    """Gaussian Error Linear Unit — smoother than ReLU."""
    return 0.5 * x * (1 + np.tanh(np.sqrt(2/np.pi) * (x + 0.044715*x**3)))

def layer_norm(x, gamma, beta, eps=1e-5):
    """Normalize across the last dimension."""
    mean = x.mean(axis=-1, keepdims=True)
    var  = x.var(axis=-1, keepdims=True)
    return gamma * (x - mean) / np.sqrt(var + eps) + beta

class TransformerBlock:
    def __init__(self, d_model=768, n_heads=12, d_ff=3072):
        self.d_model = d_model
        self.n_heads = n_heads
        self.d_k     = d_model // n_heads

        # Attention weights
        self.W_Q = np.random.randn(d_model, d_model) * 0.02
        self.W_K = np.random.randn(d_model, d_model) * 0.02
        self.W_V = np.random.randn(d_model, d_model) * 0.02
        self.W_O = np.random.randn(d_model, d_model) * 0.02

        # FFN weights
        self.W1  = np.random.randn(d_model, d_ff)    * 0.02
        self.W2  = np.random.randn(d_ff,    d_model) * 0.02

        # LayerNorm params
        self.gamma1 = np.ones(d_model);  self.beta1 = np.zeros(d_model)
        self.gamma2 = np.ones(d_model);  self.beta2 = np.zeros(d_model)

    def forward(self, x):
        """x: (seq_len, d_model)"""
        # 1. Pre-LN Attention with residual
        h = layer_norm(x, self.gamma1, self.beta1)
        # (simplified: single-head for readability)
        Q, K, V = h @ self.W_Q, h @ self.W_K, h @ self.W_V
        scores = Q @ K.T / np.sqrt(self.d_k)
        scores = np.tril(scores)   # causal mask
        scores[scores == 0] = -1e9
        A = np.exp(scores - scores.max(-1, keepdims=True))
        A = A / A.sum(-1, keepdims=True)
        attn_out = A @ V @ self.W_O
        x = x + attn_out           # residual

        # 2. Pre-LN FFN with residual
        h = layer_norm(x, self.gamma2, self.beta2)
        ffn_out = gelu(h @ self.W1) @ self.W2
        x = x + ffn_out            # residual
        return x

block = TransformerBlock()
seq_len = 8
x = np.random.randn(seq_len, 768)
out = block.forward(x)
print(f"Input shape:  {x.shape}")   # (8, 768)
print(f"Output shape: {out.shape}") # (8, 768)</code></pre>

</div>`,

<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">🎲</span> Autoregressive Generation</h2>
  <p class="prose">LLMs generate text one token at a time. After each token, it's appended to the context and the whole sequence is run through the model again (KV cache makes this efficient). The output at each step is a probability distribution over the vocabulary.</p>
  <div class="code-wrap">
    <div class="code-hdr"><div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><span class="file-lbl">sampling.py</span><span class="lang-lbl">PYTHON</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
    <pre><code class="language-python">import numpy as np

def softmax(x): 
    e = np.exp(x - x.max()); return e / e.sum()

def sample_token(logits, temperature=1.0, top_k=0, top_p=1.0):
    """
    Full sampling pipeline: temperature → top-k → top-p → sample.
    """
    # 1. Temperature scaling: higher = more random, lower = more focused
    logits = logits / max(temperature, 1e-8)

    # 2. Top-K: keep only the k highest-probability tokens
    if top_k > 0:
        k = min(top_k, len(logits))
        top_k_idx = np.argpartition(logits, -k)[-k:]
        mask = np.full_like(logits, -1e9)
        mask[top_k_idx] = logits[top_k_idx]
        logits = mask

    probs = softmax(logits)

    # 3. Top-P (nucleus sampling): keep smallest set summing to p
    if top_p < 1.0:
        sorted_idx  = np.argsort(probs)[::-1]
        sorted_prob = probs[sorted_idx]
        cumsum      = np.cumsum(sorted_prob)
        # Remove tokens beyond the nucleus
        cutoff      = np.searchsorted(cumsum, top_p) + 1
        keep        = sorted_idx[:cutoff]
        mask        = np.zeros_like(probs)
        mask[keep]  = probs[keep]
        probs       = mask / mask.sum()

    # 4. Sample from the distribution
    return np.random.choice(len(probs), p=probs)

# Greedy decoding (temperature=0 equivalent)
def greedy(logits): return np.argmax(logits)

# Compare strategies on same logits
vocab = 10
logits = np.array([0.1, 2.5, 0.3, 1.8, 0.2, 3.1, 0.4, 0.1, 0.9, 0.6])
print("Greedy:", greedy(logits))
print("Temp=0.7, top_k=5, top_p=0.9:", sample_token(logits, 0.7, 5, 0.9))</code></pre>

</div>
<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">⚡</span> KV Cache & Speculative Decoding</h2>
  <p class="prose">The <strong>KV cache</strong> stores computed Key and Value matrices from previous tokens so they don't need to be recomputed at each step. <strong>Speculative decoding</strong> uses a small "draft" model to propose multiple tokens at once, verified in parallel by the large model.</p>

  </table>
</div>`,

<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">🪶</span> The Problem: Full Fine-tuning is Expensive</h2>
  <p class="prose">Fine-tuning all parameters of a 70B model requires ~140 GB of GPU memory just for weights (bf16), plus gradients (~140 GB) and optimizer states (~560 GB for AdamW). That's <strong>~840 GB</strong> — 10+ high-end GPUs. PEFT methods make this feasible on a single GPU.</p>
</div>
<div class="sec">
  <h2 class="sec-title"><span class="sec-icon">🔀</span> LoRA: Low-Rank Adaptation</h2>
  <p class="prose">LoRA freezes the original weights and adds a <strong>low-rank decomposition</strong> to each attention weight matrix. Instead of updating \\( W \\in \\mathbb{R}^{d \\times d} \\), it learns \\( \\Delta W = BA \\) where \\( B \\in \\mathbb{R}^{d \\times r} \\) and \\( A \\in \\mathbb{R}^{r \\times d} \\) with \\( r \\ll d \\).</p>
  <div class="math-card">
    <div class="lbl">LoRA Forward Pass</div>
    <div class="math-disp">\\( h = W_0 x + \\frac{\\alpha}{r} B A x \\quad B \\in \\mathbb{R}^{d \\times r},\\; A \\in \\mathbb{R}^{r \\times d},\\; r \\ll d \\)</div>
  </div>
  <div class="code-wrap">
    <div class="code-hdr"><div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><span class="file-lbl">lora.py</span><span class="lang-lbl">PYTHON</span><button class="cp-btn" onclick="copyCode(this)">Copy</button></div>
    <pre><code class="language-python">import numpy as np

class LoRALayer:
    """
    LoRA: Low-Rank Adaptation of a linear layer.
    Only A and B are trained; W0 stays frozen.
    """
    def __init__(self, d_in, d_out, rank=16, alpha=32):
        self.rank  = rank
        self.alpha = alpha
        self.scale = alpha / rank

        # Frozen pretrained weight
        self.W0 = np.random.randn(d_out, d_in) * 0.02

        # LoRA matrices (trained)
        # A: initialized with random Gaussian
        self.A = np.random.randn(rank, d_in) * 0.02
        # B: initialized to zero (so ΔW=0 at start)
        self.B = np.zeros((d_out, rank))

    def forward(self, x):
        """x: (..., d_in)"""
        # Original frozen computation
        base   = x @ self.W0.T

        # LoRA delta
        lora   = x @ self.A.T @ self.B.T * self.scale

        return base + lora

    @property
    def trainable_params(self):
        return self.A.size + self.B.size

    @property
    def total_params(self):
        return self.W0.size

# Example: one attention projection in LLaMA-2 7B
# d_model = 4096
d = 4096
layer = LoRALayer(d, d, rank=16)
print(f"Original params: {layer.total_params:,}")          # 16,777,216
print(f"LoRA params:     {layer.trainable_params:,}")      # 131,072
print(f"Reduction:       {layer.total_params/layer.trainable_params:.0f}×")

x = np.random.randn(8, d)  # batch of 8 tokens
out = layer.forward(x)
print(f"Output shape: {out.shape}")</code></pre>

    btn.textContent = S.completed[id] ? '✓ Marked Complete' : '○ Mark as Complete';
    btn.className   = `done-btn ${S.completed[id]?'marked':''}`;
  }
  buildSidebar();
}

// COPY CODE
// ════════════════════════════════════════
function copyCode(btn) {
  const txt = btn.closest('.code-wrap').querySelector('code').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',1600);
  });
}

// QUIZ
// ════════════════════════════════════════
function openQuiz() {
  if (!S.current?.quiz?.length) return;
  S.quiz = { qs: [...S.current.quiz], cur: 0, answers: [], answered: false };
  renderQuizQ();
  document.getElementById('quizOverlay').classList.add('open');
}

function renderQuizQ() {
  const { qs, cur } = S.quiz;
  const q = qs[cur];
  const pct = (cur/qs.length)*100;
  document.getElementById('quizModal').innerHTML = `
    <div class="m-head">
      <div class="m-ico">✦</div>
      <div><div class="m-title">Knowledge Check</div><div class="m-sub">${S.current.title}</div></div>
      <button class="m-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="qprog">
      <div class="qprog-bar"><div class="qprog-fill" style="width:${pct}%"></div></div>
      <span class="qprog-lbl">${cur+1} / ${qs.length}</span>
    </div>
    <div class="q-text">Q${cur+1}. ${q.q}</div>
    <div class="q-opts">
      ${q.opts.map((o,i)=>`<button class="q-opt" id="opt${i}" onclick="pickAnswer(${i})">${o}</button>`).join('')}
    </div>
    <div class="q-exp" id="qExp">${q.exp}</div>
    <div class="q-acts">
      <button class="q-btn sec" onclick="closeQuiz()">Exit</button>
      <button class="q-btn pri" id="qNext" onclick="nextQ()" disabled>Next →</button>
    </div>`;
  renderMathInElement(document.getElementById('quizModal'), {
    delimiters:[{left:'\\(',right:'\\)',display:false}], throwOnError:false
  });
}

function pickAnswer(i) {
  if (S.quiz.answered) return;
  S.quiz.answered = true;
  const q = S.quiz.qs[S.quiz.cur];
  S.quiz.answers.push(i === q.ans ? 1 : 0);
  document.querySelectorAll('.q-opt').forEach((el,idx)=>{
    if (idx===q.ans) el.classList.add('correct');
    else if (idx===i && i!==q.ans) el.classList.add('wrong');
  });
  document.getElementById('qExp').classList.add('show');
  const nb = document.getElementById('qNext');
  nb.disabled = false;
  nb.textContent = S.quiz.cur < S.quiz.qs.length-1 ? 'Next →' : 'See Results';
}

function nextQ() {
  S.quiz.cur++;
  S.quiz.answered = false;
  if (S.quiz.cur >= S.quiz.qs.length) showResult();
  else renderQuizQ();
}

function showResult() {
  const correct = S.quiz.answers.reduce((a,b)=>a+b,0);
  const total   = S.quiz.qs.length;
  const pct     = Math.round(correct/total*100);
  const emoji   = pct>=80?'🎉':pct>=50?'👍':'📖';
  const msg     = pct>=80?'Excellent mastery!':pct>=50?'Good progress!':'Review and retry!';
  if (pct===100) { S.completed[S.current.id]=true; save(); updateProgress(); buildSidebar(); }
  document.getElementById('quizModal').innerHTML = `
    <div class="m-head">
      <div class="m-ico">🏆</div>
      <div><div class="m-title">Quiz Complete!</div><div class="m-sub">${S.current.title}</div></div>
      <button class="m-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="result-wrap">
      <div class="res-emoji">${emoji}</div>
      <div class="res-score">${pct}%</div>
      <div class="res-msg">${correct}/${total} correct — ${msg}</div>
    </div>
    <div class="q-acts">
      <button class="q-btn sec" onclick="closeQuiz()">Close</button>
      <button class="q-btn pri" onclick="retakeQuiz()">Retake</button>
    </div>`;
}

function retakeQuiz() {
  S.quiz = { qs: [...S.current.quiz], cur: 0, answers: [], answered: false };
  renderQuizQ();
}
function closeQuiz() { document.getElementById('quizOverlay').classList.remove('open'); }
document.getElementById('quizOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('quizOverlay')) closeQuiz();
});

function hlCode(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(import|from|def|class|return|for|if|elif|else|in|as|not|and|or|with|yield|lambda|True|False|None|print|pass|raise)\b/g,'<span class="kw">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span class="st">$1</span>')
    .replace(/\b(\d+\.?\d*[BMKk]*)\b/g,'<span class="nm">$1</span>');
}

function buildPdf(topics) {
  const parser = new DOMParser();
  const done = Object.keys(S.completed).filter(k=>S.completed[k]).length;
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>LLM Academy</title><style>${PDF_CSS}</style></head><body>`;

  // Cover
  html += `<div class="cover">
    <div class="cover-logo">LLM.Academy</div>
    <div class="cover-sub">A Complete Guide to Large Language Models</div>
    <div class="cover-title">From Tokenization to Agents</div>
    <div class="cover-desc">Master every concept powering modern AI — GPT, Claude, LLaMA — with Python code and detailed explanations.</div>
    <div class="cover-stats">
      <div><div class="cs-n">${topics.length}</div><div class="cs-l">Topics</div></div>
      <div><div class="cs-n">3</div><div class="cs-l">Levels</div></div>
      <div><div class="cs-n">${done}</div><div class="cs-l">Completed</div></div>
    </div>
  </div>`;

  // TOC
  html += `<div class="toc"><div class="toc-title">Table of Contents</div><div class="toc-rule"></div>`;
  ['beginner','medium','advanced'].forEach(lvl => {
    const ts = topics.filter(t=>t.level===lvl);
    html += `<div class="toc-lvl"><div class="toc-lh ${lvl.slice(0,3)}">${lvl}</div>`;
    ts.forEach(t => {
      html += `<div class="toc-row"><span style="flex:1">${t.title}</span><span class="toc-row-n">Topic ${topics.indexOf(t)+1}</span></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // Topic pages
  topics.forEach((t, idx) => {
    const tagCls = t.level==='beginner'?'tp-beg':t.level==='medium'?'tp-med':'tp-adv';
    const emoji  = t.level==='beginner'?'🟢':t.level==='medium'?'🟡':'🔴';
    const doc    = parser.parseFromString(`<div>${t.content}</div>`, 'text/html');

    html += `<div class="topic-page">
      <div class="tp-tag ${tagCls}">${emoji} ${t.level}</div>
      <div class="tp-title">${t.title}</div>
      <div class="tp-desc">${t.desc}</div>
      <div class="tp-div"></div>`;

    doc.querySelectorAll('.sec').forEach(sec => {
      const h = sec.querySelector('.sec-title');
      if (h) html += `<div class="sec-h">${h.textContent.trim()}</div>`;

      sec.querySelectorAll('.prose').forEach(p => {
        const txt = p.innerHTML.replace(/<strong>(.*?)<\/strong>/g,'<strong>$1</strong>').replace(/<[^>]+>/g,' ').trim();
        html += `<div class="prose">${txt}</div>`;
      });

      sec.querySelectorAll('.math-card').forEach(mc => {
        const lbl  = mc.querySelector('.lbl')?.textContent?.trim()||'';
        const math = mc.querySelector('.math-disp')?.innerHTML?.trim()||'';
        html += `<div class="math-box"><div class="ml">${lbl}</div><div class="mc">${math}</div></div>`;
      });

      sec.querySelectorAll('.callout').forEach(c => {
        const txt = c.innerHTML.replace(/<div class="callout-ico">.*?<\/div>/gs,'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        html += `<div class="callout-pdf">${txt}</div>`;
      });

      // Timeline
      sec.querySelectorAll('.tl-item').forEach(ti => {
        const yr = ti.querySelector('.tl-year')?.textContent||'';
        const tt = ti.querySelector('.tl-title')?.textContent||'';
        const td = ti.querySelector('.tl-desc')?.textContent||'';
        html += `<div class="tl-item-pdf"><div class="tl-dot-pdf">→</div><div class="tl-body-pdf"><div class="tl-yr">${yr}</div><div class="tl-t">${tt}</div><div class="tl-d">${td}</div></div></div>`;
      });

      // Stat cards
      const statCards = sec.querySelectorAll('.stat-card');
      if (statCards.length) {
        html += `<div class="stats-row">`;
        statCards.forEach(sc => {
          html += `<div class="stat-c"><div class="stat-n">${sc.querySelector('.stat-num')?.textContent||''}</div><div class="stat-l">${sc.querySelector('.stat-lbl')?.textContent||''}</div></div>`;
        });
        html += `</div>`;
      }

      // Tables
      sec.querySelectorAll('.cmp-table').forEach(tbl => {
        html += tbl.outerHTML.replace(/class="[^"]*"/g, '');
      });

      // Code
      sec.querySelectorAll('code.language-python').forEach(ce => {
        const fn = ce.closest('.code-wrap')?.querySelector('.file-lbl')?.textContent||'python';
        html += `<div class="code-box">
          <div class="code-hdr-pdf"><span style="color:#ff5f57">●</span><span style="color:#ffbd2e">●</span><span style="color:#28c840">●</span><span style="margin-left:8px">${fn}</span></div>
          <div class="code-body">${hlCode(ce.textContent)}</div>
        </div>`;
      });
    });

    // Quiz
    if (t.quiz?.length) {
      html += `<div class="quiz-sec"><div class="quiz-hdr">✦ Knowledge Check Quiz</div>`;
      t.quiz.forEach((q,qi) => {
        html += `<div class="qi">
          <div class="qi-n">Question ${qi+1}</div>
          <div class="qi-q">${q.q}</div>
          <div class="qi-opts">${q.opts.map((o,oi)=>`<div class="qi-opt ${oi===q.ans?'cor':''}">${oi===q.ans?'✓ ':'○ '}${o}</div>`).join('')}</div>
          <div class="qi-exp">💡 ${q.exp}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `<div class="footer">LLM.Academy — Topic ${idx+1} of ${topics.length}: ${t.title}</div></div>`;
  });

  html += `</body></html>`;
  return html;
}

function openPdf(html) {
  const win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
  win.onload = () => {
    const link = win.document.createElement('link');
    link.rel='stylesheet'; link.href='https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css';
    win.document.head.appendChild(link);
    const s1 = win.document.createElement('script');
    s1.src='https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js';
    win.document.head.appendChild(s1);
    s1.onload = () => {
      const s2 = win.document.createElement('script');
      s2.src='https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js';
      win.document.head.appendChild(s2);
      s2.onload = () => {
        win.renderMathInElement(win.document.body, {
          delimiters:[{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],
          throwOnError:false
        });
        setTimeout(()=>{ win.focus(); win.print(); }, 900);
      };
    };
  };
}

function downloadAll()     { openPdf(buildPdf(TOPICS)); }
function downloadCurrent() { if (S.current) openPdf(buildPdf([S.current])); }
