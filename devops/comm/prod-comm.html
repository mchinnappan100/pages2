<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Deployment Doc Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon"
        href="https://mohan-chinnappan-n5.github.io/dfv/img/mc_favIcon.ico" />
<style>
  :root {
    --bg: #0a0d14;
    --bg2: #111520;
    --bg3: #181d2e;
    --surface: #1e2437;
    --surface2: #252c42;
    --border: rgba(100,130,255,0.15);
    --border2: rgba(100,130,255,0.28);
    --text: #e8ecf5;
    --text2: #8a95b8;
    --text3: #5a6385;
    --accent: #4f7bff;
    --accent2: #7c9fff;
    --green: #27e89b;
    --amber: #ffb740;
    --red: #ff5a5a;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --splitter: #4f7bff;
  }
  [data-theme="light"] {
    --bg: #f0f2fa;
    --bg2: #e8eaf5;
    --bg3: #f5f6fc;
    --surface: #ffffff;
    --surface2: #f0f2fa;
    --border: rgba(60,80,200,0.12);
    --border2: rgba(60,80,200,0.25);
    --text: #1a2050;
    --text2: #4a5580;
    --text3: #8a95b8;
    --accent: #2f5bff;
    --accent2: #1a3fd4;
    --green: #16a060;
    --amber: #d4820a;
    --red: #cc2e2e;
    --splitter: #2f5bff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 54px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent2);
  }
  .logo-icon { font-size: 22px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-theme {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-theme:hover { background: var(--surface2); color: var(--text); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* MAIN LAYOUT */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* LEFT PANE */
  .pane-left {
    width: 400px;
    min-width: 280px;
    max-width: 65%;
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  .pane-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
  }
  .pane-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    flex: 1;
  }
  .pane-badge {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(79,123,255,0.15);
    color: var(--accent2);
    border: 1px solid rgba(79,123,255,0.3);
  }
  .pane-body { flex: 1; overflow-y: auto; padding: 18px; }
  .pane-body::-webkit-scrollbar { width: 4px; }
  .pane-body::-webkit-scrollbar-track { background: transparent; }
  .pane-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* FORM ELEMENTS */
  .field-group { margin-bottom: 18px; }
  .field-label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .field-label span { color: var(--accent); margin-right: 4px; }
  input[type="text"], input[type="date"], input[type="time"], textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,123,255,0.12);
  }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .date-row { display: flex; gap: 8px; }
  .date-row > * { flex: 1; }

  /* TASK ITEMS */
  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    position: relative;
    transition: border-color 0.2s;
  }
  .task-item:hover { border-color: var(--border2); }
  .task-item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .task-phase-badge {
    font-size: 9px;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(79,123,255,0.18);
    color: var(--accent2);
    border: 1px solid rgba(79,123,255,0.25);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .task-item input[type="text"] {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    padding: 4px 0;
    font-size: 13px;
    font-weight: 500;
  }
  .task-item input[type="text"]:focus {
    box-shadow: none;
    border-bottom-color: var(--accent);
  }
  .task-date-row { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
  .task-date-row input { font-size: 11px; padding: 5px 8px; }
  .task-date-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .btn-remove {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .btn-remove:hover { color: var(--red); background: rgba(255,90,90,0.1); }
  .btn-add {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border2);
    color: var(--text2);
    padding: 10px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent2); background: rgba(79,123,255,0.06); }

  /* SECTION DIVIDERS */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 22px 0 14px;
  }
  .section-divider-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
  }
  .section-divider-line { flex: 1; height: 1px; background: var(--border); }

  /* GENERATE BTN */
  .btn-generate {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #2a4bcc, #4f7bff);
    border: none;
    color: white;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 20px;
    position: relative;
    overflow: hidden;
  }
  .btn-generate:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,123,255,0.35); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate.loading { pointer-events: none; opacity: 0.8; }
  .btn-generate .rocket { display: inline-block; transition: transform 0.3s; }
  .btn-generate:hover .rocket { transform: translateX(4px) translateY(-2px); }

  /* SPLITTER */
  .splitter {
    width: 5px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.2s;
    position: relative;
    z-index: 10;
  }
  .splitter:hover, .splitter.dragging {
    background: var(--splitter);
    box-shadow: 0 0 8px rgba(79,123,255,0.5);
  }
  .splitter::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1px;
    height: 40px;
    background: rgba(79,123,255,0.6);
    border-radius: 2px;
  }

  /* RIGHT PANE */
  .pane-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    min-width: 0;
  }
  .pane-right-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
    flex-shrink: 0;
  }
  .export-btns { display: flex; gap: 6px; margin-left: auto; }
  .btn-export {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 5px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-export:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }

  /* PREVIEW AREA */
  .preview-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }
  .preview-area::-webkit-scrollbar { width: 4px; }
  .preview-area::-webkit-scrollbar-track { background: transparent; }
  .preview-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .preview-content { max-width: 780px; margin: 0 auto; }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    text-align: center;
    gap: 14px;
  }
  .empty-icon { font-size: 52px; opacity: 0.4; }
  .empty-title { font-family: var(--mono); font-size: 13px; letter-spacing: 0.1em; }
  .empty-sub { font-size: 12px; line-height: 1.6; max-width: 260px; }

  /* LOADING STATE */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
  }
  .launch-seq {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.1em;
  }
  .launch-rocket {
    font-size: 42px;
    animation: liftoff 2s ease-in-out infinite alternate;
  }
  @keyframes liftoff {
    0% { transform: translateY(0); filter: brightness(1); }
    100% { transform: translateY(-12px); filter: brightness(1.3); }
  }
  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 2px;
    animation: dotpulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotpulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  /* RENDERED DOC */
  .doc-rendered { animation: fadeSlideIn 0.5s ease; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .doc-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .doc-rocket { font-size: 44px; filter: drop-shadow(0 0 12px rgba(79,123,255,0.4)); }
  .doc-title-block {}
  .doc-mission-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .doc-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .doc-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .doc-meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text2);
  }
  .doc-meta-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item {
    display: flex;
    gap: 16px;
    padding-bottom: 0;
    position: relative;
  }
  .timeline-spine {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 32px;
  }
  .timeline-node {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    z-index: 1;
  }
  .timeline-node.launch {
    border-color: var(--accent);
    background: rgba(79,123,255,0.15);
    box-shadow: 0 0 12px rgba(79,123,255,0.25);
  }
  .timeline-line {
    width: 2px;
    flex: 1;
    background: var(--border);
    min-height: 20px;
  }
  .timeline-content {
    flex: 1;
    padding-bottom: 24px;
  }
  .timeline-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-top: 4px;
  }
  .timeline-t {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(79,123,255,0.12);
    border: 1px solid rgba(79,123,255,0.25);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .timeline-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .timeline-date { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-left: auto; }
  .timeline-body { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .timeline-body ul { padding-left: 16px; margin-top: 8px; }
  .timeline-body li { margin-bottom: 4px; }
  .checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .checklist-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
  }
  .check-icon {
    width: 18px; height: 18px;
    border-radius: 4px;
    background: rgba(39,232,155,0.15);
    border: 1px solid rgba(39,232,155,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green);
    font-size: 10px;
    flex-shrink: 0;
  }
  .phase-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 10px;
  }
  .phase-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 8px;
  }
  .phase-steps { display: flex; flex-direction: column; gap: 5px; }
  .phase-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text2);
  }
  .step-num {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--accent2);
    flex-shrink: 0;
  }
  .doc-footer {
    margin-top: 28px;
    padding: 16px 18px;
    background: linear-gradient(135deg, rgba(79,123,255,0.08), rgba(39,232,155,0.06));
    border: 1px solid rgba(79,123,255,0.2);
    border-radius: 10px;
    text-align: center;
  }
  .doc-footer-quote {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.04em;
    font-style: italic;
    line-height: 1.5;
  }
  .doc-footer-rocket { font-size: 22px; display: block; margin-top: 8px; }

  /* REQUIREMENTS SECTION */
  .req-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 10px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }
  .req-block p { margin: 0; }

  /* MISSIONS REQUIREMENTS BADGES */
  .mission-reqs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .req-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: var(--mono);
    padding: 4px 10px;
    border-radius: 5px;
    background: rgba(39,232,155,0.1);
    border: 1px solid rgba(39,232,155,0.25);
    color: var(--green);
  }
  .req-badge::before { content: '✓'; font-size: 9px; }

  /* error */
  .error-msg {
    background: rgba(255,90,90,0.1);
    border: 1px solid rgba(255,90,90,0.3);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    color: var(--red);
    text-align: center;
    margin: 20px 0;
  }

  /* EXPORT AREA */
  #export-source { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🚀</span>
    MISSION CONTROL
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span style="font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing:0.06em">SYSTEMS NOMINAL</span>
    <button class="btn-theme" onclick="toggleTheme()">☀ / ☾ THEME</button>
  </div>
</header>

<div class="workspace" id="workspace">
  <!-- LEFT PANE -->
  <div class="pane-left" id="paneLeft">
    <div class="pane-header">
      <div class="pane-title">Mission Parameters</div>
      <div class="pane-badge">INPUT</div>
    </div>
    <div class="pane-body">
      <div class="field-group">
        <label class="field-label"><span>01</span>Mission Name</label>
        <input type="text" id="missionName" value="Salesforce Production Deployment" placeholder="e.g. Salesforce Production Deployment">
      </div>
      <div class="field-group">
        <label class="field-label"><span>02</span>Mission Subtitle / Sprint</label>
        <input type="text" id="missionSubtitle" value="Sprint 11 + E2E Test Stories" placeholder="e.g. Sprint 11 + E2E Test Stories">
      </div>
      <div class="field-group">
        <label class="field-label"><span>03</span>Deployment Style / Theme</label>
        <select id="deployStyle">
          <option value="rocket launch">🚀 Rocket Launch Mission</option>
          <option value="military operation">🎯 Military Operation</option>
          <option value="space mission">🌌 NASA Space Mission</option>
          <option value="submarine dive">🌊 Submarine Dive Protocol</option>
          <option value="air traffic control">✈️ Air Traffic Control</option>
        </select>
      </div>

      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-label">Launch Window</div>
        <div class="section-divider-line"></div>
      </div>

      <div class="field-group">

<script>
// ─── DEFAULT TASKS ─────────────────────────────────────────────────────────────
const defaultTasks = [

// ─── TASK MANAGEMENT ─────────────────────────────────────────────────────────
function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  tasks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'task-item';
    el.innerHTML = `
      <div class="task-item-header">
        <input type="text" value="${t.phase}" placeholder="T-72h" style="width:70px;font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase" oninput="tasks[${i}].phase=this.value">

      <input type="text" value="${escHtml(t.title)}" placeholder="Task title..." oninput="tasks[${i}].title=this.value" style="width:100%;margin-bottom:8px">

        <span class="task-date-label">Date</span>
        <input type="date" value="${t.date}" oninput="tasks[${i}].date=this.value">

      </div>

    `;
    list.appendChild(el);
  });
}

let tasks = JSON.parse(JSON.stringify(defaultTasks));

function addTask() {
  tasks.push({ phase: 'T-Xh', title: '', date: '', time: '', notes: '' });
  renderTasks();
  document.querySelector('.pane-body').scrollTop = 9999;
}

function removeTask(i) {
  tasks.splice(i, 1);
  renderTasks();
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderTasks();

// ─── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
}

// ─── SPLITTER DRAG ─────────────────────────────────────────────────────────────
const splitter = document.getElementById('splitter');
const paneLeft = document.getElementById('paneLeft');
const workspace = document.getElementById('workspace');
let isDragging = false;

splitter.addEventListener('mousedown', (e) => {
  isDragging = true;
  splitter.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const rect = workspace.getBoundingClientRect();
  const newW = Math.min(Math.max(e.clientX - rect.left, 280), workspace.offsetWidth * 0.65);
  paneLeft.style.width = newW + 'px';
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    splitter.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ─── DOCUMENT GENERATION ───────────────────────────────────────────────────────
let lastGeneratedHTML = '';
let lastGeneratedMD = '';

function fmtDate(dateStr) {
  if (!dateStr) return 'TBD';
  const [y, m, d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}
function fmtTime(timeStr) {
  if (!timeStr) return '';
  const [h, m] = timeStr.split(':');
  const hr = parseInt(h);
  const ampm = hr >= 12 ? 'PM' : 'AM';
  const hr12 = hr % 12 || 12;
  return `${hr12}:${m} ${ampm} EST`;
}

const DEPLOY_STYLES = {
  'rocket launch': {
    icon: '🚀',
    statement: n => `Mission "${n}" is cleared for ignition — all systems nominal, countdown is live, and the crew is ready to execute a flawless launch sequence into production.`,
    quote: 'All systems nominal. Ignition sequence start. We are go for launch.',
    phases: [
      { name: 'Readiness Poll', steps: ['Confirm all crew stations are manned', 'Verify T-0 checklist is complete', 'Obtain go/no-go from all leads'] },
      { name: 'Deployment Execution', steps: ['Initiate Quick Deploy sequence', 'Monitor telemetry during burn', 'Confirm payload delivery to orbit'] },
      { name: 'Post-Deploy Procedures', steps: ['Execute manual post-deployment steps', 'Run DRO data migration tasks', 'Activate feature flags'] },
      { name: 'Verification & Go/No-Go', steps: ['Smoke test critical user paths', 'Validate data integrity', 'Confirm mission success with stakeholders'] }
    ]
  },

    quote: 'Cleared for takeoff. Winds nominal. You are free to navigate as filed.',
    phases: [
      { name: 'Readiness Poll', steps: ['Confirm all flight crew checked in', 'Verify flight plan filed and approved', 'Obtain tower clearance'] },
      { name: 'Deployment Execution', steps: ['Execute takeoff sequence', 'Monitor altitude and heading', 'Confirm cruising altitude reached'] },
      { name: 'Post-Deploy Procedures', steps: ['Execute in-flight procedure checklist', 'Run DRO cargo manifests', 'Enable passenger services'] },

    ]
  }
};

function buildDocFromTemplate(missionName, missionSubtitle, deployDate, deployTime, deployMode, deployStyle, missionReqs) {
  const style = DEPLOY_STYLES[deployStyle] || DEPLOY_STYLES['rocket launch'];

  const requirements = missionReqs
    .split(/[,.\n]+/)
    .map(s => s.replace(/^and\s+/i, '').trim())
    .filter(s => s.length > 8)
    .slice(0, 6);

  const timeline = tasks.map(t => ({
    tMinus: t.phase,
    date: fmtDate(t.date) + (t.time ? ' · ' + fmtTime(t.time) : ''),
    icon: '📋',
    title: t.title,
    description: t.notes,
    items: []
  }));

  timeline.push({
    tMinus: 'T-0',
    date: fmtDate(deployDate) + ' · ' + fmtTime(deployTime),
    icon: style.icon,
    title: `Launch Execution — ${deployMode}`,
    description: `All countdown tasks complete. Initiating ${deployMode} to production. All leads on standby for immediate response.`,
    items: [`${deployMode} initiated`, 'All leads on standby', 'Comms channel open throughout window']
  });

  return {
    missionStatement: style.statement(missionName),
    missionQuote: style.quote,
    requirements,
    timeline,
    launchPhases: style.phases,
    successCriteria: [
      'All user stories deployed successfully with zero rollbacks',
      'Manual post-deployment steps executed and verified',
      'No P1/P2 incidents reported within 2 hours of deployment',
      'E2E test suite passes in production',
      'DRO data migration validated and confirmed',
      'Stakeholder sign-off received',
      'Deployment window closed on schedule'
    ]
  };
}

async function generateDoc() {
  const btn = document.getElementById('generateBtn');
  btn.classList.add('loading');
  btn.innerHTML = `<span>⏳</span> COMPUTING TRAJECTORY...`;

  const preview = document.getElementById('previewArea');
  preview.innerHTML = `<div class="loading-state"><div class="launch-rocket">🚀</div><div class="launch-seq"><div>INITIALIZING LAUNCH SEQUENCE</div><div class="dots"><span></span><span></span><span></span></div></div></div>`;

  const missionName = document.getElementById('missionName').value;
  const missionSubtitle = document.getElementById('missionSubtitle').value;
  const deployStyle = document.getElementById('deployStyle').value;
  const deployDate = document.getElementById('deployDate').value;
  const deployTime = document.getElementById('deployTime').value;
  const deployMode = document.getElementById('deployMode').value;
  const missionReqs = document.getElementById('missionReqs').value;

  await new Promise(r => setTimeout(r, 400));

  const doc = buildDocFromTemplate(missionName, missionSubtitle, deployDate, deployTime, deployMode, deployStyle, missionReqs);

  renderDocument(doc, { missionName, missionSubtitle, deployDate, deployTime, deployMode, deployStyle });
  ['btnHtml','btnMd','btnPrint'].forEach(id => document.getElementById(id).disabled = false);

  btn.classList.remove('loading');
  btn.innerHTML = `<span class="rocket">🚀</span> REGENERATE LAUNCH SEQUENCE`;
}

function renderDocument(doc, meta) {
  const { missionName, missionSubtitle, deployDate, deployTime, deployMode } = meta;
  const preview = document.getElementById('previewArea');

  let html = `<div class="preview-content doc-rendered">
    <div class="doc-header">
      <div class="doc-rocket">🚀</div>
      <div class="doc-title-block">
        <div class="doc-mission-label">Mission Control — Launch Sequence Document</div>
        <div class="doc-title">${escHtml(missionName)}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${escHtml(missionSubtitle)}</div>
        <div class="doc-meta">
          <div class="doc-meta-item"><div class="dot"></div>${fmtDate(deployDate)} · ${fmtTime(deployTime)}</div>
          <div class="doc-meta-item"><div class="dot" style="background:var(--amber)"></div>${escHtml(deployMode)}</div>
        </div>
      </div>
    </div>

    <div style="margin-bottom:22px">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Mission Objective</div>
      <div class="req-block"><p>${escHtml(doc.missionStatement)}</p></div>
      <div class="mission-reqs">
        ${(doc.requirements||[]).map(r => `<div class="req-badge">${escHtml(r)}</div>`).join('')}
      </div>
    </div>

    <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:14px">Countdown Timeline</div>
    <div class="timeline">`;

  (doc.timeline||[]).forEach((item, idx) => {
    const isLast = idx === doc.timeline.length - 1;
    html += `
      <div class="timeline-item">
        <div class="timeline-spine">
          <div class="timeline-node ${isLast ? 'launch' : ''}">${item.icon||'📍'}</div>
          ${!isLast ? '<div class="timeline-line"></div>' : ''}
        </div>
        <div class="timeline-content">
          <div class="timeline-header">
            <div class="timeline-t">${escHtml(item.tMinus||'')}</div>
            <div class="timeline-title">${escHtml(item.title)}</div>
            <div class="timeline-date">${escHtml(item.date||'')}</div>
          </div>
          <div class="timeline-body">
            <p style="margin-bottom:8px">${escHtml(item.description||'')}</p>
            ${(item.items||[]).length ? `<ul>${item.items.map(i=>`<li>${escHtml(i)}</li>`).join('')}</ul>` : ''}
          </div>
        </div>
      </div>`;
  });

  html += `</div>`;

  if (doc.launchPhases && doc.launchPhases.length) {
    html += `<div style="margin-top:24px;margin-bottom:8px;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3)">T-0 Launch Execution Phases</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">`;
    doc.launchPhases.forEach((p, i) => {
      html += `<div class="phase-block">
        <div class="phase-title">Phase ${i+1} — ${escHtml(p.name)}</div>
        <div class="phase-steps">
          ${(p.steps||[]).map((s,si) => `<div class="phase-step"><div class="step-num">${si+1}</div>${escHtml(s)}</div>`).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (doc.successCriteria && doc.successCriteria.length) {
    html += `<div style="margin-top:24px;margin-bottom:10px;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3)">Mission Success Criteria</div>
    <div class="checklist">
      ${doc.successCriteria.map(s => `<div class="checklist-item"><div class="check-icon">✓</div>${escHtml(s)}</div>`).join('')}
    </div>`;
  }

  html += `<div class="doc-footer">
    <div class="doc-footer-quote">"${escHtml(doc.missionQuote)}"</div>
    <span class="doc-footer-rocket">🚀</span>
  </div></div>`;

  preview.innerHTML = html;
  lastGeneratedHTML = html;

  // Build markdown
  lastGeneratedMD = buildMarkdown(doc, meta);
}

function buildMarkdown(doc, meta) {
  const { missionName, missionSubtitle, deployDate, deployTime, deployMode } = meta;
  let md = `# 🚀 Mission Control: ${missionName}\n\n`;
  md += `## ${missionSubtitle}\n\n`;
  md += `**Deployment Date:** ${fmtDate(deployDate)} at ${fmtTime(deployTime)}  \n`;
  md += `**Deploy Mode:** ${deployMode}\n\n`;
  md += `---\n\n`;
  md += `## Mission Objective\n\n${doc.missionStatement}\n\n`;
  md += `### Mission Critical Requirements\n\n`;
  (doc.requirements||[]).forEach(r => { md += `- ✅ ${r}\n`; });
  md += `\n---\n\n## Countdown Timeline\n\n`;
  (doc.timeline||[]).forEach(item => {
    md += `### ${item.icon} [${item.tMinus}] ${item.title}\n`;
    md += `**${item.date}**\n\n${item.description}\n\n`;
    (item.items||[]).forEach(i => { md += `- ${i}\n`; });
    md += `\n`;
  });
  md += `---\n\n## Launch Execution Phases\n\n`;
  (doc.launchPhases||[]).forEach((p, i) => {
    md += `**Phase ${i+1} — ${p.name}**\n\n`;
    (p.steps||[]).forEach((s, si) => { md += `${si+1}. ${s}\n`; });
    md += `\n`;
  });
  md += `---\n\n## Mission Success Criteria\n\n`;
  (doc.successCriteria||[]).forEach(s => { md += `- ✅ ${s}\n`; });
  md += `\n---\n\n*"${doc.missionQuote}"* 🚀\n`;
  return md;
}

function download(filename, content, type) {
  const a = document.createElement('a');
  a.href = 'data:' + type + ';charset=utf-8,' + encodeURIComponent(content);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
